        // --- NAVIGATION ---
        function showPage(id) {
    document.querySelectorAll('section').forEach(s => 
        s.classList.add('hidden-section')
    );

    if (id.startsWith('kuis-')) {
        currentLevel = id.replace('kuis-', '');

        // --- READING ---
        function updateReading() {
            const item = readingList[readIdx];
            document.getElementById('word-image').innerText = item.emoji;
            document.getElementById('full-word').innerText = item.word;
            const sylArea = document.getElementById('word-syllables');
            sylArea.innerHTML = '';
            item.syllables.forEach(s => {
                const span = document.createElement('span');
                span.className = 'syllable animate__animated animate__bounceIn';
                span.innerText = s;
                sylArea.appendChild(span);
            });
        }
        function nextWord() { readIdx = (readIdx + 1) % readingList.length; updateReading(); }
        function prevWord() { readIdx = (readIdx - 1 + readingList.length) % readingList.length; updateReading(); }
        
        function speakWord() {
    const text = readingList[readIdx].word;

    const utter = new SpeechSynthesisUtterance(text);

    utter.lang = "id-ID";
    utter.rate = 0.85;   // lebih pelan (lembut)
    utter.pitch = 1.2;   // sedikit tinggi (natural cewek)
    utter.volume = 1;

    const voices = window.speechSynthesis.getVoices();

    // Cari voice Indonesia perempuan
    let femaleVoice = voices.find(v =>
        v.lang.startsWith("id") &&
        v.name.toLowerCase().toLowerCase().includes("female")
    );

    // Jika tidak ada, pakai voice Indonesia apapun
    if (!femaleVoice) {
        femaleVoice = voices.find(v =>
            v.lang.startsWith("id")
        );
    }

    if (femaleVoice) {
        utter.voice = femaleVoice;
    }

    window.speechSynthesis.cancel();
    window.speechSynthesis.speak(utter);
}

        // --- PAINTING & ZOOM ---
        function initMewarnai() {
            pCanvas = document.getElementById('paint-layer'); pCtx = pCanvas.getContext('2d');
            iCanvas = document.getElementById('img-layer'); iCtx = iCanvas.getContext('2d');
            loadChar(document.getElementById('char-select').value);

            const getPos = (e) => {
                const rect = pCanvas.getBoundingClientRect();
                const clientX = e.touches ? e.touches[0].clientX : e.clientX;
                const clientY = e.touches ? e.touches[0].clientY : e.clientY;
                return {
                    x: (clientX - rect.left) * (pCanvas.width / rect.width),
                    y: (clientY - rect.top) * (pCanvas.height / rect.height)
                };
            };
            const start = (e) => { painting = true; draw(e); };
            const stop = () => { painting = false; pCtx.beginPath(); };
            const draw = (e) => {
                if(!painting) return;
                const pos = getPos(e);
                pCtx.lineWidth = document.getElementById('brush-size').value;
                pCtx.lineCap = 'round'; pCtx.lineJoin = 'round';
                pCtx.globalCompositeOperation = isEraser ? 'destination-out' : 'source-over';
                pCtx.strokeStyle = currentColor;
                pCtx.lineTo(pos.x, pos.y); pCtx.stroke();
                pCtx.beginPath(); pCtx.moveTo(pos.x, pos.y);
            };
            pCanvas.onmousedown = start; pCanvas.onmouseup = stop; pCanvas.onmousemove = draw;
            pCanvas.addEventListener('touchstart', (e) => { e.preventDefault(); start(e); }, {passive: false});
            pCanvas.addEventListener('touchend', stop);
            pCanvas.addEventListener('touchmove', (e) => { e.preventDefault(); draw(e); }, {passive: false});
        }
        function changeZoom(amt) {
            currentScale = Math.min(Math.max(1, currentScale + amt), 3);
            document.getElementById('canvas-wrapper').style.transform = `scale(${currentScale})`;
            document.getElementById('zoom-text').innerText = Math.round(currentScale * 100) + "%";
        }
        function resetZoom() { currentScale = 1; changeZoom(0); }
        function loadChar(key) {
            const img = new Image(); img.crossOrigin = "anonymous"; img.src = charImages[key];
            img.onload = () => {
                iCtx.clearRect(0, 0, 500, 500); pCtx.clearRect(0, 0, 500, 500);
                iCtx.drawImage(img, 0, 0, 500, 500); resetZoom();
            };
        }
        function setColor(c) { isEraser = false; currentColor = c; document.getElementById('eraser-btn').style.borderColor = "transparent"; }
        function toggleEraser() { isEraser = !isEraser; document.getElementById('eraser-btn').style.borderColor = isEraser ? "#3b82f6" : "transparent"; }
        function clearPaint() { if(confirm("Hapus semua warna?")) pCtx.clearRect(0, 0, 500, 500); }
        function downloadImage() {
            const temp = document.createElement('canvas'); temp.width = 500; temp.height = 500;
            const tCtx = temp.getContext('2d');
            tCtx.fillStyle = "white"; tCtx.fillRect(0,0,500,500);
            tCtx.drawImage(iCanvas, 0, 0); tCtx.globalCompositeOperation = 'multiply'; tCtx.drawImage(pCanvas, 0, 0);
            const link = document.createElement('a'); link.download = 'karya_drakidsss.png';
            link.href = temp.toDataURL(); link.click();
        }

        // --- QUIZ ---
        function shuffleArray(array) {
    for (let i = array.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [array[i], array[j]] = [array[j], array[i]];
    }
}
        
        function loadQuiz() {
    const data = currentQuestions[qIdx];
    document.getElementById('q-text').innerText = data.q;

    const grid = document.getElementById('q-grid');
    grid.innerHTML = '';

    data.opt.forEach(o => {
        const b = document.createElement('button');
        b.className = "p-4 bg-white/5 border border-white/10 rounded-xl hover:bg-blue-500/20 transition-all";
        b.innerText = o;

        b.onclick = () => {
            // Disable semua tombol setelah klik
            const allButtons = grid.querySelectorAll("button");
            allButtons.forEach(btn => btn.disabled = true);

            if (o === data.a) {
                // ✅ BENAR
                confetti({ particleCount: 80, spread: 60, origin: { y: 0.6 } });
                score += 4;
                b.classList.add("bg-green-500/40");
            } else {
                // ❌ SALAH
                score -= 2;
                if (score < 0) score = 0;

                b.classList.add("bg-red-500/40");

                // Tampilkan jawaban benar
                allButtons.forEach(btn => {
                    if (btn.innerText === data.a) {
                        btn.classList.add("bg-green-500/40");
                    }
                });
            }

            // Update skor global
            document.getElementById('global-score').innerText = score;

            // Lanjut soal setelah 1 detik
            setTimeout(() => {
                nextQuestion();
            }, 1000);
        };

        grid.appendChild(b);
    });
}
        
        function nextQuestion() {
    if (qIdx >= currentQuestions.length - 1) {
        showResult();
        return;
    }
    qIdx++;
    loadQuiz();
}
// --- GRADING SYSTEM ---
function getGrade(score, total) {
    const maxScore = total * 4;
    const percent = (score / maxScore) * 100;

    if (percent >= 90) return { 
        grade: "A", 
        message: "🌟 Kamu Pintar Sekali!" 
    };

    if (percent >= 80) return { 
        grade: "B", 
        message: "🔥 Kamu Hebat!" 
    };

    if (percent >= 70) return { 
        grade: "C", 
        message: "🙂 Kamu Cukup Baik!" 
    };

    if (percent >= 60) return { 
        grade: "D", 
        message: "💪 Kamu Harus Lebih Semangat!" 
    };

    return { 
        grade: "E", 
        message: "📚 Yuk Belajar Lagi!" 
    };
}

function showResult() {
    lastScore = score;
    lastLevel = currentLevel.toUpperCase();

    const total = currentQuestions.length;
    const hasil = getGrade(score, total);

    document.getElementById("final-score").innerText =
        `Skor kamu: ${score} dari ${total * 4}`;

    document.getElementById("final-grade").innerText =
        `Nilai: ${hasil.grade} - ${hasil.desc}`;

    document.getElementById("result-modal").classList.remove("hidden");
}

        function updateLastScoreDisplay() {
    const el = document.getElementById("last-score-display");

    if (lastScore > 0) {
        el.innerText = `Skor Terakhir ${lastLevel}: ${lastScore}`;
    } else {
        el.innerText = "";
    }
}
        function exitQuiz() {
    // Simpan skor walaupun belum selesai
    if (currentLevel && score > 0) {
        lastScore = score;
        lastLevel = currentLevel.toUpperCase();
    }

    // Reset skor sekarang
    score = 0;
    currentLevel = null;

    // Tampilkan home
    showPage('home');
}
        function closeResult() {
    document.getElementById("result-modal").classList.add("hidden");
    score = 0;
    document.getElementById("global-score").innerText = 0;
    showPage('home');
}
        
        // --- STARS ---
        function createStars() {
            const field = document.getElementById('star-field');
            for (let i = 0; i < 100; i++) {
                const star = document.createElement('div');
                star.className = 'star';
                const size = Math.random() * 3 + 'px';
                star.style.width = size; star.style.height = size;
                star.style.left = Math.random() * 100 + 'vw';
                star.style.top = Math.random() * 100 + 'vh';
                star.style.setProperty('--duration', (Math.random() * 3 + 2) + 's');
                field.appendChild(star);
            }
        }
        createStars();
