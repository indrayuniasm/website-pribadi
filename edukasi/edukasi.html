        .star {
            position: absolute;
            background: white;
            border-radius: 50%;
            opacity: 0.5;
            animation: twinkle var(--duration) infinite ease-in-out;
        }

        @keyframes twinkle {
            0%, 100% { opacity: 0.3; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.2); }
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.05);

        }

        .hidden-section { display: none; }
        
        /* ZOOM CONTAINER */
        .zoom-viewport {
            position: relative;
            width: 320px; height: 320px;
            margin: 0 auto;
            overflow: auto;
            border-radius: 20px;
            border: 4px solid #3b82f6;
            background: white;
        }
        @media (min-width: 640px) { .zoom-viewport { width: 450px; height: 450px; } }

        #canvas-wrapper {
            position: relative;
            width: 500px; height: 500px;
            transform-origin: 0 0;
            transition: transform 0.2s ease-out;
        }
        canvas { position: absolute; top: 0; left: 0; }

        { q: "Struktur informasi genetik?", a: "DNA", opt: ["RNA", "DNA", "Protein", "Enzim"] },
        { q: "Unsur nomor atom 1?", a: "Hidrogen", opt: ["Helium", "Oksigen", "Hidrogen", "Karbon"] },
        { q: "Hukum F = m . a adalah?", a: "Newton II", opt: ["Newton I", "Newton II", "Newton III", "Pascal"] },
        { q: "Inflasi karena biaya produksi?", a: "Cost-push inflation", opt: ["Demand-pull", "Cost-push inflation", "Hiperinflasi", "Deflasi"] },
        { q: "Nilai sin 30°?", a: "1/2", opt: ["0", "1/2", "1", "1/2 √3"] },
        { q: "Pembelahan sel identik?", a: "Mitosis", opt: ["Meiosis", "Mitosis", "Amitosis", "Oogenesis"] },
        { q: "Larutan pH 9 bersifat?", a: "Basa", opt: ["Asam", "Netral", "Basa", "Garam"] },
        { q: "Perang Dunia I berakhir tahun?", a: "1918", opt: ["1914", "1918", "1939", "1945"] },
        { q: "Cepat rambat cahaya (m/s)?", a: "3 x 10^8", opt: ["3 x 10^5", "3 x 10^6", "3 x 10^7", "3 x 10^8"] },
        { q: "Integral 2x dx?", a: "x^2 + C", opt: ["2x^2 + C", "x^2 + C", "x + C", "2 + C"] },
        { q: "Tempat sintesis protein?", a: "Ribosom", opt: ["Ribosom", "Lisosom", "Vakuola", "Nukleus"] },
        { q: "Ikatan penggunaan elektron bersama?", a: "Kovalen", opt: ["Ion", "Logam", "Kovalen", "Hidrogen"] },
        { q: "Batuan dari magma dingin?", a: "Beku", opt: ["Sedimen", "Metamorf", "Beku", "Fosil"] },
        { q: "Pasar hanya satu penjual?", a: "Monopoli", opt: ["Oligopoli", "Monopoli", "Persaingan Sempurna", "Monopsoni"] },
        { q: "Jika log 100 = x, x adalah?", a: "2", opt: ["1", "2", "10", "100"] },
        { q: "Satuan hambatan listrik?", a: "Ohm", opt: ["Volt", "Ampere", "Ohm", "Watt"] },
        { q: "Hormon pengatur gula darah?", a: "Insulin", opt: ["Adrenalin", "Insulin", "Tiroksin", "Estrogen"] },
        { q: "Nama senyawa CH4?", a: "Metana", opt: ["Etana", "Metana", "Propana", "Butana"] },
        { q: "Kota pelaksanaan KAA pertama?", a: "Bandung", opt: ["Jakarta", "Bandung", "Bogor", "Surabaya"] }
    ]
};
        // --- STATE ---
        let pCanvas, pCtx, iCanvas, iCtx, painting = false, currentColor = '#ff0055', isEraser = false;
        let currentScale = 1, readIdx = 0, score = 0, currentLevel = 'sd', qIdx = 0;

        // --- NAVIGATION ---
        function showPage(id) {
            document.querySelectorAll('section').forEach(s => s.classList.add('hidden-section'));
            if(id.startsWith('kuis-')) {
                currentLevel = id.replace('kuis-', ''); qIdx = 0;
                document.getElementById('quiz-box').classList.remove('hidden-section'); 
                document.getElementById('quiz-title').innerText = "KUIS " + currentLevel.toUpperCase();
                loadQuiz();
            } else {
                document.getElementById(id).classList.remove('hidden-section');
                if(id === 'mewarnai') initMewarnai();
                if(id === 'belajar-membaca') updateReading();
            }
        }

        // --- READING ---
        function updateReading() {
            const item = readingList[readIdx];
            document.getElementById('word-image').innerText = item.emoji;
            document.getElementById('full-word').innerText = item.word;
            const sylArea = document.getElementById('word-syllables');
            sylArea.innerHTML = '';
            item.syllables.forEach(s => {
                const span = document.createElement('span');
                span.className = 'syllable animate__animated animate__bounceIn';
                span.innerText = s;
                sylArea.appendChild(span);
            });
        }
        function nextWord() { readIdx = (readIdx + 1) % readingList.length; updateReading(); }
        function prevWord() { readIdx = (readIdx - 1 + readingList.length) % readingList.length; updateReading(); }
        function speakWord() {
            const utter = new SpeechSynthesisUtterance(readingList[readIdx].word);
            utter.lang = 'id-ID'; utter.rate = 0.8;
            window.speechSynthesis.speak(utter);
        }

        // --- PAINTING & ZOOM ---
        function initMewarnai() {
            pCanvas = document.getElementById('paint-layer'); pCtx = pCanvas.getContext('2d');
            iCanvas = document.getElementById('img-layer'); iCtx = iCanvas.getContext('2d');
            loadChar(document.getElementById('char-select').value);

            const getPos = (e) => {
                const rect = pCanvas.getBoundingClientRect();
                const clientX = e.touches ? e.touches[0].clientX : e.clientX;
                const clientY = e.touches ? e.touches[0].clientY : e.clientY;
                return {
                    x: (clientX - rect.left) * (pCanvas.width / rect.width),
                    y: (clientY - rect.top) * (pCanvas.height / rect.height)
                };
            };
            const start = (e) => { painting = true; draw(e); };
            const stop = () => { painting = false; pCtx.beginPath(); };
            const draw = (e) => {
                if(!painting) return;
                const pos = getPos(e);
                pCtx.lineWidth = document.getElementById('brush-size').value;
                pCtx.lineCap = 'round'; pCtx.lineJoin = 'round';
                pCtx.globalCompositeOperation = isEraser ? 'destination-out' : 'source-over';
                pCtx.strokeStyle = currentColor;
                pCtx.lineTo(pos.x, pos.y); pCtx.stroke();
                pCtx.beginPath(); pCtx.moveTo(pos.x, pos.y);
            };
            pCanvas.onmousedown = start; pCanvas.onmouseup = stop; pCanvas.onmousemove = draw;
            pCanvas.addEventListener('touchstart', (e) => { e.preventDefault(); start(e); }, {passive: false});
            pCanvas.addEventListener('touchend', stop);
            pCanvas.addEventListener('touchmove', (e) => { e.preventDefault(); draw(e); }, {passive: false});
        }
        function changeZoom(amt) {
            currentScale = Math.min(Math.max(1, currentScale + amt), 3);
            document.getElementById('canvas-wrapper').style.transform = `scale(${currentScale})`;
            document.getElementById('zoom-text').innerText = Math.round(currentScale * 100) + "%";
        }
        function resetZoom() { currentScale = 1; changeZoom(0); }
        function loadChar(key) {
            const img = new Image(); img.crossOrigin = "anonymous"; img.src = charImages[key];
            img.onload = () => {
                iCtx.clearRect(0, 0, 500, 500); pCtx.clearRect(0, 0, 500, 500);
                iCtx.drawImage(img, 0, 0, 500, 500); resetZoom();
            };
        }
        function setColor(c) { isEraser = false; currentColor = c; document.getElementById('eraser-btn').style.borderColor = "transparent"; }
        function toggleEraser() { isEraser = !isEraser; document.getElementById('eraser-btn').style.borderColor = isEraser ? "#3b82f6" : "transparent"; }
        function clearPaint() { if(confirm("Hapus semua warna?")) pCtx.clearRect(0, 0, 500, 500); }
        function downloadImage() {
            const temp = document.createElement('canvas'); temp.width = 500; temp.height = 500;
            const tCtx = temp.getContext('2d');
            tCtx.fillStyle = "white"; tCtx.fillRect(0,0,500,500);
            tCtx.drawImage(iCanvas, 0, 0); tCtx.globalCompositeOperation = 'multiply'; tCtx.drawImage(pCanvas, 0, 0);
            const link = document.createElement('a'); link.download = 'karya_drakidsss.png';
            link.href = temp.toDataURL(); link.click();
        }

        // --- QUIZ ---
        function loadQuiz() {
            const data = bank[currentLevel][qIdx];
            document.getElementById('q-text').innerText = data.q;
            const grid = document.getElementById('q-grid'); grid.innerHTML = '';
            data.opt.forEach(o => {
                const b = document.createElement('button');
                b.className = "p-4 bg-white/5 border border-white/10 rounded-xl hover:bg-blue-500/20 transition-all";
                b.innerText = o;
                b.onclick = () => {
                    if(o === data.a) { 
                        confetti({ particleCount: 100, spread: 70, origin: { y: 0.6 } });
                        score += 10; document.getElementById('global-score').innerText = score; 
                        nextQuestion(); 
                    } else { alert("Aduh, kurang tepat! Coba lagi!"); }
                };
                grid.appendChild(b);
            });
        }
        function nextQuestion() { qIdx = (qIdx + 1) % bank[currentLevel].length; loadQuiz(); }

        // --- STARS ---
        function createStars() {
            const field = document.getElementById('star-field');
            for (let i = 0; i < 100; i++) {
                const star = document.createElement('div');
                star.className = 'star';
                const size = Math.random() * 3 + 'px';
                star.style.width = size; star.style.height = size;
                star.style.left = Math.random() * 100 + 'vw';
                star.style.top = Math.random() * 100 + 'vh';
                star.style.setProperty('--duration', (Math.random() * 3 + 2) + 's');
                field.appendChild(star);
            }
        }
        createStars();
    </script>
</body>
