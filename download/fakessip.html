:root {
    --gold-light: #f9e29d;
    --gold-mid: #d4af37;
    --gold-dark: #a67c00;
}

/* Kunci scroll saat loading */
body.loading-active {
    overflow: hidden !important;
    height: 100vh;
    min-height: 100vh;
}

#preloader {
    position: fixed;
    top: 0; left: 0; width: 100%; height: 100%;
    background: #0f0e0d; /* Background gelap khas mewah */
    display: flex;
    justify-content: center;
    align-items: center;
    z-index: 10002;
    perspective: 1000px;
    transition: opacity 1s ease, visibility 1s ease;
}

.luxury-loader {
    position: relative;
    width: 200px;
    height: 200px;
    transform-style: preserve-3d;
}

.luxury-loader .ring {
    position: absolute;
    width: 100%;
    height: 100%;
    border: 2px solid transparent;
    border-top: 4px solid var(--gold-mid);
    border-radius: 50%;
    box-shadow: 0 0 20px rgba(212, 175, 55, 0.2);
}
    .cursive {
            font-family: 'Great Vibes', cursive;
        }

/* Animasi Cincin 1, 2, 3 sesuai struktur kamu */
.luxury-loader .ring:nth-child(1) {
    animation: rotate3D_1 2s linear infinite;
}

.luxury-loader .ring:nth-child(2) {
    animation: rotate3D_2 2s linear infinite;
    border-top: 4px solid var(--gold-light);
    width: 90%; height: 90%; top: 5%; left: 5%;
}

.luxury-loader .ring:nth-child(3) {
    animation: rotate3D_3 2s linear infinite;
    border-top: 4px solid var(--gold-dark);
    width: 80%; height: 80%; top: 10%; left: 10%;
}

.loading-text {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    text-align: center;
    width: 100%;
    z-index: 10;
}

.loading-text span {
    display: block;
    font-size: 3rem;
    color: var(--gold-mid);
    text-shadow: 0 0 15px rgba(212, 175, 55, 0.5);
}

.loading-text p {
    font-family: 'Montserrat', sans-serif;
    font-size: 0.6rem;
    letter-spacing: 5px;
    text-transform: uppercase;
    color: white;
    margin-top: 10px;
    opacity: 0.8;
    animation: pulseText 1.5s ease-in-out infinite;
}

@keyframes rotate3D_1 {
    0% { transform: rotateX(35deg) rotateY(-45deg) rotateZ(0deg); }
    100% { transform: rotateX(35deg) rotateY(-45deg) rotateZ(360deg); }
}

@keyframes rotate3D_2 {
    0% { transform: rotateX(50deg) rotateY(10deg) rotateZ(0deg); }
    100% { transform: rotateX(50deg) rotateY(10deg) rotateZ(360deg); }
}

@keyframes rotate3D_3 {
    0% { transform: rotateX(-35deg) rotateY(55deg) rotateZ(0deg); }
    100% { transform: rotateX(-35deg) rotateY(55deg) rotateZ(360deg); }
}

@keyframes pulseText {
    0%, 100% { opacity: 0.3; }
    50% { opacity: 1; }
}

<script>
    async function generateIQC() {
    const text = document.getElementById('textInput').value;
    const jamRaw = document.getElementById('jamInput').value; // Mengambil "12:05"
    const bat = document.getElementById('batInput').value;
    const prov = document.getElementById('provInput').value;
    
    const btn = document.getElementById('btnGen');
    const loader = document.getElementById('loading');
    const wrapper = document.getElementById('resultWrapper');
    const imgElement = document.getElementById('resultImg');

    if (!text) return alert("Pesan tidak boleh kosong!");

    // Jika API NexRay kaku (minta 1200), gunakan ini:
    // const jamFormatted = jamRaw.replace(':', ''); 
    
    // Tapi karena kamu minta "pake titik juga" di screenshot:
    // Kita kirim jamRaw apa adanya ("12:00") atau gunakan URL Encode
    const jamForApi = encodeURIComponent(jamRaw); 

    wrapper.classList.add('hidden');
    imgElement.classList.remove('show');
    loader.classList.remove('hidden');
    btn.disabled = true;

    // Masukkan jam yang sudah ada titiknya ke URL
    const apiUrl = `https://api.nexray.web.id/maker/v1/iqc?text=${encodeURIComponent(text)}&provider=${encodeURIComponent(prov)}&jam=${jamForApi}&baterai=${bat}`;

    const tempImg = new Image();
    tempImg.src = apiUrl;

    tempImg.onload = function() {
        imgElement.src = apiUrl;
        loader.classList.add('hidden');
        wrapper.classList.remove('hidden');
        btn.disabled = false;
        
        setTimeout(() => imgElement.classList.add('show'), 150);
        
        // Auto Download
        setTimeout(() => { downloadIQC(); }, 1200);
    };

    tempImg.onerror = function() {
        alert("Gagal render. Coba ganti format jam atau teks.");
        loader.classList.add('hidden');
        btn.disabled = false;
    };
}

        async function downloadIQC() {
            const imgSrc = document.getElementById('resultImg').src;
            if (!imgSrc) return;

            try {
                const response = await fetch(imgSrc);
                const blob = await response.blob();
                const url = window.URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `iFake_SS_${Date.now()}.png`;
                document.body.appendChild(a);
                a.click();
                window.URL.revokeObjectURL(url);
                document.body.removeChild(a);
            } catch (e) {
                window.open(imgSrc, '_blank');
            }
        }

        document.body.classList.add('loading-active');
    window.addEventListener('load', () => {
        const preloader = document.getElementById('preloader');
        setTimeout(() => {
            preloader.style.opacity = '0';
            preloader.style.visibility = 'hidden';
            document.body.classList.remove('loading-active');
        }, 3000); 
    });
    </script>
