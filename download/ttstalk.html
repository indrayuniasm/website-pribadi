<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TT Stalk - IYM Project</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Montserrat:wght@700&family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://cdn.tailwindcss.com"></script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { 
                        sans: ['Plus Jakarta Sans', 'sans-serif'], 
                        cursive: ['Great Vibes', 'cursive'] 
                    },
                    colors: {
                        gold: { light: '#f9e29d', mid: '#d4af37', dark: '#a67c00' },
                        tt: { pink: '#FE2C55', cyan: '#25F4EE', dark: '#050505' }
                    }
                }
            }
        }
    </script>

    <style>
        :root { --accent: #FE2C55; }
        
        body {
            background-color: #050505;
            color: white;
            font-family: 'Plus Jakarta Sans', sans-serif;
            min-height: 100vh;
            overflow-x: hidden;
        }

        body.loading-active { overflow: hidden !important; }

        /* Background Animation */
        .bg-mesh {
            position: fixed;
            inset: 0;
            z-index: -1;
            background: 
                radial-gradient(at 0% 0%, rgba(254, 44, 85, 0.15) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(37, 244, 238, 0.1) 0px, transparent 50%);
        }

        /* Luxury Preloader */
        #preloader {
            position: fixed;
            inset: 0;
            background: #0f0e0d;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 10002;
            transition: opacity 1s ease, visibility 1s ease;
        }

        .luxury-loader {
            position: relative;
            width: 200px; height: 200px;
            transform-style: preserve-3d;
            perspective: 1000px;
        }

        .luxury-loader .ring {
            position: absolute;
            inset: 0;
            border: 2px solid transparent;
            border-top: 4px solid #d4af37;
            border-radius: 50%;
        }

        .luxury-loader .ring:nth-child(1) { animation: rotate3D_1 2s linear infinite; }
        .luxury-loader .ring:nth-child(2) { 
            animation: rotate3D_2 2s linear infinite; 
            border-top-color: #f9e29d;
            inset: 5%;
        }
        .luxury-loader .ring:nth-child(3) { 
            animation: rotate3D_3 2s linear infinite; 
            border-top-color: #a67c00;
            inset: 10%;
        }

        @keyframes rotate3D_1 { 0% { transform: rotateX(35deg) rotateY(-45deg) rotateZ(0deg); } 100% { transform: rotateX(35deg) rotateY(-45deg) rotateZ(360deg); } }
        @keyframes rotate3D_2 { 0% { transform: rotateX(50deg) rotateY(10deg) rotateZ(0deg); } 100% { transform: rotateX(50deg) rotateY(10deg) rotateZ(360deg); } }
        @keyframes rotate3D_3 { 0% { transform: rotateX(-35deg) rotateY(55deg) rotateZ(0deg); } 100% { transform: rotateX(-35deg) rotateY(55deg) rotateZ(360deg); } }

        /* UI Components */
        .glass-panel {
            background: rgba(20, 20, 20, 0.7);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .bento-item {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.05);
            transition: all 0.3s ease;
        }

        .bento-item:hover {
            background: rgba(255, 255, 255, 0.08);
            transform: translateY(-5px);
            border-color: var(--accent);
        }

        .floating { animation: float 6s ease-in-out infinite; }
        @keyframes float { 0%, 100% { transform: translateY(0px); } 50% { transform: translateY(-15px); } }
    </style>
</head>
<body class="loading-active">
    <div class="bg-mesh"></div>

    <div id="preloader">
        <div class="luxury-loader">
            <div class="ring"></div>
            <div class="ring"></div>
            <div class="ring"></div>
            <div class="absolute inset-0 flex flex-col items-center justify-center text-center">
                <span class="font-cursive text-5xl text-gold-mid">dra</span>
                <p class="text-[8px] tracking-[4px] uppercase text-white/60 mt-2 animate-pulse">Welcome To My Site</p>
            </div>
        </div>
    </div>

    <div class="flex flex-col min-h-screen">
        <main class="flex-grow max-w-7xl mx-auto px-6 py-12 w-full">
            
            <nav class="flex flex-col md:flex-row justify-between items-center gap-6 mb-16">
                <div class="flex items-center gap-4">
                    <div class="w-12 h-12 bg-tt-pink rounded-xl flex items-center justify-center shadow-lg shadow-tt-pink/20">
                        <i class="fab fa-tiktok text-xl text-white"></i>
                    </div>
                    <div>
                        <h1 class="text-2xl font-extrabold tracking-tighter italic">STALKING TIKTOK
                        <p class="text-[10px] font-bold text-zinc-500 tracking-widest uppercase">Project By IYM</p>
                    </div>
                </div>

                <div class="relative w-full md:w-96">
                    <div class="relative flex bg-zinc-900 border border-white/10 rounded-xl p-1 focus-within:border-tt-pink/50 transition-all">
                        <input type="text" id="usernameInput" placeholder="Username TikTok..." 
                            class="bg-transparent border-none outline-none w-full px-4 text-sm">
                        <button onclick="stalkUser()" class="bg-tt-pink text-white px-4 py-2 rounded-lg font-bold text-xs hover:brightness-110 transition-all">
                            SEARCH
                        </button>
                    </div>
                </div>
            </nav>

            <div id="welcome" class="text-center py-20">
                <div class="w-24 h-24 bg-zinc-900 rounded-full flex items-center justify-center mx-auto mb-6 border border-white/10 floating">
                    <i class="fa-solid fa-bolt text-3xl text-tt-pink"></i>
                </div>
                <h2 class="text-4xl font-bold mb-2">Siap Melacak?</h2>
                <p class="text-zinc-500">Masukkan username untuk melihat statistik akun.</p>
            </div>

            <div id="loading" class="hidden text-center py-20">
                <div class="w-12 h-12 border-4 border-tt-pink border-t-transparent rounded-full animate-spin mx-auto mb-4"></div>
                <p class="text-tt-pink font-bold text-sm tracking-widest">LOADING DATA...</p>
            </div>

            <div id="resultContainer" class="hidden space-y-6">
                <div class="glass-panel rounded-[2rem] p-8 md:p-12 relative overflow-hidden">
                    <div class="flex flex-col md:flex-row items-center gap-8 relative z-10">
                        <img id="avatar" src="" class="w-40 h-40 rounded-3xl object-cover border-4 border-white/10 shadow-2xl">
                        <div class="text-center md:text-left">
                            <div class="flex items-center justify-center md:justify-start gap-3">
                                <h2 id="fullName" class="text-4xl font-black tracking-tighter"></h2>
                                <span id="regionBadge" class="text-[10px] bg-white/10 px-2 py-1 rounded-md font-bold"></span>
                                
                            </div>
                            <p id="username" class="text-tt-pink font-bold text-lg mb-4"></p>
                            <p id="bio" class="text-zinc-400 text-sm max-w-md italic"></p>
                        </div>
                        <div class="md:ml-auto">
                            <a id="profileLink" href="#" target="_blank" class="w-14 h-14 bg-white text-black rounded-full flex items-center justify-center hover:scale-110 transition-transform shadow-xl">
                                <i class="fa-solid fa-external-link text-xl"></i>
                            </a>
                        </div>
                    </div>
                </div>

                <div class="grid grid-cols-2 lg:grid-cols-4 gap-4">
                    <div class="bento-item p-6 rounded-3xl text-center">
                        <p id="followers" class="text-3xl font-black text-white">0</p>
                        <p class="text-[10px] uppercase tracking-widest text-zinc-500 font-bold">Followers</p>
                    </div>
                    <div class="bento-item p-6 rounded-3xl text-center">
                        <p id="following" class="text-3xl font-black text-white">0</p>
                        <p class="text-[10px] uppercase tracking-widest text-zinc-500 font-bold">Following</p>
                    </div>
                    <div class="bento-item p-6 rounded-3xl text-center">
                        <p id="likes" class="text-3xl font-black text-white">0</p>
                        <p class="text-[10px] uppercase tracking-widest text-zinc-500 font-bold">Total Like</p>
                    </div>
                    <div class="bento-item p-6 rounded-3xl text-center">
                        <p id="videoCount" class="text-3xl font-black text-white">0</p>
                        <p class="text-[10px] uppercase tracking-widest text-zinc-500 font-bold">Video</p>
                    </div>
                    <div class="bento-item p-6 rounded-3xl text-center">
                        <p id="private" class="text-3xl font-black text-white">0</p>
                        <p class="text-[10px] uppercase tracking-widest text-zinc-500 font-bold">Private</p>
                    </div>
                    <div class="bento-item p-6 rounded-3xl text-center">
                        <p id="friend" class="text-3xl font-black text-white">0</p>
                        <p class="text-[10px] uppercase tracking-widest text-zinc-500 font-bold">Friend</p>
                    </div>
                    <div class="bento-item p-6 rounded-3xl text-center">
                        <p id="new_followers" class="text-3xl font-black text-white">0</p>
                        <p class="text-[10px] uppercase tracking-widest text-zinc-500 font-bold">New Followers</p>
                    </div>
                    
                </div>
            </div>
        </main>

        <footer class="bg-transparent border-t border-white/5 py-10 mt-auto">
    <div class="max-w-6xl mx-auto px-8 flex flex-col md:flex-row justify-between items-center gap-8">
        <div class="order-2 md:order-1 text-center md:text-left">
            <p class="text-[10px] text-gray-500 font-bold uppercase tracking-widest">
                &copy; 2026 <span class="text-[#24A1DE]">-Indra Y.M</span>
            </p>
        </div>

        <div class="flex items-center gap-6 order-1 md:order-2">
            <a href="https://wa.me/6283849997221" target="_blank" class="text-gray-500 hover:text-green-500 transition-colors">
                <i class="fa-brands fa-whatsapp text-xl"></i>
            </a>
            <a href="https://instagram.com/asmarabot" target="_blank" class="text-gray-500 hover:text-pink-500 transition-colors">
                <i class="fa-brands fa-instagram text-xl"></i>
            </a>
            <a href="https://www.tiktok.com/@apaan_oy" target="_blank" class="text-gray-500 hover:text-[#24A1DE] transition-colors">
                <i class="fa-brands fa-tiktok text-xl"></i>
            </a>
        </div>
    </div>
</footer>

    <script>
        function formatUnixTime(unixTime) {
            const date = new Date(unixTime * 1000);
            return date.toLocaleDateString('id-ID', { year: 'numeric', month: 'long', day: 'numeric' });
        }

        async function stalkUser() {
            const user = document.getElementById('usernameInput').value;
            const welcome = document.getElementById('welcome');
            const container = document.getElementById('resultContainer');
            const loader = document.getElementById('loading');
            
            if(!user) return alert('Input username!');

            welcome.classList.add('hidden');
            container.classList.add('hidden');
            loader.classList.remove('hidden');

            try {
                const response = await fetch(`https://api.nexray.web.id/stalker/tiktok?username=${encodeURIComponent(user)}`);
                const data = await response.json();

                if (data.status && data.result) {
                    const res = data.result;
                    document.getElementById('avatar').src = res.avatar;
                    document.getElementById('fullName').innerText = res.name || 'User';
                    document.getElementById('username').innerText = `@${res.username}`;
                    document.getElementById('bio').innerText = res.bio || 'No Bio';
                    document.getElementById('new_followers').innerText = res.new_followers || 'kosong';
                    document.getElementById('private').innerText = res.private || 'No';
                    document.getElementById('regionBadge').innerText = res.region.toUpperCase();
                    document.getElementById('followers').innerText = res.stats.followers.toLocaleString();
                    document.getElementById('following').innerText = res.stats.following.toLocaleString();
                    document.getElementById('likes').innerText = res.stats.likes.toLocaleString();
                    document.getElementById('friend').innerText = res.stats.friend.toLocaleString();
                    
                    document.getElementById('videoCount').innerText = res.stats.videos.toLocaleString();
                    document.getElementById('profileLink').href = res.link;

                    loader.classList.add('hidden');
                    container.classList.remove('hidden');
                } else {
                    alert('User tidak ditemukan!');
                    loader.classList.add('hidden');
                    welcome.classList.remove('hidden');
                }
            } catch (e) {
                alert('Eror koneksi!');
                loader.classList.add('hidden');
                welcome.classList.remove('hidden');
            }
        }

        window.addEventListener('load', () => {
            const preloader = document.getElementById('preloader');
            setTimeout(() => {
                preloader.style.opacity = '0';
                preloader.style.visibility = 'hidden';
                document.body.classList.remove('loading-active');
            }, 2500);
        });
    </script>
</body>
</html>
