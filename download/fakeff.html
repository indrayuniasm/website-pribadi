<style>
    @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        
        body { 
            background: #0f172a; 
            color: white; 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            cursor: default !important; /* Kursor Asli */
        }

        button, a { cursor: pointer; }

        .tg-card { background: #1e293b; border: 1px solid rgba(255,255,255,0.05); }
        .sticker-item { background: rgba(255,255,255,0.03); transition: all 0.3s ease; }
        .sticker-item:hover { transform: translateY(-5px); background: rgba(255,255,255,0.08); }
        .btn-tg { background: #24A1DE; }
        .loader { border-top-color: #24A1DE; animation: spin 1s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
:root {
    --gold-light: #f9e29d;
    --gold-mid: #d4af37;
    --gold-dark: #a67c00;
}

/* Kunci scroll saat loading */
body.loading-active {
    overflow: hidden !important;
    height: 100vh;
    min-height: 100vh;
}

#preloader {
    position: fixed;
    top: 0; left: 0; width: 100%; height: 100%;
    background: #0f0e0d; /* Background gelap khas mewah */
    display: flex;
    justify-content: center;
    align-items: center;
    z-index: 10002;
    perspective: 1000px;
    transition: opacity 1s ease, visibility 1s ease;
}

.luxury-loader {
    position: relative;
    width: 200px;
    height: 200px;
    transform-style: preserve-3d;
}

.luxury-loader .ring {
    position: absolute;
    width: 100%;
    height: 100%;
    border: 2px solid transparent;
    border-top: 4px solid var(--gold-mid);
    border-radius: 50%;
    box-shadow: 0 0 20px rgba(212, 175, 55, 0.2);
}
    .cursive {
            font-family: 'Great Vibes', cursive;
        }

/* Animasi Cincin 1, 2, 3 sesuai struktur kamu */
.luxury-loader .ring:nth-child(1) {
    animation: rotate3D_1 2s linear infinite;
}

.luxury-loader .ring:nth-child(2) {
    animation: rotate3D_2 2s linear infinite;
    border-top: 4px solid var(--gold-light);
    width: 90%; height: 90%; top: 5%; left: 5%;
}

.luxury-loader .ring:nth-child(3) {
    animation: rotate3D_3 2s linear infinite;
    border-top: 4px solid var(--gold-dark);
    width: 80%; height: 80%; top: 10%; left: 10%;
}

.loading-text {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    text-align: center;
    width: 100%;
    z-index: 10;
}

.loading-text span {
    display: block;
    font-size: 3rem;
    color: var(--gold-mid);
    text-shadow: 0 0 15px rgba(212, 175, 55, 0.5);
}

.loading-text p {
    font-family: 'Montserrat', sans-serif;
    font-size: 0.6rem;
    letter-spacing: 5px;
    text-transform: uppercase;
    color: white;
    margin-top: 10px;
    opacity: 0.8;
    animation: pulseText 1.5s ease-in-out infinite;
}

@keyframes rotate3D_1 {
    0% { transform: rotateX(35deg) rotateY(-45deg) rotateZ(0deg); }
    100% { transform: rotateX(35deg) rotateY(-45deg) rotateZ(360deg); }
}

@keyframes rotate3D_2 {
    0% { transform: rotateX(50deg) rotateY(10deg) rotateZ(0deg); }
    100% { transform: rotateX(50deg) rotateY(10deg) rotateZ(360deg); }
}

@keyframes rotate3D_3 {
    0% { transform: rotateX(-35deg) rotateY(55deg) rotateZ(0deg); }
    100% { transform: rotateX(-35deg) rotateY(55deg) rotateZ(360deg); }
}

@keyframes pulseText {
    0%, 100% { opacity: 0.3; }
    50% { opacity: 1; }
}

    
</style>
</head>
<body>
    <div class="flex flex-col min-h-screen"> <main class="flex-grow p-4 md:p-10 flex flex-col items-center">
<div id="preloader">
    <div class="luxury-loader">
        <div class="ring"></div>
        <div class="ring"></div>
        <div class="ring"></div>
        <div class="loading-text">
            <span class="cursive" style="font-size: 3rem; color: var(--gold-mid); display: block;">dra</span>
                <p style="color: white; font-size: 0.6rem; letter-spacing: 5px; text-transform: uppercase; margin-top: 10px; opacity: 0.8;">Welcome To My site</p>
        </div>
    </div>
</div>
<!--isian web-->
        <div class="text-center mt-10 mb-10">
        <h1 class="text-5xl font-black text-transparent bg-clip-text ff-gradient italic tracking-tighter uppercase">FF LOBBY MAKER</h1>
        <p class="text-gray-500 mt-2 text-[10px] font-bold tracking-[0.3em] uppercase opacity-60">IYM Project • Booyah Edition</p>
    </div>

    <div class="w-full max-w-lg glass p-6 md:p-10 rounded-[2.5rem] shadow-2xl border-t border-white/10">
        <div class="space-y-6">
            <div>
                <label class="text-[10px] uppercase font-black text-orange-500 ml-2 mb-3 block tracking-widest">Survivor Nickname</label>
                <div class="bg-white/5 rounded-2xl flex items-center p-1 border border-white/10 focus-within:border-orange-500/50 transition-all">
                    <span class="pl-5 text-orange-500"><i class="fa-solid fa-crosshairs"></i></span>
                    <input id="nickInput" type="text" placeholder="Masukkan Nickname..."

            <button onclick="generateFF()" id="btnGen" class="w-full ff-gradient hover:brightness-125 text-white py-5 rounded-2xl font-black uppercase tracking-[0.2em] transition-all ff-glow active:scale-95">

        <div class="grid grid-cols-2 gap-4 mt-8 w-full max-w-md">

    </main>
<script>
    async function generateFF() {
            const nick = document.getElementById('nickInput').value;
            const btn = document.getElementById('btnGen');
            const loader = document.getElementById('loading');
            const wrapper = document.getElementById('resultWrapper');
            const imgElement = document.getElementById('resultImg');

            if (!nick) return alert("Nickname-nya isi dulu, Bang!");

            // UI Reset
            wrapper.classList.add('hidden');
            imgElement.classList.remove('show');
            loader.classList.remove('hidden');
            btn.disabled = true;

            // Langsung tembak API NexRay (Tanpa Upload ImgBB)
            const apiUrl = `https://api.nexray.web.id/maker/fakelobyff?nickname=${encodeURIComponent(nick)}`;

            const tempImg = new Image();
            tempImg.src = apiUrl;

            tempImg.onload = function() {
                imgElement.src = apiUrl;
                loader.classList.add('hidden');
                wrapper.classList.remove('hidden');
                btn.disabled = false;
                
                // Animasi muncul
                setTimeout(() => imgElement.classList.add('show'), 100);

                // Otomatis download (delay 1.5 detik biar user lihat hasilnya dulu)
                setTimeout(() => {
                    downloadFF();
                }, 1500);
            };

            tempImg.onerror = function() {
                alert("Gagal mengambil data. Server mungkin sibuk.");
                loader.classList.add('hidden');
                btn.disabled = false;
            };
        }

        async function downloadFF() {
            const imgSrc = document.getElementById('resultImg').src;
            if (!imgSrc || imgSrc === "") return;

            try {
                const response = await fetch(imgSrc);
                const blob = await response.blob();
                const url = window.URL.createObjectURL(blob);
                
                const a = document.createElement('a');
                a.href = url;
                a.download = `IYM_FF_Lobby_${Date.now()}.png`;
                document.body.appendChild(a);
                a.click();
                
                window.URL.revokeObjectURL(url);
                document.body.removeChild(a);
            } catch (e) {
                // Fallback jika CORS bermasalah
                window.open(imgSrc, '_blank');
            }
        }

        document.body.classList.add('loading-active');
    window.addEventListener('load', () => {
        const preloader = document.getElementById('preloader');
        setTimeout(() => {
            preloader.style.opacity = '0';
            preloader.style.visibility = 'hidden';
            document.body.classList.remove('loading-active');
        }, 3000); 
    });
    </script>
