<style>
    @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        
        body { 
            background: #0f172a; 
            color: white; 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            min-height: 100vh;
            display: flex;
            flex-direction: column;

        }

        button, a { cursor: pointer; }

        .tg-card { background: #1e293b; border: 1px solid rgba(255,255,255,0.05); }
        .sticker-item { background: rgba(255,255,255,0.03); transition: all 0.3s ease; }
        .sticker-item:hover { transform: translateY(-5px); background: rgba(255,255,255,0.08); }
        .btn-tg { background: #24A1DE; }
        .loader { border-top-color: #24A1DE; animation: spin 1s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
:root {
    --gold-light: #f9e29d;
    --gold-mid: #d4af37;
    --gold-dark: #a67c00;
}

/* Kunci scroll saat loading */
body.loading-active {
    overflow: hidden !important;
    height: 100vh;
    min-height: 100vh;
}

#preloader {
    position: fixed;
    top: 0; left: 0; width: 100%; height: 100%;
    background: #0f0e0d; /* Background gelap khas mewah */
    display: flex;
    justify-content: center;
    align-items: center;
    z-index: 10002;
    perspective: 1000px;
    transition: opacity 1s ease, visibility 1s ease;
}

.luxury-loader {
    position: relative;
    width: 200px;
    height: 200px;
    transform-style: preserve-3d;
}

.luxury-loader .ring {
    position: absolute;
    width: 100%;
    height: 100%;
    border: 2px solid transparent;
    border-top: 4px solid var(--gold-mid);
    border-radius: 50%;
    box-shadow: 0 0 20px rgba(212, 175, 55, 0.2);
}
    .cursive {
            font-family: 'Great Vibes', cursive;
        }

/* Animasi Cincin 1, 2, 3 sesuai struktur kamu */
.luxury-loader .ring:nth-child(1) {
    animation: rotate3D_1 2s linear infinite;
}

.luxury-loader .ring:nth-child(2) {
    animation: rotate3D_2 2s linear infinite;
    border-top: 4px solid var(--gold-light);
    width: 90%; height: 90%; top: 5%; left: 5%;
}

.luxury-loader .ring:nth-child(3) {
    animation: rotate3D_3 2s linear infinite;
    border-top: 4px solid var(--gold-dark);
    width: 80%; height: 80%; top: 10%; left: 10%;
}

.loading-text {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    text-align: center;
    width: 100%;
    z-index: 10;
}

.loading-text span {
    display: block;
    font-size: 3rem;
    color: var(--gold-mid);
    text-shadow: 0 0 15px rgba(212, 175, 55, 0.5);
}

.loading-text p {
    font-family: 'Montserrat', sans-serif;
    font-size: 0.6rem;
    letter-spacing: 5px;
    text-transform: uppercase;
    color: white;
    margin-top: 10px;
    opacity: 0.8;
    animation: pulseText 1.5s ease-in-out infinite;
}

@keyframes rotate3D_1 {
    0% { transform: rotateX(35deg) rotateY(-45deg) rotateZ(0deg); }
    100% { transform: rotateX(35deg) rotateY(-45deg) rotateZ(360deg); }
}

@keyframes rotate3D_2 {
    0% { transform: rotateX(50deg) rotateY(10deg) rotateZ(0deg); }
    100% { transform: rotateX(50deg) rotateY(10deg) rotateZ(360deg); }
}

@keyframes rotate3D_3 {
    0% { transform: rotateX(-35deg) rotateY(55deg) rotateZ(0deg); }
    100% { transform: rotateX(-35deg) rotateY(55deg) rotateZ(360deg); }
}

@keyframes pulseText {
    0%, 100% { opacity: 0.3; }
    50% { opacity: 1; }
}
</style>
</head>
<body>
    <div class="flex flex-col min-h-screen"> <main class="flex-grow p-4 md:p-10 flex flex-col items-center">
<div id="preloader">
    <div class="luxury-loader">
        <div class="ring"></div>
        <div class="ring"></div>
        <div class="ring"></div>
        <div class="loading-text">
            <span class="cursive" style="font-size: 3rem; color: var(--gold-mid); display: block;">dra</span>
                <p style="color: white; font-size: 0.6rem; letter-spacing: 5px; text-transform: uppercase; margin-top: 10px; opacity: 0.8;">Welcome To My site</p>
        </div>
    </div>
</div>
<!--isian web-->
        <div class="text-center mt-10 mb-8">
        <h1 class="text-4xl font-black text-blue-500 tracking-tighter uppercase italic">ML Lobby Maker</h1>

    </div>

    <div class="w-full max-w-xl glass p-6 md:p-8 rounded-[2rem] border border-white/5 shadow-2xl">
        <div class="space-y-5">
            <div>
                <label class="text-[10px] uppercase font-bold text-gray-400 ml-4 mb-2 block tracking-widest">In-Game Nickname</label>
                <div class="glass rounded-2xl flex items-center p-1 border border-white/10">
                    <span class="pl-4 text-blue-500"><i class="fa-solid fa-signature"></i></span>
                    <input id="nickInput" type="text" placeholder="Contoh: NexRay" 
                           class="bg-transparent flex-1 p-4 outline-none text-white placeholder-gray-700 font-bold">

            <div>
                <label class="text-[10px] uppercase font-bold text-gray-400 ml-4 mb-2 block tracking-widest">Avatar / Photo Profile</label>

                    <input id="fileInput" type="file" accept="image/*" class="hidden">
                    
                    <button onclick="document.getElementById('fileInput').click()"

<script>
    // Pastikan ini adalah API Key ImgBB kamu yang valid
    const IMGBB_API_KEY = "a1acd30065ad15688fe2643dce1dbdbc"; 

    // Fungsi Preview Foto
    document.getElementById('fileInput').onchange = function() {
        const file = this.files[0];
        if (file) {
            document.getElementById('fileName').innerText = file.name;
            document.getElementById('fileName').classList.replace('text-gray-400', 'text-white');
            
            const reader = new FileReader();
            reader.onload = function(e) {
                const thumb = document.getElementById('thumbPreview');
                thumb.src = e.target.result;
                thumb.style.display = 'block';
            }
            reader.readAsDataURL(file);
        }
    };

    async function generateLobby() {
        const nick = document.getElementById('nickInput').value;
        const fileInput = document.getElementById('fileInput');
        const btn = document.getElementById('btnGen');
        const loader = document.getElementById('loading');
        const loadText = document.getElementById('loadingText');
        const wrapper = document.getElementById('resultWrapper');
        const imgElement = document.getElementById('resultImg');

        // Validasi input
        if (!nick) return alert("Nickname jangan kosong dong!");
        if (!fileInput.files[0]) return alert("Pilih foto dulu dari galeri!");
        
        // Pengecekan key (Logika diperbaiki)
        if (IMGBB_API_KEY === "" || IMGBB_API_KEY.includes("GANTI")) {
            return alert("API KEY ImgBB belum dikonfigurasi!");
        }

        wrapper.classList.add('hidden');
        imgElement.classList.remove('show'); // Reset animasi gambar
        loader.classList.remove('hidden');
        btn.disabled = true;

        try {
            // STEP 1: Upload ke ImgBB
            loadText.innerText = "Mengirim foto ke Cloud...";
            const formData = new FormData();
            formData.append("image", fileInput.files[0]);
            
            const upload = await fetch(`https://api.imgbb.com/1/upload?key=${IMGBB_API_KEY}`, {
                method: "POST",
                body: formData
            });
            
            const uploadRes = await upload.json();
            if (!uploadRes.success) throw new Error("Gagal mengunggah gambar ke server cloud.");

            const avatarUrl = uploadRes.data.url;

            // STEP 2: Generate Lobby via NexRay
            loadText.innerText = "Menyusun Lobby ML...";
            const apiUrl = `https://api.nexray.web.id/maker/fakelobyml?avatar=${encodeURIComponent(avatarUrl)}&nickname=${encodeURIComponent(nick)}`;
            
            const tempImg = new Image();
            tempImg.src = apiUrl;
            
    tempImg.onload = function() {
    imgElement.src = apiUrl;
    loader.classList.add('hidden');
    wrapper.classList.remove('hidden');
    btn.disabled = false;
    
    setTimeout(() => {
        imgElement.classList.add('show');
    }, 150);

    // Otomatis download setelah gambar muncul
    setTimeout(() => {
        downloadImage();
    }, 1000); 
};

            tempImg.onerror = function() {
                throw new Error("Gagal mengambil hasil dari generator.");
            };

        } catch (error) {
            alert("Oops! " + error.message);
            loader.classList.add('hidden');
            btn.disabled = false;
        }
    }

async function downloadImage() {
    const imgElement = document.getElementById('resultImg');
    const imgSrc = imgElement.src;
    if (!imgSrc || imgSrc === "") return;
    
    // Gunakan nama file yang unik
    const fileName = `IYM_LobbyML_${Date.now()}.png`;

    try {
        // Coba metode Fetch (Blob) dulu karena ini yang paling "bersih"
        const response = await fetch(imgSrc, { mode: 'cors' });
        if (!response.ok) throw new Error("Network response was not ok");
        
        const blob = await response.blob();
        const url = window.URL.createObjectURL(blob);
        
        const a = document.createElement('a');
        a.href = url;
        a.download = fileName;
        document.body.appendChild(a);
        a.click();
        
        window.URL.revokeObjectURL(url);
        document.body.removeChild(a);
    } catch (error) {
        // FALLBACK: Jika Fetch gagal (karena CORS), gunakan metode direct link
        // Catatan: Di beberapa browser, ini akan tetap membuka tab baru jika server tidak mengizinkan download
        console.warn("Fetch failed, using fallback download method.");
        const a = document.createElement('a');
        a.href = imgSrc;
        a.download = fileName;
        a.target = "_blank"; // Supaya tidak menimpa halaman utama
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
    }
}
    
    document.body.classList.add('loading-active');
    window.addEventListener('load', () => {
        const preloader = document.getElementById('preloader');
        setTimeout(() => {
            preloader.style.opacity = '0';
            preloader.style.visibility = 'hidden';
            document.body.classList.remove('loading-active');
        }, 3000); 
    });
</script>
