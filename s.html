<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>tes doang</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <style>
        .glass {
            background: rgba(255, 255, 255, 0.01);
            backdrop-filter: blur(25px);
            border: 1px solid rgba(255, 255, 255, 0.04);
        }
        .custom-scroll::-webkit-scrollbar { width: 3px; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #1d4ed8; border-radius: 10px; }
        .file-item { animation: fadeIn 0.4s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="bg-[#020406] text-gray-400 min-h-screen flex items-center justify-center p-4">

    <div class="max-w-3xl w-full glass p-10 rounded-[3rem] shadow-2xl">
        <header class="text-center mb-12">
            <h1 class="text-3xl font-bold text-white tracking-tight">Bulk Cache <span class="text-blue-500">Recovery</span></h1>
            <p class="text-gray-500 text-sm mt-2">Deteksi format biner & preview instan secara massal</p>
        </header>

        <div id="dropZone" class="group border-2 border-dashed border-gray-800 rounded-3xl p-16 text-center hover:border-blue-500 transition-all cursor-pointer bg-white/[0.01]">
            <input type="file" id="fileInput" class="hidden" multiple>
            <div class="space-y-4">
                <div class="w-20 h-20 bg-blue-500/10 rounded-full flex items-center justify-center mx-auto group-hover:scale-110 transition-transform">
                    <svg class="w-10 h-10 text-blue-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path></svg>
                </div>
                <p class="text-gray-400 font-medium text-lg">Klik atau seret banyak file ke sini</p>
            </div>
        </div>

        <div id="fileListContainer" class="mt-10 hidden">
            <div class="flex justify-between items-center mb-5">
                <span id="fileCount" class="text-xs font-bold text-blue-400 uppercase tracking-widest">0 Files Processed</span>
                <div class="flex gap-4 items-center">
                    <button id="clearBtn" class="text-xs text-red-500 hover:text-red-400">Clear All</button>
                    <button id="downloadZipBtn" class="bg-blue-600 hover:bg-blue-500 text-white text-xs font-bold px-5 py-2 rounded-lg transition-all flex items-center gap-1.5">
                        <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"></path></svg>
                        Download (.ZIP)
                    </button>
                </div>
            </div>

            <div id="fileList" class="max-h-[400px] overflow-y-auto custom-scroll space-y-3 pr-2">
                </div>
        </div>
    </div>

    <script>
        const dropZone = document.getElementById('dropZone');
        const fileInput = document.getElementById('fileInput');
        const fileList = document.getElementById('fileList');
        const fileCount = document.getElementById('fileCount');
        const downloadZipBtn = document.getElementById('downloadZipBtn');
        const clearBtn = document.getElementById('clearBtn');
        const fileListContainer = document.getElementById('fileListContainer');
        
        let processedFiles = [];

        dropZone.onclick = () => fileInput.click();
        clearBtn.onclick = () => { location.reload(); };

        fileInput.onchange = (e) => handleFiles(Array.from(e.target.files));

        async function handleFiles(files) {
            fileListContainer.classList.remove('hidden');
            
            for (let file of files) {
                // Jangan proses file yang sama dua kali (jika user tambah file lagi)
                if (processedFiles.some(pf => pf.file.name === file.name && pf.file.size === file.size)) continue;

                const result = await processFile(file);
                processedFiles.push(result);
                
                renderFileItem(result);
            }
            fileCount.innerText = `${processedFiles.length} Files Processed`;
        }

        async function processFile(file) {
            // Baca 50 byte pertama untuk deteksi format
            const buffer = await file.slice(0, 50).arrayBuffer();
            const uint = new Uint8Array(buffer);
            let bytes = [];
            uint.forEach((byte) => bytes.push(byte.toString(16).padStart(2, '0').toUpperCase()));
            const hex = bytes.join(' ');

            let extension = ".bin";
            let type = "image"; // Default untuk preview

            if (hex.startsWith("FF D8 FF")) { extension = ".jpg"; type="image"; }
            else if (hex.startsWith("89 50 4E 47")) { extension = ".png"; type="image"; }
            else if (hex.includes("66 74 79 70")) { extension = ".mp4"; type="video"; } // MP4 Signature "ftyp"
            else if (hex.startsWith("52 49 46 46") && hex.includes("57 45 42 50")) { extension = ".webp"; type="image"; }
            else if (hex.startsWith("47 49 46 38")) { extension = ".gif"; type="image"; }
            else { type = "unknown"; }

            // Buat Object URL untuk Live Preview (Hemat memori karena kita gak load seluruh file ke JS)
            const previewUrl = (type === 'image' || type === 'video') ? URL.createObjectURL(file) : null;

            return { file, extension, type, previewUrl };
        }

        function renderFileItem(result) {
            const item = document.createElement('div');
            item.className = "file-item flex items-center gap-4 p-3 bg-white/5 rounded-xl border border-white/5 text-sm";
            
            let previewElement = `<div class="w-12 h-12 bg-gray-900 rounded-md flex items-center justify-center text-xs text-gray-700 font-mono">BIN</div>`;
            
            if (result.type === 'image') {
                previewElement = `<img src="${result.previewUrl}" class="w-12 h-12 rounded-md object-cover hover:scale-150 transition-transform cursor-pointer" />`;
            } else if (result.type === 'video') {
                previewElement = `
                    <video class="w-12 h-12 rounded-md object-cover">
                        <source src="${result.previewUrl}" type="video/mp4">
                    </video>`;
            }

            item.innerHTML = `
                ${previewElement}
                <div class="flex-1 min-w-0">
                    <span class="truncate block text-gray-300 font-mono text-xs">${result.file.name}</span>
                    <span class="text-gray-600 text-[11px]">${(result.file.size / 1024 / 1024).toFixed(2)} MB</span>
                </div>
                <span class="text-blue-400 font-mono text-xs font-bold px-3 py-1 bg-blue-500/10 rounded-full">${result.extension.toUpperCase()}</span>
            `;
            fileList.appendChild(item);
        }

        downloadZipBtn.onclick = async () => {
            const zip = new JSZip();
            downloadZipBtn.innerText = "Zipping... ⏳";
            downloadZipBtn.disabled = true;

            processedFiles.forEach(item => {
                // Pertahankan nama file asli tapi tambah ekstensi jika belum ada
                const newFileName = item.file.name.includes('.') ? item.file.name : item.file.name + item.extension;
                zip.file(newFileName, item.file);
            });

            // Buat ZIP file di client-side
            const content = await zip.generateAsync({ type: "blob" });
            const url = URL.createObjectURL(content);
            const a = document.createElement('a');
            a.href = url;
            a.download = `Recovery_Media_${new Date().toISOString().slice(0,10)}.zip`;
            a.click();
            
            // Bersihkan memori dari previewUrls
            processedFiles.forEach(item => { if(item.previewUrl) URL.revokeObjectURL(item.previewUrl); });

            downloadZipBtn.innerText = "Download All as .ZIP";
            downloadZipBtn.disabled = false;
        };
    </script>
</body>
</html>
