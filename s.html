<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium Testimonial Hub</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700&display=swap" rel="stylesheet">
    
    <style>
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background: #05070a;
            color: #e2e8f0;
        }

        /* Background Animasi Halus */
        .bg-gradient-custom {
            background: radial-gradient(circle at 0% 0%, rgba(79, 70, 229, 0.15) 0%, transparent 40%),
                        radial-gradient(circle at 100% 100%, rgba(219, 39, 119, 0.1) 0%, transparent 40%);
        }

        /* Efek Kaca (Glassmorphism) */
        .glass {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            transition: all 0.3s ease;
        }

        .glass:hover {
            border-color: rgba(99, 102, 241, 0.4);
            background: rgba(255, 255, 255, 0.05);
        }

        /* Input Bintang Custom */
        .star-rating {
            display: flex;
            flex-direction: row-reverse;
            justify-content: flex-end;
        }
        .star-rating input { display: none; }
        .star-rating label {
            cursor: pointer;
            font-size: 1.8rem;
            color: #1e293b;
            transition: color 0.2s ease-in-out;
        }
        .star-rating label:hover,
        .star-rating label:hover ~ label,
        .star-rating input:checked ~ label {
            color: #fbbf24;
        }

        /* Animasi Muncul */
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-card { animation: fadeInUp 0.5s ease forwards; }
    </style>
</head>
<body class="bg-gradient-custom min-h-screen">

    <div class="max-w-6xl mx-auto px-6 py-12">
        <div class="text-center mb-16">
            <h1 class="text-5xl font-extrabold tracking-tight mb-4 bg-clip-text text-transparent bg-gradient-to-r from-indigo-400 via-purple-400 to-pink-400">
                Testimoni Pelanggan
            </h1>
            <p class="text-gray-400 max-w-2xl mx-auto text-lg leading-relaxed">
                Kami sangat menghargai setiap masukan. Bagikan pengalaman Anda dan bantu kami menjadi lebih baik lagi.
            </p>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-12 gap-12">
            
            <div class="lg:col-span-4">
                <div class="glass p-8 rounded-3xl sticky top-8 shadow-2xl">
                    <h2 class="text-2xl font-bold mb-6 text-white tracking-wide">Beri Rating</h2>
                    
                    <div class="space-y-6">
                        <div>
                            <label class="block text-xs font-semibold uppercase tracking-widest text-gray-500 mb-2">Nama Lengkap</label>
                            <input type="text" id="userName" placeholder="Contoh: Budi Santoso" 
                                class="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-3 focus:ring-2 focus:ring-indigo-500 outline-none transition text-white">
                        </div>

                        <div>
                            <label class="block text-xs font-semibold uppercase tracking-widest text-gray-500 mb-2">Rating Pelayanan</label>
                            <div class="star-rating bg-white/5 p-3 rounded-xl border border-white/10">
                                <input type="radio" id="s5" name="rating" value="5" checked><label for="s5">★</label>
                                <input type="radio" id="s4" name="rating" value="4"><label for="s4">★</label>
                                <input type="radio" id="s3" name="rating" value="3"><label for="s3">★</label>
                                <input type="radio" id="s2" name="rating" value="2"><label for="s2">★</label>
                                <input type="radio" id="s1" name="rating" value="1"><label for="s1">★</label>
                            </div>
                        </div>

                        <div>
                            <label class="block text-xs font-semibold uppercase tracking-widest text-gray-500 mb-2">Pesan Anda</label>
                            <textarea id="userMsg" rows="4" placeholder="Apa yang Anda rasakan tentang layanan kami?" 
                                class="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-3 focus:ring-2 focus:ring-indigo-500 outline-none transition text-white resize-none"></textarea>
                        </div>

                        <button onclick="sendReview()" id="btnSubmit" 
                            class="w-full bg-gradient-to-r from-indigo-600 to-purple-600 hover:from-indigo-500 hover:to-purple-500 text-white font-bold py-4 rounded-xl shadow-lg transition-all active:scale-95 flex items-center justify-center gap-2">
                            Kirim Ulasan
                        </button>
                    </div>
                </div>
            </div>

            <div class="lg:col-span-8">
                <div class="glass p-3 rounded-2xl mb-8 flex flex-wrap justify-center sm:justify-start gap-2 overflow-x-auto">
                    <button onclick="applyFilter(0)" id="f-0" class="btn-f active-f px-5 py-2 rounded-xl text-sm font-medium transition-all">Semua</button>
                    <button onclick="applyFilter(5)" id="f-5" class="btn-f px-5 py-2 rounded-xl text-sm font-medium transition-all hover:bg-white/5">5 ★</button>
                    <button onclick="applyFilter(4)" id="f-4" class="btn-f px-5 py-2 rounded-xl text-sm font-medium transition-all hover:bg-white/5">4 ★</button>
                    <button onclick="applyFilter(3)" id="f-3" class="btn-f px-5 py-2 rounded-xl text-sm font-medium transition-all hover:bg-white/5">3 ★</button>
                    <button onclick="applyFilter(2)" id="f-2" class="btn-f px-5 py-2 rounded-xl text-sm font-medium transition-all hover:bg-white/5">2 ★</button>
                    <button onclick="applyFilter(1)" id="f-1" class="btn-f px-5 py-2 rounded-xl text-sm font-medium transition-all hover:bg-white/5">1 ★</button>
                </div>

                <div id="listContainer" class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    </div>

                <div id="moreBox" class="mt-12 text-center hidden">
                    <button onclick="enableShowAll()" class="glass px-10 py-3 rounded-full hover:bg-indigo-600 hover:text-white font-semibold transition-all shadow-xl">
                        Lihat Semua Ulasan
                    </button>
                </div>
            </div>

        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, addDoc, query, orderBy, where, onSnapshot, serverTimestamp, limit } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        // ==========================================
        // CONFIG FIREBASE (WAJIB GANTI)
        const firebaseConfig = {
            apiKey: "AIzaSy...",
            authDomain: "projek-anda.firebaseapp.com",
            projectId: "projek-anda",
            storageBucket: "projek-anda.appspot.com",
            messagingSenderId: "12345",
            appId: "1:12345:web:abcd"
        };
        // ==========================================

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const colRef = collection(db, "testimonials");

        let activeRating = 0; 
        let isFullView = false;
        let stopListen = null;

        // --- Core: Load Data ---
        const fetchReviews = () => {
            if (stopListen) stopListen();

            let constraints = [orderBy("createdAt", "desc")];
            
            if (activeRating > 0) constraints.push(where("rating", "==", activeRating));
            if (!isFullView) constraints.push(limit(10));

            const q = query(colRef, ...constraints);

            stopListen = onSnapshot(q, (snap) => {
                const container = document.getElementById('listContainer');
                const moreBtn = document.getElementById('moreBox');
                container.innerHTML = '';

                if (snap.empty) {
                    container.innerHTML = `<div class="col-span-full py-20 text-center text-gray-600 italic">Belum ada ulasan untuk kategori ini.</div>`;
                    moreBtn.classList.add('hidden');
                    return;
                }

                snap.forEach(doc => {
                    const data = doc.data();
                    container.innerHTML += buildCard(data);
                });

                // Logic Tampilkan tombol "Lihat Semua"
                if (snap.size >= 10 && !isFullView) {
                    moreBtn.classList.remove('hidden');
                } else {
                    moreBtn.classList.add('hidden');
                }
            });
        };

        // --- UI: Template Card ---
        const buildCard = (d) => {
            const stars = "★".repeat(d.rating) + "☆".repeat(5 - d.rating);
            const initial = d.name ? d.name.charAt(0).toUpperCase() : '?';
            const date = d.createdAt ? d.createdAt.toDate().toLocaleDateString('id-ID') : 'Baru saja';

            return `
                <div class="glass p-6 rounded-3xl animate-card">
                    <div class="flex items-center gap-4 mb-4">
                        <div class="w-12 h-12 rounded-full bg-gradient-to-tr from-indigo-600 to-purple-600 flex items-center justify-center font-bold text-white shadow-lg">
                            ${initial}
                        </div>
                        <div>
                            <h4 class="text-white font-semibold leading-none">${d.name}</h4>
                            <span class="text-[10px] text-gray-500 uppercase tracking-tighter">${date}</span>
                        </div>
                        <div class="ml-auto text-amber-500 text-sm font-bold bg-amber-500/10 px-2 py-1 rounded-lg">
                            ${d.rating} ★
                        </div>
                    </div>
                    <p class="text-gray-400 text-sm italic leading-relaxed">"${d.message}"</p>
                </div>
            `;
        };

        // --- Logic: Submit ---
        window.sendReview = async () => {
            const name = document.getElementById('userName').value;
            const msg = document.getElementById('userMsg').value;
            const rating = document.querySelector('input[name="rating"]:checked').value;
            const btn = document.getElementById('btnSubmit');

            if (!name || !msg) return alert("Lengkapi nama dan pesan Anda!");

            btn.disabled = true;
            btn.innerHTML = "Mengirim...";

            try {
                await addDoc(colRef, {
                    name,
                    message: msg,
                    rating: parseInt(rating),
                    createdAt: serverTimestamp()
                });
                document.getElementById('userName').value = '';
                document.getElementById('userMsg').value = '';
            } catch (err) {
                console.error(err);
                alert("Gagal mengirim ulasan.");
            } finally {
                btn.disabled = false;
                btn.innerHTML = "Kirim Ulasan";
            }
        };

        // --- Logic: Filter & View ---
        window.applyFilter = (r) => {
            activeRating = r;
            isFullView = false;
            
            // UI Toggle
            document.querySelectorAll('.btn-f').forEach(b => {
                b.classList.remove('bg-indigo-600', 'text-white', 'active-f');
                b.classList.add('hover:bg-white/5');
            });
            const activeBtn = document.getElementById(`f-${r}`);
            activeBtn.classList.add('bg-indigo-600', 'text-white', 'active-f');
            activeBtn.classList.remove('hover:bg-white/5');

            fetchReviews();
        };

        window.enableShowAll = () => {
            isFullView = true;
            fetchReviews();
        };

        // CSS Helper for active filter
        const style = document.createElement('style');
        style.innerHTML = `.active-f { background: #4f46e5 !important; color: white !important; shadow: 0 10px 15px -3px rgba(79, 70, 229, 0.4); }`;
        document.head.appendChild(style);

        // Init
        fetchReviews();
    </script>
</body>
</html>
