const grid=document.getElementById("grid");
function render(list){
 grid.innerHTML="";
 list.forEach(v=>{
  grid.innerHTML+=`
   <div class="card" onclick="openMedia('${v.type}','${v.url}')">
    <img src="${v.thumbnail}">
    <div class="info">
     <h4>${v.title}</h4>
     <div class="tag">${v.tags}</div>
    </div>
   </div>`;
 });
}
render(videos);

/* SEARCH */
search.oninput=e=>{
 const q=e.target.value.toLowerCase();
 render(videos.filter(v=>
  v.title.toLowerCase().includes(q) ||
  v.tags.toLowerCase().includes(q)
 ));
};

/* CATEGORY */
document.querySelectorAll(".cat").forEach(c=>{
 c.onclick=()=>{
  document.querySelectorAll(".cat").forEach(x=>x.classList.remove("active"));
  c.classList.add("active");
  const cat=c.dataset.cat;
  render(cat==="all"?videos:videos.filter(v=>v.category===cat));
 };
});

/* PLAYER */
function openMedia(type,url){
 modalContent.innerHTML=
  type==="video"
  ? `<iframe src="${url}" allowfullscreen></iframe>`
  : `<img src="${url}">`;
 modal.style.display="flex";
}
function closeModal(){
 modal.style.display="none";
 modalContent.innerHTML="";
}

/* POPUP USER */
if(!localStorage.getItem("submitted")){
 popup.style.display="flex";
}
function submitUser(){
 if(!setuju.checked) return alert("Harus setuju");
 const users=JSON.parse(localStorage.getItem("users")||"[]");
 users.push({
  umur:umur.value,
  kota:kota.value,
  gender:gender.value,
  waktu:new Date().toLocaleString()
 });
 localStorage.setItem("users",JSON.stringify(users));
 localStorage.setItem("submitted","yes");
 popup.style.display="none";
}

/* DARK MODE */
if(localStorage.getItem("theme")==="dark"){
 document.body.classList.add("dark");
 themeToggle.textContent="☀️";
}
themeToggle.onclick=()=>{
 document.body.classList.toggle("dark");
 const d=document.body.classList.contains("dark");
 themeToggle.textContent=d?"☀️":"🌙";
 localStorage.setItem("theme",d?"dark":"light");
};
