let currentCategory = [];
let currentMedia = "";

/* ===============================
   LOGIC
================================ */
function startRandom(key) {
  currentCategory = mediaDB[key] || [];
  if (!currentCategory.length) {
    alert("Kategori kosong");
    return;
  }
  showRandom();
}

function showRandom() {
  const i = Math.floor(Math.random() * currentCategory.length);
  currentMedia = currentCategory[i];

  const box = document.getElementById("mediaContainer");
  box.innerHTML = "";
  box.classList.remove("hidden");
  box.classList.add("fade");

  if (currentMedia.endsWith(".mp4")) {
    box.innerHTML = `
      <video src="${currentMedia}" controls autoplay loop
        class="rounded-2xl shadow-lg max-h-80 mx-auto"></video>`;
  } else {
    box.innerHTML = `
      <img src="${currentMedia}"
        class="rounded-2xl shadow-lg max-h-80 mx-auto object-cover">`;
  }

  document.getElementById("actionButtons").classList.remove("hidden");
}

function nextMedia() {
  showRandom();
}

/* ===============================
   FORCE DOWNLOAD
================================ */
function downloadMedia() {
  if (!currentMedia) return;

  fetch(currentMedia)
    .then(r => r.blob())
    .then(blob => {
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url;
      a.download = `media_${Date.now()}`;
      document.body.appendChild(a);
      a.click();
      a.remove();
      URL.revokeObjectURL(url);
    })
    .catch(() => alert("Download gagal"));
}
</script><script>const canvas = document.getElementById("rainCanvas");
const ctx = canvas.getContext("2d");

function resizeCanvas() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}
window.addEventListener("resize", resizeCanvas);
resizeCanvas();

const rainDrops = [];

for (let i = 0; i < 250; i++) {
  rainDrops.push({
    x: Math.random() * canvas.width,
    y: Math.random() * canvas.height,
    length: Math.random() * 20 + 10,
    speed: Math.random() * 6 + 4
  });
}

function drawRain() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  ctx.strokeStyle = "rgba(255,255,255,0.25)";
  ctx.lineWidth = 1;

  rainDrops.forEach(drop => {
    ctx.beginPath();
    ctx.moveTo(drop.x, drop.y);
    ctx.lineTo(drop.x, drop.y + drop.length);
    ctx.stroke();

    drop.y += drop.speed;
    if (drop.y > canvas.height) {
      drop.y = -20;
      drop.x = Math.random() * canvas.width;
    }
  });

  requestAnimationFrame(drawRain);
}

drawRain();</script>
