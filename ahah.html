from{opacity:0;transform:scale(.98);}
to{opacity:1;transform:scale(1);}
}

<body x-data="videoApp()" x-init="init()" class="bg-white dark:bg-ytBlack text-black dark:text-white transition">

<!-- HEADER -->
<header class="sticky top-0 z-50 bg-white dark:bg-ytBlack shadow-sm">

<div class="flex items-center justify-between px-4 py-2 h-14">

<div class="flex items-center gap-4">
<button @click="sidebarOpen=!sidebarOpen" 
class="hidden md:block p-2 hover:bg-gray-200 dark:hover:bg-ytDarkSurface rounded-full">
<i class="fa-solid fa-bars"></i>
</button>

<div class="flex items-center gap-1 font-bold text-xl">
<i class="ri-video-line text-red-600 text-3xl"></i> SANGE EUY
</div>
</div>

<div class="hidden md:flex items-center gap-4">
<input type="text" placeholder="Cari video..."
x-model="searchQuery"
@input="searchVideos()"
class="px-4 py-1 rounded-full bg-gray-200 dark:bg-ytDarkSurface text-sm w-72 focus:outline-none">

<button @click="toggleDark()" 
class="p-2 rounded-full hover:bg-gray-200 dark:hover:bg-ytDarkSurface">
<i class="fa-solid fa-moon"></i>
</button>
</div>

</div>

<div class="md:hidden px-4 pb-3">
<input type="text" placeholder="Cari video..."
x-model="searchQuery"
@input="searchVideos()"
class="w-full px-4 py-2 rounded-full bg-gray-200 dark:bg-ytDarkSurface text-sm focus:outline-none">
</div>

</header>

<div class="flex">

<!-- SIDEBAR -->
<aside 
    :class="sidebarOpen ? 'w-60' : 'w-20'"  
    class="hidden md:block transition-all duration-300 p-3 space-y-2"
>

    <!-- Home -->
    <div 
        @click="goHome()"  
        class="flex items-center gap-4 p-3 hover:bg-gray-200 dark:hover:bg-ytDarkSurface rounded-lg cursor-pointer"
    >
        <i class="fa-solid fa-house text-red-500"></i>
        <span x-show="sidebarOpen">Home</span>
    </div>

    <!-- Saya Sukai -->
    <div 
        @click="goLiked()"

    >

        <span x-show="sidebarOpen">Saya Sukai</span>
    </div>

    <!-- Link HOME -->
    <div 
        class="flex items-center gap-4 p-3 hover:bg-gray-200 dark:hover:bg-ytDarkSurface rounded-lg cursor-pointer"
    >
        <i class="ri-instagram-fill text-red-500"></i>
        <span x-show="sidebarOpen">
            <a href="#" class="nav__link">HOME</a>
        </span>
    </div>

</aside>

<main class="flex-1 min-h-screen pb-20 md:pb-0">

<!-- HOME -->
<div x-show="currentPage==='home'" 
class="fade-enter p-4 md:p-6 grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6">

<template x-for="video in filteredVideos" :key="video.id">
<div @click="watchVideo(video)" 
class="video-card cursor-pointer transition hover:-translate-y-2">

<div class="relative rounded-xl overflow-hidden aspect-video bg-gray-200 dark:bg-ytDarkSurface">
<img :src="video.thumbnail" 
class="thumb-zoom w-full h-full object-cover transition duration-500">
</div>

<div class="mt-3 flex gap-3">
<img :src="video.avatar" class="w-9 h-9 rounded-full">
<div>
<h3 class="font-bold text-sm line-clamp-2" x-text="video.title"></h3>
<p class="text-xs text-gray-500" x-text="video.channel"></p>
</div>
</div>

</div>
</template>

</div>

<!-- WATCH -->
<div x-show="currentPage==='watch'" 
class="fade-enter p-4 md:p-6 flex flex-col lg:flex-row gap-6" x-cloak>

<div class="w-full lg:w-[70%]">
<button @click="goHome()" 
class="mb-4 px-4 py-2 bg-gray-200 dark:bg-ytDarkSurface rounded-full">
<i class="fa-solid fa-arrow-left"></i> Kembali
</button>

<div class="aspect-video bg-black rounded-xl overflow-hidden">
<video 
:key="currentVideo?.id"
:src="currentVideo?.videoUrl" 
controls
playsinline
class="w-full h-full">
</video>
</div>

<h1 class="text-lg md:text-xl font-bold mt-4" 
x-text="currentVideo?.title"></h1>

<button @click="toggleLike(currentVideo)" 
:class="isLiked(currentVideo?.id)?
'bg-red-500 text-white':
'bg-gray-200 dark:bg-ytDarkSurface'"
class="mt-4 px-4 py-2 rounded-full transition">
<i class="fa-solid fa-thumbs-up"></i> Like
</button>

<p class="text-sm text-gray-500 mt-3" 
x-text="currentVideo?.description"></p>

</div>

<!-- REKOMENDASI -->
<div class="w-full lg:w-[30%]">
<h3 class="font-bold mb-3">Rekomendasi</h3>

<template x-for="rec in recommendations" :key="rec.id">
<div @click="watchVideo(rec)" 
class="flex gap-3 mb-3 cursor-pointer hover:bg-gray-100 dark:hover:bg-ytDarkSurface p-2 rounded-lg transition">
<img :src="rec.thumbnail" 
class="w-32 h-20 object-cover rounded-lg">
<div>
<h4 class="text-sm font-semibold line-clamp-2" x-text="rec.title"></h4>
<p class="text-xs text-gray-500" x-text="rec.channel"></p>
</div>
</div>
</template>

</div>

</div>

<!-- LIKED -->
<div x-show="currentPage==='liked'" 
class="fade-enter p-4 md:p-6 grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6" x-cloak>

<template x-for="video in likedVideos" :key="video.id">
<div @click="watchVideo(video)" class="cursor-pointer">
<img :src="video.thumbnail" class="rounded-xl">
<h3 class="mt-2 font-bold text-sm" x-text="video.title"></h3>
</div>
</template>

<div x-show="likedVideos.length===0" class="text-gray-500">
Belum ada video yang kamu sukai.
</div>

</div>

</main>
</div>

</nav>

shuffleVideos(){
this.filteredVideos=[...this.videos]
.sort(()=>Math.random()-0.5)
.slice(0,10);
},

watchVideo(video){
this.stopVideo();
this.currentVideo=video;
this.currentPage='watch';

this.recommendations=this.videos
.filter(v=>v.id!==video.id)
.sort(()=>Math.random()-0.5)
.slice(0,6);

window.scrollTo({top:0,behavior:'smooth'});
},

stopVideo(){
const vids=document.querySelectorAll("video");
vids.forEach(v=>{
v.pause();
v.currentTime=0;
});
},

goHome(){
this.stopVideo();
this.currentPage='home';
},

goLiked(){
this.stopVideo();
this.currentPage='liked';
},

toggleLike(video){
if(!video) return;

if(this.isLiked(video.id)){
this.likedVideos=this.likedVideos.filter(v=>v.id!==video.id);
}else{
this.likedVideos.push(video);
}
localStorage.setItem("likedVideos",JSON.stringify(this.likedVideos));
},

isLiked(id){
return this.likedVideos.some(v=>v.id===id);
},

loadLikes(){
let data=localStorage.getItem("likedVideos");
if(data){
this.likedVideos=JSON.parse(data);
}
},

searchVideos(){
if(this.searchQuery.trim()===""){
this.shuffleVideos();
return;
}

let words=this.searchQuery.toLowerCase().split(" ");

this.filteredVideos=this.videos.filter(video=>{
return words.every(word=>
video.title.toLowerCase().includes(word) ||
video.description.toLowerCase().includes(word) ||
video.channel.toLowerCase().includes(word)
);
});
},

toggleDark(){
document.documentElement.classList.toggle('dark');
}
