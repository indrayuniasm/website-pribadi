// ===================== LOAD MOTOR =====================
const motorSelect = document.getElementById("motorSelect");
for (let m in dataMotor) {
    let opt = document.createElement("option");
    opt.value = m;
    opt.textContent = m;
    motorSelect.appendChild(opt);
}

// ===================== UPDATE WARNA ====================
function updateWarna() {
    const motor = motorSelect.value;
    const warnaSelect = document.getElementById("warnaSelect");
    warnaSelect.innerHTML = "<option value=''>-- Pilih Warna --</option>";

    if (!motor) return;

    dataMotor[motor].warna.forEach(w => {
        let opt = document.createElement("option");
        opt.value = w;
        opt.textContent = w;
        warnaSelect.appendChild(opt);
    });

    hitungCash();
    hitungKredit();
}

// ===================== CASH / KREDIT ===================
function toggleCashKredit() {
    const tipe = document.getElementById("tipeSelect").value;

    document.getElementById("cashBox").style.display = tipe === "cash" ? "block" : "none";
    document.getElementById("kreditBox").style.display = tipe === "kredit" ? "block" : "none";

    hitungCash();
    hitungKredit();
}

// ===================== HITUNG CASH =====================
function hitungCash() {
    if (document.getElementById("tipeSelect").value !== "cash") return;

    const motor = motorSelect.value;
    if (!motor) return;

    let otr = dataMotor[motor].otr;
    let diskon = dataMotor[motor].diskonCash;
    let max = otr - diskon;

    document.getElementById("otrDisp").textContent = "Rp " + otr.toLocaleString();
    document.getElementById("diskonCashDisp").textContent = "Rp " + diskon.toLocaleString();
    document.getElementById("maxBayarDisp").textContent = "Rp " + max.toLocaleString();
}

// ===================== HITUNG KREDIT =====================
function hitungKredit() {
    if (document.getElementById("tipeSelect").value !== "kredit") return;

    const motor = motorSelect.value;
    const tenor = document.getElementById("tenorSelect").value;
    const dpBayar = Number(document.getElementById("dpBayar").value || 0);

    if (!motor || !tenor) return;

    let dpSystem = dataMotor[motor].kredit[tenor].dp;
    let diskon = dataMotor[motor].kredit[tenor].diskon;
    let totalDP = dpBayar + diskon;

    document.getElementById("dpSystemDisp").textContent = "Rp " + dpSystem.toLocaleString();
    document.getElementById("diskonKreditDisp").textContent = "Rp " + diskon.toLocaleString();
    document.getElementById("totalDPDisp").textContent = "Rp " + totalDP.toLocaleString();

    // STATUS
// STATUS BARU
let totalSetelahDiskon = dpBayar + diskon;

if (totalSetelahDiskon > dpSystem) {
    let lebih = totalSetelahDiskon - dpSystem;
    document.getElementById("statusKredit").textContent =
        "DP melebihi ✔ | Kelebihan: Rp " + lebih.toLocaleString();
} 
else if (totalSetelahDiskon < dpSystem) {
    let kurang = dpSystem - totalSetelahDiskon;
    document.getElementById("statusKredit").textContent =
        "DP kurang ❌ | Kurang: Rp " + kurang.toLocaleString();
} 
else {
    document.getElementById("statusKredit").textContent = 
        "DP PAS ✔";
}
}
