    <style>
        :root {
            --bg-dark: #050505;
            --accent: #00f2ff;
            --card-bg: rgba(20, 20, 20, 0.6);
        }

        body { 
            font-family: 'Outfit', sans-serif; 
            background: var(--bg-dark); 
            color: #fff;
            background-image: radial-gradient(circle at 50% -20%, #111 0%, #050505 80%);
            min-height: 100vh;
        }

        .mono { font-family: 'JetBrains Mono', monospace; }

        /* Floating Dock */
        .dock-container {
            position: fixed;
            bottom: 24px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(15, 15, 15, 0.8);
            backdrop-filter: blur(20px);
            padding: 10px;
            border-radius: 28px;
            border: 1px solid rgba(255,255,255,0.1);
            display: flex;
            gap: 12px;
            z-index: 100;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.7);
        }

        .dock-item {
            width: 54px;
            height: 54px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 20px;
            color: #555;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            cursor: pointer;
        }

        .dock-item:hover {
            background: rgba(255,255,255,0.05);
            color: var(--accent);
            transform: translateY(-12px) scale(1.1);
        }

        .dock-item.active {
            background: #fff;
            color: #000;
            box-shadow: 0 0 20px rgba(255,255,255,0.2);
        }

        /* Bento Cards */
        .bento-card {
            background: var(--card-bg);
            border: 1px solid rgba(255,255,255,0.05);
            border-radius: 32px;
            padding: 24px;
            transition: 0.4s ease;
            backdrop-filter: blur(10px);
        }

        .bento-card:hover {
            border-color: rgba(0, 242, 255, 0.3);
            background: rgba(25, 25, 25, 0.8);
        }

        .page-content { display: none; }
        .page-content.active { display: block; animation: slideUp 0.6s cubic-bezier(0.23, 1, 0.32, 1); }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        ::-webkit-scrollbar { width: 0px; }
    </style>
</head>

    <script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-app.js";
import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, doc, deleteDoc, updateDoc } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-firestore.js";

const firebaseConfig = {
    apiKey: "AIzaSyCLTHkDtSmn6ICpq4o-xWWUPrl3a_VaT3c",
    authDomain: "pricelist-23ec2.firebaseapp.com",
    projectId: "pricelist-23ec2",
    storageBucket: "pricelist-23ec2.firebasestorage.app",
    messagingSenderId: "546085857444",
    appId: "1:546085857444:web:e1fe997ddb9feb912ede31"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const IMGBB_API_KEY = "a1acd30065ad15688fe2643dce1dbdbc";

// --- NAVIGATION & UI HELPERS ---
window.switchTab = (id, title) => {
    document.querySelectorAll('.page-content').forEach(p => p.classList.remove('active'));
    document.querySelectorAll('.dock-item').forEach(d => d.classList.remove('active'));
    document.getElementById(id).classList.add('active');
    document.getElementById('nav-' + id).classList.add('active');
    document.getElementById('view-title').innerText = title;
};

window.toggleModal = (id) => document.getElementById(id).classList.toggle('hidden');

setInterval(() => {
    const timer = document.getElementById('live-timer');
    if(timer) timer.innerText = new Date().toLocaleTimeString('id-ID');
}, 1000);

// --- PRODUCT OPERATIONS ---
let allProducts = [];

window.uploadProduct = async () => {
    const name = document.getElementById('prod-name').value;
    const price = document.getElementById('prod-price').value;
    const desc = document.getElementById('prod-desc').value;
    const category = document.getElementById('prod-category').value;
    const file = document.getElementById('prod-image').files[0];
    const btn = document.getElementById('btn-upload');

    if(!name || !file) return alert("Data tidak lengkap!");

    btn.innerText = "Syncing Data..."; btn.disabled = true;
    try {
        const fd = new FormData(); 
        fd.append("image", file);
        const res = await fetch(`https://api.imgbb.com/1/upload?key=${IMGBB_API_KEY}`, { method: "POST", body: fd });
        const r = await res.json();

        await addDoc(collection(db, "products"), { 
            name: name,
            price: parseInt(price), 
            description: desc,
            image: r.data.url, 
            category: category, 
            status: 'ready', 
            createdAt: new Date() 
        });

        toggleModal('modal-tambah');
        document.getElementById('prod-name').value = "";
        document.getElementById('prod-price').value = "";
        document.getElementById('prod-desc').value = "";
        document.getElementById('prod-image').value = "";
    } catch (e) { 
        console.error(e);
        alert("Upload Gagal"); 
    }
    btn.innerText = "Execute Upload"; btn.disabled = false;
};

window.applyFilter = () => {
    const filterValue = document.getElementById('filter-category').value;
    const list = document.getElementById('product-list');
    const countDisplay = document.getElementById('prod-count');
    
    const filtered = filterValue === 'All' ? allProducts : allProducts.filter(item => item.data.category === filterValue);
    if(countDisplay) countDisplay.innerText = filtered.length;

    list.innerHTML = '';
    filtered.forEach(item => {
        const p = item.data;
        const id = item.id;
        const isH = p.status === 'habis';
        list.innerHTML += `
        <div class="bento-card col-span-1 group relative overflow-hidden">
            <img src="${p.image}" class="absolute inset-0 w-full h-full object-cover opacity-10 group-hover:opacity-30 transition-all duration-700 group-hover:scale-110 ${isH ? 'grayscale' : ''}">
            <div class="relative z-10 h-full flex flex-col justify-between min-h-[160px]">
                <div class="flex justify-between items-start">
                    <span class="text-[8px] font-black uppercase tracking-widest px-2 py-1 bg-white/5 border border-white/10 rounded-lg">${p.category}</span>
                    <div class="flex gap-3">
                        <button onclick="openEditModal('${id}', '${p.name}', ${p.price}, '${p.category}', '${p.description || ''}')" class="text-white/20 hover:text-cyan-400"><i class="fas fa-edit"></i></button>
                        <button onclick="deleteProduct('${id}')" class="text-white/20 hover:text-rose-500"><i class="fas fa-trash"></i></button>
                    </div>
                </div>
                <div>
                    <h4 class="font-bold text-sm truncate">${p.name}</h4>
                    <p class="text-xs text-cyan-400 font-bold italic">IDR ${p.price.toLocaleString()}</p>
                    <button onclick="toggleStock('${id}', '${p.status}')" class="mt-4 w-full py-2 rounded-xl text-[9px] font-black uppercase tracking-widest border border-white/5 hover:bg-white hover:text-black transition">
                        ${isH ? 'Set Ready' : 'Set Out'}
                    </button>
                </div>
            </div>
        </div>`;
    });
};

onSnapshot(query(collection(db, "products"), orderBy("createdAt", "desc")), (snap) => {
    allProducts = [];
    snap.forEach(d => { allProducts.push({ id: d.id, data: d.data() }); });
    applyFilter();
});

window.toggleStock = async (id, cur) => await updateDoc(doc(db, "products", id), { status: cur === 'ready' ? 'habis' : 'ready' });
window.deleteProduct = async (id) => confirm('Hapus Item?') && await deleteDoc(doc(db, "products", id));

// --- ORDER OPERATIONS (FITUR SELESAIKAN) ---
window.tandaiSelesai = async (id) => {
    if(confirm("Tandai pesanan ini sebagai selesai?")) {
        try {
            await updateDoc(doc(db, "orders", id), { status: 'selesai' });
        } catch (e) { alert("Gagal memperbarui status!"); }
    }
};
window.viewDetail = (id) => {
    alert("ID Pesanan: " + id + "\nFitur detail sedang dikembangkan.");
};
window.deleteOrderPermanen = async (id) => {
    if(confirm("Hapus permanen history pesanan ini?")) {
        try {
            await deleteDoc(doc(db, "orders", id));
        } catch (e) { alert("Gagal menghapus!"); }
    }
};

onSnapshot(query(collection(db, "orders"), orderBy("createdAt", "desc")), (snap) => {
    const list = document.getElementById('order-list');
    if(!list) return;

    list.innerHTML = '';
    let ordersArr = [];
    snap.forEach(docSnap => { ordersArr.push({ id: docSnap.id, ...docSnap.data() }); });

    // Sortir agar yang selesai berada di bawah
    ordersArr.sort((a, b) => (a.status === 'selesai') - (b.status === 'selesai'));

    ordersArr.forEach(o => {
        const isSelesai = o.status === 'selesai';
        
        // --- PERBAIKAN LOGIKA DISINI ---
        // Kita cek field 'deliveryMethod' dari database
        const isAnter = o.deliveryMethod === 'antar'; 
        
        const infoPengiriman = isAnter 
            ? `<div class="p-3 bg-orange-500/10 border border-orange-500/20 rounded-2xl">
                <p class="text-[9px] text-orange-500 font-black uppercase">Sistem Pengiriman: DIANTAR</p>
                <p class="text-xs text-white mt-1"><i class="fas fa-map-marker-alt mr-1 text-orange-500"></i> ${o.address || 'Alamat tidak diisi'}</p>
               </div>`
            : `<div class="p-3 bg-cyan-500/10 border border-cyan-500/20 rounded-2xl">
                <p class="text-[9px] text-cyan-500 font-black uppercase">Sistem Pengiriman: AMBIL SENDIRI</p>
                <p class="text-xs text-white mt-1"><i class="fas fa-store mr-1 text-cyan-500"></i> Ambil di Toko</p>
               </div>`;

        list.innerHTML += `
        <div class="bento-card border-l-4 ${isSelesai ? 'border-l-zinc-700 opacity-60' : (isAnter ? 'border-l-orange-500' : 'border-l-cyan-500')} mb-6 p-5 bg-zinc-900/80 rounded-3xl border border-white/5 relative">
            
            ${isSelesai ? '<div class="absolute top-4 right-4 bg-zinc-800 text-zinc-400 text-[8px] font-black px-3 py-1 rounded-full border border-white/5 uppercase tracking-widest z-20">SELESAI</div>' : ''}

            <div class="mb-4">
                <p class="text-[9px] text-zinc-500 font-bold uppercase">Nama Pemesan:</p>
                <h5 class="font-black text-lg text-white uppercase tracking-tight">${o.customerName || 'No Name'}</h5>
                <a href="https://wa.me/${o.customerWa}" target="_blank" class="text-cyan-400 text-[11px] font-bold hover:underline">
                    <i class="fab fa-whatsapp mr-1"></i> ${o.customerWa || 'No WA'}
                </a>
            </div>

            <div class="space-y-2 py-3 border-y border-white/5 mb-4">
                <p class="text-[9px] text-zinc-500 font-bold uppercase tracking-widest">Pesanan:</p>
                ${o.items ? o.items.map(i => `
                    <div class="flex justify-between items-center text-xs">
                        <span class="text-white font-medium">${i.name} (x${i.qty})</span>
                        <span class="text-zinc-400">Rp ${(i.price * i.qty).toLocaleString()}</span>
                    </div>
                `).join('') : ''}
                <div class="flex justify-between pt-2 mt-2 border-t border-white/5">
                    <p class="text-[10px] text-zinc-500 font-bold uppercase">Total Akhir:</p>
                    <p class="text-sm font-black text-cyan-400 italic">Rp ${(o.totalBayar || 0).toLocaleString()}</p>
                </div>
            </div>

            <div class="grid grid-cols-2 gap-3 mb-4">
                <div>
                    <p class="text-[9px] text-zinc-500 font-bold uppercase mb-1">Sistem Bayar:</p>
                    <span class="px-2 py-1 bg-white/5 rounded text-[10px] font-bold text-zinc-300 uppercase">${o.paymentMethod || 'COD'}</span>
                </div>
            </div>

            ${infoPengiriman}

            ${o.proofImg ? `
                <div class="mt-4">
                    <p class="text-[9px] text-zinc-500 font-bold uppercase mb-2">Bukti TF:</p>
                    <a href="${o.proofImg}" target="_blank">
                        <img src="${o.proofImg}" class="w-full h-32 object-cover rounded-2xl border border-white/10 hover:opacity-80 transition">
                    </a>
                </div>
            ` : ''}

            <div class="flex items-center justify-end mt-5 pt-4 border-t border-white/5 gap-2">
                ${isSelesai ? 
                    `<button onclick="deleteOrderPermanen('${o.id}')" class="text-rose-500 text-[10px] font-bold uppercase px-3 py-2"><i class="fas fa-trash-alt mr-1"></i> Hapus</button>` : 
                    `<button onclick="tandaiSelesai('${o.id}')" class="bg-emerald-500 text-black px-6 py-3 rounded-2xl text-[10px] font-black hover:scale-105 transition uppercase shadow-lg shadow-emerald-500/20">Selesaikan Pesanan</button>`
                }
            </div>
        </div>`;
    });
});

// Fungsi pembantu untuk hitung total di sisi admin
function calculateTotal(items) {
    return items.reduce((acc, item) => acc + (item.price * item.qty), 0);
}
// --- USER & NOTIFICATION OPERATIONS ---
onSnapshot(collection(db, "users"), (snap) => {
    const list = document.getElementById('user-list');
    const targetList = document.getElementById('target-user-list');
    if(list) list.innerHTML = '';
    if(targetList) targetList.innerHTML = '<p class="text-[10px] text-zinc-500 mb-2 uppercase">Pilih User Tertentu:</p>';

    snap.forEach(d => {
        const u = d.data();
        if(list) list.innerHTML += `
            <tr class="hover:bg-white/5 transition">
                <td class="p-6 font-bold text-white">${u.name}</td>
                <td class="p-6 text-zinc-500">${u.wa}</td>
                <td class="p-6"><span class="mono bg-black px-2 py-1 rounded border border-white/10 cursor-pointer" onclick="this.innerText = this.innerText === '••••••••' ? '${u.password || 'N/A'}' : '••••••••'">••••••••</span></td>
                <td class="p-6">${u.age}</td>
                <td class="p-6"><span class="px-3 py-1 bg-white/5 rounded-full">${u.ref || 'Direct'}</span></td>
                <td class="p-6 text-center"><button onclick="deleteUser('${d.id}', '${u.name}')" class="text-zinc-600 hover:text-rose-500"><i class="fas fa-user-minus"></i></button></td>
            </tr>`;
        if(targetList) targetList.innerHTML += `<label class="flex items-center gap-3 p-2 hover:bg-white/5 rounded-lg cursor-pointer"><input type="checkbox" name="user-notif" value="${d.id}" class="accent-orange-500"><span class="text-sm">${u.name}</span></label>`;
    });
});

window.deleteUser = async (id, name) => confirm(`Hapus permanen user "${name}"?`) && await deleteDoc(doc(db, "users", id));

window.sendNotif = async (type) => {
    const title = document.getElementById('notif-title').value;
    const body = document.getElementById('notif-body').value;
    if(!title || !body) return alert("Isi pesan dulu!");
    let targets = [];
    if(type === 'selected') {
        document.querySelectorAll('input[name="user-notif"]:checked').forEach(cb => targets.push(cb.value));
        if(targets.length === 0) return alert("Pilih minimal satu user!");
    }
    try {
        await addDoc(collection(db, "notifications"), { title, body, targetType: type, targetUsers: targets, timestamp: new Date() });
        alert("Sinyal notifikasi berhasil dikirim!");
        document.getElementById('notif-title').value = ""; document.getElementById('notif-body').value = "";
    } catch (e) { alert("Gagal mengirim sinyal!"); }
};

// --- PROMO OPERATIONS ---
window.toggleScopeUI = () => {
    const scope = document.getElementById('promo-scope').value;
    const area = document.getElementById('product-selector-area');
    const container = document.getElementById('promo-product-checkboxes');
    if (scope === 'spesifik') {
        area.classList.remove('hidden');
        container.innerHTML = allProducts.map(p => `
            <label class="flex items-center gap-3 p-3 hover:bg-white/10 rounded-xl cursor-pointer transition">
                <input type="checkbox" name="promo-targets" value="${p.id}" data-name="${p.data.name}" class="w-4 h-4 accent-cyan-500">
                <div class="flex flex-col"><span class="text-xs font-bold text-white">${p.data.name}</span><span class="text-[9px] text-zinc-500 italic">IDR ${p.data.price.toLocaleString()}</span></div>
            </label>`).join('');
    } else area.classList.add('hidden');
};

window.savePromo = async () => {
    const code = document.getElementById('promo-code').value.toUpperCase().trim();
    const scope = document.getElementById('promo-scope').value;
    const minOrder = parseInt(document.getElementById('promo-min-order').value) || 0;
    const type = document.getElementById('promo-type').value;
    const val = parseInt(document.getElementById('promo-value').value) || 0;
    const btn = document.getElementById('btn-save-promo');
    if(!code || !val) return alert("Data tidak lengkap!");

    let targetIds = [], targetNames = [];
    if(scope === 'spesifik') {
        document.querySelectorAll('input[name="promo-targets"]:checked').forEach(el => {
            targetIds.push(el.value);
            targetNames.push(el.getAttribute('data-name'));
        });
        if(targetIds.length === 0) return alert("Pilih produknya dulu!");
    }

    btn.innerText = "DEPLOYING..."; btn.disabled = true;
    try {
        await addDoc(collection(db, "promos"), { code, scope, minOrder, type, value: val, targetIds, targetNames, discountTarget: scope === 'spesifik' ? 'item' : 'total', reward: type === 'diskon_persen' ? `${val}% OFF` : `Rp ${val.toLocaleString()} OFF`, createdAt: new Date() });
        toggleModal('modal-promo');
        alert("Promo Berhasil!");
    } catch (e) { alert("Gagal deploy promo."); }
    btn.innerText = "Deploy Signal"; btn.disabled = false;
};

onSnapshot(query(collection(db, "promos"), orderBy("createdAt", "desc")), (snap) => {
    const list = document.getElementById('promo-list'); 
    if(!list) return;
    list.innerHTML = '';
    snap.forEach(d => {
        const pr = d.data();
        const isSpesifik = pr.scope === 'spesifik';
        list.innerHTML += `
        <div class="bento-card border-t-2 ${isSpesifik ? 'border-cyan-500' : 'border-emerald-500'} flex flex-col justify-between min-h-[160px] relative overflow-hidden group">
            <div class="absolute -right-8 top-4 rotate-45 bg-${isSpesifik ? 'cyan' : 'emerald'}-500 text-black text-[7px] font-black py-1 w-32 text-center uppercase tracking-tighter shadow-lg">${isSpesifik ? 'Item Discount' : 'Total Discount'}</div>
            <div>
                <p class="text-2xl font-black tracking-tighter text-white">${pr.code}</p>
                <p class="mono text-[8px] text-zinc-500 uppercase">Min. Belanja: Rp ${(pr.minOrder || 0).toLocaleString()}</p>
                ${isSpesifik ? `<div class="mt-4"><div class="flex flex-wrap gap-1">${pr.targetNames.map(name => `<span class="text-[9px] bg-cyan-500/10 border border-cyan-500/20 px-2 py-0.5 rounded-lg text-cyan-200">${name}</span>`).join('')}</div></div>` : ''}
            </div>
            <div class="flex justify-between items-end mt-4">
                <div><p class="text-[8px] text-zinc-600 uppercase font-bold">Potongan</p><span class="text-white font-black italic text-xl tracking-tighter">${pr.reward}</span></div>
                <button onclick="deletePromo('${d.id}')" class="w-8 h-8 rounded-lg bg-zinc-800 text-zinc-500 hover:bg-rose-500 hover:text-white transition-all flex items-center justify-center"><i class="fas fa-trash text-[10px]"></i></button>
            </div>
        </div>`;
    });
});

window.deletePromo = async (id) => confirm('Hapus promo?') && await deleteDoc(doc(db, "promos", id));

// --- EDIT PRODUCT LOGIC ---
window.openEditModal = (id, name, price, category, desc) => {
    document.getElementById('edit-prod-id').value = id;
    document.getElementById('edit-prod-name').value = name;
    document.getElementById('edit-prod-price').value = price;
    document.getElementById('edit-prod-category').value = category;
    document.getElementById('edit-prod-desc').value = desc;
    toggleModal('modal-edit');
};

window.updateProduct = async () => {
    const id = document.getElementById('edit-prod-id').value;
    const name = document.getElementById('edit-prod-name').value;
    const price = document.getElementById('edit-prod-price').value;
    const category = document.getElementById('edit-prod-category').value;
    const desc = document.getElementById('edit-prod-desc').value;
    const btn = document.getElementById('btn-update');
    if(!name || !price) return alert("Nama dan Harga wajib diisi!");
    btn.innerText = "Updating..."; btn.disabled = true;
    try {
        await updateDoc(doc(db, "products", id), { name, price: parseInt(price), category, description: desc });
        toggleModal('modal-edit');
        alert("Data diperbarui!");
    } catch (e) { alert("Gagal memperbarui data"); }
    btn.innerText = "Save Changes"; btn.disabled = false;
};
    </script>
