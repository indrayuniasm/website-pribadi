<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Satu Atap | Nexus Dashboard v4.0</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;500;800&family=JetBrains+Mono&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg-dark: #050505;
            --accent: #00f2ff;
            --card-bg: rgba(20, 20, 20, 0.6);
        }

        body { 
            font-family: 'Outfit', sans-serif; 
            background: var(--bg-dark); 
            color: #fff;
            background-image: radial-gradient(circle at 50% -20%, #111 0%, #050505 80%);
            min-height: 100vh;
        }

        .mono { font-family: 'JetBrains Mono', monospace; }

        /* Floating Dock */
        .dock-container {
            position: fixed;
            bottom: 24px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(15, 15, 15, 0.8);
            backdrop-filter: blur(20px);
            padding: 10px;
            border-radius: 28px;
            border: 1px solid rgba(255,255,255,0.1);
            display: flex;
            gap: 12px;
            z-index: 100;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.7);
        }

        .dock-item {
            width: 54px;
            height: 54px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 20px;
            color: #555;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            cursor: pointer;
        }

        .dock-item:hover {
            background: rgba(255,255,255,0.05);
            color: var(--accent);
            transform: translateY(-12px) scale(1.1);
        }

        .dock-item.active {
            background: #fff;
            color: #000;
            box-shadow: 0 0 20px rgba(255,255,255,0.2);
        }

        /* Bento Cards */
        .bento-card {
            background: var(--card-bg);
            border: 1px solid rgba(255,255,255,0.05);
            border-radius: 32px;
            padding: 24px;
            transition: 0.4s ease;
            backdrop-filter: blur(10px);
        }

        .bento-card:hover {
            border-color: rgba(0, 242, 255, 0.3);
            background: rgba(25, 25, 25, 0.8);
        }

        .page-content { display: none; }
        .page-content.active { display: block; animation: slideUp 0.6s cubic-bezier(0.23, 1, 0.32, 1); }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        ::-webkit-scrollbar { width: 0px; }
    </style>
</head>
<body class="p-4 md:p-12 pb-32">

    <header class="max-w-7xl mx-auto flex justify-between items-end mb-12">
        <div>
            <h2 class="mono text-[10px] text-cyan-500 tracking-[0.4em] uppercase mb-2">Authenticated: Indra_Dev</h2>
            <h1 class="text-4xl font-extrabold tracking-tight" id="view-title">Katalog Data</h1>
        </div>
        <div class="text-right hidden md:block">
            <p id="live-timer" class="text-xl font-light mono">00:00:00</p>
            <p class="text-[10px] text-zinc-500 tracking-widest uppercase">System.Operational</p>
        </div>
    </header>

    <main class="max-w-7xl mx-auto">
        
        <section id="tab-produk" class="page-content active">
            <div class="grid grid-cols-1 md:grid-cols-4 gap-6">
                <div class="bento-card col-span-1 md:col-span-2 bg-gradient-to-br from-cyan-500 to-blue-600 border-none p-8 flex flex-col justify-between min-h-[220px]">
                    <h3 class="text-3xl font-black text-black leading-none">TAMBAH<br>ENTRI BARU</h3>
                    <button onclick="toggleModal('modal-tambah')" class="bg-black text-white px-6 py-3 rounded-2xl font-bold text-xs w-fit hover:scale-105 transition uppercase tracking-widest">Open Injector</button>
                </div>

                <div class="bento-card flex flex-col items-center justify-center">
                    <span class="mono text-[10px] text-zinc-500 mb-2 uppercase">Live Items</span>
                    <p class="text-6xl font-black italic" id="prod-count">0</p>
                </div>

                <div class="bento-card bg-zinc-900 border-none flex flex-col justify-between">
                    <i class="fas fa-layer-group text-cyan-400 text-2xl"></i>
                    <p class="text-xs font-bold text-zinc-400 uppercase leading-relaxed">Storage Filter:<br><span class="text-white">All Categories</span></p>
                </div>

                <div id="product-list" class="contents"></div>
            </div>
        </section>

        <section id="tab-pesanan" class="page-content">
            <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6" id="order-list"></div>
            <div class="bento-card border-t-2 border-orange-500 p-6 mt-6">
    <h3 class="text-xl font-bold mb-4 uppercase italic">Broadcast Signal</h3>
    <div class="space-y-4">
        <input type="text" id="notif-title" placeholder="Judul Notifikasi" class="w-full bg-black border border-white/5 p-4 rounded-2xl">
        <textarea id="notif-body" placeholder="Isi Pesan..." class="w-full bg-black border border-white/5 p-4 rounded-2xl"></textarea>
        
        <div class="p-4 bg-white/5 rounded-2xl max-h-40 overflow-y-auto" id="target-user-list">
            </div>

        <div class="flex gap-2">
            <button onclick="sendNotif('all')" class="flex-1 bg-orange-500 text-white font-bold py-3 rounded-xl">KIRIM KE SEMUA</button>
            <button onclick="sendNotif('selected')" class="flex-1 bg-white text-black font-bold py-3 rounded-xl">KIRIM TERPILIH</button>
        </div>
    </div>
</div>
        </section>

        <section id="tab-users" class="page-content">
            <div class="bento-card overflow-x-auto border-none bg-zinc-900/40">
                <table class="w-full text-left mono text-xs">
                    <thead class="text-cyan-500 border-b border-white/5 uppercase">
                        <tr>
                            <th class="p-6">User</th>
                            <th class="p-6">Contact</th>
                            <th class="p-6">_KEY</th> 
                            <th class="p-6">Age</th>
                            <th class="p-6">Ref</th>
                        </tr>
                    </thead>
                    <tbody id="user-list" class="divide-y divide-white/5"></tbody>
                </table>
            </div>
        </section>

        <section id="tab-promo" class="page-content">
            <div class="grid grid-cols-1 md:grid-cols-4 gap-6">
                <div class="bento-card bg-emerald-500 text-black p-8 flex flex-col justify-between cursor-pointer" onclick="toggleModal('modal-promo')">
                    <i class="fas fa-ticket-alt text-3xl"></i>
                    <p class="font-black text-xl italic uppercase">Generate Promo</p>
                </div>
                <div id="promo-list" class="contents"></div>
            </div>
        </section>

    </main>

    <nav class="dock-container">
        <div onclick="switchTab('tab-produk', 'Katalog Data')" class="dock-item active" id="nav-tab-produk"><i class="fas fa-box-open"></i></div>
        <div onclick="switchTab('tab-pesanan', 'Signal Pesanan')" class="dock-item" id="nav-tab-pesanan"><i class="fas fa-bolt"></i></div>
        <div onclick="switchTab('tab-users', 'Profil Tamu')" class="dock-item" id="nav-tab-users"><i class="fas fa-users-viewfinder"></i></div>
        <div onclick="switchTab('tab-promo', 'Strategi Promo')" class="dock-item" id="nav-tab-promo"><i class="fas fa-percentage"></i></div>
    </nav>

    <div id="modal-tambah" class="fixed inset-0 bg-black/95 z-[200] hidden flex items-center justify-center p-6">
        <div class="bento-card max-w-xl w-full bg-zinc-900 border-white/10 p-10">
            <h3 class="text-2xl font-bold mb-8">Inject New Record</h3>
            <div class="space-y-4">
                <div class="grid grid-cols-2 gap-4">
                    <input type="text" id="prod-name" placeholder="Nama" class="bg-black border border-white/5 p-4 rounded-2xl outline-none focus:border-cyan-500">
                    <select id="prod-category" class="bg-black border border-white/5 p-4 rounded-2xl outline-none text-zinc-500">
                        <option value="Makanan">MAKANAN</option>
                        <option value="Minuman">MINUMAN</option>
                    </select>
                </div>
                <input type="number" id="prod-price" placeholder="Harga (IDR)" class="w-full bg-black border border-white/5 p-4 rounded-2xl">
                <textarea id="prod-desc" placeholder="Deskripsi Singkat" class="w-full bg-black border border-white/5 p-4 rounded-2xl h-24"></textarea>
                <input type="file" id="prod-image" class="text-xs text-zinc-500 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:bg-white file:text-black">
                
                <div class="flex gap-4 pt-4">
                    <button onclick="uploadProduct()" id="btn-upload" class="flex-1 bg-cyan-500 text-black font-black py-4 rounded-2xl uppercase tracking-tighter">Execute Upload</button>
                    <button onclick="toggleModal('modal-tambah')" class="px-6 text-zinc-500 uppercase text-[10px] font-bold">Cancel</button>
                </div>
            </div>
        </div>
    </div>

   <div id="modal-promo" class="fixed inset-0 bg-black/95 z-[200] hidden flex items-center justify-center p-6">
    <div class="bento-card max-w-xl w-full bg-zinc-900 p-10">
        <h3 class="text-2xl font-bold mb-8 uppercase italic">Campaign Setup</h3>
        <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-6">
            <input type="text" id="promo-code" placeholder="KODE PROMO" class="bg-black border border-white/5 p-4 rounded-2xl uppercase font-bold text-cyan-500">
            
            <select id="promo-type" onchange="updatePromoUI()" class="bg-black border border-white/5 p-4 rounded-2xl text-zinc-500">
                <option value="diskon_persen">DISKON (%)</option>
                <option value="diskon_nominal">DISKON (RP)</option>
                <option value="free_produk">BONUS ITEM</option>
            </select>

            <div id="promo-value-wrapper">
                <input type="number" id="promo-value" placeholder="Nilai Diskon" class="w-full bg-black border border-white/5 p-4 rounded-2xl outline-none focus:border-cyan-500">
            </div>

            <div id="promo-bonus-wrapper" class="hidden">
                <select id="promo-bonus-item" class="w-full bg-black border border-white/5 p-4 rounded-2xl text-white outline-none focus:border-cyan-500">
                    <option value="Teh Manis">Teh Manis</option>
                    <option value="Air Mineral">Air Mineral</option>
                    <option value="Teh Pucuk">Teh Pucuk</option>
                </select>
            </div>
            
            <input type="number" id="promo-min-order" placeholder="Min. Order (IDR)" class="bg-black border border-white/5 p-4 rounded-2xl">
        </div>
        <div class="flex gap-4">
            <button onclick="savePromo()" id="btn-save-promo" class="flex-1 bg-white text-black font-black py-4 rounded-2xl uppercase">Activate Signal</button>
            <button onclick="toggleModal('modal-promo')" class="px-6 text-zinc-500 font-bold text-[10px] uppercase">Close</button>
        </div>
    </div>
</div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, doc, deleteDoc, updateDoc } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCLTHkDtSmn6ICpq4o-xWWUPrl3a_VaT3c",
            authDomain: "pricelist-23ec2.firebaseapp.com",
            projectId: "pricelist-23ec2",
            storageBucket: "pricelist-23ec2.firebasestorage.app",
            messagingSenderId: "546085857444",
            appId: "1:546085857444:web:e1fe997ddb9feb912ede31"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const IMGBB_API_KEY = "a1acd30065ad15688fe2643dce1dbdbc";

        // Navigation
        window.switchTab = (id, title) => {
            document.querySelectorAll('.page-content').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.dock-item').forEach(d => d.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            document.getElementById('nav-' + id).classList.add('active');
            document.getElementById('view-title').innerText = title;
        };

        window.toggleModal = (id) => document.getElementById(id).classList.toggle('hidden');

        // Timer
        setInterval(() => {
            document.getElementById('live-timer').innerText = new Date().toLocaleTimeString('id-ID');
        }, 1000);

        // -- FIREBASE OPERATIONS --

        // Product Upload
        window.uploadProduct = async () => {
            const name = document.getElementById('prod-name').value, price = document.getElementById('prod-price').value;
            const file = document.getElementById('prod-image').files[0], btn = document.getElementById('btn-upload');
            if(!name || !file) return alert("Data tidak lengkap!");

            btn.innerText = "Syncing Data..."; btn.disabled = true;
            try {
                const fd = new FormData(); fd.append("image", file);
                const res = await fetch(`https://api.imgbb.com/1/upload?key=${IMGBB_API_KEY}`, { method: "POST", body: fd });
                const r = await res.json();
                await addDoc(collection(db, "products"), { 
                    name, price: parseInt(price), image: r.data.url, 
                    category: document.getElementById('prod-category').value, 
                    status: 'ready', createdAt: new Date() 
                });
                toggleModal('modal-tambah');
            } catch (e) { alert("Upload Gagal"); }
            btn.innerText = "Execute Upload"; btn.disabled = false;
        };

        // Snapshot Produk
        onSnapshot(query(collection(db, "products"), orderBy("createdAt", "desc")), (snap) => {
            const list = document.getElementById('product-list');
            document.getElementById('prod-count').innerText = snap.size;
            list.innerHTML = '';
            snap.forEach(d => {
                const p = d.data(), isH = p.status === 'habis';
                list.innerHTML += `
                <div class="bento-card col-span-1 group relative overflow-hidden">
                    <img src="${p.image}" class="absolute inset-0 w-full h-full object-cover opacity-10 group-hover:opacity-30 transition-all duration-700 group-hover:scale-110 ${isH ? 'grayscale' : ''}">
                    <div class="relative z-10 h-full flex flex-col justify-between min-h-[160px]">
                        <div class="flex justify-between items-start">
                            <span class="text-[8px] font-black uppercase tracking-widest px-2 py-1 bg-white/5 border border-white/10 rounded-lg">${p.category}</span>
                            <button onclick="deleteProduct('${d.id}')" class="text-white/20 hover:text-rose-500"><i class="fas fa-trash"></i></button>
                        </div>
                        <div>
                            <h4 class="font-bold text-sm truncate">${p.name}</h4>
                            <p class="text-xs text-cyan-400 font-bold italic">IDR ${p.price.toLocaleString()}</p>
                            <button onclick="toggleStock('${d.id}', '${p.status}')" class="mt-4 w-full py-2 rounded-xl text-[9px] font-black uppercase tracking-widest border border-white/5 hover:bg-white hover:text-black transition">
                                ${isH ? 'Set Ready' : 'Set Out'}
                            </button>
                        </div>
                    </div>
                </div>`;
            });
        });

        window.toggleStock = async (id, cur) => await updateDoc(doc(db, "products", id), { status: cur === 'ready' ? 'habis' : 'ready' });
        window.deleteProduct = async (id) => confirm('Hapus Item?') && await deleteDoc(doc(db, "products", id));

        // Snapshot Pesanan
        onSnapshot(query(collection(db, "orders"), orderBy("timestamp", "desc")), (snap) => {
            const list = document.getElementById('order-list'); list.innerHTML = '';
            snap.forEach(d => {
                const o = d.data();
                list.innerHTML += `
                <div class="bento-card border-l-4 border-l-cyan-500">
                    <div class="flex justify-between mb-4">
                        <h5 class="font-bold text-white uppercase truncate">${o.customer}</h5>
                        <p class="mono text-[9px] text-zinc-500">${o.wa}</p>
                    </div>
                    <div class="space-y-1 mb-6">
                        ${o.items?.map(i => `<div class="flex justify-between text-[11px] text-zinc-400"><span>${i.name} x${i.qty}</span></div>`).join('')}
                    </div>
                    <div class="flex items-center justify-between pt-4 border-t border-white/5">
                        <span class="text-sm font-black text-cyan-400">${o.total}</span>
                        <button onclick="deleteOrder('${d.id}')" class="bg-white text-black px-4 py-2 rounded-xl text-[9px] font-black">CLEAR</button>
                    </div>
                </div>`;
            });
        });
        window.deleteOrder = async (id) => await deleteDoc(doc(db, "orders", id));

        // Users & Promo (Logic sama dengan kode lama kamu)
        onSnapshot(collection(db, "users"), (snap) => {
    const list = document.getElementById('user-list'); 
    list.innerHTML = '';
    snap.forEach(d => {
        const u = d.data();
        // Password kita kasih efek blur, pas diklik baru kelihatan
        list.innerHTML += `
        <tr class="hover:bg-white/5 transition">
            <td class="p-6 font-bold text-white">${u.name}</td>
            <td class="p-6 text-zinc-500">${u.wa}</td>
<td class="p-6">
    <span class="mono bg-black px-2 py-1 rounded border border-white/10 cursor-pointer hover:border-cyan-500 transition-all select-none" 
          onclick="this.innerText = this.innerText === '••••••••' ? '${u.password || 'N/A'}' : '••••••••'">
        ••••••••
    </span>
</td>
            <td class="p-6">${u.age}</td>
            <td class="p-6"><span class="px-3 py-1 bg-white/5 rounded-full">${u.ref || 'Direct'}</span></td>
        </tr>`;
    });
});

        // Logic Simpan Promo Baru

// Update Fungsi Save
window.savePromo = async () => {
    const code = document.getElementById('promo-code').value.toUpperCase().trim();
    const type = document.getElementById('promo-type').value;
    const min = parseInt(document.getElementById('promo-min-order').value) || 0;
    const btn = document.getElementById('btn-save-promo');

    if(!code) return alert("KODE_PROMO_WAJIB_ISI!");

    btn.innerText = "ACTIVATING..."; btn.disabled = true;
    
    let rewardText = "";
    let finalValue = 0;

    if(type === 'diskon_persen') {
        finalValue = parseInt(document.getElementById('promo-value').value);
        rewardText = `${finalValue}% OFF`;
    } else if(type === 'diskon_nominal') {
        finalValue = parseInt(document.getElementById('promo-value').value);
        rewardText = `-${finalValue.toLocaleString()}`;
    } else {
        // Ambil dari dropdown minuman
        rewardText = "FREE " + document.getElementById('promo-bonus-item').value;
        finalValue = 0; 
    }

    try {
        await addDoc(collection(db, "promos"), { 
            code, type, value: finalValue, reward: rewardText, minOrder: min, createdAt: new Date() 
        });
        toggleModal('modal-promo');
        // Reset
        document.getElementById('promo-code').value = "";
        document.getElementById('promo-value').value = "";
    } catch (e) { alert("ERROR_SYSTEM_FAILURE"); }
    btn.innerText = "Activate Signal"; btn.disabled = false;
};
// Render List Promo (Bento Style)
onSnapshot(query(collection(db, "promos"), orderBy("createdAt", "desc")), (snap) => {
    const list = document.getElementById('promo-list'); 
    list.innerHTML = '';
    snap.forEach(d => {
        const pr = d.data();
        // Warna kartu beda berdasarkan tipe
        const accentColor = pr.type.includes('diskon') ? 'border-emerald-500' : 'border-cyan-500';
        
        list.innerHTML += `
        <div class="bento-card border-t-2 ${accentColor} flex flex-col justify-between min-h-[140px] group">
            <div>
                <div class="flex justify-between items-start">
                    <p class="text-2xl font-black tracking-tighter">${pr.code}</p>
                    <span class="text-[8px] mono bg-white/5 px-2 py-1 rounded text-zinc-500 uppercase">${pr.type.replace('_', ' ')}</span>
                </div>
                <p class="mono text-[9px] text-zinc-500 mt-1 uppercase">Min. Order: Rp ${(pr.minOrder || 0).toLocaleString()}</p>
            </div>
            <div class="flex justify-between items-end">
                <span class="text-emerald-400 font-bold italic text-lg">${pr.reward}</span>
                <button onclick="deletePromo('${d.id}')" class="text-white/10 group-hover:text-rose-500 transition-colors"><i class="fas fa-trash"></i></button>
            </div>
        </div>`;
    });
});

// Helper UI untuk placeholder
window.updatePromoUI = () => {
    const type = document.getElementById('promo-type').value;
    const valueWrapper = document.getElementById('promo-value-wrapper');
    const bonusWrapper = document.getElementById('promo-bonus-wrapper');
    const inputVal = document.getElementById('promo-value');

    if (type === 'free_produk') {
        // Sembunyikan input angka, munculkan dropdown minuman
        valueWrapper.classList.add('hidden');
        bonusWrapper.classList.remove('hidden');
    } else {
        // Munculkan input angka, sembunyikan dropdown minuman
        valueWrapper.classList.remove('hidden');
        bonusWrapper.classList.add('hidden');
        
        // Update placeholder biar sesuai (Persen atau Rupiah)
        inputVal.placeholder = (type === 'diskon_persen') ? "Nilai Persen (%)" : "Nilai Potongan (Rp)";
    }
};
        window.deletePromo = async (id) => await deleteDoc(doc(db, "promos", id));

        // Render daftar user dengan checkbox
onSnapshot(collection(db, "users"), (snap) => {
    const targetList = document.getElementById('target-user-list');
    targetList.innerHTML = '<p class="text-[10px] text-zinc-500 mb-2 uppercase">Pilih User Tertentu:</p>';
    snap.forEach(d => {
        const u = d.data();
        targetList.innerHTML += `
            <label class="flex items-center gap-3 p-2 hover:bg-white/5 rounded-lg cursor-pointer">
                <input type="checkbox" name="user-notif" value="${d.id}" class="accent-orange-500">
                <span class="text-sm">${u.name}</span>
            </label>
        `;
    });
});

window.sendNotif = async (type) => {
    const title = document.getElementById('notif-title').value;
    const body = document.getElementById('notif-body').value;
    
    if(!title || !body) return alert("Isi pesan dulu!");

    let targets = [];
    if(type === 'selected') {
        const checkboxes = document.querySelectorAll('input[name="user-notif"]:checked');
        checkboxes.forEach(cb => targets.push(cb.value));
    }

    try {
        await addDoc(collection(db, "notifications"), {
            title,
            body,
            targetType: type,
            targetUsers: targets,
            timestamp: new Date()
        });
        alert("Sinyal notifikasi dikirim ke database!");
    } catch (e) { alert("Gagal kirim"); }
};
    </script>
</body>
</html>
