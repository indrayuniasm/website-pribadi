<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ChatApp - Private & Story</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        /* Sembunyikan footer di desktop, tampilkan di mobile */
        @media (min-width: 768px) { .mobile-footer { display: none; } }
        /* Custom scrollbar */
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    </style>
</head>
<body class="bg-slate-100 font-sans">

    <div id="auth-screen" class="fixed inset-0 bg-white z-50 flex flex-col items-center justify-center p-6">
        <div id="register-form" class="w-full max-w-md space-y-4">
            <h2 class="text-2xl font-bold text-blue-600 text-center">Daftar Akun</h2>
            <input id="reg-nama" type="text" placeholder="Nama Lengkap" class="w-full border p-3 rounded-lg">
            <input id="reg-id" type="text" placeholder="ID Unik (contoh: budi_99)" class="w-full border p-3 rounded-lg">
            <input id="reg-hp" type="tel" placeholder="Nomor HP" class="w-full border p-3 rounded-lg">
            <input id="reg-pass" type="password" placeholder="Password" class="w-full border p-3 rounded-lg">
            <div class="flex gap-4">
                <select id="reg-gender" class="w-1/2 border p-3 rounded-lg">
                    <option value="Pria">Pria</option>
                    <option value="Wanita">Wanita</option>
                </select>
                <input id="reg-umur" type="number" placeholder="Umur" class="w-1/2 border p-3 rounded-lg">
            </div>
            <button onclick="handleRegister()" class="w-full bg-blue-600 text-white py-3 rounded-lg font-bold">Daftar</button>
            <p class="text-center text-sm cursor-pointer text-blue-500" onclick="toggleAuth()">Sudah punya akun? Login</p>
        </div>

        <div id="login-form" class="hidden w-full max-w-md space-y-4">
            <h2 class="text-2xl font-bold text-blue-600 text-center">Masuk ChatApp</h2>
            <input id="login-id" type="text" placeholder="No HP atau ID" class="w-full border p-3 rounded-lg">
            <input id="login-pass" type="password" placeholder="Password" class="w-full border p-3 rounded-lg">
            <button onclick="handleLogin()" class="w-full bg-blue-600 text-white py-3 rounded-lg font-bold">Login</button>
            <p class="text-center text-sm cursor-pointer text-blue-500" onclick="toggleAuth()">Belum punya akun? Daftar</p>
        </div>
    </div>

    <div id="app-screen" class="hidden flex h-screen overflow-hidden">
        
        <aside class="hidden md:flex w-80 bg-white border-r flex-col">
            <div class="p-4 border-b">
                <h1 class="text-xl font-bold text-blue-600">ChatApp</h1>
                <input type="text" placeholder="Cari pesan atau ID..." class="w-full mt-3 bg-slate-100 p-2 rounded-md outline-none border-none">
            </div>
            <div id="chat-list" class="flex-1 overflow-y-auto">
                </div>
        </aside>

        <main class="flex-1 flex flex-col bg-white">
            <header class="h-16 border-b flex items-center justify-between px-4 bg-white">
                <div class="flex items-center gap-3">
                    <img id="current-chat-img" src="https://ui-avatars.com/api/?name=User" class="w-10 h-10 rounded-full">
                    <div>
                        <h3 id="current-chat-name" class="font-bold text-sm">Pilih Chat</h3>
                        <p class="text-xs text-green-500">Online</p>
                    </div>
                </div>
                <div class="flex gap-4 text-slate-500">
                    <button onclick="alert('Memulai Telepon...')"><i class="fas fa-phone"></i></button>
                    <button onclick="alert('Memulai Video Call...')"><i class="fas fa-video"></i></button>
                </div>
            </header>

            <div id="message-container" class="flex-1 overflow-y-auto p-4 space-y-4 bg-slate-50">
                </div>

            <div class="p-4 border-t flex gap-2 bg-white">
                <input id="msg-input" type="text" placeholder="Ketik pesan..." class="flex-1 bg-slate-100 p-3 rounded-full outline-none">
                <button onclick="sendMsg()" class="bg-blue-600 text-white w-12 h-12 rounded-full flex items-center justify-center">
                    <i class="fas fa-paper-plane"></i>
                </button>
            </div>
        </main>

        <nav class="mobile-footer fixed bottom-0 left-0 right-0 bg-white border-t flex justify-around py-3">
            <button class="flex flex-col items-center text-blue-600"><i class="fas fa-comment"></i><span class="text-[10px]">Chat</span></button>
            <button onclick="showStory()" class="flex flex-col items-center text-slate-400"><i class="fas fa-circle-notch"></i><span class="text-[10px]">Story</span></button>
            <button class="flex flex-col items-center text-slate-400"><i class="fas fa-history"></i><span class="text-[10px]">History</span></button>
            <button onclick="showProfile()" class="flex flex-col items-center text-slate-400"><i class="fas fa-user-circle"></i><span class="text-[10px]">Profil</span></button>
        </nav>
    </div>

    <script type="module">
        // Import Firebase SDK
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, getDoc, collection, addDoc, onSnapshot, query, orderBy } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        // CONFIG FIREBASE (Ganti dengan milik Anda)
        const firebaseConfig = {
  apiKey: "AIzaSyBSo0nFUKNBDmUX0wSFV_idAFWBRnnTcXE",
  authDomain: "fotobooth-e36ab.firebaseapp.com",
  databaseURL: "https://fotobooth-e36ab-default-rtdb.firebaseio.com",
  projectId: "fotobooth-e36ab",
  storageBucket: "fotobooth-e36ab.firebasestorage.app",
  messagingSenderId: "1040239629485",
  appId: "1:1040239629485:web:254a7b50a4243b6c5d6224",
  measurementId: "G-SEKNK1YY41"
};
      }

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // LOGIKA PINDAH LAYAR
        window.toggleAuth = () => {
            document.getElementById('register-form').classList.toggle('hidden');
            document.getElementById('login-form').classList.toggle('hidden');
        };

        // DAFTAR
        window.handleRegister = async () => {
            const nama = document.getElementById('reg-nama').value;
            const idUnik = document.getElementById('reg-id').value;
            const hp = document.getElementById('reg-hp').value;
            const pass = document.getElementById('reg-pass').value;

            try {
                // Gunakan dummy email karena Firebase Auth butuh format email
                const userCredential = await createUserWithEmailAndPassword(auth, idUnik + "@chat.com", pass);
                const user = userCredential.user;

                // Simpan detail ke Firestore
                await setDoc(doc(db, "users", user.uid), {
                    nama, userID: idUnik, hp, gender: document.getElementById('reg-gender').value,
                    umur: document.getElementById('reg-umur').value,
                    photoURL: `https://ui-avatars.com/api/?name=${nama}`,
                    bio: "Halo, saya menggunakan ChatApp!"
                });

                alert("Berhasil Daftar!");
                location.reload();
            } catch (err) { alert(err.message); }
        };

        // LOGIN
        window.handleLogin = async () => {
            const id = document.getElementById('login-id').value;
            const pass = document.getElementById('login-pass').value;
            try {
                await signInWithEmailAndPassword(auth, id + "@chat.com", pass);
                document.getElementById('auth-screen').classList.add('hidden');
                document.getElementById('app-screen').classList.remove('hidden');
            } catch (err) { alert("Login Gagal: Periksa ID/Password"); }
        };

        // REAL-TIME STORY VIEWER LOGIC (Contoh Singkat)
        window.trackStoryView = async (storyId, viewerId) => {
            const storyRef = doc(db, "stories", storyId);
            // Update array viewer di Firestore secara real-time
            await updateDoc(storyRef, {
                viewers: arrayUnion(viewerId)
            });
        };
    </script>
</body>
          </html>
