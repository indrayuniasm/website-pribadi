<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ConnectPro X - Adaptive Layout</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    <script src="https://unpkg.com/peerjs@1.4.7/dist/peerjs.min.js"></script>
    
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <style>
        :root {
            --accent: #8b5cf6;
            --bg: #09090b;
            --panel: #18181b;
            --border: rgba(255, 255, 255, 0.1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }
        body { background: var(--bg); color: #fff; height: 100vh; overflow: hidden; }

        /* --- DESKTOP LAYOUT (Default) --- */
        .app-container {
            display: grid;
            grid-template-columns: 350px 1fr 300px;
            height: 100vh;
            width: 100%;
        }

        .sidebar, .main-chat, .profile-info {
            height: 100vh;
            display: flex;
            flex-direction: column;
            border-right: 1px solid var(--border);
        }

        .sidebar { background: #121214; }
        .main-chat { background: var(--bg); border-right: none; }
        .profile-info { background: #121214; border-right: none; border-left: 1px solid var(--border); }

        /* Components */
        .header { padding: 20px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; min-height: 70px; }
        .scroll-area { flex: 1; overflow-y: auto; padding: 15px; }
        .contact-card { display: flex; align-items: center; gap: 12px; padding: 12px; border-radius: 15px; cursor: pointer; transition: 0.2s; margin-bottom: 5px; }
        .contact-card:hover { background: rgba(255,255,255,0.05); }
        .status-dot { width: 10px; height: 10px; border-radius: 50%; }
        .online { background: #22c55e; box-shadow: 0 0 8px #22c55e; }
        .offline { background: #52525b; }

        /* Chat Bubbles */
        .bubble { padding: 12px 16px; border-radius: 18px; max-width: 75%; margin-bottom: 10px; font-size: 0.9rem; line-height: 1.4; }
        .sent { align-self: flex-end; background: var(--accent); border-bottom-right-radius: 4px; }
        .received { align-self: flex-start; background: #27272a; border-bottom-left-radius: 4px; }

        .input-bar { padding: 20px; border-top: 1px solid var(--border); display: flex; gap: 10px; }
        input { flex: 1; background: #27272a; border: none; border-radius: 12px; padding: 12px 15px; color: #fff; outline: none; }

        /* Mobile Navigation (Hidden on Desktop) */
        .mobile-nav { display: none; }

        /* --- MOBILE LAYOUT (Breakpoint 900px) --- */
        @media (max-width: 900px) {
            .app-container {
                grid-template-columns: 1fr; /* Hanya satu kolom di HP */
            }

            /* Sembunyikan semua panel secara default */
            .sidebar, .main-chat, .profile-info {
                display: none;
                width: 100% !important;
                border: none;
            }

            /* Panel yang aktif akan ditampilkan */
            .active-panel { display: flex !important; }

            .mobile-nav {
                display: flex;
                position: fixed;
                bottom: 0;
                width: 100%;
                height: 70px;
                background: #121214;
                border-top: 1px solid var(--border);
                justify-content: space-around;
                align-items: center;
                z-index: 100;
            }

            .nav-item { color: #71717a; text-align: center; cursor: pointer; font-size: 1.2rem; }
            .nav-item.active { color: var(--accent); }
            
            .main-chat { height: calc(100vh - 70px); } /* Beri ruang untuk nav bawah */
        }

        /* Call UI */
        #callUI { position: fixed; inset: 0; background: #000; z-index: 9999; display: none; flex-direction: column; }
        #remoteVideo { width: 100%; height: 100%; object-fit: cover; }
        #localVideo { width: 120px; height: 160px; position: absolute; top: 20px; right: 20px; border-radius: 12px; border: 2px solid var(--accent); object-fit: cover; }

        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div id="authUI" style="position:fixed; inset:0; background:var(--bg); z-index:10000; display:flex; align-items:center; justify-content:center;">
        <div style="background:var(--panel); padding:40px; border-radius:25px; width:90%; max-width:350px; text-align:center;">
            <h2 style="margin-bottom:20px;">ConnectPro</h2>
            <input type="text" id="username" placeholder="Masukkan Username..." style="width:100%; margin-bottom:15px; background:#09090b; border:1px solid var(--border);">
            <button onclick="initApp()" style="width:100%; padding:12px; background:var(--accent); border:none; border-radius:10px; color:white; font-weight:bold; cursor:pointer;">Masuk</button>
        </div>
    </div>

    <div class="app-container hidden" id="mainApp">
        <aside class="sidebar active-panel" id="panel-beranda">
            <div class="header"><h2>Chats</h2></div>
            <div class="scroll-area" id="contactList"></div>
        </aside>

        <main class="main-chat" id="panel-chat">
            <div class="header">
                <div id="chatTarget">Pilih teman...</div>
                <div id="callTools" class="hidden">
                    <button onclick="startCall(false)" style="background:none; border:none; color:white; margin-right:15px; cursor:pointer;"><i class="fa-solid fa-phone"></i></button>
                    <button onclick="startCall(true)" style="background:none; border:none; color:white; cursor:pointer;"><i class="fa-solid fa-video"></i></button>
                </div>
            </div>
            <div class="scroll-area" id="msgBox" style="display:flex; flex-direction:column;"></div>
            <div class="input-bar">
                <input type="text" id="msgInput" placeholder="Ketik pesan...">
                <button onclick="sendMsg()" style="background:var(--accent); border:none; color:white; padding:10px 15px; border-radius:10px; cursor:pointer;"><i class="fa-solid fa-paper-plane"></i></button>
            </div>
        </main>

        <aside class="profile-info" id="panel-profile">
            <div class="header"><h2>Profil</h2></div>
            <div class="scroll-area" style="text-align:center; padding-top:40px;">
                <div id="myAva" style="width:100px; height:100px; background:var(--accent); border-radius:50%; margin:0 auto 15px; display:flex; align-items:center; justify-content:center; font-size:2.5rem; font-weight:800;">?</div>
                <h3 id="displayMyName">Username</h3>
                <p style="color:#71717a; margin-top:5px;">Online Everywhere</p>
                <button onclick="location.reload()" style="margin-top:40px; background:rgba(239,68,68,0.1); color:#ef4444; border:none; padding:10px 20px; border-radius:10px; cursor:pointer;">Logout</button>
            </div>
        </aside>

        <nav class="mobile-nav">
            <div class="nav-item active" onclick="switchPanel('beranda')" id="nav-beranda"><i class="fa-solid fa-house"></i></div>
            <div class="nav-item" onclick="switchPanel('chat')" id="nav-chat"><i class="fa-solid fa-message"></i></div>
            <div class="nav-item" onclick="switchPanel('profile')" id="nav-profile"><i class="fa-solid fa-user"></i></div>
        </nav>
    </div>

    <div id="callUI">
        <video id="remoteVideo" autoplay playsinline></video>
        <video id="localVideo" autoplay muted playsinline></video>
        <div style="position:absolute; bottom:50px; left:50%; transform:translateX(-50%); display:flex; gap:20px;">
            <button id="answerBtn" onclick="answerCall()" style="width:60px; height:60px; border-radius:50%; background:#22c55e; border:none; color:white; font-size:1.5rem; cursor:pointer;"><i class="fa-solid fa-phone"></i></button>
            <button onclick="endCall()" style="width:60px; height:60px; border-radius:50%; background:#ef4444; border:none; color:white; font-size:1.5rem; cursor:pointer;"><i class="fa-solid fa-phone-slash"></i></button>
        </div>
    </div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyBSo0nFUKNBDmUX0wSFV_idAFWBRnnTcXE",
        authDomain: "fotobooth-e36ab.firebaseapp.com",
        databaseURL: "https://fotobooth-e36ab-default-rtdb.firebaseio.com",
        projectId: "fotobooth-e36ab",
        storageBucket: "fotobooth-e36ab.firebasestorage.app",
        messagingSenderId: "1040239629485",
        appId: "1:1040239629485:web:254a7b50a4243b6c5d6224"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    let myID = "", partnerID = "", peer, localStream, currentCall;

    // --- INITIALIZATION ---
    function initApp() {
        myID = document.getElementById('username').value.trim().toLowerCase();
        if(!myID) return;

        peer = new Peer(myID);
        peer.on('open', () => {
            db.ref('users/' + myID).update({ status: 'online' });
            db.ref('users/' + myID + '/status').onDisconnect().set('offline');
            
            document.getElementById('authUI').style.display = 'none';
            document.getElementById('mainApp').classList.remove('hidden');
            document.getElementById('displayMyName').innerText = myID;
            document.getElementById('myAva').innerText = myID.charAt(0).toUpperCase();
            
            loadContacts();
            listenForCalls();
        });

        peer.on('call', call => {
            currentCall = call;
            document.getElementById('callUI').style.display = 'flex';
            document.getElementById('answerBtn').style.display = 'block';
        });
    }

    // --- RESPONSIVE NAVIGATION ---
    function switchPanel(panelName) {
        if(window.innerWidth > 900) return; // Nonaktifkan di desktop

        document.querySelectorAll('.sidebar, .main-chat, .profile-info').forEach(p => p.classList.remove('active-panel'));
        document.getElementById('panel-' + panelName).classList.add('active-panel');

        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        document.getElementById('nav-' + panelName).classList.add('active');
    }

    // --- CORE FEATURES ---
    function loadContacts() {
        db.ref('users').on('value', snap => {
            const list = document.getElementById('contactList');
            list.innerHTML = "";
            snap.forEach(u => {
                if(u.key !== myID) {
                    const online = u.val().status === 'online';
                    list.innerHTML += `
                        <div class="contact-card" onclick="openChat('${u.key}')">
                            <div class="status-dot ${online ? 'online' : 'offline'}"></div>
                            <b>${u.key}</b>
                        </div>`;
                }
            });
        });
    }

    function openChat(id) {
        partnerID = id;
        document.getElementById('chatTarget').innerText = id;
        document.getElementById('callTools').classList.remove('hidden');
        
        if(window.innerWidth <= 900) switchPanel('chat');

        const room = [myID, partnerID].sort().join("_");
        db.ref('messages/' + room).on('value', snap => {
            const box = document.getElementById('msgBox');
            box.innerHTML = "";
            snap.forEach(m => {
                const d = m.val();
                box.innerHTML += `<div class="bubble ${d.sender === myID ? 'sent' : 'received'}">${d.text}</div>`;
            });
            box.scrollTop = box.scrollHeight;
        });
    }

    function sendMsg() {
        const text = document.getElementById('msgInput').value;
        if(!text || !partnerID) return;
        const room = [myID, partnerID].sort().join("_");
        db.ref('messages/' + room).push({ sender: myID, text: text });
        document.getElementById('msgInput').value = "";
    }

    // --- VIDEO CALL ---
    async function startCall(video) {
        localStream = await navigator.mediaDevices.getUserMedia({ video: video, audio: true });
        document.getElementById('localVideo').srcObject = localStream;
        document.getElementById('callUI').style.display = 'flex';
        document.getElementById('answerBtn').style.display = 'none';

        currentCall = peer.call(partnerID, localStream);
        currentCall.on('stream', remote => document.getElementById('remoteVideo').srcObject = remote);
    }

    async function answerCall() {
        localStream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
        document.getElementById('localVideo').srcObject = localStream;
        document.getElementById('answerBtn').style.display = 'none';
        
        currentCall.answer(localStream);
        currentCall.on('stream', remote => document.getElementById('remoteVideo').srcObject = remote);
    }

    function endCall() {
        if(currentCall) currentCall.close();
        if(localStream) localStream.getTracks().forEach(t => t.stop());
        document.getElementById('callUI').style.display = 'none';
    }

    function listenForCalls() {} // Handled by peer.on('call')
</script>
</body>
</html>
