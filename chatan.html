<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NexChat Premium - LDR & Dealer System</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #0b0f1a; color: white; }
        .glass { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(16px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .hidden { display: none !important; }
        input:focus { border-color: #38bdf8 !important; outline: none; }
        .custom-scroll::-webkit-scrollbar { width: 5px; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center overflow-hidden">

    <div id="captcha-container"></div>

    <div id="auth-container" class="w-full max-w-md p-6">
        <div id="reg-card" class="glass p-8 rounded-[2rem] shadow-2xl">
            <h2 class="text-3xl font-bold mb-2 bg-gradient-to-r from-sky-400 to-indigo-400 bg-clip-text text-transparent">Daftar Akun</h2>
            <p class="text-slate-400 text-sm mb-6">Lengkapi data untuk bergabung.</p>
            
            <div class="space-y-4">
                <input type="text" id="reg-nama" placeholder="Nama Lengkap" class="w-full p-3 bg-slate-900/50 rounded-xl border border-slate-700 transition">
                <input type="text" id="reg-id" placeholder="ID Unik (Tanpa Spasi)" class="w-full p-3 bg-slate-900/50 rounded-xl border border-slate-700 transition">
                <div class="flex gap-2">
                    <input type="tel" id="reg-phone" placeholder="+628..." class="flex-1 p-3 bg-slate-900/50 rounded-xl border border-slate-700 transition">
                    <button id="btn-otp" onclick="handleSendOTP()" class="bg-sky-600 px-4 rounded-xl text-xs font-bold hover:bg-sky-500">Kirim OTP</button>
                </div>
                <input type="text" id="reg-otp" placeholder="Kode OTP" class="w-full p-3 bg-slate-900/50 rounded-xl border border-slate-700 transition">
                <input type="password" id="reg-pass" placeholder="Password" class="w-full p-3 bg-slate-900/50 rounded-xl border border-slate-700 transition">
                <button onclick="handleRegister()" class="w-full py-4 bg-sky-600 rounded-2xl font-bold shadow-lg shadow-sky-900/40 mt-2">Daftar Sekarang</button>
            </div>
            <p class="mt-4 text-center text-sm text-slate-500">Sudah punya akun? <button onclick="toggleView('login')" class="text-sky-400">Login</button></p>
        </div>

        <div id="log-card" class="glass p-8 rounded-[2rem] shadow-2xl hidden">
            <h2 class="text-3xl font-bold mb-6 text-white text-center">Login</h2>
            <div class="space-y-4">
                <input type="tel" id="log-phone" placeholder="Nomor HP (+62)" class="w-full p-3 bg-slate-900/50 rounded-xl border border-slate-700">
                <input type="password" id="log-pass" placeholder="Password" class="w-full p-3 bg-slate-900/50 rounded-xl border border-slate-700">
                <button onclick="handleLogin()" class="w-full py-4 bg-indigo-600 rounded-2xl font-bold shadow-lg">Masuk</button>
            </div>
            <p class="mt-4 text-center text-sm text-slate-500">Belum punya akun? <button onclick="toggleView('reg')" class="text-sky-400">Daftar</button></p>
        </div>
    </div>

    <div id="main-app" class="w-screen h-screen glass flex hidden">
        <div class="w-80 border-r border-white/10 flex flex-col">
            <div class="p-6">
                <div class="flex items-center justify-between mb-6">
                    <h1 class="text-xl font-bold tracking-tight">NexChat</h1>
                    <button onclick="logout()" class="text-red-400 text-sm">Keluar</button>
                </div>
                <input type="text" id="search-bar" placeholder="Cari ID atau Nomor..." class="w-full p-3 bg-slate-800/50 rounded-xl text-sm border border-slate-700">
            </div>
            <div id="contact-list" class="flex-1 overflow-y-auto custom-scroll">
                </div>
        </div>

        <div class="flex-1 flex flex-col bg-slate-900/30">
            <div id="chat-header" class="p-4 border-b border-white/10 flex justify-between items-center hidden">
                <div class="flex items-center gap-3">
                    <div class="w-10 h-10 rounded-full bg-gradient-to-tr from-sky-500 to-indigo-500"></div>
                    <div>
                        <p id="target-name" class="font-bold">-</p>
                        <p class="text-[10px] text-green-400 uppercase tracking-widest">Active Now</p>
                    </div>
                </div>
                <div class="flex gap-4">
                    <button onclick="initCall('voice')" class="p-2 hover:bg-white/10 rounded-full">📞</button>
                    <button onclick="initCall('video')" class="p-2 hover:bg-white/10 rounded-full">📹</button>
                </div>
            </div>

            <div id="chat-messages" class="flex-1 p-6 overflow-y-auto custom-scroll space-y-4">
                </div>

            <div id="chat-input-area" class="p-4 bg-slate-900/80 flex gap-3 hidden">
                <input type="text" id="input-pesan" placeholder="Ketik pesan..." class="flex-1 bg-slate-800 border-none rounded-xl px-4">
                <button onclick="kirimPesan()" class="bg-sky-600 px-6 rounded-xl font-bold">Kirim</button>
            </div>
        </div>
    </div>

    <div id="video-modal" class="fixed inset-0 bg-black/90 z-50 flex items-center justify-center hidden">
        <video id="remote-video" autoplay class="w-full h-full object-cover"></video>
        <video id="local-video" autoplay muted class="absolute bottom-10 right-10 w-48 h-72 border-2 border-white rounded-xl object-cover"></video>
        <button onclick="endCall()" class="absolute bottom-10 left-1/2 -translate-x-1/2 bg-red-600 p-4 rounded-full px-8 font-bold">Tutup Telepon</button>
    </div>

    <script type="module">
        // --- FIREBASE CONFIGURATION ---
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, signInWithPhoneNumber, RecaptchaVerifier, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, getDoc, collection, addDoc, query, onSnapshot, where, orderBy } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBSo0nFUKNBDmUX0wSFV_idAFWBRnnTcXE",
            authDomain: "fotobooth-e36ab.firebaseapp.com",
            databaseURL: "https://fotobooth-e36ab-default-rtdb.firebaseio.com",
            projectId: "fotobooth-e36ab",
            storageBucket: "fotobooth-e36ab.firebasestorage.app",
            messagingSenderId: "1040239629485",
            appId: "1:1040239629485:web:f48eba2428d267895d6224",
            measurementId: "G-EZG1C3KX2P"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        let currentUser = null;
        let activeChatTarget = null;

        // --- AUTH LOGIC ---
        window.toggleView = (view) => {
            if(view === 'login') {
                document.getElementById('reg-card').classList.add('hidden');
                document.getElementById('log-card').classList.remove('hidden');
            } else {
                document.getElementById('reg-card').classList.remove('hidden');
                document.getElementById('log-card').classList.add('hidden');
            }
        };

        // Inisialisasi Recaptcha
        const initRecaptcha = () => {
            if (!window.recaptchaVerifier) {
                window.recaptchaVerifier = new RecaptchaVerifier(auth, 'captcha-container', { 'size': 'invisible' });
            }
        };

        window.handleSendOTP = async () => {
            const phone = document.getElementById('reg-phone').value;
            if (!phone.startsWith('+62')) return alert("Gunakan format +62");
            initRecaptcha();
            try {
                window.confirmationResult = await signInWithPhoneNumber(auth, phone, window.recaptchaVerifier);
                alert("OTP Terkirim!");
            } catch (e) { alert(e.message); }
        };

        window.handleRegister = async () => {
            const otp = document.getElementById('reg-otp').value;
            const userData = {
                nama: document.getElementById('reg-nama').value,
                username: document.getElementById('reg-id').value,
                phone: document.getElementById('reg-phone').value,
                bio: "Available",
                mode: "public"
            };

            try {
                const result = await window.confirmationResult.confirm(otp);
                await setDoc(doc(db, "users", result.user.uid), userData);
                alert("Pendaftaran Berhasil!");
                location.reload();
            } catch (e) { alert("OTP Salah atau Data Kurang"); }
        };

        // --- SESSION MANAGEMENT ---
        onAuthStateChanged(auth, async (user) => {
            if (user) {
                const docSnap = await getDoc(doc(db, "users", user.uid));
                if (docSnap.exists()) {
                    currentUser = { uid: user.uid, ...docSnap.data() };
                    document.getElementById('auth-container').classList.add('hidden');
                    document.getElementById('main-app').classList.remove('hidden');
                    initPeer(user.uid);
                    loadContacts();
                }
            }
        });

        window.logout = () => { signOut(auth).then(() => location.reload()); };

        // --- CHAT LOGIC ---
        async function loadContacts() {
            const q = query(collection(db, "users"), where("mode", "==", "public"));
            onSnapshot(q, (snapshot) => {
                const list = document.getElementById('contact-list');
                list.innerHTML = "";
                snapshot.forEach(doc => {
                    if(doc.id === currentUser.uid) return;
                    const u = doc.data();
                    const div = document.createElement('div');
                    div.className = "p-4 flex items-center gap-3 hover:bg-white/5 cursor-pointer border-b border-white/5";
                    div.innerHTML = `<div class="w-10 h-10 rounded-full bg-slate-700"></div><div><p class="font-bold text-sm">${u.nama}</p><p class="text-xs text-slate-500">@${u.username}</p></div>`;
                    div.onclick = () => startChat(doc.id, u.nama);
                    list.appendChild(div);
                });
            });
        }

        function startChat(id, nama) {
            activeChatTarget = id;
            document.getElementById('chat-header').classList.remove('hidden');
            document.getElementById('chat-input-area').classList.remove('hidden');
            document.getElementById('target-name').innerText = nama;
            loadMessages(id);
        }

        function loadMessages(targetId) {
            const q = query(collection(db, "chats"), orderBy("time", "asc"));
            onSnapshot(q, (snapshot) => {
                const msgBox = document.getElementById('chat-messages');
                msgBox.innerHTML = "";
                snapshot.forEach(d => {
                    const m = d.data();
                    if((m.from === currentUser.uid && m.to === targetId) || (m.from === targetId && m.to === currentUser.uid)) {
                        const isMe = m.from === currentUser.uid;
                        const div = document.createElement('div');
                        div.className = `flex ${isMe ? 'justify-end' : 'justify-start'}`;
                        div.innerHTML = `<div class="${isMe ? 'bg-sky-600' : 'bg-slate-800'} p-3 rounded-2xl max-w-[80%] text-sm">${m.text}</div>`;
                        msgBox.appendChild(div);
                    }
                });
                msgBox.scrollTop = msgBox.scrollHeight;
            });
        }

        window.kirimPesan = async () => {
            const txt = document.getElementById('input-pesan').value;
            if(!txt) return;
            await addDoc(collection(db, "chats"), {
                from: currentUser.uid,
                to: activeChatTarget,
                text: txt,
                time: Date.now()
            });
            document.getElementById('input-pesan').value = "";
        };

        // --- VIDEO CALL LOGIC (PEERJS) ---
        let myPeer, localStream;
        function initPeer(id) {
            myPeer = new Peer(id);
            myPeer.on('call', call => {
                if(confirm("Ada panggilan masuk. Terima?")) {
                    navigator.mediaDevices.getUserMedia({video: true, audio: true}).then(stream => {
                        localStream = stream;
                        document.getElementById('local-video').srcObject = stream;
                        document.getElementById('video-modal').classList.remove('hidden');
                        call.answer(stream);
                        call.on('stream', userStream => {
                            document.getElementById('remote-video').srcObject = userStream;
                        });
                    });
                }
            });
        }

        window.initCall = (type) => {
            navigator.mediaDevices.getUserMedia({video: true, audio: true}).then(stream => {
                localStream = stream;
                document.getElementById('local-video').srcObject = stream;
                document.getElementById('video-modal').classList.remove('hidden');
                const call = myPeer.call(activeChatTarget, stream);
                call.on('stream', userStream => {
                    document.getElementById('remote-video').srcObject = userStream;
                });
            });
        };

        window.endCall = () => {
            localStream.getTracks().forEach(track => track.stop());
            document.getElementById('video-modal').classList.add('hidden');
        };

    </script>
</body>
</html>
