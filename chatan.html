<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ConnectPro Elite OS</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    <script src="https://unpkg.com/peerjs@1.4.7/dist/peerjs.min.js"></script>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <style>
        :root {
            --primary: #6366f1;
            --accent: #ec4899;
            --bg: #0f172a;
            --surface: rgba(30, 41, 59, 0.7);
            --border: rgba(255, 255, 255, 0.08);
            --text: #f8fafc;
            --chat-bg: #0f172a;
        }

        /* Themes */
        .theme-crimson { --primary: #e11d48; --bg: #1a0a0d; }
        .theme-emerald { --primary: #10b981; --bg: #061a14; }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background: var(--bg); color: var(--text); height: 100vh; overflow: hidden; }

        /* --- LAYOUT ENGINE --- */
        .os-container { display: grid; height: 100vh; width: 100%; transition: 0.4s ease; }
        
        /* Desktop Mode */
        @media (min-width: 1025px) {
            .os-container { grid-template-columns: 80px 350px 1fr 300px; }
            .mobile-nav { display: none; }
            .nav-rail { display: flex; flex-direction: column; align-items: center; padding: 20px 0; background: rgba(0,0,0,0.3); border-right: 1px solid var(--border); }
        }

        /* Mobile Mode */
        @media (max-width: 1024px) {
            .os-container { grid-template-columns: 1fr; }
            .nav-rail, .side-list, .chat-area, .extra-panel { display: none; }
            .active-view { display: flex !important; }
            .mobile-nav { position: fixed; bottom: 0; width: 100%; height: 75px; background: var(--surface); backdrop-filter: blur(20px); display: flex; justify-content: space-around; align-items: center; border-top: 1px solid var(--border); z-index: 100; }
        }

        .panel { background: var(--surface); backdrop-filter: blur(25px); border-right: 1px solid var(--border); display: flex; flex-direction: column; position: relative; }

        /* --- STORY STRIP --- */
        .story-container { padding: 15px; display: flex; gap: 12px; overflow-x: auto; border-bottom: 1px solid var(--border); scrollbar-width: none; }
        .story-circle { min-width: 60px; height: 60px; border-radius: 50%; border: 2px solid var(--primary); padding: 3px; cursor: pointer; position: relative; }
        .story-circle img { width: 100%; height: 100%; border-radius: 50%; object-fit: cover; }
        .my-story::after { content: '+'; position: absolute; bottom: 0; right: 0; background: var(--primary); width: 20px; height: 20px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 14px; border: 2px solid var(--bg); }

        /* --- CHAT COMPONENTS --- */
        .chat-area { background: var(--chat-bg); position: relative; }
        .msg-scroll { flex: 1; padding: 25px; overflow-y: auto; display: flex; flex-direction: column; gap: 15px; }
        .bubble { padding: 12px 18px; border-radius: 22px; max-width: 70%; font-size: 0.95rem; line-height: 1.5; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .sent { align-self: flex-end; background: var(--primary); border-bottom-right-radius: 4px; }
        .received { align-self: flex-start; background: #1e293b; border-bottom-left-radius: 4px; }
        .blue-tick { color: #38bdf8; margin-left: 5px; font-size: 0.8rem; }

        /* --- PROFILE EDITOR --- */
        .pfp-large { width: 120px; height: 120px; border-radius: 40px; border: 3px solid var(--primary); margin-bottom: 20px; transition: 0.3s; cursor: pointer; }
        .pfp-large:hover { transform: scale(1.05); }
        .edit-input { background: rgba(0,0,0,0.2); border: 1px solid var(--border); padding: 10px; border-radius: 10px; color: white; width: 100%; margin-bottom: 15px; }

        /* --- CALL SYSTEM --- */
        #callUI { position: fixed; inset: 0; background: #000; z-index: 10001; display: none; }
        #vRemote { width: 100%; height: 100%; object-fit: cover; }
        #vLocal { width: 120px; height: 180px; position: absolute; top: 40px; right: 40px; border-radius: 20px; border: 2px solid var(--primary); }

        .btn-circle { width: 55px; height: 55px; border-radius: 50%; border: none; display: flex; align-items: center; justify-content: center; color: white; cursor: pointer; font-size: 1.2rem; }
        
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div id="authScreen" style="position:fixed; inset:0; background:var(--bg); z-index:10000; display:flex; align-items:center; justify-content:center;">
        <div class="panel" style="padding:40px; border-radius:30px; width:360px; text-align:center; border:1px solid var(--border);">
            <h1 style="font-weight:800; letter-spacing:-1px; margin-bottom:30px;">ConnectPro<span style="color:var(--primary)">.</span></h1>
            <input type="text" id="uID" placeholder="ID Username" class="edit-input">
            <button onclick="initOS()" style="width:100%; padding:15px; background:var(--primary); border:none; color:white; border-radius:15px; font-weight:700; cursor:pointer;">Launch System</button>
        </div>
    </div>

    <div class="os-container hidden" id="os">
        
        <nav class="nav-rail">
            <div class="btn-circle" style="background:var(--primary); margin-bottom:40px;"><i class="fa-solid fa-bolt"></i></div>
            <div onclick="switchView('side-list')" style="margin-bottom:30px; cursor:pointer;"><i class="fa-solid fa-comment-dots"></i></div>
            <div onclick="switchView('extra-panel')" style="cursor:pointer;"><i class="fa-solid fa-user-gear"></i></div>
        </nav>

        <aside class="panel side-list active-view" id="view-side-list">
            <div style="padding:25px 20px 10px;">
                <h2 style="font-weight:800;">Messages</h2>
            </div>
            
            <div class="story-container" id="storyStrip">
                <div class="story-circle my-story" onclick="postStory()">
                    <img id="myStoryImg" src="https://ui-avatars.com/api/?name=Me">
                </div>
                </div>

            <div id="chatHistory" style="flex:1; overflow-y:auto; padding-top:10px;"></div>
        </aside>

        <main class="panel chat-area" id="view-chat">
            <div style="padding:20px; border-bottom:1px solid var(--border); display:flex; justify-content:space-between; align-items:center;">
                <div style="display:flex; align-items:center; gap:12px;">
                    <div id="cAvatar" style="width:45px; height:45px; border-radius:15px; background:var(--primary);"></div>
                    <div>
                        <b id="cName">Select Chat</b><br>
                        <small id="cStatus" style="opacity:0.5">Offline</small>
                    </div>
                </div>
                <div id="cTools" class="hidden" style="display:flex; gap:15px;">
                    <button onclick="makeCall(false)" style="background:none; border:none; color:white; font-size:1.1rem; cursor:pointer;"><i class="fa-solid fa-phone"></i></button>
                    <button onclick="makeCall(true)" style="background:none; border:none; color:white; font-size:1.1rem; cursor:pointer;"><i class="fa-solid fa-video"></i></button>
                </div>
            </div>
            
            <div class="msg-scroll" id="mBox"></div>

            <div style="padding:20px; display:flex; gap:12px; background:rgba(0,0,0,0.2);">
                <input type="text" id="mInput" placeholder="Type a message..." class="edit-input" style="margin:0;">
                <button onclick="sendMsg()" class="btn-circle" style="background:var(--primary); width:50px; height:50px;"><i class="fa-solid fa-paper-plane"></i></button>
            </div>
        </main>

        <aside class="panel extra-panel" id="view-extra-panel">
            <div style="padding:25px; border-bottom:1px solid var(--border);"><h2>System Settings</h2></div>
            <div style="padding:30px; text-align:center;">
                <img id="pPfp" src="" class="pfp-large" onclick="update('pfp')">
                <h3 id="pName" onclick="update('nama')">User Name</h3>
                <p id="pID" style="opacity:0.5; margin-bottom:20px;">@username</p>
                <div id="pBio" class="edit-input" onclick="update('bio')" style="text-align:left; min-height:60px;">Bio loading...</div>
                
                <div style="text-align:left; margin-top:20px;">
                    <label style="font-size:0.8rem; opacity:0.5;">ACCOUNT PRIVACY</label>
                    <select id="pPrivacy" class="edit-input" onchange="updatePrivacy(this.value)" style="margin-top:10px;">
                        <option value="public">Public (Discoverable)</option>
                        <option value="private">Private (Invite Only)</option>
                    </select>
                </div>

                <div style="text-align:left; margin-top:20px;">
                    <label style="font-size:0.8rem; opacity:0.5;">CHAT THEME</label>
                    <div style="display:flex; gap:10px; margin-top:10px;">
                        <div onclick="setTheme('')" style="width:30px; height:30px; background:#6366f1; border-radius:8px; cursor:pointer;"></div>
                        <div onclick="setTheme('crimson')" style="width:30px; height:30px; background:#e11d48; border-radius:8px; cursor:pointer;"></div>
                        <div onclick="setTheme('emerald')" style="width:30px; height:30px; background:#10b981; border-radius:8px; cursor:pointer;"></div>
                    </div>
                </div>
            </div>
        </aside>

        <nav class="mobile-nav">
            <div onclick="switchView('side-list')"><i class="fa-solid fa-house"></i></div>
            <div onclick="switchView('chat')"><i class="fa-solid fa-message"></i></div>
            <div onclick="switchView('extra-panel')"><i class="fa-solid fa-user-astronaut"></i></div>
        </nav>
    </div>

    <div id="callUI">
        <video id="vRemote" autoplay playsinline></video>
        <video id="vLocal" autoplay muted playsinline></video>
        <div style="position:absolute; bottom:60px; left:50%; transform:translateX(-50%); display:flex; gap:30px;">
            <button id="btnAns" onclick="ansCall()" style="background:#22c55e;" class="btn-circle"><i class="fa-solid fa-phone"></i></button>
            <button onclick="endCall()" style="background:#ef4444;" class="btn-circle"><i class="fa-solid fa-phone-slash"></i></button>
        </div>
    </div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyBSo0nFUKNBDmUX0wSFV_idAFWBRnnTcXE",
        authDomain: "fotobooth-e36ab.firebaseapp.com",
        databaseURL: "https://fotobooth-e36ab-default-rtdb.firebaseio.com",
        projectId: "fotobooth-e36ab",
        storageBucket: "fotobooth-e36ab.firebasestorage.app",
        messagingSenderId: "1040239629485",
        appId: "1:1040239629485:web:254a7b50a4243b6c5d6224"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    let myID = "", partnerID = "", peer, callConn, stream;

    // --- SYSTEM INIT ---
    function initOS() {
        myID = document.getElementById('uID').value.trim().toLowerCase();
        if(!myID) return;

        peer = new Peer(myID);
        peer.on('open', () => {
            const statusRef = db.ref('users/' + myID + '/status');
            db.ref('.info/connected').on('value', s => {
                if(s.val()) { statusRef.set('online'); statusRef.onDisconnect().set('offline'); }
            });

            document.getElementById('authScreen').style.display = 'none';
            document.getElementById('os').classList.remove('hidden');
            
            syncMe();
            loadChats();
            loadStories();

            peer.on('call', c => {
                callConn = c;
                document.getElementById('callUI').style.display = 'block';
                document.getElementById('btnAns').classList.remove('hidden');
            });
        });
    }

    // --- PROFILE ENGINE ---
    function syncMe() {
        db.ref('users/' + myID).on('value', snap => {
            const d = snap.val() || {};
            document.getElementById('pName').innerText = d.nama || myID;
            document.getElementById('pID').innerText = "@" + myID;
            document.getElementById('pBio').innerText = d.bio || "Click to set bio";
            document.getElementById('pPfp').src = d.pfp || `https://ui-avatars.com/api/?name=${myID}`;
            document.getElementById('myStoryImg').src = d.pfp || `https://ui-avatars.com/api/?name=${myID}`;
            document.getElementById('pPrivacy').value = d.privacy || 'public';
        });
    }

    function update(key) {
        const val = prompt("Enter new " + key + ":");
        if(val) db.ref('users/' + myID).update({ [key]: val });
    }

    function updatePrivacy(val) {
        db.ref('users/' + myID).update({ privacy: val });
    }

    // --- STORY SYSTEM ---
    function postStory() {
        const txt = prompt("What's on your mind? (Story Text)");
        if(!txt) return;
        db.ref('stories/' + myID).set({
            sender: myID,
            text: txt,
            time: Date.now(),
            views: {}
        });
        alert("Story posted!");
    }

    function loadStories() {
        db.ref('stories').on('value', snap => {
            const strip = document.getElementById('storyStrip');
            strip.innerHTML = '<div class="story-circle my-story" onclick="postStory()"><img id="myStoryImg" src="'+document.getElementById('pPfp').src+'"></div>';
            
            snap.forEach(s => {
                if(s.key !== myID) {
                    strip.innerHTML += `
                        <div class="story-circle" onclick="viewStory('${s.key}', '${s.val().text}')">
                            <img src="https://ui-avatars.com/api/?name=${s.key}">
                        </div>`;
                }
            });
        });
    }

    function viewStory(id, text) {
        // Record view
        db.ref(`stories/${id}/views/${myID}`).set(true);
        alert(id + " says: " + text);
    }

    // --- CHAT SYSTEM ---
    function loadChats() {
        db.ref('messages').on('value', snap => {
            const list = document.getElementById('chatHistory');
            list.innerHTML = "";
            let items = [];

            snap.forEach(room => {
                if(room.key.includes(myID)) {
                    const other = room.key.split("_").find(i => i !== myID);
                    const msgs = Object.values(room.val());
                    const last = msgs[msgs.length - 1];
                    items.push({ id: other, last: last.text, time: last.time, unread: (last.sender !== myID && !last.read) });
                }
            });

            items.sort((a,b) => b.time - a.time).forEach(i => {
                db.ref('users/' + i.id).once('value', u => {
                    const d = u.val() || {};
                    list.innerHTML += `
                        <div style="padding:15px; display:flex; gap:12px; cursor:pointer;" onclick="openChat('${i.id}')">
                            <img src="${d.pfp || 'https://ui-avatars.com/api/?name='+i.id}" style="width:50px; height:50px; border-radius:15px;">
                            <div style="flex:1">
                                <div style="display:flex; justify-content:space-between"><b>${d.nama || i.id}</b> <small style="opacity:0.4">${new Date(i.time).getHours()}:${new Date(i.time).getMinutes()}</small></div>
                                <p style="font-size:0.85rem; opacity:0.6;">${i.last}</p>
                            </div>
                            ${i.unread ? '<div style="width:10px; height:10px; background:var(--primary); border-radius:50%; align-self:center;"></div>' : ''}
                        </div>`;
                });
            });
        });
    }

    function openChat(id) {
        partnerID = id;
        document.getElementById('cTools').classList.remove('hidden');
        if(window.innerWidth <= 1024) switchView('chat');

        db.ref('users/' + id).on('value', s => {
            const d = s.val() || {};
            document.getElementById('cName').innerText = d.nama || id;
            document.getElementById('cStatus').innerText = d.status || 'offline';
            document.getElementById('cAvatar').innerHTML = `<img src="${d.pfp || 'https://ui-avatars.com/api/?name='+id}" style="width:100%; height:100%; border-radius:15px;">`;
        });

        const room = [myID, partnerID].sort().join("_");
        db.ref('messages/' + room).on('value', snap => {
            const box = document.getElementById('mBox');
            box.innerHTML = "";
            snap.forEach(m => {
                const d = m.val();
                if(d.sender !== myID && !d.read) db.ref(`messages/${room}/${m.key}`).update({ read: true });
                
                box.innerHTML += `
                    <div class="bubble ${d.sender === myID ? 'sent' : 'received'}">
                        ${d.text}
                        <div style="font-size:0.7rem; text-align:right; margin-top:5px; opacity:0.6;">
                            ${new Date(d.time).getHours()}:${new Date(d.time).getMinutes()}
                            ${d.sender === myID ? `<i class="fa-solid fa-check-double ${d.read ? 'blue-tick' : ''}"></i>` : ''}
                        </div>
                    </div>`;
            });
            box.scrollTop = box.scrollHeight;
        });
    }

    function sendMsg() {
        const t = document.getElementById('mInput').value;
        if(!t || !partnerID) return;
        const room = [myID, partnerID].sort().join("_");
        db.ref('messages/' + room).push({ sender: myID, text: t, time: Date.now(), read: false });
        document.getElementById('mInput').value = "";
    }

    // --- CALL SYSTEM ---
    async function makeCall(video) {
        stream = await navigator.mediaDevices.getUserMedia({ video, audio: true });
        document.getElementById('vLocal').srcObject = stream;
        document.getElementById('callUI').style.display = 'block';
        document.getElementById('btnAns').classList.add('hidden');
        callConn = peer.call(partnerID, stream);
        callConn.on('stream', rs => document.getElementById('vRemote').srcObject = rs);
    }

    async function ansCall() {
        stream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
        document.getElementById('vLocal').srcObject = stream;
        callConn.answer(stream);
        callConn.on('stream', rs => document.getElementById('vRemote').srcObject = rs);
        document.getElementById('btnAns').classList.add('hidden');
    }

    function endCall() {
        if(callConn) callConn.close();
        if(stream) stream.getTracks().forEach(t => t.stop());
        document.getElementById('callUI').style.display = 'none';
    }

    // --- UI ENGINE ---
    function switchView(id) {
        document.querySelectorAll('.panel').forEach(p => p.classList.remove('active-view'));
        document.getElementById('view-' + id).classList.add('active-view');
    }

    function setTheme(t) { document.body.className = t ? 'theme-' + t : ''; }
</script>
</body>
    </html>
