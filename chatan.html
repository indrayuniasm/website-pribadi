<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>WA Clone Simple</title>

<script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>

body{
margin:0;
font-family:Segoe UI;
background:#0b141a;
color:white;
}

.app{
max-width:500px;
margin:auto;
height:100vh;
display:flex;
flex-direction:column;
}

header{
background:#202c33;
padding:15px;
display:flex;
justify-content:space-between;
align-items:center;
}

.chat-list{
flex:1;
overflow:auto;
}

.row{
display:flex;
padding:14px;
gap:10px;
border-bottom:1px solid rgba(255,255,255,0.05);
cursor:pointer;
}

.row img{
width:50px;
height:50px;
border-radius:50%;
}

.row b{
display:block;
}

.chat-room{
position:fixed;
inset:0;
background:#0b141a;
display:none;
flex-direction:column;
}

.chat-header{
background:#202c33;
padding:10px;
display:flex;
align-items:center;
gap:10px;
}

.chat-messages{
flex:1;
overflow:auto;
padding:10px;
}

.msg{
padding:8px 12px;
border-radius:10px;
max-width:70%;
margin-bottom:6px;
font-size:14px;
}

.me{
background:#005c4b;
margin-left:auto;
}

.other{
background:#202c33;
}

.input-area{
display:flex;
background:#202c33;
padding:8px;
}

.input-area input{
flex:1;
padding:10px;
border:none;
border-radius:20px;
outline:none;
}

.input-area button{
background:#25d366;
border:none;
border-radius:50%;
width:40px;
height:40px;
margin-left:8px;
}

.login{
position:fixed;
inset:0;
background:#0b141a;
display:flex;
align-items:center;
justify-content:center;
}

.login-box{
width:300px;
text-align:center;
}

.login input{
width:100%;
padding:12px;
border:none;
border-radius:10px;
margin-bottom:10px;
}

.login button{
width:100%;
padding:12px;
border:none;
border-radius:20px;
background:#25d366;
font-weight:bold;
}

</style>
</head>
<body>

<div class="login" id="login">
<div class="login-box">
<h2>WA Clone</h2>
<input id="userInput" placeholder="Masukkan ID">
<button onclick="login()">MASUK</button>
</div>
</div>

<div class="app" id="app" style="display:none">

<header>
<b>WhatsApp</b>
<i class="fa fa-ellipsis-vertical"></i>
</header>

<div class="chat-list" id="chatList"></div>

</div>

<div class="chat-room" id="chatRoom">

<div class="chat-header">
<i class="fa fa-arrow-left" onclick="closeChat()"></i>
<b id="chatUser"></b>
</div>

<div class="chat-messages" id="messages"></div>

<div class="input-area">
<input id="msgInput" placeholder="Ketik pesan">
<button onclick="sendMsg()">
<i class="fa fa-paper-plane"></i>
</button>
</div>

</div>

<script>

const firebaseConfig={
apiKey:"AIzaSyBSo0nFUKNBDmUX0wSFV_idAFWBRnnTcXE",
databaseURL:"https://fotobooth-e36ab-default-rtdb.firebaseio.com"
};

firebase.initializeApp(firebaseConfig);
const db=firebase.database();

let myID="";
let currentChat="";

function login(){

const id=document.getElementById("userInput").value.trim();

if(!id)return;

myID=id;

document.getElementById("login").style.display="none";
document.getElementById("app").style.display="flex";

loadChats();

}

function loadChats(){

db.ref("messages").on("value",snap=>{

const box=document.getElementById("chatList");
box.innerHTML="";

snap.forEach(room=>{

if(room.key.includes(myID)){

const other=room.key.split("_").find(x=>x!==myID);

box.innerHTML+=`
<div class="row" onclick="openChat('${other}')">

<img src="https://ui-avatars.com/api/?name=${other}">

<div>
<b>${other}</b>
<span>Buka chat</span>
</div>

</div>
`;

}

});

});

}

function openChat(user){

currentChat=user;

document.getElementById("chatRoom").style.display="flex";
document.getElementById("chatUser").innerText=user;

db.ref("messages/"+roomID()).on("value",snap=>{

const box=document.getElementById("messages");
box.innerHTML="";

snap.forEach(m=>{

const d=m.val();

box.innerHTML+=`
<div class="msg ${d.sender==myID?'me':'other'}">
${d.text}
</div>
`;

});

box.scrollTop=box.scrollHeight;

});

}

function closeChat(){

document.getElementById("chatRoom").style.display="none";

}

function sendMsg(){

const text=document.getElementById("msgInput").value;

if(!text)return;

db.ref("messages/"+roomID()).push({

sender:myID,
text:text,
time:Date.now()

});

document.getElementById("msgInput").value="";

}

function roomID(){

return [myID,currentChat].sort().join("_");

}

</script>

</body>
</html>
