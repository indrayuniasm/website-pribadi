<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ConnectPro - Modern Chat</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-storage-compat.js"></script>
    
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <style>
        :root {
            --primary: #8b5cf6;
            --bg-deep: #030712;
            --glass-card: rgba(17, 24, 39, 0.75);
            --glass-border: rgba(255, 255, 255, 0.1);
            --text-high: #f9fafb;
            --text-low: #9ca3af;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Outfit', sans-serif; -webkit-tap-highlight-color: transparent; }
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-thumb { background: var(--glass-border); border-radius: 10px; }
        
        body { background: var(--bg-deep); color: var(--text-high); height: 100vh; overflow: hidden; display: flex; justify-content: center; }

        /* Latar Belakang & Efek Glassmorphism */
        #mainBgLayer { position: fixed; inset: 0; z-index: -2; background-size: cover; background-position: center; transition: 0.8s; }
        .bg-overlay { position: fixed; inset: 0; z-index: -1; background: radial-gradient(circle at top right, rgba(139, 92, 246, 0.15), transparent), rgba(3, 7, 18, 0.8); }

        .app-wrapper { width: 100%; max-width: 1440px; height: 100vh; display: grid; grid-template-columns: 300px 1fr 300px; gap: 20px; padding: 20px; }
        .glass-panel { background: var(--glass-card); backdrop-filter: blur(25px); border: 1px solid var(--glass-border); border-radius: 28px; display: flex; flex-direction: column; overflow: hidden; position: relative; }

        /* Input & Form Umum */
        input, select { background: rgba(0,0,0,0.3); border: 1px solid var(--glass-border); padding: 14px 16px; border-radius: 16px; color: white; outline: none; width: 100%; margin-bottom: 15px; font-size: 0.95rem; }
        input:focus, select:focus { border-color: var(--primary); }

        /* Kolom Kiri: Beranda / List Kontak */
        .panel-left { padding: 24px; }
        .logo { font-size: 1.5rem; font-weight: 800; margin-bottom: 25px; display: flex; align-items: center; gap: 10px; }
        .logo i { color: var(--primary); }
        .contact-item { display: flex; align-items: center; gap: 14px; padding: 12px; border-radius: 18px; cursor: pointer; transition: 0.2s; margin-bottom: 8px; border: 1px solid transparent; }
        .contact-item:hover { background: rgba(255,255,255,0.05); }
        .contact-item.active { background: rgba(139, 92, 246, 0.15); border-color: rgba(139, 92, 246, 0.3); }
        .pfp-img { width: 50px; height: 50px; border-radius: 16px; object-fit: cover; background: #1f2937; }

        /* Kolom Tengah: Ruang Chat */
        .chat-header { padding: 20px 24px; border-bottom: 1px solid var(--glass-border); display: flex; align-items: center; gap: 15px; }
        .back-btn { display: none; background: none; border: none; color: white; font-size: 1.2rem; cursor: pointer; }
        .msg-area { flex: 1; padding: 24px; overflow-y: auto; display: flex; flex-direction: column; gap: 16px; }
        
        /* Bubble Chat */
        .bubble { padding: 14px 18px; border-radius: 22px; max-width: 70%; font-size: 0.95rem; line-height: 1.5; animation: slideUp 0.3s ease-out; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .sent { align-self: flex-end; background: var(--primary); border-bottom-right-radius: 4px; box-shadow: 0 5px 15px rgba(139, 92, 246, 0.3); }
        .received { align-self: flex-start; background: #27272a; border-bottom-left-radius: 4px; }
        
        /* Bar Input Pesan */
        .input-bar { padding: 20px 24px; display: flex; gap: 12px; border-top: 1px solid var(--glass-border); }
        .action-circle { width: 48px; height: 48px; border-radius: 16px; border: none; display: flex; align-items: center; justify-content: center; cursor: pointer; font-size: 1.1rem; flex-shrink: 0; transition: 0.2s; }
        .btn-vn { background: #3f3f46; color: white; }
        .btn-send { background: var(--primary); color: white; }
        .recording { background: #ef4444 !important; animation: pulse 1s infinite; }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.1); } 100% { transform: scale(1); } }
        
        /* Kolom Kanan: Profil & Settings (Desktop) */
        .panel-right { padding: 24px; display: flex; flex-direction: column; gap: 20px; }
        .profile-card { text-align: center; padding: 20px; background: rgba(0,0,0,0.2); border-radius: 24px; border: 1px solid var(--glass-border); }
        .badge { background: rgba(139, 92, 246, 0.2); color: var(--primary); padding: 4px 10px; border-radius: 10px; font-size: 0.75rem; font-weight: 600; margin-top: 10px; display: inline-block; }

        /* Modal Edit Profil */
        .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 2000; display: flex; align-items: center; justify-content: center; backdrop-filter: blur(10px); }
        .modal-content { width: 90%; max-width: 400px; padding: 30px; }
        
        /* Logika Responsif Mobile */
        @media (max-width: 900px) {
            .app-wrapper { grid-template-columns: 1fr; padding: 0; }
            .glass-panel { border-radius: 0; border: none; }
            .panel-right { display: none; } 
            .chat-area { display: none; } 
            .back-btn { display: block; } 
            
            /* Bottom Navigation (Khusus Mobile) */
            .mobile-bottom-nav { position: fixed; bottom: 0; width: 100%; height: 65px; background: var(--glass-card); backdrop-filter: blur(20px); display: flex; justify-content: space-around; align-items: center; z-index: 100; border-top: 1px solid var(--glass-border); }
            .nav-item { color: var(--text-low); font-size: 1.3rem; cursor: pointer; padding: 10px; transition: 0.3s; }
            .nav-item.active { color: var(--primary); transform: translateY(-3px); }
            .panel-left { height: calc(100vh - 65px); } 
        }
        @media (min-width: 901px) { .mobile-bottom-nav { display: none; } }

        /* UI Otentikasi */
        .auth-overlay { position: fixed; inset: 0; z-index: 3000; display: flex; align-items: center; justify-content: center; padding: 20px; }
        .hidden { display: none !important; }
        audio { height: 35px; border-radius: 10px; width: 200px; }
    </style>
</head>
<body>

    <div id="mainBgLayer"></div>
    <div class="bg-overlay"></div>

    <div id="authUI" class="auth-overlay">
        <div class="glass-panel" style="width: 100%; max-width: 400px; padding: 40px;">
            <div class="logo" style="justify-content: center; font-size: 2rem;"><i class="fa-solid fa-bolt"></i> ConnectPro</div>
            
            <div id="loginForm">
                <input type="text" id="lID" placeholder="ID Username (huruf kecil)">
                <input type="password" id="lPW" placeholder="Password">
                <button class="btn-send action-circle" style="width: 100%; border-radius: 16px; margin-top: 10px;" onclick="handleAuth('login')">Masuk Beranda</button>
                <p align="center" style="margin-top:20px; color:var(--text-low); font-size:0.9rem;">Belum punya akun? <span onclick="toggleAuth()" style="color:var(--primary); cursor:pointer; font-weight:600;">Daftar</span></p>
            </div>

            <div id="regForm" class="hidden">
                <input type="text" id="rNama" placeholder="Nama Lengkap">
                <input type="text" id="rID" placeholder="Buat ID Username">
                <input type="password" id="rPW" placeholder="Password">
                <button class="btn-send action-circle" style="width: 100%; border-radius: 16px; margin-top: 10px;" onclick="handleAuth('reg')">Daftar Akun</button>
                <p align="center" style="margin-top:20px; color:var(--text-low); font-size:0.9rem;">Punya akun? <span onclick="toggleAuth()" style="color:var(--primary); cursor:pointer; font-weight:600;">Login</span></p>
            </div>
        </div>
    </div>

    <div id="appUI" class="app-wrapper hidden">
        
        <div class="glass-panel panel-left" id="berandaPanel">
            <div class="logo"><i class="fa-solid fa-bolt"></i> Beranda</div>
            <div style="position:relative; margin-bottom: 20px;">
                <i class="fa-solid fa-search" style="position:absolute; left:15px; top:15px; color:var(--text-low);"></i>
                <input type="text" id="searchInput" placeholder="Cari teman..." style="padding-left: 45px; margin: 0; border-radius: 20px;" onkeyup="filterContacts()">
            </div>
            <div style="font-size: 0.8rem; color: var(--text-low); margin-bottom: 10px; font-weight: 600;">SEMUA PENGGUNA PUBLIK</div>
            <div style="flex: 1; overflow-y: auto;" id="contactList">
                </div>
        </div>

        <div class="glass-panel chat-area" id="chatPanel">
            <div class="chat-header">
                <button class="back-btn" onclick="backToBeranda()"><i class="fa-solid fa-chevron-left"></i></button>
                <div id="activeUserHeader" style="display:flex; align-items:center; gap:12px;">
                    <div style="font-weight:600; color:var(--text-low);">Pilih obrolan dari Beranda...</div>
                </div>
            </div>
            
            <div class="msg-area" id="msgBox">
                <div style="margin: auto; text-align: center; color: var(--text-low);">
                    <i class="fa-solid fa-comments" style="font-size: 3rem; margin-bottom: 10px; display: block;"></i>
                    Mulai obrolan baru
                </div>
            </div>

            <div class="input-bar">
                <button id="vnBtn" class="action-circle btn-vn" onmousedown="startVN()" onmouseup="stopVN()" ontouchstart="startVN()" ontouchend="stopVN()">
                    <i class="fa-solid fa-microphone"></i>
                </button>
                <input type="text" id="msgInput" placeholder="Ketik pesan..." style="margin:0;">
                <button class="action-circle btn-send" onclick="sendText()">
                    <i class="fa-solid fa-paper-plane"></i>
                </button>
            </div>
        </div>

        <div class="glass-panel panel-right" id="profilePanel">
            <div class="profile-card">
                <img id="myPfp" src="https://via.placeholder.com/150" style="width:100px; height:100px; border-radius:30px; object-fit:cover; border:3px solid var(--primary); margin-bottom: 15px;">
                <h2 id="myNama" style="font-weight: 800;">Username</h2>
                <p style="color:var(--text-low);">@<span id="myIDDisplay">iduser</span></p>
                <div class="badge" id="myPrivacyBadge">Akun Publik</div>
                
                <button class="action-circle" style="width:100%; border-radius:14px; background:rgba(255,255,255,0.1); color:white; margin-top: 20px;" onclick="openEditModal()">
                    <i class="fa-solid fa-user-pen" style="margin-right: 8px;"></i> Edit Profil
                </button>
            </div>

            <div class="profile-card" style="flex:1; display:flex; flex-direction:column; justify-content:space-between;">
                <div>
                    <h4 style="margin-bottom:15px; color:var(--text-low); font-size:0.8rem; text-transform:uppercase;">Tema Latar Belakang</h4>
                    <input type="file" id="bgInput" accept="image/*" style="font-size:0.8rem; padding: 10px;">
                </div>
                <button class="action-circle" style="width:100%; border-radius:14px; background:rgba(239, 68, 68, 0.15); color:#ef4444;" onclick="location.reload()">
                    <i class="fa-solid fa-arrow-right-from-bracket" style="margin-right: 8px;"></i> Keluar Akun
                </button>
            </div>
        </div>
    </div>

    <div class="mobile-bottom-nav" id="mobileNav">
        <div class="nav-item active" onclick="switchMobileTab('beranda')" id="tab-beranda"><i class="fa-solid fa-house"></i></div>
        <div class="nav-item" onclick="switchMobileTab('chat')" id="tab-chat"><i class="fa-solid fa-message"></i></div>
        <div class="nav-item" onclick="switchMobileTab('profile')" id="tab-profile"><i class="fa-solid fa-user"></i></div>
    </div>

    <div id="editProfileModal" class="modal-overlay hidden">
        <div class="glass-panel modal-content">
            <h3 style="margin-bottom: 20px; font-weight: 800;"><i class="fa-solid fa-sliders"></i> Edit Profil</h3>
            
            <label style="font-size:0.8rem; color:var(--text-low);">Foto Profil Baru:</label>
            <input type="file" id="editPfpInput" accept="image/*">
            
            <label style="font-size:0.8rem; color:var(--text-low);">Nama Lengkap:</label>
            <input type="text" id="editNamaInput">
            
            <label style="font-size:0.8rem; color:var(--text-low);">Status Akun:</label>
            <select id="editPrivacyInput">
                <option value="public">Publik (Muncul di Beranda orang)</option>
                <option value="private">Private (Sembunyi dari Beranda)</option>
            </select>
            
            <div style="display:flex; gap:10px; margin-top: 10px;">
                <button class="action-circle btn-send" style="flex:1; border-radius:14px;" onclick="saveProfile()" id="saveBtn">Simpan</button>
                <button class="action-circle" style="flex:1; border-radius:14px; background:rgba(255,255,255,0.1); color:white;" onclick="closeEditModal()">Batal</button>
            </div>
        </div>
    </div>

<script>
    // --- KONFIGURASI FIREBASE ---
    // (Ganti dengan config milikmu jika ada yang baru)
    const firebaseConfig = {
        apiKey: "AIzaSyBSo0nFUKNBDmUX0wSFV_idAFWBRnnTcXE",
        authDomain: "fotobooth-e36ab.firebaseapp.com",
        databaseURL: "https://fotobooth-e36ab-default-rtdb.firebaseio.com",
        projectId: "fotobooth-e36ab",
        storageBucket: "fotobooth-e36ab.firebasestorage.app",
        messagingSenderId: "1040239629485",
        appId: "1:1040239629485:web:254a7b50a4243b6c5d6224"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    const storage = firebase.storage();

    let myID = "", partnerID = "", myData = {};
    let mediaRec, chunks = [];

    // Latar belakang default yang estetik
    document.getElementById('mainBgLayer').style.backgroundImage = "url('https://images.unsplash.com/photo-1534796636912-3b95b3ab5986?q=80&w=1920')";

    // --- SISTEM LOGIN & DAFTAR ---
    function toggleAuth() {
        document.getElementById('loginForm').classList.toggle('hidden');
        document.getElementById('regForm').classList.toggle('hidden');
    }

    function handleAuth(type) {
        if(type === 'reg') {
            const id = document.getElementById('rID').value.trim().toLowerCase();
            const pw = document.getElementById('rPW').value;
            const nama = document.getElementById('rNama').value;
            if(!id || !pw || !nama) return alert("Harap lengkapi semua kolom pendaftaran!");
            
            db.ref('users/' + id).set({ nama, pw, pfp: '', privacy: 'public' })
              .then(() => { alert("Akun berhasil dibuat! Silahkan Login."); toggleAuth(); });
        } else {
            const id = document.getElementById('lID').value.trim().toLowerCase();
            const pw = document.getElementById('lPW').value;
            db.ref('users/' + id).once('value', snap => {
                if(snap.exists() && snap.val().pw === pw) {
                    myID = id;
                    myData = snap.val();
                    
                    document.getElementById('authUI').classList.add('hidden');
                    document.getElementById('appUI').classList.remove('hidden');
                    updateProfileUI();
                    loadContacts();
                    
                    if(window.innerWidth <= 900) switchMobileTab('beranda');
                } else alert("Username atau Password tidak cocok!");
            });
        }
    }

    // --- SISTEM BERANDA & KONTAK ---
    function loadContacts() {
        db.ref('users').on('value', snap => {
            const list = document.getElementById('contactList');
            list.innerHTML = "";
            snap.forEach(u => {
                const data = u.val();
                if(u.key !== myID && data.privacy !== 'private') {
                    list.innerHTML += `
                        <div class="contact-item" onclick="openChat('${u.key}', '${data.nama}', '${data.pfp}')">
                            <img src="${data.pfp || 'https://via.placeholder.com/150'}" class="pfp-img">
                            <div style="flex:1">
                                <div style="font-weight:600; font-size:1rem;">${data.nama}</div>
                                <div style="color:var(--text-low); font-size:0.8rem;">@${u.key}</div>
                            </div>
                        </div>`;
                }
            });
        });
    }

    function filterContacts() {
        const query = document.getElementById('searchInput').value.toLowerCase();
        const items = document.querySelectorAll('.contact-item');
        items.forEach(item => {
            const name = item.innerText.toLowerCase();
            item.style.display = name.includes(query) ? "flex" : "none";
        });
    }

    // --- SISTEM CHAT TERINTEGRASI ---
    function openChat(id, nama, pfp) {
        partnerID = id;
        document.getElementById('activeUserHeader').innerHTML = `
            <img src="${pfp || 'https://via.placeholder.com/150'}" style="width:40px; height:40px; border-radius:12px; object-fit:cover;">
            <div>
                <div style="font-weight:600; font-size:1.1rem; color:white;">${nama}</div>
                <div style="font-size:0.75rem; color:#22c55e;">Online</div>
            </div>`;
        
        if(window.innerWidth <= 900) switchMobileTab('chat');

        const room = [myID, partnerID].sort().join("_");
        db.ref('messages/' + room).on('value', snap => {
            const box = document.getElementById('msgBox');
            box.innerHTML = "";
            snap.forEach(m => {
                const d = m.val();
                const cls = d.sender === myID ? 'sent' : 'received';
                if(d.type === 'vn') {
                    box.innerHTML += `<div class="bubble ${cls}"><audio controls src="${d.url}"></audio></div>`;
                } else {
                    box.innerHTML += `<div class="bubble ${cls}">${d.text}</div>`;
                }
            });
            box.scrollTop = box.scrollHeight;
        });
    }

    function sendText() {
        const text = document.getElementById('msgInput').value;
        if(!text || !partnerID) return;
        const room = [myID, partnerID].sort().join("_");
        db.ref('messages/' + room).push({ sender: myID, text: text, type: 'text' });
        document.getElementById('msgInput').value = "";
    }

    // --- SISTEM VOICE NOTE (VN) ---
    async function startVN() {
        if(!partnerID) return alert("Pilih teman obrolan dulu di Beranda!");
        try {
            const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
