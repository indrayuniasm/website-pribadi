<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ConnectPro - Chat & Story</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
        .hide-scroll::-webkit-scrollbar { display: none; }
        .story-ring { padding: 2px; border: 2px solid #3b82f6; }
    </style>
</head>
<body class="bg-slate-50">

    <div id="auth-screen" class="min-h-screen flex items-center justify-center p-4">
        <div class="bg-white w-full max-w-md rounded-[40px] shadow-2xl p-8 border border-white">
            <div id="login-container">
                <h2 class="text-4xl font-black mb-2 tracking-tight">Halo! 👋</h2>
                <p class="text-slate-500 mb-8">Masuk untuk lanjut ngobrol.</p>
                <div class="space-y-4">
                    <input type="text" id="login-id" placeholder="ID User" class="w-full p-4 bg-slate-100 rounded-2xl outline-none focus:ring-2 focus:ring-blue-500 transition">
                    <input type="password" id="login-pass" placeholder="Password" class="w-full p-4 bg-slate-100 rounded-2xl outline-none focus:ring-2 focus:ring-blue-500 transition">
                    <button onclick="handleLogin()" class="w-full bg-blue-600 text-white font-extrabold py-4 rounded-2xl shadow-lg hover:scale-[1.02] active:scale-95 transition">Masuk</button>
                </div>
                <p class="text-center mt-8 text-slate-500">Belum punya akun? <a href="#" onclick="toggleAuth(true)" class="text-blue-600 font-bold">Daftar Akun</a></p>
            </div>

            <div id="register-container" class="hidden">
                <h2 class="text-4xl font-black mb-2 tracking-tight">Daftar</h2>
                <div class="space-y-3">
                    <input type="text" id="reg-nama" placeholder="Nama Lengkap" class="w-full p-3 bg-slate-100 rounded-xl outline-none">
                    <input type="text" id="reg-id" placeholder="Buat ID (indra123)" class="w-full p-3 bg-slate-100 rounded-xl outline-none">
                    <input type="number" id="reg-hp" placeholder="Nomor HP" class="w-full p-3 bg-slate-100 rounded-xl outline-none">
                    <input type="password" id="reg-pass" placeholder="Buat Password" class="w-full p-3 bg-slate-100 rounded-xl outline-none">
                    <div class="flex gap-2">
                        <select id="reg-gender" class="w-1/2 p-3 bg-slate-100 rounded-xl outline-none">
                            <option value="Pria">Pria</option>
                            <option value="Wanita">Wanita</option>
                        </select>
                        <input type="number" id="reg-umur" placeholder="Umur" class="w-1/2 p-3 bg-slate-100 rounded-xl outline-none">
                    </div>
                    <button onclick="handleRegister()" class="w-full bg-emerald-500 text-white font-extrabold py-4 rounded-2xl shadow-lg mt-4 transition">Buat Akun Sekarang</button>
                </div>
                <p class="text-center mt-6 text-slate-500">Sudah punya akun? <a href="#" onclick="toggleAuth(false)" class="text-blue-600 font-bold">Login</a></p>
            </div>
        </div>
    </div>

    <div id="main-app" class="hidden h-screen flex flex-col max-w-lg mx-auto bg-white shadow-2xl overflow-hidden">
        <header class="p-6 flex justify-between items-center border-b">
            <h1 class="text-2xl font-black tracking-tight text-blue-600">ConnectPro</h1>
            <div class="flex items-center gap-3">
                <img id="my-photo" src="" class="w-10 h-10 rounded-full border-2 border-white shadow-md">
                <button onclick="logout()" class="text-slate-300 hover:text-red-500 transition"><i class="fas fa-power-off"></i></button>
            </div>
        </header>

        <div class="p-4 flex gap-4 overflow-x-auto hide-scroll border-b bg-white">
            <div onclick="openStoryModal()" class="flex flex-col items-center gap-1 min-w-[70px] cursor-pointer">
                <div class="w-14 h-14 rounded-2xl bg-blue-50 flex items-center justify-center text-blue-600 border-2 border-dashed border-blue-200">
                    <i class="fas fa-plus"></i>
                </div>
                <span class="text-[10px] font-bold">Story</span>
            </div>
            <div id="online-list" class="flex gap-4">
                </div>
        </div>

        <div class="flex-1 overflow-y-auto p-4 space-y-4 bg-slate-50/50">
            <h3 class="text-xs font-black text-slate-400 uppercase tracking-widest">Aktivitas Terbaru</h3>
            <div id="feed-container" class="space-y-4">
                </div>
        </div>
    </div>

    <div id="story-modal" class="hidden fixed inset-0 z-[100] bg-black/60 backdrop-blur-sm flex items-end justify-center p-4">
        <div class="bg-white w-full max-w-md rounded-[30px] p-6">
            <div class="flex justify-between items-center mb-6">
                <h3 class="text-xl font-black text-slate-800">Buat Story</h3>
                <button onclick="closeStoryModal()" class="text-slate-400"><i class="fas fa-times"></i></button>
            </div>
            <div class="space-y-4">
                <div class="flex gap-4 justify-center py-4 border-2 border-dashed border-slate-100 rounded-2xl">
                    <label class="cursor-pointer text-center">
                        <i class="fas fa-photo-video text-3xl text-blue-500"></i>
                        <p class="text-[10px] font-bold mt-1">Media</p>
                        <input type="file" id="story-file" accept="image/*,video/*,audio/*" class="hidden" onchange="handleFilePreview(this)">
                    </label>
                </div>
                <div id="preview-box" class="hidden p-3 bg-slate-50 rounded-xl text-xs text-blue-600 font-bold"></div>
                <textarea id="story-caption" placeholder="Tulis caption story..." class="w-full p-4 bg-slate-100 rounded-2xl outline-none min-h-[100px]"></textarea>
                <button id="btn-upload" onclick="uploadStory()" class="w-full bg-blue-600 text-white font-black py-4 rounded-2xl">Bagikan Story</button>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, getDoc, collection, addDoc, serverTimestamp, onSnapshot, query, orderBy } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
        import { getStorage, ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-storage.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBSo0nFUKNBDmUX0wSFV_idAFWBRnnTcXE",
            authDomain: "fotobooth-e36ab.firebaseapp.com",
            projectId: "fotobooth-e36ab",
            storageBucket: "fotobooth-e36ab.firebasestorage.app",
            messagingSenderId: "1040239629485",
            appId: "1:1040239629485:web:254a7b50a4243b6c5d6224"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const storage = getStorage(app);

        let myData = null;
        let selectedFile = null;

        // --- AUTH ---
        window.handleRegister = async () => {
            const nama = document.getElementById('reg-nama').value;
            const id = document.getElementById('reg-id').value.trim().toLowerCase();
            const pass = document.getElementById('reg-pass').value;
            const hp = document.getElementById('reg-hp').value;
            const gender = document.getElementById('reg-gender').value;
            const umur = document.getElementById('reg-umur').value;
            try {
                const cred = await createUserWithEmailAndPassword(auth, id + "@chat.com", pass);
                await setDoc(doc(db, "users", cred.user.uid), {
                    nama, id, hp, pass, gender, umur, uid: cred.user.uid,
                    photo: `https://ui-avatars.com/api/?name=${nama}&bg=6366f1&color=fff`
                });
                alert("Berhasil!");
            } catch (e) { alert(e.message); }
        };

        window.handleLogin = async () => {
            const id = document.getElementById('login-id').value.trim().toLowerCase();
            const pass = document.getElementById('login-pass').value;
            try { await signInWithEmailAndPassword(auth, id + "@chat.com", pass); } 
            catch (e) { alert("Salah ID/Password"); }
        };

        window.logout = () => signOut(auth);
        window.toggleAuth = (isReg) => {
            document.getElementById('register-container').classList.toggle('hidden', !isReg);
            document.getElementById('login-container').classList.toggle('hidden', isReg);
        };

        // --- STORY LOGIC ---
        window.openStoryModal = () => document.getElementById('story-modal').classList.remove('hidden');
        window.closeStoryModal = () => {
            document.getElementById('story-modal').classList.add('hidden');
            selectedFile = null;
            document.getElementById('preview-box').classList.add('hidden');
        };

        window.handleFilePreview = (input) => {
            selectedFile = input.files[0];
            if (selectedFile) {
                const box = document.getElementById('preview-box');
                box.classList.remove('hidden');
                box.innerText = "Terpilih: " + selectedFile.name;
            }
        };

        window.uploadStory = async () => {
            const caption = document.getElementById('story-caption').value;
            const user = auth.currentUser;
            const btn = document.getElementById('btn-upload');

            if (!selectedFile && !caption) return alert("Pilih media atau isi teks!");

            btn.disabled = true;
            btn.innerText = "Mengirim...";

            try {
                let url = "";
                let type = "text";

                if (selectedFile) {
                    const fileRef = ref(storage, `stories/${Date.now()}_${selectedFile.name}`);
                    await uploadBytes(fileRef, selectedFile);
                    url = await getDownloadURL(fileRef);
                    if (selectedFile.type.includes("image")) type = "image";
                    else if (selectedFile.type.includes("video")) type = "video";
                    else if (selectedFile.type.includes("audio")) type = "audio";
                }

                await addDoc(collection(db, "stories"), {
                    uid: user.uid,
                    nama: myData.nama,
                    photo: myData.photo,
                    caption, url, type,
                    createdAt: serverTimestamp()
                });

                alert("Story Berhasil!");
                closeStoryModal();
            } catch (e) { alert(e.message); }
            btn.disabled = false;
            btn.innerText = "Bagikan Story";
        };

        // --- MONITORING ---
        onAuthStateChanged(auth, async (user) => {
            if (user) {
                document.getElementById('auth-screen').classList.add('hidden');
                document.getElementById('main-app').classList.remove('hidden');
                
                const snap = await getDoc(doc(db, "users", user.uid));
                myData = snap.data();
                document.getElementById('my-photo').src = myData.photo;

                // Listen Stories
                onSnapshot(query(collection(db, "stories"), orderBy("createdAt", "desc")), (s) => {
                    const list = document.getElementById('online-list');
                    list.innerHTML = "";
                    s.forEach(d => {
                        const st = d.data();
                        list.innerHTML += `
                            <div class="flex flex-col items-center gap-1 min-w-[70px]">
                                <img src="${st.photo}" class="w-14 h-14 rounded-2xl story-ring object-cover shadow-sm">
                                <span class="text-[9px] font-bold text-slate-500">${st.nama.split(' ')[0]}</span>
                            </div>`;
                    });
                });
            } else {
                document.getElementById('auth-screen').classList.remove('hidden');
                document.getElementById('main-app').classList.add('hidden');
            }
        });
    </script>
</body>
                </html>
