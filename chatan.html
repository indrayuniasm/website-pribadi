<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ConnectApp - Secure Chat</title>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --bg: #0f172a;
            --card: #1e293b;
            --primary: #3b82f6;
            --text: #f8fafc;
            --border: #334155;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: var(--bg);
            color: var(--text);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        /* --- AUTH SECTION --- */
        .auth-container {
            width: 100%;
            max-width: 400px;
            background: var(--card);
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
        }

        input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border-radius: 10px;
            border: 1px solid var(--border);
            background: #0f172a;
            color: white;
            box-sizing: border-box;
            outline: none;
        }

        .btn {
            width: 100%;
            padding: 12px;
            background: var(--primary);
            border: none;
            color: white;
            font-weight: bold;
            border-radius: 10px;
            cursor: pointer;
            margin-top: 10px;
        }

        .captcha-box {
            background: #334155;
            padding: 10px;
            text-align: center;
            letter-spacing: 8px;
            font-weight: 800;
            margin: 10px 0;
            border-radius: 8px;
            user-select: none;
            color: #fbbf24;
        }

        .switch-link {
            text-align: center;
            margin-top: 20px;
            font-size: 0.9rem;
            color: #94a3b8;
            cursor: pointer;
        }

        /* --- CHAT SECTION --- */
        .chat-app {
            display: none;
            width: 100%;
            height: 100vh;
            grid-template-columns: 300px 1fr;
        }

        .sidebar {
            background: var(--card);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            padding: 20px;
        }

        .main-chat {
            display: flex;
            flex-direction: column;
            background: var(--bg);
        }

        .chat-header {
            padding: 20px;
            background: var(--card);
            border-bottom: 1px solid var(--border);
            font-weight: bold;
        }

        .messages {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .bubble {
            padding: 10px 15px;
            border-radius: 15px;
            max-width: 70%;
            font-size: 0.95rem;
            line-height: 1.4;
        }

        .me { align-self: flex-end; background: var(--primary); border-bottom-right-radius: 2px; }
        .them { align-self: flex-start; background: var(--border); border-bottom-left-radius: 2px; }

        .chat-input {
            padding: 20px;
            display: flex;
            gap: 10px;
            background: var(--card);
        }

        .user-found {
            margin-top: 15px;
            padding: 10px;
            background: #334155;
            border-radius: 10px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        @media (max-width: 768px) {
            .chat-app { grid-template-columns: 1fr; }
            .sidebar { display: none; } /* Mobile sederhana */
        }
    </style>
</head>
<body>

    <div class="auth-container" id="authUI">
        <h2 id="title" style="text-align:center; margin-bottom:20px;">Masuk</h2>
        
        <div id="regExtra" style="display:none;">
            <input type="text" id="regNama" placeholder="Nama Lengkap">
            <input type="number" id="regWA" placeholder="Nomor HP WhatsApp">
        </div>

        <input type="text" id="userID" placeholder="ID Username">
        <input type="password" id="userPW" placeholder="Password">

        <div id="captchaArea" style="display:none;">
            <div class="captcha-box" id="captchaDisp"></div>
            <input type="text" id="captchaInp" placeholder="Masukkan Captcha">
        </div>

        <button class="btn" onclick="processAuth()" id="btnMain">MASUK</button>
        <p class="switch-link" onclick="toggleView()" id="btnSwitch">Belum punya akun? Daftar</p>
    </div>

    <div class="chat-app" id="chatUI">
        <div class="sidebar">
            <h3>Cari User</h3>
            <input type="text" id="findID" placeholder="Masukkan ID teman...">
            <button class="btn" onclick="searchUser()">Cari ID</button>
            <div id="searchRes"></div>
            
            <div style="margin-top:auto;">
                <p style="font-size:0.8rem; color:#64748b;">Logged in as: <b id="myIdentity"></b></p>
                <button onclick="location.reload()" style="background:none; border:none; color:#ef4444; cursor:pointer;">Keluar</button>
            </div>
        </div>

        <div class="main-chat">
            <div class="chat-header" id="chatHeader">Silakan cari user untuk memulai</div>
            <div class="messages" id="msgBox"></div>
            <div class="chat-input">
                <input type="text" id="msgContent" placeholder="Ketik pesan..." style="margin:0;">
                <button class="btn" onclick="sendMessage()" style="width:80px; margin:0;"><i class="fas fa-paper-plane"></i></button>
            </div>
        </div>
    </div>

<script>
// For Firebase JS SDK v7.20.0 and later, measurementId is optional
const firebaseConfig = {
  apiKey: "AIzaSyBSo0nFUKNBDmUX0wSFV_idAFWBRnnTcXE",
  authDomain: "fotobooth-e36ab.firebaseapp.com",
  databaseURL: "https://fotobooth-e36ab-default-rtdb.firebaseio.com",
  projectId: "fotobooth-e36ab",
  storageBucket: "fotobooth-e36ab.firebasestorage.app",
  messagingSenderId: "1040239629485",
  appId: "1:1040239629485:web:254a7b50a4243b6c5d6224",
  measurementId: "G-SEKNK1YY41"
};
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let modeRegister = false;
    let captchaReal = "";
    let myID = "";
    let partnerID = "";

    // --- LOGIC AUTH ---
    function toggleView() {
        modeRegister = !modeRegister;
        document.getElementById('title').innerText = modeRegister ? "Daftar Akun" : "Masuk";
        document.getElementById('btnMain').innerText = modeRegister ? "DAFTAR SEKARANG" : "MASUK";
        document.getElementById('regExtra').style.display = modeRegister ? "block" : "none";
        document.getElementById('captchaArea').style.display = modeRegister ? "block" : "none";
        document.getElementById('btnSwitch').innerText = modeRegister ? "Sudah punya akun? Login" : "Belum punya akun? Daftar";
        if(modeRegister) createCaptcha();
    }

    function createCaptcha() {
        captchaReal = Math.random().toString(36).substring(2, 7).toUpperCase();
        document.getElementById('captchaDisp').innerText = captchaReal;
    }

    function processAuth() {
        const id = document.getElementById('userID').value.trim().toLowerCase();
        const pw = document.getElementById('userPW').value;

        if(!id || !pw) return alert("ID dan Password wajib diisi!");

        if(modeRegister) {
            const nama = document.getElementById('regNama').value;
            const wa = document.getElementById('regWA').value;
            const capInp = document.getElementById('captchaInp').value;

            if(!nama || !wa) return alert("Lengkapi data profil!");
            if(capInp.toUpperCase() !== captchaReal) {
                alert("Captcha Salah!");
                createCaptcha();
                return;
            }

            db.ref('users/' + id).once('value', snap => {
                if(snap.exists()) return alert("ID sudah dipakai orang lain!");
                db.ref('users/' + id).set({
                    nama: nama,
                    wa: wa,
                    pw: pw,
                    status: "online"
                }).then(() => {
                    alert("Pendaftaran Berhasil! Silakan Login.");
                    toggleView();
                });
            });
        } else {
            db.ref('users/' + id).once('value', snap => {
                if(snap.exists() && snap.val().pw === pw) {
                    myID = id;
                    openChatApp();
                } else {
                    alert("ID atau Password salah!");
                }
            });
        }
    }

    // --- LOGIC CHAT ---
    function openChatApp() {
        document.getElementById('authUI').style.display = 'none';
        document.getElementById('chatUI').style.display = 'grid';
        document.getElementById('myIdentity').innerText = myID;
    }

    function searchUser() {
        const target = document.getElementById('findID').value.trim().toLowerCase();
        if(target === myID) return alert("Tidak bisa chat diri sendiri!");
        
        db.ref('users/' + target).once('value', snap => {
            if(snap.exists()) {
                const u = snap.val();
                document.getElementById('searchRes').innerHTML = `
                    <div class="user-found" onclick="startChatting('${target}')">
                        <i class="fas fa-user-circle" style="font-size:2rem;"></i>
                        <div>
                            <b>${u.nama}</b><br>
                            <small>ID: ${target}</small>
                        </div>
                    </div>
                `;
            } else {
                alert("User ID tidak ditemukan!");
            }
        });
    }

    function startChatting(id) {
        partnerID = id;
        document.getElementById('chatHeader').innerText = "Chatting dengan: " + id;
        listenMessages();
    }

    function listenMessages() {
        // Buat room ID unik (alfabetis agar ID tetap sama meskipun dibalik)
        const roomID = [myID, partnerID].sort().join("_");
        
        db.ref('chats/' + roomID).on('value', snap => {
            const box = document.getElementById('msgBox');
            box.innerHTML = "";
            snap.forEach(child => {
                const data = child.val();
                const className = data.sender === myID ? 'me' : 'them';
                box.innerHTML += `<div class="bubble ${className}">${data.text}</div>`;
            });
            box.scrollTop = box.scrollHeight;
        });
    }

    function sendMessage() {
        const text = document.getElementById('msgContent').value;
        if(!text || !partnerID) return;

        const roomID = [myID, partnerID].sort().join("_");
        db.ref('chats/' + roomID).push({
            sender: myID,
            text: text,
            time: Date.now()
        });
        document.getElementById('msgContent').value = "";
    }
</script>
</body>
    </html>
