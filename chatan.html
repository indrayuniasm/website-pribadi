<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>WhatsApp Pro - Final Version</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    
    <link href="https://fonts.googleapis.com/css2?family=Segoe+UI:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <style>
        :root {
            --wa-green: #25d366;
            --wa-bg: #0b141a;
            --wa-surface: #1f2c33;
            --wa-text: #e9edef;
            --wa-muted: #8696a0;
            --wa-bubble-sent: #005c4b;
            --wa-bubble-rcvd: #202c33;
            --wa-panel-header: #202c33;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background: var(--wa-bg); color: var(--wa-text); height: 100vh; overflow: hidden; }

        /* --- AUTH SCREENS (LOGIN & REGISTER) --- */
        .auth-container { position: fixed; inset: 0; background: var(--wa-bg); z-index: 9999; display: flex; align-items: center; justify-content: center; padding: 20px; }
        .auth-card { background: var(--wa-surface); padding: 35px; border-radius: 15px; width: 100%; max-width: 400px; text-align: center; box-shadow: 0 15px 30px rgba(0,0,0,0.5); }
        .auth-card h2 { margin: 20px 0; font-size: 1.5rem; }
        .auth-input { width: 100%; padding: 14px; background: #2a3942; border: 1px solid transparent; color: white; border-radius: 10px; margin-bottom: 15px; outline: none; font-size: 1rem; }
        .auth-input:focus { border-color: var(--wa-green); }
        .auth-btn { width: 100%; padding: 14px; background: var(--wa-green); border: none; color: #000; font-weight: bold; border-radius: 10px; cursor: pointer; font-size: 1rem; }
        .auth-link { color: var(--wa-green); cursor: pointer; text-decoration: none; font-weight: 600; }

        /* --- MAIN LAYOUT --- */
        .app-container { display: flex; height: 100vh; width: 100%; position: relative; }
        
        /* Sidebar (Daftar User) */
        .side-bar { width: 400px; background: var(--wa-bg); border-right: 1px solid rgba(255,255,255,0.1); display: flex; flex-direction: column; flex-shrink: 0; }
        .side-header { background: var(--wa-panel-header); padding: 12px 16px; display: flex; justify-content: space-between; align-items: center; }
        .chat-list { flex: 1; overflow-y: auto; }
        .chat-item { padding: 12px 16px; display: flex; gap: 15px; cursor: pointer; align-items: center; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .chat-item:hover { background: #2a3942; }
        .avatar { width: 48px; height: 48px; border-radius: 50%; object-fit: cover; background: #3b4a54; }

        /* Main Chat Area */
        .main-chat { 
            flex: 1; 
            background: #0b141a; 
            background-image: url('https://user-images.githubusercontent.com/15075759/28719144-86dc0f70-73b1-11e7-911d-60d70fcded21.png'); 
            display: flex; 
            flex-direction: column; 
            position: relative; 
        }

        /* --- RESPONSIVE MOBILE --- */
        @media (max-width: 900px) {
            .side-bar { width: 100%; }
            .main-chat { 
                position: absolute; 
                inset: 0; 
                z-index: 1000; 
                transform: translateX(100%); 
                transition: transform 0.3s ease-out; 
            }
            .main-chat.active { transform: translateX(0); }
        }

        /* --- CHAT COMPONENTS --- */
        .chat-header { background: var(--wa-panel-header); padding: 10px 16px; display: flex; align-items: center; gap: 15px; }
        .msg-container { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 5px; }
        .bubble { padding: 8px 12px; border-radius: 8px; max-width: 75%; font-size: 0.95rem; position: relative; color: white; line-height: 1.4; }
        .sent { align-self: flex-end; background: var(--wa-bubble-sent); border-top-right-radius: 0; }
        .received { align-self: flex-start; background: var(--wa-bubble-rcvd); border-top-left-radius: 0; }
        
        .input-area { background: var(--wa-panel-header); padding: 10px 16px; display: flex; align-items: center; gap: 10px; }
        .m-input { flex: 1; background: #2a3942; border: none; padding: 12px 15px; color: white; border-radius: 8px; outline: none; font-size: 1rem; }
        
        .hidden { display: none !important; }
        #backBtn { font-size: 1.2rem; cursor: pointer; color: var(--wa-muted); }
    </style>
</head>
<body>

    <div id="loginScreen" class="auth-container">
        <div class="auth-card">
            <i class="fa-brands fa-whatsapp" style="color:var(--wa-green); font-size:4rem;"></i>
            <h2>Masuk ke Akun</h2>
            <input type="text" id="l-id" class="auth-input" placeholder="ID Pengguna">
            <input type="password" id="l-pass" class="auth-input" placeholder="Password">
            <button onclick="login()" class="auth-btn">LOG IN</button>
            <p style="margin-top:20px; font-size:0.9rem;">
                Belum punya akun? <span class="auth-link" onclick="switchAuth('reg')">Daftar Sekarang</span>
            </p>
            <p id="l-msg" style="color:#ff4b4b; margin-top:10px; font-size:0.8rem;"></p>
        </div>
    </div>

    <div id="regScreen" class="auth-container hidden">
        <div class="auth-card">
            <i class="fa-brands fa-whatsapp" style="color:var(--wa-green); font-size:4rem;"></i>
            <h2>Daftar Baru</h2>
            <input type="text" id="r-id" class="auth-input" placeholder="Buat ID (Contoh: budi123)">
            <input type="password" id="r-pass" class="auth-input" placeholder="Buat Password">
            <button onclick="register()" class="auth-btn">DAFTAR</button>
            <p style="margin-top:20px; font-size:0.9rem;">
                Sudah punya akun? <span class="auth-link" onclick="switchAuth('login')">Kembali Masuk</span>
            </p>
            <p id="r-msg" style="color:#ff4b4b; margin-top:10px; font-size:0.8rem;"></p>
        </div>
    </div>

    <div class="app-container hidden" id="appMain">
        <aside class="side-bar">
            <div class="side-header">
                <img id="myAvatar" class="avatar" style="width:38px; height:38px;">
                <div style="display:flex; gap:20px; color:var(--wa-muted); cursor:pointer;">
                    <i class="fa-solid fa-plus" onclick="createNewChat()" title="Mulai Chat Baru"></i>
                    <i class="fa-solid fa-right-from-bracket" onclick="location.reload()"></i>
                </div>
            </div>
            <div id="historyList" class="chat-list"></div>
        </aside>

        <main class="main-chat" id="chatArea">
            <div id="emptyChat" style="margin:auto; text-align:center; color:var(--wa-muted);">
                <i class="fa-brands fa-whatsapp" style="font-size:6rem; opacity:0.1;"></i>
                <p style="margin-top:20px;">Pilih pengguna untuk mulai mengirim pesan.</p>
            </div>

            <div id="activeChat" class="hidden" style="display:flex; flex-direction:column; height:100%;">
                <div class="chat-header">
                    <i class="fa-solid fa-arrow-left" id="backBtn" onclick="closeChat()"></i>
                    <img id="pAvatar" class="avatar" style="width:40px; height:40px;">
                    <div style="flex:1">
                        <b id="pName">Nama Partner</b><br>
                        <small id="pStatus" style="color:var(--wa-muted); font-size:0.7rem;">online</small>
                    </div>
                </div>
                
                <div class="msg-container" id="msgBox"></div>

                <div class="input-area">
                    <i class="fa-regular fa-face-smile" style="font-size:1.5rem; color:var(--wa-muted); cursor:pointer;"></i>
                    <input type="text" id="mInput" class="m-input" placeholder="Ketik pesan">
                    <i class="fa-solid fa-paper-plane" onclick="sendMessage()" style="color:var(--wa-muted); font-size:1.4rem; cursor:pointer;"></i>
                </div>
            </div>
        </main>
    </div>

<script>
    // --- KONFIGURASI FIREBASE ---
    const firebaseConfig = {
        apiKey: "AIzaSyBSo0nFUKNBDmUX0wSFV_idAFWBRnnTcXE",
        databaseURL: "https://fotobooth-e36ab-default-rtdb.firebaseio.com",
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let myID = "", partnerID = "";

    // --- LOGIKA AUTH ---
    function switchAuth(mode) {
        document.getElementById('loginScreen').classList.toggle('hidden', mode !== 'login');
        document.getElementById('regScreen').classList.toggle('hidden', mode !== 'reg');
    }

    async function login() {
        const id = document.getElementById('l-id').value.trim().toLowerCase();
        const pass = document.getElementById('l-pass').value.trim();
        if(!id || !pass) return;

        const snap = await db.ref('accounts/' + id).once('value');
        if(snap.exists() && snap.val().password === pass) {
            startApp(id);
        } else {
            document.getElementById('l-msg').innerText = "ID atau Password salah!";
        }
    }

    async function register() {
        const id = document.getElementById('r-id').value.trim().toLowerCase();
        const pass = document.getElementById('r-pass').value.trim();
        if(!id || !pass) return;

        const snap = await db.ref('accounts/' + id).once('value');
        if(snap.exists()) {
            document.getElementById('r-msg').innerText = "ID sudah terdaftar!";
        } else {
            await db.ref('accounts/' + id).set({ password: pass });
            await db.ref('users/' + id).set({ nama: id, status: 'online' });
            startApp(id);
        }
    }

    function startApp(id) {
        myID = id;
        document.getElementById('loginScreen').classList.add('hidden');
        document.getElementById('regScreen').classList.add('hidden');
        document.getElementById('appMain').classList.remove('hidden');
        
        document.getElementById('myAvatar').src = `https://ui-avatars.com/api/?name=${id}&background=random`;
        
        db.ref('users/' + id + '/status').set('online');
        db.ref('users/' + id + '/status').onDisconnect().set('offline');

        loadHistory();
    }

    // --- LOGIKA CHAT ---
    function loadHistory() {
        db.ref('messages').on('value', snap => {
            const list = document.getElementById('historyList');
            list.innerHTML = "";
            let rooms = [];
            
            snap.forEach(room => {
                if(room.key.includes(myID)) {
                    const other = room.key.split("_").find(i => i !== myID);
                    const lastMsg = Object.values(room.val()).pop();
                    rooms.push({ id: other, msg: lastMsg.text, time: lastMsg.time });
                }
            });

            rooms.sort((a,b) => b.time - a.time).forEach(r => {
                list.innerHTML += `
                    <div class="chat-item" onclick="openChat('${r.id}')">
                        <img src="https://ui-avatars.com/api/?name=${r.id}" class="avatar">
                        <div style="flex:1">
                            <b>${r.id}</b><br>
                            <small style="color:var(--wa-muted)">${r.msg}</small>
                        </div>
                    </div>`;
            });
        });
    }

    function openChat(id) {
        partnerID = id;
        document.getElementById('emptyChat').classList.add('hidden');
        document.getElementById('activeChat').classList.remove('hidden');
        document.getElementById('chatArea').classList.add('active'); // Slide-in on mobile

        document.getElementById('pName').innerText = id;
        document.getElementById('pAvatar').src = `https://ui-avatars.com/api/?name=${id}`;

        const roomID = [myID, partnerID].sort().join("_");
        db.ref('messages/' + roomID).on('value', snap => {
            const box = document.getElementById('msgBox');
            box.innerHTML = "";
            snap.forEach(msg => {
                const data = msg.val();
                box.innerHTML += `
                    <div class="bubble ${data.sender === myID ? 'sent' : 'received'}">
                        ${data.text}
                    </div>`;
            });
            box.scrollTop = box.scrollHeight;
        });
    }

    function closeChat() {
        document.getElementById('chatArea').classList.remove('active');
    }

    function sendMessage() {
        const txt = document.getElementById('mInput').value;
        if(!txt) return;

        const roomID = [myID, partnerID].sort().join("_");
        db.ref('messages/' + roomID).push({
            sender: myID,
            text: txt,
            time: Date.now()
        });
        document.getElementById('mInput').value = "";
    }

    function createNewChat() {
        const target = prompt("Masukkan ID User tujuan:");
        if(target) openChat(target.toLowerCase());
    }
</script>
</body>
                </html>
