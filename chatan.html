<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>WhatsApp Pro - Elite Edition</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    
    <link href="https://fonts.googleapis.com/css2?family=Segoe+UI:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <style>
        :root {
            --wa-green: #25d366;
            --wa-bg: #0b141a;
            --wa-surface: #1f2c33;
            --wa-text: #e9edef;
            --wa-muted: #8696a0;
            --wa-bubble-sent: #005c4b;
            --wa-bubble-rcvd: #202c33;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background: var(--wa-bg); color: var(--wa-text); height: 100vh; overflow: hidden; }

        /* --- AUTH --- */
        .auth-container { position: fixed; inset: 0; background: var(--wa-bg); z-index: 9999; display: flex; align-items: center; justify-content: center; padding: 20px; }
        .auth-card { background: var(--wa-surface); padding: 30px; border-radius: 15px; width: 100%; max-width: 380px; text-align: center; }
        .auth-input { width: 100%; padding: 12px; background: #2a3942; border: 1px solid transparent; color: white; border-radius: 8px; margin-bottom: 12px; outline: none; }
        .auth-btn { width: 100%; padding: 12px; background: var(--wa-green); border: none; color: #000; font-weight: bold; border-radius: 8px; cursor: pointer; width: 100%; }

        /* --- LAYOUT --- */
        .app-container { display: flex; height: 100vh; width: 100%; position: relative; }
        .side-bar { width: 400px; background: var(--wa-bg); border-right: 1px solid rgba(255,255,255,0.1); display: flex; flex-direction: column; }
        .header { background: #202c33; padding: 10px 16px; display: flex; justify-content: space-between; align-items: center; }
        
        /* --- TABS --- */
        .tabs { display: flex; background: #202c33; border-bottom: 1px solid rgba(255,255,255,0.1); }
        .tab-btn { flex: 1; padding: 15px; text-align: center; cursor: pointer; color: var(--wa-muted); font-weight: 600; font-size: 0.9rem; }
        .tab-btn.active { color: var(--wa-green); border-bottom: 3px solid var(--wa-green); }

        /* --- LISTS --- */
        .list-container { flex: 1; overflow-y: auto; }
        .item { padding: 12px 16px; display: flex; gap: 15px; cursor: pointer; align-items: center; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .item:hover { background: #2a3942; }
        .avatar { width: 45px; height: 45px; border-radius: 50%; object-fit: cover; background: #3b4a54; }
        .ring { border: 2px solid var(--wa-green); padding: 2px; }

        /* --- CHAT AREA --- */
        .main-chat { flex: 1; background-image: url('https://user-images.githubusercontent.com/15075759/28719144-86dc0f70-73b1-11e7-911d-60d70fcded21.png'); display: flex; flex-direction: column; }
        .chat-head { background: #202c33; padding: 10px 16px; display: flex; align-items: center; gap: 12px; }
        .msg-box { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 5px; }
        .bubble { padding: 8px 12px; border-radius: 8px; max-width: 70%; font-size: 0.9rem; }
        .sent { align-self: flex-end; background: var(--wa-bubble-sent); }
        .received { align-self: flex-start; background: var(--wa-bubble-rcvd); }

        /* --- PROFILE EDIT --- */
        .profile-pane { padding: 20px; text-align: center; }
        .p-img-box { position: relative; width: 120px; height: 120px; margin: 0 auto 20px; }
        .p-img-box i { position: absolute; bottom: 0; right: 0; background: var(--wa-green); padding: 10px; border-radius: 50%; color: #000; cursor: pointer; }

        /* Mobile Overlay */
        @media (max-width: 900px) {
            .side-bar { width: 100%; }
            .main-chat { position: absolute; inset: 0; z-index: 100; transform: translateX(100%); transition: 0.3s; }
            .main-chat.active { transform: translateX(0); }
        }

        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div id="loginPage" class="auth-container">
        <div class="auth-card">
            <i class="fa-brands fa-whatsapp" style="color:var(--wa-green); font-size:3rem; margin-bottom:15px;"></i>
            <h2>Masuk</h2>
            <input type="text" id="l-id" class="auth-input" placeholder="ID">
            <input type="password" id="l-pass" class="auth-input" placeholder="Password">
            <button onclick="auth('login')" class="auth-btn">MASUK</button>
            <p style="margin-top:15px; font-size:0.8rem;">Belum punya akun? <span onclick="toggleAuth('reg')" style="color:var(--wa-green); cursor:pointer;">Daftar</span></p>
        </div>
    </div>

    <div id="regPage" class="auth-container hidden">
        <div class="auth-card">
            <h2>Daftar Akun</h2>
            <input type="text" id="r-id" class="auth-input" placeholder="ID Baru">
            <input type="password" id="r-pass" class="auth-input" placeholder="Password">
            <button onclick="auth('reg')" class="auth-btn">DAFTAR</button>
            <p style="margin-top:15px; font-size:0.8rem;">Sudah punya akun? <span onclick="toggleAuth('login')" style="color:var(--wa-green); cursor:pointer;">Masuk</span></p>
        </div>
    </div>

    <div id="app" class="app-container hidden">
        <aside class="side-bar">
            <div class="header">
                <img id="myAvatar" class="avatar" style="width:35px; height:35px;" onclick="showTab('profile')">
                <div style="display:flex; gap:15px; color:var(--wa-muted); cursor:pointer;">
                    <i class="fa-solid fa-circle-notch" onclick="showTab('story')"></i>
                    <i class="fa-solid fa-plus" onclick="startChat()"></i>
                    <i class="fa-solid fa-phone" onclick="showTab('calls')"></i>
                </div>
            </div>

            <div class="tabs">
                <div class="tab-btn active" id="btn-chats" onclick="showTab('chats')">CHATS</div>
                <div class="tab-btn" id="btn-story" onclick="showTab('story')">STORY</div>
                <div class="tab-btn" id="btn-calls" onclick="showTab('calls')">CALLS</div>
            </div>

            <div id="pane-chats" class="list-container"></div>
            
            <div id="pane-story" class="list-container hidden">
                <div class="item" onclick="uploadStory()">
                    <div style="position:relative"><img id="sAvatar" class="avatar"><div style="position:absolute; bottom:0; right:0; background:var(--wa-green); border-radius:50%; font-size:10px; padding:2px; color:#000;">+</div></div>
                    <div><b>Status Saya</b><br><small id="storyViewerCount">Ketuk untuk update</small></div>
                </div>
                <div id="otherStories"></div>
            </div>

            <div id="pane-calls" class="list-container hidden"></div>

            <div id="pane-profile" class="list-container hidden profile-pane">
                <div class="p-img-box">
                    <img id="p-img" class="avatar" style="width:120px; height:120px;">
                    <i class="fa-solid fa-camera" onclick="edit('pfp')"></i>
                </div>
                <h3 id="p-nama" onclick="edit('nama')">Nama</h3>
                <p id="p-id" style="color:var(--wa-muted); margin-bottom:10px;">@id</p>
                <p id="p-bio" onclick="edit('bio')">Bio...</p>
                <div style="margin-top:20px; background:#2a3942; padding:15px; border-radius:10px;">
                    <label>Privasi Akun:</label>
                    <select id="p-priv" onchange="updatePrivacy(this.value)" style="background:none; color:var(--wa-green); border:none; font-weight:bold; cursor:pointer;">
                        <option value="public">Publik</option>
                        <option value="private">Privat</option>
                    </select>
                </div>
                <button onclick="showTab('chats')" class="auth-btn" style="margin-top:20px;">Kembali</button>
            </div>
        </aside>

        <main id="chatWindow" class="main-chat">
            <div id="noChat" style="margin:auto; text-align:center; color:var(--wa-muted);"><i class="fa-brands fa-whatsapp" style="font-size:5rem; opacity:0.1;"></i><p>Pilih chat untuk memulai</p></div>
            <div id="chatActive" class="hidden" style="display:flex; flex-direction:column; height:100%;">
                <div class="chat-head">
                    <i class="fa-solid fa-arrow-left" onclick="closeChat()"></i>
                    <img id="hAvatar" class="avatar" style="width:40px; height:40px;">
                    <div style="flex:1">
                        <b id="hName">...</b><br>
                        <small id="hStatus" style="font-size:0.7rem;"></small>
                    </div>
                    <div style="display:flex; gap:20px; color:var(--wa-muted);"><i class="fa-solid fa-video" onclick="makeCall('video')"></i><i class="fa-solid fa-phone" onclick="makeCall('voice')"></i></div>
                </div>
                <div id="mBox" class="msg-box"></div>
                <div class="input-area">
                    <input type="text" id="mInput" class="m-input" placeholder="Ketik pesan">
                    <i class="fa-solid fa-paper-plane" onclick="send()"></i>
                </div>
            </div>
        </main>
    </div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyBSo0nFUKNBDmUX0wSFV_idAFWBRnnTcXE",
        databaseURL: "https://fotobooth-e36ab-default-rtdb.firebaseio.com",
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    let myID = "", partnerID = "";

    function toggleAuth(m) {
        document.getElementById('loginPage').classList.toggle('hidden', m!=='login');
        document.getElementById('regPage').classList.toggle('hidden', m!=='reg');
    }

    async function auth(mode) {
        const id = document.getElementById(mode==='login'?'l-id':'r-id').value.trim().toLowerCase();
        const pass = document.getElementById(mode==='login'?'l-pass':'r-pass').value.trim();
        const ref = db.ref('accounts/'+id);
        const snap = await ref.once('value');

        if(mode==='login') {
            if(snap.exists() && snap.val().password === pass) launch(id);
            else alert("Gagal Login!");
        } else {
            if(snap.exists()) alert("ID sudah ada!");
            else {
                await ref.set({password: pass});
                await db.ref('users/'+id).set({nama: id, bio: "Available", pfp: "", privacy: "public", status: "online"});
                launch(id);
            }
        }
    }

    function launch(id) {
        myID = id;
        document.getElementById('loginPage').classList.add('hidden');
        document.getElementById('regPage').classList.add('hidden');
        document.getElementById('app').classList.remove('hidden');
        
        db.ref('users/'+id+'/status').set('online');
        db.ref('users/'+id+'/status').onDisconnect().set('offline');

        syncProfile();
        loadHistory();
        loadStories();
        loadCalls();
    }

    function syncProfile() {
        db.ref('users/'+myID).on('value', s => {
            const d = s.val() || {};
            const img = d.pfp || `https://ui-avatars.com/api/?name=${myID}`;
            document.getElementById('myAvatar').src = document.getElementById('sAvatar').src = document.getElementById('p-img').src = img;
            document.getElementById('p-nama').innerText = d.nama;
            document.getElementById('p-id').innerText = "@"+myID;
            document.getElementById('p-bio').innerText = d.bio;
            document.getElementById('p-priv').value = d.privacy;
        });
    }

    function loadHistory() {
        db.ref('messages').on('value', snap => {
            const list = document.getElementById('pane-chats');
            list.innerHTML = "";
            snap.forEach(room => {
                if(room.key.includes(myID)) {
                    const other = room.key.split("_").find(i => i!==myID);
                    const last = Object.values(room.val()).pop();
                    db.ref('users/'+other).once('value', u => {
                        const ud = u.val();
                        list.innerHTML += `<div class="item" onclick="openChat('${other}')">
                            <img src="${ud.pfp || 'https://ui-avatars.com/api/?name='+other}" class="avatar">
                            <div><b>${ud.nama}</b><br><small style="color:var(--wa-muted)">${last.text}</small></div>
                        </div>`;
                    });
                }
            });
        });
    }

    function openChat(id) {
        partnerID = id;
        document.getElementById('noChat').classList.add('hidden');
        document.getElementById('chatActive').classList.remove('hidden');
        document.getElementById('chatWindow').classList.add('active');

        db.ref('users/'+id).on('value', s => {
            const d = s.val();
            document.getElementById('hName').innerText = d.nama;
            document.getElementById('hAvatar').src = d.pfp || `https://ui-avatars.com/api/?name=${id}`;
            document.getElementById('hStatus').innerText = d.status;
            document.getElementById('hStatus').style.color = d.status === 'online' ? 'var(--wa-green)' : 'var(--wa-muted)';
        });

        const room = [myID, partnerID].sort().join("_");
        db.ref('messages/'+room).on('value', snap => {
            const box = document.getElementById('mBox');
            box.innerHTML = "";
            snap.forEach(m => {
                const d = m.val();
                box.innerHTML += `<div class="bubble ${d.sender===myID?'sent':'received'}">${d.text}</div>`;
            });
            box.scrollTop = box.scrollHeight;
        });
    }

    function send() {
        const t = document.getElementById('mInput').value;
        if(!t) return;
        const room = [myID, partnerID].sort().join("_");
        db.ref('messages/'+room).push({sender: myID, text: t, time: Date.now()});
        document.getElementById('mInput').value = "";
    }

    // --- STORY ---
    function uploadStory() {
        const txt = prompt("Ketik isi story kamu:");
        if(txt) db.ref('stories/'+myID).set({text: txt, time: Date.now(), viewers: {}});
    }

    function loadStories() {
        db.ref('stories').on('value', snap => {
            const list = document.getElementById('otherStories');
            list.innerHTML = "";
            snap.forEach(s => {
                if(s.key === myID) {
                    const views = s.val().viewers ? Object.keys(s.val().viewers).length : 0;
                    document.getElementById('storyViewerCount').innerText = views + " Dilihat";
                } else {
                    list.innerHTML += `<div class="item" onclick="viewStory('${s.key}','${s.val().text}')">
                        <img src="https://ui-avatars.com/api/?name=${s.key}" class="avatar ring">
                        <div><b>${s.key}</b><br><small>Baru saja</small></div>
                    </div>`;
                }
            });
        });
    }

    function viewStory(id, txt) {
        db.ref(`stories/${id}/viewers/${myID}`).set(true);
        alert("Story " + id + ":\n\n" + txt);
    }

    // --- CALL HISTORY ---
    function makeCall(type) {
        db.ref('calls').push({from: myID, to: partnerID, type: type, time: Date.now()});
        alert("Memulai " + type + " call ke " + partnerID);
    }

    function loadCalls() {
        db.ref('calls').on('value', snap => {
            const list = document.getElementById('pane-calls');
            list.innerHTML = "";
            snap.forEach(c => {
                const d = c.val();
                if(d.from === myID || d.to === myID) {
                    const target = d.from === myID ? d.to : d.from;
                    list.innerHTML += `<div class="item">
                        <i class="fa-solid fa-phone" style="color:var(--wa-muted)"></i>
                        <div><b>${target}</b><br><small>${d.type} - ${new Date(d.time).toLocaleString()}</small></div>
                    </div>`;
                }
            });
        });
    }

    // --- UTILS ---
    async function startChat() {
        const id = prompt("Cari ID teman:").toLowerCase();
        const u = await db.ref('users/'+id).once('value');
        if(u.exists()) {
            if(u.val().privacy === 'private') alert("User ini memprivat akunnya!");
            else openChat(id);
        } else alert("User tidak ditemukan!");
    }

    function showTab(t) {
        ['chats', 'story', 'calls', 'profile'].forEach(p => {
            document.getElementById('pane-'+p).classList.add('hidden');
            if(document.getElementById('btn-'+p)) document.getElementById('btn-'+p).classList.remove('active');
        });
        document.getElementById('pane-'+t).classList.remove('hidden');
        if(document.getElementById('btn-'+t)) document.getElementById('btn-'+t).classList.add('active');
    }

    function edit(field) {
        const val = prompt("Masukkan " + field + " baru:");
        if(val) db.ref('users/'+myID).update({[field]: val});
    }

    function updatePrivacy(v) { db.ref('users/'+myID).update({privacy: v}); }
    function closeChat() { document.getElementById('chatWindow').classList.remove('active'); }
</script>
</body>
                    </html>
