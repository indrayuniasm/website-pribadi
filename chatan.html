<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ConnectPro Ultra Final</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    <script src="https://unpkg.com/peerjs@1.4.7/dist/peerjs.min.js"></script>
    
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <style>
        :root {
            --primary: #8b5cf6;
            --bg: #09090b;
            --panel: rgba(24, 24, 27, 0.8);
            --border: rgba(255, 255, 255, 0.1);
            --text: #fafafa;
        }

        .theme-midnight { --primary: #3b82f6; --bg: #020617; }
        .theme-forest { --primary: #10b981; --bg: #061712; }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }
        body { background: var(--bg); color: var(--text); height: 100vh; overflow: hidden; transition: 0.5s; }

        /* --- LAYOUT --- */
        .app-shell { display: grid; height: 100vh; width: 100%; grid-template-columns: 350px 1fr 320px; }
        
        @media (max-width: 1000px) {
            .app-shell { grid-template-columns: 1fr; }
            .side-panel, .chat-view, .profile-panel { display: none; width: 100% !important; }
            .active-panel { display: flex !important; }
            .mobile-nav { 
                position: fixed; bottom: 0; width: 100%; height: 70px; background: var(--panel); 
                backdrop-filter: blur(20px); display: flex; justify-content: space-around; align-items: center;
                border-top: 1px solid var(--border); z-index: 100;
            }
        }
        @media (min-width: 1001px) { .mobile-nav { display: none; } }

        .panel { background: var(--panel); backdrop-filter: blur(30px); border-right: 1px solid var(--border); display: flex; flex-direction: column; overflow: hidden; }
        .header { padding: 20px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; min-height: 80px; }

        /* --- CONTACT LIST --- */
        .contact-item { padding: 15px 20px; display: flex; align-items: center; gap: 12px; cursor: pointer; border-bottom: 1px solid rgba(255,255,255,0.02); }
        .contact-item:hover { background: rgba(255,255,255,0.05); }
        .avatar { width: 50px; height: 50px; border-radius: 15px; object-fit: cover; background: #27272a; position: relative; }
        .online-dot { position: absolute; bottom: -2px; right: -2px; width: 12px; height: 12px; border-radius: 50%; border: 2px solid #000; background: #71717a; }
        .online-dot.active { background: #22c55e; box-shadow: 0 0 8px #22c55e; }

        /* --- CHAT BUBBLES --- */
        .msg-scroll { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; }
        .bubble { padding: 12px 16px; border-radius: 18px; max-width: 75%; font-size: 0.92rem; position: relative; }
        .sent { align-self: flex-end; background: var(--primary); border-bottom-right-radius: 4px; }
        .received { align-self: flex-start; background: #27272a; border-bottom-left-radius: 4px; }
        .msg-meta { font-size: 0.7rem; display: flex; align-items: center; gap: 4px; justify-content: flex-end; margin-top: 4px; opacity: 0.7; }
        .read-icon { color: #38bdf8; }

        /* --- INPUT --- */
        .input-bar { padding: 20px; display: flex; gap: 12px; background: rgba(0,0,0,0.2); align-items: center; }
        .input-bar input { flex: 1; background: #18181b; border: 1px solid var(--border); padding: 12px; border-radius: 12px; color: white; outline: none; }

        /* --- CALL OVERLAY --- */
        #callUI { position: fixed; inset: 0; background: #000; z-index: 9999; display: none; }
        #remoteVideo { width: 100%; height: 100%; object-fit: cover; }
        #localVideo { width: 120px; height: 160px; position: absolute; top: 30px; right: 30px; border-radius: 15px; border: 2px solid var(--primary); object-fit: cover; }

        .btn-action { width: 50px; height: 50px; border-radius: 15px; border: none; cursor: pointer; color: white; display: flex; align-items: center; justify-content: center; transition: 0.2s; }
        .btn-call { background: var(--primary); }

        /* --- AUTH --- */
        #authScreen { position: fixed; inset: 0; background: var(--bg); z-index: 10000; display: flex; align-items: center; justify-content: center; }
        
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div id="authScreen">
        <div class="panel" style="padding:40px; border-radius:24px; width:340px; text-align:center;">
            <h2 style="margin-bottom:20px;">ConnectPro</h2>
            <input type="text" id="loginID" placeholder="ID Username" style="width:100%; padding:12px; background:#000; border:1px solid var(--border); color:white; border-radius:10px; margin-bottom:15px;">
            <button onclick="login()" style="width:100%; padding:12px; background:var(--primary); border:none; color:white; font-weight:bold; border-radius:10px; cursor:pointer;">Mulai</button>
        </div>
    </div>

    <div class="app-shell hidden" id="app">
        <aside class="panel side-panel active-panel" id="panel-beranda">
            <div class="header">
                <h2>Pesan</h2>
                <button onclick="newChat()" class="btn-action" style="background:rgba(255,255,255,0.05)"><i class="fa-solid fa-plus"></i></button>
            </div>
            <div id="contactList" style="flex:1; overflow-y:auto;"></div>
        </aside>

        <main class="panel chat-view" id="panel-chat">
            <div class="header">
                <div style="display:flex; align-items:center; gap:12px;">
                    <button class="btn-action desktop-hidden" onclick="switchPanel('beranda')" style="background:none; width:auto;"><i class="fa-solid fa-arrow-left"></i></button>
                    <div id="activeAva" class="avatar" style="width:40px; height:40px;"></div>
                    <b id="activeName">Pilih Chat</b>
                </div>
                <div id="callTools" class="hidden" style="display:flex; gap:10px;">
                    <button onclick="startCall(false)" class="btn-action" style="background:rgba(255,255,255,0.05)"><i class="fa-solid fa-phone"></i></button>
                    <button onclick="startCall(true)" class="btn-action" style="background:rgba(255,255,255,0.05)"><i class="fa-solid fa-video"></i></button>
                </div>
            </div>
            <div class="msg-scroll" id="msgBox"></div>
            <div class="input-bar">
                <input type="text" id="msgInput" placeholder="Ketik pesan...">
                <button onclick="send()" class="btn-action btn-call"><i class="fa-solid fa-paper-plane"></i></button>
            </div>
        </main>

        <aside class="panel profile-panel" id="panel-profile">
            <div class="header"><h2>Profil</h2></div>
            <div style="padding:30px; text-align:center;">
                <img id="myPfp" src="" class="avatar" style="width:120px; height:120px; border-radius:40px; cursor:pointer; margin-bottom:15px;" onclick="edit('pfp')">
                <h3 id="myName" onclick="edit('nama')">Nama</h3>
                <p id="myBio" onclick="edit('bio')" style="opacity:0.6; margin:10px 0; font-size:0.9rem;">Klik untuk edit bio...</p>
                
                <div style="margin-top:40px; text-align:left;">
                    <small style="opacity:0.5; display:block; margin-bottom:10px;">TEMA APLIKASI</small>
                    <div style="display:flex; gap:10px;">
                        <div onclick="setTheme('')" style="width:30px; height:30px; background:#8b5cf6; border-radius:8px; cursor:pointer;"></div>
                        <div onclick="setTheme('midnight')" style="width:30px; height:30px; background:#3b82f6; border-radius:8px; cursor:pointer;"></div>
                        <div onclick="setTheme('forest')" style="width:30px; height:30px; background:#10b981; border-radius:8px; cursor:pointer;"></div>
                    </div>
                </div>
            </div>
        </aside>

        <nav class="mobile-nav">
            <div onclick="switchPanel('beranda')"><i class="fa-solid fa-message"></i></div>
            <div onclick="switchPanel('chat')"><i class="fa-solid fa-comment-dots"></i></div>
            <div onclick="switchPanel('profile')"><i class="fa-solid fa-user"></i></div>
        </nav>
    </div>

    <div id="callUI">
        <video id="remoteVideo" autoplay playsinline></video>
        <video id="localVideo" autoplay muted playsinline></video>
        <div style="position:absolute; bottom:50px; left:50%; transform:translateX(-50%); display:flex; gap:20px;">
            <button id="btnAccept" onclick="accept()" style="background:#22c55e;" class="btn-action"><i class="fa-solid fa-phone"></i></button>
            <button onclick="hangup()" style="background:#ef4444;" class="btn-action"><i class="fa-solid fa-phone-slash"></i></button>
        </div>
    </div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyBSo0nFUKNBDmUX0wSFV_idAFWBRnnTcXE",
        authDomain: "fotobooth-e36ab.firebaseapp.com",
        databaseURL: "https://fotobooth-e36ab-default-rtdb.firebaseio.com",
        projectId: "fotobooth-e36ab",
        storageBucket: "fotobooth-e36ab.firebasestorage.app",
        messagingSenderId: "1040239629485",
        appId: "1:1040239629485:web:254a7b50a4243b6c5d6224"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    let myID = "", partnerID = "", peer, currentCall, stream;

    function login() {
        myID = document.getElementById('loginID').value.trim().toLowerCase();
        if(!myID) return;

        peer = new Peer(myID);
        peer.on('open', () => {
            const statusRef = db.ref('users/' + myID + '/status');
            db.ref('.info/connected').on('value', snap => {
                if(snap.val()) { statusRef.set('online'); statusRef.onDisconnect().set('offline'); }
            });

            document.getElementById('authScreen').classList.add('hidden');
            document.getElementById('app').classList.remove('hidden');
            
            syncProfile();
            loadHistory();

            peer.on('call', call => {
                currentCall = call;
                document.getElementById('callUI').style.display = 'block';
                document.getElementById('btnAccept').classList.remove('hidden');
            });
        });
    }

    function syncProfile() {
        db.ref('users/' + myID).on('value', snap => {
            const d = snap.val() || {};
            document.getElementById('myName').innerText = d.nama || myID;
            document.getElementById('myBio').innerText = d.bio || "No bio yet.";
            document.getElementById('myPfp').src = d.pfp || `https://ui-avatars.com/api/?name=${myID}`;
        });
    }

    function edit(key) {
        const v = prompt("Masukkan " + key + " baru:");
        if(v) db.ref('users/' + myID).update({ [key]: v });
    }

    function loadHistory() {
        db.ref('messages').on('value', snap => {
            const list = document.getElementById('contactList');
            list.innerHTML = "";
            let rooms = [];

            snap.forEach(room => {
                if(room.key.includes(myID)) {
                    const other = room.key.split("_").find(i => i !== myID);
                    const msgs = Object.values(room.val());
                    const last = msgs[msgs.length - 1];
                    rooms.push({ id: other, last: last.text, time: last.time, unread: (last.sender !== myID && !last.read) });
                }
            });

            rooms.sort((a,b) => b.time - a.time).forEach(r => {
                db.ref('users/' + r.id).once('value', u => {
                    const data = u.val() || {};
                    list.innerHTML += `
                        <div class="contact-item" onclick="openChat('${r.id}')">
                            <div class="avatar">
                                <img src="${data.pfp || 'https://ui-avatars.com/api/?name='+r.id}" style="width:100%; height:100%; border-radius:15px;">
                                <div class="online-dot ${data.status === 'online' ? 'active' : ''}"></div>
                            </div>
                            <div style="flex:1">
                                <div style="display:flex; justify-content:space-between"><b>${data.nama || r.id}</b> <small style="opacity:0.5">${new Date(r.time).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'})}</small></div>
                                <p style="font-size:0.8rem; opacity:0.6; overflow:hidden; white-space:nowrap; width:150px;">${r.last}</p>
                            </div>
                            ${r.unread ? '<div style="width:8px; height:8px; background:var(--primary); border-radius:50%"></div>' : ''}
                        </div>`;
                });
            });
        });
    }

    function newChat() {
        const id = prompt("ID User:");
        if(id) openChat(id.toLowerCase());
    }

    function openChat(id) {
        partnerID = id;
        document.getElementById('callTools').classList.remove('hidden');
        if(window.innerWidth <= 1000) switchPanel('chat');

        db.ref('users/' + id).once('value', snap => {
            const d = snap.val() || {};
            document.getElementById('activeName').innerText = d.nama || id;
            document.getElementById('activeAva').innerHTML = `<img src="${d.pfp || 'https://ui-avatars.com/api/?name='+id}" style="width:100%; height:100%; border-radius:15px;">`;
        });

        const room = [myID, partnerID].sort().join("_");
        db.ref('messages/' + room).on('value', snap => {
            const box = document.getElementById('msgBox');
            box.innerHTML = "";
            snap.forEach(m => {
                const d = m.val();
                if(d.sender !== myID && !d.read) db.ref(`messages/${room}/${m.key}`).update({ read: true });
                
                box.innerHTML += `
                    <div class="bubble ${d.sender === myID ? 'sent' : 'received'}">
                        ${d.text}
                        <div class="msg-meta">
                            ${new Date(d.time).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'})}
                            ${d.sender === myID ? `<i class="fa-solid fa-check-double ${d.read ? 'read-icon' : ''}"></i>` : ''}
                        </div>
                    </div>`;
            });
            box.scrollTop = box.scrollHeight;
        });
    }

    function send() {
        const t = document.getElementById('msgInput').value;
        if(!t || !partnerID) return;
        const room = [myID, partnerID].sort().join("_");
        db.ref('messages/' + room).push({ sender: myID, text: t, time: Date.now(), read: false });
        document.getElementById('msgInput').value = "";
    }

    async function startCall(video) {
        stream = await navigator.mediaDevices.getUserMedia({ video, audio: true });
        document.getElementById('localVideo').srcObject = stream;
        document.getElementById('callUI').style.display = 'block';
        document.getElementById('btnAccept').classList.add('hidden');
        currentCall = peer.call(partnerID, stream);
        currentCall.on('stream', rs => document.getElementById('remoteVideo').srcObject = rs);
    }

    async function accept() {
        stream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
        document.getElementById('localVideo').srcObject = stream;
        currentCall.answer(stream);
        currentCall.on('stream', rs => document.getElementById('remoteVideo').srcObject = rs);
        document.getElementById('btnAccept').classList.add('hidden');
    }

    function hangup() {
        if(currentCall) currentCall.close();
        if(stream) stream.getTracks().forEach(t => t.stop());
        document.getElementById('callUI').style.display = 'none';
    }

    function switchPanel(n) {
        document.querySelectorAll('.panel').forEach(p => p.classList.remove('active-panel'));
        document.getElementById('panel-' + n).classList.add('active-panel');
    }

    function setTheme(t) { document.body.className = t ? 'theme-' + t : ''; }
</script>
</body>
            </html>
