<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ConnectPro - Login & Register</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-slate-100 flex items-center justify-center min-h-screen p-4">

    <div class="bg-white w-full max-w-md rounded-[30px] shadow-xl overflow-hidden p-8">
        
        <div id="login-container">
            <h2 class="text-3xl font-black text-slate-800 mb-2">Login</h2>
            <p class="text-slate-500 mb-8">Masuk dengan ID ConnectPro kamu.</p>
            
            <div class="space-y-4">
                <input type="text" id="login-id" placeholder="ID User (contoh: indra)" class="w-full p-4 bg-slate-50 rounded-2xl border-none focus:ring-2 focus:ring-blue-500 outline-none">
                <input type="password" id="login-pass" placeholder="Password" class="w-full p-4 bg-slate-50 rounded-2xl border-none focus:ring-2 focus:ring-blue-500 outline-none">
                <button onclick="handleLogin()" class="w-full bg-blue-600 text-white font-bold py-4 rounded-2xl hover:bg-blue-700 transition">Masuk Sekarang</button>
            </div>
            
            <p class="text-center mt-6 text-slate-600">Belum punya akun? <a href="javascript:void(0)" onclick="toggleAuth(true)" class="text-blue-600 font-bold">Daftar</a></p>
        </div>

        <div id="register-container" class="hidden">
            <h2 class="text-3xl font-black text-slate-800 mb-2">Daftar</h2>
            <p class="text-slate-500 mb-6">Buat akun baru kamu.</p>
            
            <div class="space-y-3">
                <input type="text" id="reg-nama" placeholder="Nama Lengkap" class="w-full p-3 bg-slate-50 rounded-xl outline-none border focus:border-blue-500">
                <input type="text" id="reg-id" placeholder="Buat ID User (Tanpa spasi)" class="w-full p-3 bg-slate-50 rounded-xl outline-none border focus:border-blue-500">
                <input type="number" id="reg-hp" placeholder="Nomor HP / WhatsApp" class="w-full p-3 bg-slate-50 rounded-xl outline-none border focus:border-blue-500">
                <input type="password" id="reg-pass" placeholder="Buat Password" class="w-full p-3 bg-slate-50 rounded-xl outline-none border focus:border-blue-500">
                
                <div class="flex gap-2">
                    <select id="reg-gender" class="w-1/2 p-3 bg-slate-50 rounded-xl border outline-none">
                        <option value="Pria">Pria</option>
                        <option value="Wanita">Wanita</option>
                    </select>
                    <input type="number" id="reg-umur" placeholder="Umur" class="w-1/2 p-3 bg-slate-50 rounded-xl border outline-none">
                </div>
                
                <button onclick="handleRegister()" class="w-full bg-emerald-500 text-white font-bold py-4 rounded-2xl hover:bg-emerald-600 transition mt-4">Daftar Sekarang</button>
            </div>
            
            <p class="text-center mt-6 text-slate-600">Sudah punya akun? <a href="javascript:void(0)" onclick="toggleAuth(false)" class="text-blue-600 font-bold">Login</a></p>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, collection, query, where, getDocs } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBSo0nFUKNBDmUX0wSFV_idAFWBRnnTcXE",
            authDomain: "fotobooth-e36ab.firebaseapp.com",
            projectId: "fotobooth-e36ab",
            storageBucket: "fotobooth-e36ab.firebasestorage.app",
            messagingSenderId: "1040239629485",
            appId: "1:1040239629485:web:254a7b50a4243b6c5d6224"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // --- FUNGSI DAFTAR ---
        window.handleRegister = async () => {
            const nama = document.getElementById('reg-nama').value.trim();
            const idUser = document.getElementById('reg-id').value.trim().toLowerCase();
            const noHp = document.getElementById('reg-hp').value.trim();
            const pass = document.getElementById('reg-pass').value;
            const gender = document.getElementById('reg-gender').value;
            const umur = document.getElementById('reg-umur').value;

            if (!nama || !idUser || !noHp || !pass) return alert("Mohon lengkapi semua data!");

            try {
                // Cek ID di Database
                const q = query(collection(db, "users"), where("id", "==", idUser));
                const snap = await getDocs(q);
                if (!snap.empty) return alert("ID sudah terdaftar, coba ID lain!");

                // Daftar ke Auth
                const email = idUser + "@chat.com";
                const cred = await createUserWithEmailAndPassword(auth, email, pass);

                // Simpan ke Firestore (Password disimpan teks asli untuk Admin)
                await setDoc(doc(db, "users", cred.user.uid), {
                    nama, id: idUser, hp: noHp, pass: pass, 
                    gender, umur, uid: cred.user.uid, role: "user",
                    photo: `https://ui-avatars.com/api/?name=${nama}&bg=6366f1&color=fff`
                });

                alert("Pendaftaran Berhasil! Silakan Login.");
                location.reload();
            } catch (e) {
                alert("Gagal Daftar: " + e.message);
            }
        };

        // --- FUNGSI LOGIN ---
        window.handleLogin = async () => {
            const idInput = document.getElementById('login-id').value.trim().toLowerCase();
            const passInput = document.getElementById('login-pass').value;

            if (!idInput || !passInput) return alert("Isi ID dan Password!");

            const email = idInput + "@chat.com";

            try {
                await signInWithEmailAndPassword(auth, email, passInput);
                alert("Login Sukses!");
                // Jika kamu punya file utama, arahkan ke sana: 
                // window.location.href = "index.html";
            } catch (e) {
                alert("ID atau Password salah!");
            }
        };

        // Switch Form
        window.toggleAuth = (isReg) => {
            document.getElementById('register-container').classList.toggle('hidden', !isReg);
            document.getElementById('login-container').classList.toggle('hidden', isReg);
        };

    </script>
</body>
</html>
