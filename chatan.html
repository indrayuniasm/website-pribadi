    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, onAuthStateChanged, signInWithEmailAndPassword, createUserWithEmailAndPassword, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, getDoc, updateDoc, collection, addDoc, onSnapshot, query, orderBy, where, deleteDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
        import { getStorage, ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-storage.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBSo0nFUKNBDmUX0wSFV_idAFWBRnnTcXE",
            authDomain: "fotobooth-e36ab.firebaseapp.com",
            projectId: "fotobooth-e36ab",
            storageBucket: "fotobooth-e36ab.firebasestorage.app",
            messagingSenderId: "1040239629485",
            appId: "1:1040239629485:web:254a7b50a4243b6c5d6224"
        };
// Ganti fungsi loadChatList lama dengan ini:
function loadChatList() {
    if (!auth.currentUser) return;

    // Ambil pesan terbaru secara keseluruhan (order by time)
    const q = query(
        collection(db, "chats"),
        orderBy("time", "desc")
    );

    onSnapshot(q, async (snap) => {
        const chatListDiv = document.getElementById('chat-list');
        const uniqueUsers = new Set();
        const lastMessages = [];

        // Filter manual: Hanya ambil yang room-nya ada UID kita
        snap.forEach(doc => {
            const data = doc.data();
            if (data.room && data.room.includes(auth.currentUser.uid)) {
                const members = data.room.split("_");
                const otherUid = members.find(uid => uid !== auth.currentUser.uid);
                
                if (otherUid && !uniqueUsers.has(otherUid)) {
                    uniqueUsers.add(otherUid);
                    lastMessages.push({
                        uid: otherUid,
                        text: data.text,
                        time: data.time?.toDate() || new Date()
                    });
                }
            }
        });

        if (lastMessages.length === 0) {
            chatListDiv.innerHTML = `
                <div class="text-center py-20 opacity-20">
                    <i class="fa-solid fa-message text-6xl mb-4"></i>
                    <p class="text-sm font-bold uppercase">Belum ada obrolan</p>
                </div>`;
            return;
        }

        chatListDiv.innerHTML = "";
        
        for (const chat of lastMessages) {
            const userDoc = await getDoc(doc(db, "users", chat.uid));
            if (userDoc.exists()) {
                const userData = userDoc.data();
                const timeStr = chat.time.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
                
                const card = document.createElement('div');
                card.className = "bg-white p-4 rounded-[28px] flex items-center justify-between shadow-sm border border-slate-50 active:scale-95 transition cursor-pointer";
                card.onclick = () => openChat(userData.uid, userData.nama, userData.photo);
                
                card.innerHTML = `
                    <div class="flex items-center gap-4">
                        <img src="${userData.photo}" class="w-14 h-14 rounded-2xl object-cover">
                        <div class="overflow-hidden">
                            <h4 class="font-bold text-slate-800 leading-tight">${userData.nama}</h4>
                            <p class="text-xs text-slate-400 truncate w-40 font-bold">${chat.text}</p>
                        </div>
                    </div>
                    <div class="text-right">
                        <p class="text-[10px] font-black text-blue-500">${timeStr}</p>
                    </div>
                `;
                chatListDiv.appendChild(card);
            }
        }
    });
}
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const storage = getStorage(app);

        let myData = null, selectedFile = null, profileFile = null, targetUser = null, storyTimer = null, generatedCaptcha = "";
        let activeSlides = [], currentSlideIndex = 0;

        // --- AUTH & CAPTCHA ---
        function generateCaptcha() {
            const c = "ABCDEFGHJKLMNPQRSTUVWXYZ23456789";
            generatedCaptcha = Array.from({length: 5}, () => c[Math.floor(Math.random()*c.length)]).join('');
            document.getElementById('captcha-code').innerText = generatedCaptcha;
        }

        window.toggleAuth = (is) => {
            document.getElementById('register-container').classList.toggle('hidden', !is);
            document.getElementById('login-container').classList.toggle('hidden', is);
            if(is) generateCaptcha();
        };

        window.handleRegister = async () => {
            const n = document.getElementById('reg-nama').value, id = document.getElementById('reg-id').value.trim().toLowerCase();
            const ph = document.getElementById('reg-phone').value, g = document.getElementById('reg-gender').value;
            const p = document.getElementById('reg-pass').value, ci = document.getElementById('reg-captcha-input').value.toUpperCase();

            if(!n || !id || !ph || !g || !p) return alert("Isi semua data!");
            if(ci !== generatedCaptcha) { alert("Captcha Salah!"); return generateCaptcha(); }

            try {
                const c = await createUserWithEmailAndPassword(auth, id + "@chat.com", p);
                await setDoc(doc(db, "users", c.user.uid), { nama: n, id, phone: ph, gender: g, uid: c.user.uid, photo: `https://ui-avatars.com/api/?name=${n}&bg=3b82f6&color=fff` });
            } catch (e) { alert(e.message); generateCaptcha(); }
        };

        window.handleLogin = async () => {
            const id = document.getElementById('login-id').value.trim().toLowerCase(), p = document.getElementById('login-pass').value;
            try { await signInWithEmailAndPassword(auth, id + "@chat.com", p); } catch (e) { alert("ID/Password Salah!"); }
        };

        window.logout = () => signOut(auth);

        // --- NAVIGATION & PROFILE ---
        window.navigate = (page, title, el) => {
            document.querySelectorAll('.page-content').forEach(p => p.classList.remove('active'));
            document.getElementById('page-' + page).classList.add('active');
            document.getElementById('page-title').innerText = title;
            document.querySelectorAll('.nav-item').forEach(i => i.classList.replace('text-blue-600', 'text-slate-400'));
            el.classList.replace('text-slate-400', 'text-blue-600');
            if(page === 'profile') { document.getElementById('edit-nama').value = myData.nama; document.getElementById('edit-id').value = "@"+myData.id; document.getElementById('profile-preview').src = myData.photo; }
            if(page === 'history') loadHistory();
        };

        window.previewProfilePic = (i) => { profileFile = i.files[0]; if(profileFile) { const r = new FileReader(); r.onload = (e) => document.getElementById('profile-preview').src = e.target.result; r.readAsDataURL(profileFile); } };
        window.updateProfile = async () => {
            const b = document.getElementById('btn-save-profile'); b.innerText = "Saving...";
            try {
                let url = myData.photo;
                if(profileFile) { const r = ref(storage, `profiles/${auth.currentUser.uid}`); await uploadBytes(r, profileFile); url = await getDownloadURL(r); }
                await updateDoc(doc(db, "users", auth.currentUser.uid), { nama: document.getElementById('edit-nama').value, photo: url });
                location.reload();
            } catch (e) { alert(e.message); }
        };

        // --- STORY SYSTEM ---
        window.openStoryModal = () => document.getElementById('story-modal').classList.remove('hidden');
        window.closeStoryModal = () => document.getElementById('story-modal').classList.add('hidden');
        window.handleFilePreview = (i) => { selectedFile = i.files[0]; if(selectedFile) document.getElementById('preview-text').innerText = "✅ Selected"; };
        window.uploadStory = async () => {
            const b = document.getElementById('btn-upload'); b.innerText = "Uploading...";
            try {
                let url = "", type = "text";
                if(selectedFile) { const r = ref(storage, `stories/${Date.now()}`); await uploadBytes(r, selectedFile); url = await getDownloadURL(r); type = selectedFile.type.split('/')[0]; }
                await addDoc(collection(db, "stories"), { uid: auth.currentUser.uid, nama: myData.nama, photo: myData.photo, caption: document.getElementById('story-caption').value, url, type, createdAt: serverTimestamp() });
                closeStoryModal();
            } catch (e) { alert(e.message); }
            b.innerText = "UPLOAD";
        };

        window.openStoryGroup = (gs) => { activeSlides = gs; currentSlideIndex = 0; document.getElementById('story-view-screen').classList.remove('hidden'); renderSlide(); };
        function renderSlide() {
            const d = activeSlides[currentSlideIndex];
            const img = document.getElementById('view-img'), vid = document.getElementById('view-vid'), txt = document.getElementById('view-text');
            document.getElementById('btn-delete-story').classList.toggle('hidden', d.uid !== auth.currentUser.uid);
            document.getElementById('progress-container').innerHTML = activeSlides.map((_, i) => `<div class="progress-track"><div id="fill-${i}" class="progress-fill" style="width: ${i < currentSlideIndex ? '100%' : '0%'}"></div></div>`).join('');
            [img, vid, txt].forEach(el => el.classList.add('hidden')); vid.pause();
            document.getElementById('viewer-avatar').src = d.photo; document.getElementById('viewer-name').innerText = d.nama; document.getElementById('view-caption').innerText = d.caption || "";
            let ms = 5000;
            if(d.type === 'image') { img.src = d.url; img.classList.remove('hidden'); }
            else if(d.type === 'video') { vid.src = d.url; vid.classList.remove('hidden'); vid.play(); ms = 15000; }
            else { txt.innerText = d.caption; txt.classList.remove('hidden'); }
            setTimeout(() => { const f = document.getElementById(`fill-${currentSlideIndex}`); if(f){ f.style.transitionDuration = `${ms}ms`; f.style.width = '100%'; } }, 50);
            clearTimeout(storyTimer); storyTimer = setTimeout(nextSlide, ms);
        }
        window.nextSlide = () => { if(currentSlideIndex < activeSlides.length - 1) { currentSlideIndex++; renderSlide(); } else { closeStoryViewer(); } };
        window.prevSlide = () => { if(currentSlideIndex > 0) { currentSlideIndex--; renderSlide(); } };
        window.closeStoryViewer = () => { document.getElementById('story-view-screen').classList.add('hidden'); document.getElementById('view-vid').pause(); clearTimeout(storyTimer); };
        window.deleteCurrentStory = async () => { if(confirm("Hapus?")) { await deleteDoc(doc(db, "stories", activeSlides[currentSlideIndex].id)); closeStoryViewer(); } };

        // --- SEARCH, CHAT & HISTORY ---
        window.searchUser = () => {
            const id = document.getElementById('search-input').value.trim().toLowerCase();
            const res = document.getElementById('search-result');
            if(id.length < 3) return res.innerHTML = "";
            onSnapshot(query(collection(db, "users"), where("id", "==", id)), (snap) => {
                res.innerHTML = "";
                snap.forEach(d => {
                    const u = d.data();
                    const div = document.createElement('div');
                    div.className = "bg-white p-4 rounded-3xl flex items-center justify-between border border-slate-100 shadow-sm";
                    div.innerHTML = `<div class="flex items-center gap-3"><img src="${u.photo}" class="w-12 h-12 rounded-2xl object-cover"><div><h4 class="font-bold text-slate-800">${u.nama}</h4><p class="text-[10px] text-blue-500 font-bold uppercase">@${u.id}</p></div></div><button onclick="openChat('${u.uid}', '${u.nama}', '${u.photo}')" class="bg-blue-600 text-white px-5 py-2 rounded-2xl font-black text-xs">CHAT</button>`;
                    res.appendChild(div);
                });
            });
        };
        window.openChat = (uid, nama, photo) => { targetUser = { uid, nama, photo }; document.getElementById('chat-screen').classList.remove('hidden'); document.getElementById('chat-name').innerText = nama; document.getElementById('chat-avatar').src = photo; loadMessages(); };
        window.closeChat = () => document.getElementById('chat-screen').classList.add('hidden');
// --- FUNGSI LOAD CHAT DEBUG MODE ---
function loadMessages() {
    if (!targetUser) return;

    // buat vn
    // Di dalam loop loadMessages
const isVN = m.type === 'vn';
div.innerHTML = `
    <div class="max-w-[80%] p-4 text-sm font-bold shadow-sm ${isMe ? 'chat-bubble-me' : 'chat-bubble-them'}">
        ${isVN ? `<audio src="${m.fileUrl}" controls class="w-48"></audio>` : m.text}
    </div>
`;
    
    // Kita buat Room ID yang konsisten
    const roomId = [auth.currentUser.uid, targetUser.uid].sort().join("_");
    console.log("Membuka Room ID:", roomId); // Debug: Cek di F12

    const chatBox = document.getElementById('chat-messages');
    
    // Sederhanakan query: Hapus orderBy dulu untuk tes awal
    // Karena orderBy sering bikin chat macet kalau Index belum dibuat
    const q = query(
        collection(db, "chats"), 
        where("room", "==", roomId)
    );

    onSnapshot(q, (snap) => {
        console.log("Data diterima! Jumlah pesan:", snap.size); // Debug: Cek jumlah data
        chatBox.innerHTML = "";
        
        if (snap.empty) {
            chatBox.innerHTML = `<div class="text-center mt-10 text-slate-400 text-xs font-bold uppercase tracking-widest opacity-50">Belum ada pesan</div>`;
            return;
        }

        // Urutkan manual di sisi client agar tidak butuh Index Firebase sementara
        const docs = [];
        snap.forEach(d => docs.push(d.data()));
        docs.sort((a, b) => (a.time?.seconds || 0) - (b.time?.seconds || 0));

        docs.forEach(m => {
            const isMe = m.sender === auth.currentUser.uid;
            const div = document.createElement('div');
            div.className = `flex ${isMe ? 'justify-end' : 'justify-start'}`;
            div.innerHTML = `
                <div class="max-w-[80%] p-4 text-sm font-bold shadow-sm ${isMe ? 'chat-bubble-me' : 'chat-bubble-them'}">
                    ${m.text}
                </div>
            `;
            chatBox.appendChild(div);
        });
        chatBox.scrollTop = chatBox.scrollHeight;
    }, (error) => {
        console.error("FIREBASE ERROR:", error.message);
        alert("Terjadi masalah koneksi database!");
    });
}

window.sendMessage = async () => {
    const input = document.getElementById('chat-input');

    if(!text || !targetUser) return;

    const roomId = [auth.currentUser.uid, targetUser.uid].sort().join("_");

    try {

            time: serverTimestamp()
        });
        input.value = "";

        alert("Gagal kirim pesan: " + e.message);

};

               loadChatList();

        let mediaRecorder;
let audioChunks = [];

window.startRecording = async () => {
    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
    mediaRecorder = new MediaRecorder(stream);
    audioChunks = [];
    
    mediaRecorder.ondataavailable = (e) => audioChunks.push(e.data);
    mediaRecorder.onstop = async () => {
        const audioBlob = new Blob(audioChunks, { type: 'audio/webm' });
        const vnRef = ref(storage, `vn/${Date.now()}.webm`);
        await uploadBytes(vnRef, audioBlob);
        const url = await getDownloadURL(vnRef);
        
        // Kirim sebagai pesan tipe VN
        await addDoc(collection(db, "chats"), {
            room: [auth.currentUser.uid, targetUser.uid].sort().join("_"),
            sender: auth.currentUser.uid,
            text: "Voice Note",
            type: "vn",
            fileUrl: url,
            time: serverTimestamp()
        });
    };
    mediaRecorder.start();
};

window.stopRecording = () => {
    if(mediaRecorder) mediaRecorder.stop();
};

        window.startCall = async (type) => {
    if(!targetUser) return;
    alert(`Memanggil ${targetUser.nama} via ${type}...`);
    
    await addDoc(collection(db, "call_history"), {
        uid: targetUser.uid,
        callerId: auth.currentUser.uid,
        callerName: myData.nama,
        status: type === 'video' ? 'Video Call' : 'Voice Call',
        timestamp: serverTimestamp()
    });
};
