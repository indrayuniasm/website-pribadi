<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ConnectPro Ultra</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    <script src="https://unpkg.com/peerjs@1.4.7/dist/peerjs.min.js"></script>
    
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <style>
        :root {
            --primary: #8b5cf6;
            --bg: #09090b;
            --panel: rgba(24, 24, 27, 0.7);
            --border: rgba(255, 255, 255, 0.1);
            --text: #fafafa;
        }

        /* Themes */
        .theme-midnight { --primary: #3b82f6; --bg: #020617; }
        .theme-amethyst { --primary: #d946ef; --bg: #0f051a; }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }
        body { background: var(--bg); color: var(--text); height: 100vh; overflow: hidden; transition: 0.5s; }

        /* --- LAYOUT ENGINE --- */
        .app-shell { display: grid; height: 100vh; width: 100%; transition: 0.3s; }
        
        /* Desktop: 3 Columns */
        @media (min-width: 901px) {
            .app-shell { grid-template-columns: 350px 1fr 320px; }
            .mobile-nav { display: none; }
        }

        /* Mobile: Single Column */
        @media (max-width: 900px) {
            .app-shell { grid-template-columns: 1fr; }
            .sidebar, .chat-view, .profile-view { display: none; width: 100% !important; }
            .active-panel { display: flex !important; }
            .mobile-nav { 
                position: fixed; bottom: 0; width: 100%; height: 70px; 
                background: var(--panel); backdrop-filter: blur(20px);
                display: flex; justify-content: space-around; align-items: center;
                border-top: 1px solid var(--border); z-index: 100;
            }
        }

        /* Components */
        .panel { background: var(--panel); backdrop-filter: blur(30px); border-right: 1px solid var(--border); display: flex; flex-direction: column; overflow: hidden; }
        .header { padding: 25px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
        
        /* Contacts */
        .contact-item { padding: 15px 20px; display: flex; align-items: center; gap: 15px; cursor: pointer; transition: 0.2s; }
        .contact-item:hover { background: rgba(255,255,255,0.05); }
        .pfp-ring { width: 50px; height: 50px; border-radius: 18px; object-fit: cover; background: #27272a; position: relative; }
        .status-badge { position: absolute; bottom: -2px; right: -2px; width: 14px; height: 14px; border-radius: 50%; border: 3px solid var(--bg); }
        .online { background: #22c55e; }
        .offline { background: #71717a; }

        /* Chat Messages */
        .msg-scroll { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 12px; }
        .bubble { padding: 12px 18px; border-radius: 20px; max-width: 70%; font-size: 0.95rem; line-height: 1.5; }
        .sent { align-self: flex-end; background: var(--primary); color: white; border-bottom-right-radius: 4px; }
        .received { align-self: flex-start; background: #27272a; border-bottom-left-radius: 4px; }

        /* Input Area */
        .input-bar { padding: 20px; display: flex; gap: 12px; align-items: center; background: rgba(0,0,0,0.2); }
        .main-input { flex: 1; background: #18181b; border: 1px solid var(--border); padding: 14px; border-radius: 15px; color: white; outline: none; }

        /* Profile Editor */
        .profile-card { text-align: center; padding: 30px; }
        .editable-pfp { width: 120px; height: 120px; border-radius: 40px; margin-bottom: 20px; cursor: pointer; border: 2px dashed var(--primary); padding: 5px; }
        .bio-area { background: rgba(0,0,0,0.3); padding: 15px; border-radius: 15px; font-size: 0.9rem; margin-top: 10px; border: 1px solid var(--border); }

        /* Call Overlay */
        #callUI { position: fixed; inset: 0; background: #000; z-index: 9999; display: none; }
        #remoteVideo { width: 100%; height: 100%; object-fit: cover; }
        #localVideo { width: 120px; height: 170px; position: absolute; top: 30px; right: 30px; border-radius: 20px; border: 2px solid var(--primary); object-fit: cover; }

        .btn-round { width: 50px; height: 50px; border-radius: 15px; border: none; display: flex; align-items: center; justify-content: center; cursor: pointer; transition: 0.3s; }
        .btn-primary { background: var(--primary); color: white; }
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div id="authScreen" style="position:fixed; inset:0; background:var(--bg); z-index:10000; display:flex; align-items:center; justify-content:center; padding:20px;">
        <div class="panel" style="width:100%; max-width:400px; padding:40px; border-radius:30px; border:1px solid var(--border);">
            <h1 style="text-align:center; margin-bottom:10px; font-weight:800;">ConnectPro</h1>
            <p style="text-align:center; color:#71717a; margin-bottom:30px;">Premium Real-time Messaging</p>
            <input type="text" id="loginUsername" placeholder="ID Username" class="main-input" style="width:100%; margin-bottom:15px;">
            <button onclick="bootApp()" class="btn-round btn-primary" style="width:100%; border-radius:15px; font-weight:bold;">Sign In</button>
        </div>
    </div>

    <div class="app-shell hidden" id="app">
        
        <aside class="panel sidebar active-panel" id="panel-beranda">
            <div class="header">
                <h2>Chats</h2>
                <button class="btn-round" style="background:transparent; color:white;"><i class="fa-solid fa-plus"></i></button>
            </div>
            <div style="flex:1; overflow-y:auto;" id="contactList"></div>
        </aside>

        <main class="panel chat-view" id="panel-chat">
            <div class="header">
                <div style="display:flex; align-items:center; gap:12px;">
                    <div id="chatAvatar" class="pfp-ring" style="width:40px; height:40px;"></div>
                    <div>
                        <h4 id="chatTitle">Pilih Teman</h4>
                        <small id="chatStatusText" style="color:#71717a;">Tap to chat</small>
                    </div>
                </div>
                <div id="callActions" class="hidden" style="display:flex; gap:10px;">
                    <button onclick="initCall(false)" class="btn-round" style="background:rgba(255,255,255,0.05); color:white;"><i class="fa-solid fa-phone"></i></button>
                    <button onclick="initCall(true)" class="btn-round" style="background:rgba(255,255,255,0.05); color:white;"><i class="fa-solid fa-video"></i></button>
                </div>
            </div>
            <div class="msg-scroll" id="msgBox"></div>
            <div class="input-bar">
                <input type="text" id="msgInput" placeholder="Write something..." class="main-input">
                <button onclick="send()" class="btn-round btn-primary"><i class="fa-solid fa-paper-plane"></i></button>
            </div>
        </main>

        <aside class="panel profile-view" id="panel-profile">
            <div class="header"><h2>Settings</h2></div>
            <div class="profile-card">
                <img id="profilePfp" src="https://ui-avatars.com/api/?name=User" class="editable-pfp" onclick="updateProfileData('pfp')">
                <h3 id="profileName" onclick="updateProfileData('nama')">Nama User</h3>
                <p id="profileID" style="color:#71717a;">@id</p>
                <div class="bio-area" id="profileBio" onclick="updateProfileData('bio')">Click here to edit bio...</div>
                
                <div style="margin-top:30px; text-align:left;">
                    <label style="font-size:0.8rem; color:#71717a;">GANTI TEMA</label>
                    <div style="display:flex; gap:10px; margin-top:10px;">
                        <div onclick="setTheme('default')" style="width:30px; height:30px; background:#8b5cf6; border-radius:8px; cursor:pointer;"></div>
                        <div onclick="setTheme('midnight')" style="width:30px; height:30px; background:#3b82f6; border-radius:8px; cursor:pointer;"></div>
                        <div onclick="setTheme('amethyst')" style="width:30px; height:30px; background:#d946ef; border-radius:8px; cursor:pointer;"></div>
                    </div>
                </div>
                <button onclick="location.reload()" style="margin-top:40px; color:#ef4444; background:none; border:none; cursor:pointer;">Sign Out</button>
            </div>
        </aside>

        <nav class="mobile-nav">
            <div class="nav-btn active" onclick="switchPanel('beranda')" id="nav-beranda"><i class="fa-solid fa-house"></i></div>
            <div class="nav-btn" onclick="switchPanel('chat')" id="nav-chat"><i class="fa-solid fa-comment"></i></div>
            <div class="nav-btn" onclick="switchPanel('profile')" id="nav-profile"><i class="fa-solid fa-user-gear"></i></div>
        </nav>
    </div>

    <div id="callUI">
        <video id="remoteVideo" autoplay playsinline></video>
        <video id="localVideo" autoplay muted playsinline></video>
        <div style="position:absolute; bottom:50px; left:50%; transform:translateX(-50%); display:flex; gap:20px;">
            <button id="btnAnswer" onclick="answer()" style="background:#22c55e;" class="btn-round"><i class="fa-solid fa-phone"></i></button>
            <button onclick="hangup()" style="background:#ef4444;" class="btn-round"><i class="fa-solid fa-phone-slash"></i></button>
        </div>
    </div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyBSo0nFUKNBDmUX0wSFV_idAFWBRnnTcXE",
        authDomain: "fotobooth-e36ab.firebaseapp.com",
        databaseURL: "https://fotobooth-e36ab-default-rtdb.firebaseio.com",
        projectId: "fotobooth-e36ab",
        storageBucket: "fotobooth-e36ab.firebasestorage.app",
        messagingSenderId: "1040239629485",
        appId: "1:1040239629485:web:254a7b50a4243b6c5d6224"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    let myID = "", partnerID = "", peer, currentCall, stream;

    // --- INITIALIZATION ---
    function bootApp() {
        myID = document.getElementById('loginUsername').value.trim().toLowerCase();
        if(!myID) return;

        peer = new Peer(myID);
        peer.on('open', () => {
            // Presence Logic
            const myStatusRef = db.ref('users/' + myID + '/status');
            db.ref('.info/connected').on('value', snap => {
                if(snap.val() === true) {
                    myStatusRef.set('online');
                    myStatusRef.onDisconnect().set('offline');
                }
            });

            document.getElementById('authScreen').classList.add('hidden');
            document.getElementById('app').classList.remove('hidden');
            syncProfile();
            loadContacts();
            
            peer.on('call', call => {
                currentCall = call;
                document.getElementById('callUI').style.display = 'block';
                document.getElementById('btnAnswer').classList.remove('hidden');
            });
        });
    }

    // --- PROFILE ENGINE ---
    function syncProfile() {
        db.ref('users/' + myID).on('value', snap => {
            const data = snap.val() || {};
            document.getElementById('profileName').innerText = data.nama || myID;
            document.getElementById('profileID').innerText = "@" + myID;
            document.getElementById('profileBio').innerText = data.bio || "No bio yet.";
            document.getElementById('profilePfp').src = data.pfp || `https://ui-avatars.com/api/?name=${myID}`;
        });
    }

    function updateProfileData(type) {
        const newVal = prompt("Masukkan " + type + " baru:");
        if(newVal) {
            let update = {};
            update[type] = newVal;
            db.ref('users/' + myID).update(update);
        }
    }

    // --- CHAT ENGINE ---
    function loadContacts() {
        db.ref('users').on('value', snap => {
            const list = document.getElementById('contactList');
            list.innerHTML = "";
            snap.forEach(u => {
                if(u.key !== myID) {
                    const isOnline = u.val().status === 'online';
                    list.innerHTML += `
                        <div class="contact-item" onclick="openChat('${u.key}', '${u.val().nama || u.key}', '${u.val().pfp}')">
                            <div class="pfp-ring">
                                <img src="${u.val().pfp || 'https://ui-avatars.com/api/?name='+u.key}" style="width:100%; height:100%; border-radius:18px;">
                                <div class="status-badge ${isOnline ? 'online' : 'offline'}"></div>
                            </div>
                            <div>
                                <b>${u.val().nama || u.key}</b><br>
                                <small style="color:#71717a;">${isOnline ? 'Active Now' : 'Offline'}</small>
                            </div>
                        </div>`;
                }
            });
        });
    }

    function openChat(id, nama, pfp) {
        partnerID = id;
        document.getElementById('chatTitle').innerText = nama;
        document.getElementById('chatAvatar').innerHTML = `<img src="${pfp || 'https://ui-avatars.com/api/?name='+id}" style="width:100%; height:100%; border-radius:18px;">`;
        document.getElementById('callActions').classList.remove('hidden');
        if(window.innerWidth <= 900) switchPanel('chat');

        const room = [myID, partnerID].sort().join("_");
        db.ref('messages/' + room).on('value', snap => {
            const box = document.getElementById('msgBox');
            box.innerHTML = "";
            snap.forEach(m => {
                const d = m.val();
                box.innerHTML += `<div class="bubble ${d.sender === myID ? 'sent' : 'received'}">${d.text}</div>`;
            });
            box.scrollTop = box.scrollHeight;
        });
    }

    function send() {
        const text = document.getElementById('msgInput').value;
        if(!text || !partnerID) return;
        const room = [myID, partnerID].sort().join("_");
        db.ref('messages/' + room).push({ sender: myID, text });
        document.getElementById('msgInput').value = "";
    }

    // --- CALL SYSTEM ---
    async function initCall(isVideo) {
        stream = await navigator.mediaDevices.getUserMedia({ video: isVideo, audio: true });
        document.getElementById('localVideo').srcObject = stream;
        document.getElementById('callUI').style.display = 'block';
        document.getElementById('btnAnswer').classList.add('hidden');

        currentCall = peer.call(partnerID, stream);
        currentCall.on('stream', rs => document.getElementById('remoteVideo').srcObject = rs);
    }

    async function answer() {
        stream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
        document.getElementById('localVideo').srcObject = stream;
        currentCall.answer(stream);
        currentCall.on('stream', rs => document.getElementById('remoteVideo').srcObject = rs);
        document.getElementById('btnAnswer').classList.add('hidden');
    }

    function hangup() {
        if(currentCall) currentCall.close();
        if(stream) stream.getTracks().forEach(t => t.stop());
        document.getElementById('callUI').style.display = 'none';
    }

    // --- UI TOOLS ---
    function switchPanel(name) {
        document.querySelectorAll('.panel').forEach(p => p.classList.remove('active-panel'));
        document.getElementById('panel-' + name).classList.add('active-panel');
    }

    function setTheme(t) {
        document.body.className = t === 'default' ? '' : 'theme-' + t;
    }
</script>
</body>
                    </html>
