<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ConnectPro Ultimate</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/emoji-mart@latest/dist/browser.js"></script>
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; overflow: hidden; }
        .hide-scroll::-webkit-scrollbar { display: none; }
        .glass { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(15px); }
        #main-app { height: 100dvh; }
        .page-content { display: none; height: 100%; overflow-y: auto; padding-bottom: 120px; }
        .page-content.active { display: block; }
        .nav-active { color: #2563eb !important; transform: scale(1.1); }
        .chat-bubble-me { border-radius: 20px 20px 4px 20px; background: #2563eb; color: white; }
        .chat-bubble-them { border-radius: 20px 20px 20px 4px; background: white; color: #1e293b; border: 1px solid #e2e8f0; }
        
        /* Style khusus Emoji Picker agar melayang rapi */
        em-emoji-picker {
            --border-radius: 24px;
            --shadow: 0 20px 25px -5px rgb(0 0 0 / 0.1);
            height: 35vh;
            min-height: 300px;
        }
    </style>
</head>
<body class="bg-slate-100">

    <div id="auth-screen" class="min-h-screen flex items-center justify-center p-4">
        <div class="bg-white w-full max-w-md rounded-[40px] shadow-2xl p-8 border border-white">
            <div id="login-container">
                <h2 class="text-3xl font-black mb-2 text-slate-800 tracking-tighter">ConnectPro 👋</h2>
                <p class="text-slate-500 mb-8 text-sm font-bold">Masuk untuk terhubung kembali.</p>
                <div class="space-y-4">
                    <input type="text" id="login-id" placeholder="ID User" class="w-full p-4 bg-slate-100 rounded-2xl outline-none focus:ring-2 focus:ring-blue-500 font-bold">
                    <input type="password" id="login-pass" placeholder="Password" class="w-full p-4 bg-slate-100 rounded-2xl outline-none focus:ring-2 focus:ring-blue-500 font-bold">
                    <button onclick="handleLogin()" class="w-full bg-blue-600 text-white font-extrabold py-4 rounded-2xl shadow-lg active:scale-95 transition">Masuk</button>
                </div>
                <p class="text-center mt-8 text-slate-500 text-sm">Belum punya akun? <a href="#" onclick="toggleAuth(true)" class="text-blue-600 font-bold">Daftar</a></p>
            </div>
            <div id="register-container" class="hidden">
                 <h2 class="text-3xl font-black mb-6 text-emerald-500 tracking-tighter text-center">Buat Akun</h2>
                <div class="space-y-3 overflow-y-auto max-h-[50vh] pr-2 hide-scroll">
                    <input type="text" id="reg-nama" placeholder="Nama Lengkap" class="w-full p-4 bg-slate-100 rounded-2xl outline-none focus:ring-2 focus:ring-emerald-500 font-bold">
                    <input type="text" id="reg-id" placeholder="ID User (unik)" class="w-full p-4 bg-slate-100 rounded-2xl outline-none focus:ring-2 focus:ring-emerald-500 font-bold">
                    <input type="number" id="reg-phone" placeholder="Nomor HP (0812...)" class="w-full p-4 bg-slate-100 rounded-2xl outline-none focus:ring-2 focus:ring-emerald-500 font-bold">
                    <select id="reg-gender" class="w-full p-4 bg-slate-100 rounded-2xl outline-none focus:ring-2 focus:ring-emerald-500 font-bold text-slate-500">
                        <option value="">Jenis Kelamin</option>
                        <option value="Laki-laki">Laki-laki</option>
                        <option value="Perempuan">Perempuan</option>
                    </select>
                    <input type="password" id="reg-pass" placeholder="Password" class="w-full p-4 bg-slate-100 rounded-2xl outline-none focus:ring-2 focus:ring-emerald-500 font-bold">
                    <div class="bg-slate-50 p-4 rounded-2xl border border-slate-200">
                        <div class="flex justify-between items-center mb-2 px-2">
                            <span class="text-[10px] font-black uppercase text-slate-400">Keamanan</span>
                            <span id="captcha-code" class="bg-emerald-100 text-emerald-700 px-3 py-1 rounded-lg font-black tracking-widest italic select-none"></span>
                        </div>
                        <input type="text" id="reg-captcha-input" placeholder="Ketik kode di atas" class="w-full p-3 bg-white rounded-xl outline-none border border-slate-200 text-center font-bold">
                    </div>
                </div>
                <button onclick="handleRegister()" class="w-full bg-emerald-500 text-white font-bold py-4 rounded-2xl shadow-lg mt-6 active:scale-95 transition">Daftar Sekarang</button>
                <p class="text-center mt-4 text-sm"><a href="#" onclick="toggleAuth(false)" class="text-blue-600 font-bold">Kembali ke Login</a></p>
            </div>
        </div>
    </div>

    <div id="main-app" class="hidden flex flex-col max-w-lg mx-auto bg-white shadow-2xl relative overflow-hidden">
        <header class="p-6 flex justify-between items-center border-b bg-white z-20">
            <h1 id="page-title" class="text-2xl font-black text-blue-600 tracking-tighter">ConnectPro</h1>
            <div class="flex items-center gap-3">
                <img id="header-photo" src="" class="w-10 h-10 rounded-full border-2 border-white shadow-md object-cover bg-slate-200">
                <button onclick="logout()" class="text-slate-300 hover:text-red-500 transition"><i class="fa-solid fa-power-off"></i></button>
            </div>
        </header>

        <div class="flex-1 relative overflow-hidden bg-slate-50">
            <div id="page-home" class="page-content active">
                <div class="p-4 flex gap-4 overflow-x-auto hide-scroll border-b bg-white">
                    <div onclick="openStoryModal()" class="flex flex-col items-center gap-1 min-w-[70px] cursor-pointer">
                        <div class="w-14 h-14 rounded-2xl bg-blue-50 flex items-center justify-center text-blue-600 border-2 border-dashed border-blue-200">
                            <i class="fa-solid fa-plus"></i>
                        </div>
                        <span class="text-[10px] font-bold text-slate-500 uppercase">Story</span>
                    </div>
                    <div id="online-list" class="flex gap-4"></div>
                </div>
                <div class="p-4">
                    <h3 class="font-black text-slate-800 text-lg mb-4 uppercase tracking-tight">Pesan Masuk</h3>
                    <div id="chat-list" class="space-y-3"></div>
                </div>
            </div>

            <div id="page-search" class="page-content p-4">
                <div class="relative mb-6">
                    <input type="text" id="search-input" oninput="searchUser()" placeholder="Ketik ID Teman..." 
                        class="w-full p-4 pl-12 bg-white rounded-[24px] shadow-sm border border-slate-100 outline-none focus:ring-2 focus:ring-blue-500 font-bold">
                    <i class="fa-solid fa-magnifying-glass absolute left-5 top-1/2 -translate-y-1/2 text-slate-400"></i>
                </div>
                <div id="search-result" class="space-y-3"></div>
            </div>

            <div id="page-history" class="page-content p-4">
                <h3 class="font-black text-slate-800 text-lg mb-4 uppercase">Panggilan Terakhir</h3>
                <div id="history-list" class="space-y-3"></div>
            </div>

            <div id="page-profile" class="page-content p-6">
                <div class="bg-white rounded-[40px] p-8 shadow-sm border border-slate-50 text-center">
                    <div class="relative w-32 h-32 mx-auto mb-6">
                        <img id="profile-preview" src="" class="w-full h-full rounded-[40px] object-cover border-4 border-slate-50 shadow-lg">
                        <label class="absolute -bottom-2 -right-2 bg-blue-600 text-white w-10 h-10 rounded-2xl flex items-center justify-center cursor-pointer shadow-lg border-4 border-white">
                            <i class="fa-solid fa-camera"></i>
                            <input type="file" id="input-profile-pic" accept="image/*" class="hidden" onchange="previewProfilePic(this)">
                        </label>
                    </div>
                    <div class="space-y-4 text-left font-bold">
                        <div>
                            <label class="text-[10px] text-slate-400 uppercase ml-2">Nama Lengkap</label>
                            <input type="text" id="edit-nama" class="w-full p-4 bg-slate-50 rounded-2xl border border-slate-100 outline-none focus:ring-2 focus:ring-blue-500">
                        </div>
                        <div>
                            <label class="text-[10px] text-slate-400 uppercase ml-2">ID User</label>
                            <input type="text" id="edit-id" disabled class="w-full p-4 bg-slate-100 rounded-2xl text-slate-400 cursor-not-allowed">
                        </div>
                        <button onclick="updateProfile()" id="btn-save-profile" class="w-full bg-blue-600 text-white font-black py-4 rounded-2xl shadow-xl active:scale-95 transition mt-4">SIMPAN PROFIL</button>
                    </div>
                </div>
            </div>
        </div>

        <nav class="fixed bottom-0 left-0 right-0 max-w-lg mx-auto glass border-t flex justify-around items-center h-20 bg-white/95 z-50">
            <button onclick="navigate('home', 'ConnectPro', this)" class="nav-item nav-active flex flex-col items-center"><i class="fa-solid fa-house text-xl"></i></button>
            <button onclick="navigate('search', 'Cari', this)" class="nav-item text-slate-400 flex flex-col items-center"><i class="fa-solid fa-magnifying-glass text-xl"></i></button>
            <button onclick="navigate('history', 'History', this)" class="nav-item text-slate-400 flex flex-col items-center"><i class="fa-solid fa-clock-rotate-left text-xl"></i></button>
            <button onclick="navigate('profile', 'Profil', this)" class="nav-item text-slate-400 flex flex-col items-center"><i class="fa-solid fa-circle-user text-xl"></i></button>
        </nav>
    </div>

    <div id="chat-screen" class="hidden fixed inset-0 z-[100] bg-slate-50 flex flex-col max-w-lg mx-auto">
        <header class="p-5 flex items-center justify-between bg-white border-b shadow-sm">
            <div class="flex items-center gap-4">
                <button onclick="closeChat()" class="text-slate-400"><i class="fa-solid fa-chevron-left text-xl"></i></button>
                <img id="chat-avatar" class="w-10 h-10 rounded-full object-cover bg-slate-100">
                <div class="flex-1">
                    <h4 id="chat-name" class="font-bold text-slate-800 leading-none"></h4>
                    <p class="text-[10px] text-blue-500 font-bold uppercase mt-1">Online</p>
                </div>
            </div>
            <div class="flex items-center gap-5 pr-2">
                <button onclick="startCall('voice')" class="text-slate-400 hover:text-blue-600 transition"><i class="fa-solid fa-phone text-lg"></i></button>
                <button onclick="startCall('video')" class="text-slate-400 hover:text-blue-600 transition"><i class="fa-solid fa-video text-lg"></i></button>
            </div>
        </header>

        <div id="chat-messages" class="flex-1 overflow-y-auto p-4 space-y-4 hide-scroll"></div>

        <div id="emoji-container" class="hidden absolute bottom-24 left-4 z-[110]"></div>

        <div class="p-4 bg-white border-t flex items-center gap-2">
            <button id="emoji-btn" class="text-slate-400 p-2 hover:text-blue-600 transition">
                <i class="fa-solid fa-face-smile text-2xl"></i>
            </button>
            <input type="text" id="chat-input" placeholder="Tulis pesan..." class="flex-1 p-3 bg-slate-100 rounded-2xl outline-none font-bold text-sm">
            
            <button id="vn-btn" onmousedown="startRecording()" onmouseup="stopRecording()" 
                class="bg-slate-100 text-slate-500 w-12 h-12 rounded-2xl flex items-center justify-center transition active:bg-red-50 active:text-red-500">
                <i class="fa-solid fa-microphone text-lg"></i>
            </button>

            <button onclick="sendMessage()" class="bg-blue-600 text-white w-12 h-12 rounded-2xl flex items-center justify-center shadow-lg active:scale-90 transition">
                <i class="fa-solid fa-paper-plane"></i>
            </button>
        </div>
    </div>

    <div id="story-view-screen" class="hidden fixed inset-0 z-[200] bg-black flex flex-col items-center justify-center">
        <div class="w-full max-w-lg h-full relative">
            <div id="progress-container" class="progress-container"></div>
            <div class="absolute top-8 left-0 right-0 px-4 flex justify-between items-center z-[110]">
                <div class="flex items-center gap-3">
                    <img id="viewer-avatar" src="" class="w-10 h-10 rounded-full border border-white">
                    <span id="viewer-name" class="text-white font-bold text-sm"></span>
                </div>
                <div class="flex items-center gap-2">
                    <button id="btn-delete-story" onclick="deleteCurrentStory()" class="hidden text-white/50 hover:text-red-500 p-2"><i class="fa-solid fa-trash-can"></i></button>
                    <button onclick="closeStoryViewer()" class="text-white p-2"><i class="fa-solid fa-xmark text-3xl"></i></button>
                </div>
            </div>
            <div class="absolute inset-0 flex z-[105]"><div class="w-1/3 h-full" onclick="prevSlide()"></div><div class="w-2/3 h-full" onclick="nextSlide()"></div></div>
            <div class="h-full flex items-center justify-center bg-zinc-900">
                <img id="view-img" class="hidden max-w-full max-h-full object-contain">
                <video id="view-vid" class="hidden max-w-full max-h-full" playsinline></video>
                <div id="view-text" class="hidden text-white text-3xl font-black text-center px-10"></div>
            </div>
            <div class="absolute bottom-12 left-0 right-0 px-6 text-center z-[110]"><p id="view-caption" class="text-white text-sm bg-black/50 p-4 rounded-3xl inline-block max-w-[80%]"></p></div>
        </div>
    </div>

    <div id="story-modal" class="hidden fixed inset-0 z-[150] bg-black/70 flex items-end justify-center p-4">
        <div class="bg-white w-full max-w-md rounded-[35px] p-6">
            <div class="flex justify-between items-center mb-6"><h3 class="text-xl font-black uppercase tracking-tighter">Post Story</h3><button onclick="closeStoryModal()" class="text-slate-400"><i class="fa-solid fa-xmark text-xl"></i></button></div>
            <label class="w-full flex flex-col items-center justify-center py-10 border-2 border-dashed border-slate-200 rounded-3xl cursor-pointer">
                <i class="fa-solid fa-cloud-arrow-up text-4xl text-blue-500 mb-2"></i>
                <p id="preview-text" class="text-xs font-bold text-slate-500 uppercase">Pilih Media</p>
                <input type="file" id="story-file" accept="image/*,video/*" class="hidden" onchange="handleFilePreview(this)">
            </label>
            <textarea id="story-caption" placeholder="Ketik sesuatu..." class="w-full p-4 bg-slate-100 rounded-2xl outline-none min-h-[100px] mt-4 font-bold text-sm"></textarea>
            <button id="btn-upload" onclick="uploadStory()" class="w-full bg-blue-600 text-white font-black py-4 rounded-2xl mt-4 shadow-lg active:scale-95 transition">UPLOAD</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, onAuthStateChanged, signInWithEmailAndPassword, createUserWithEmailAndPassword, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, getDoc, updateDoc, collection, addDoc, onSnapshot, query, orderBy, where, deleteDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
        import { getStorage, ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-storage.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBSo0nFUKNBDmUX0wSFV_idAFWBRnnTcXE",
            authDomain: "fotobooth-e36ab.firebaseapp.com",
            projectId: "fotobooth-e36ab",
            storageBucket: "fotobooth-e36ab.firebasestorage.app",
            messagingSenderId: "1040239629485",
            appId: "1:1040239629485:web:254a7b50a4243b6c5d6224"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const storage = getStorage(app);

        let myData = null, targetUser = null, mediaRecorder, audioChunks = [];

        // --- AUTH & NAVIGATION ---
        // (Sama seperti kodemu, disingkat untuk efisiensi pesan)
        window.toggleAuth = (is) => { document.getElementById('register-container').classList.toggle('hidden', !is); document.getElementById('login-container').classList.toggle('hidden', is); };
        window.handleLogin = async () => { /* ... logika login ... */ };
        window.logout = () => signOut(auth);
        window.navigate = (p, t, el) => {
            document.querySelectorAll('.page-content').forEach(pc => pc.classList.remove('active'));
            document.getElementById('page-' + p).classList.add('active');
            document.getElementById('page-title').innerText = t;
            document.querySelectorAll('.nav-item').forEach(i => i.classList.replace('text-blue-600', 'text-slate-400'));
            el.classList.replace('text-slate-400', 'text-blue-600');
        };

        // --- CHAT SYSTEM (LOAD & SEND) ---
        window.openChat = (uid, nama, photo) => {
            targetUser = { uid, nama, photo };
            document.getElementById('chat-screen').classList.remove('hidden');
            document.getElementById('chat-name').innerText = nama;
            document.getElementById('chat-avatar').src = photo;
            loadMessages();
        };

        window.closeChat = () => document.getElementById('chat-screen').classList.add('hidden');

        function loadMessages() {
            if (!targetUser) return;
            const roomId = [auth.currentUser.uid, targetUser.uid].sort().join("_");
            const q = query(collection(db, "chats"), where("room", "==", roomId));

            onSnapshot(q, (snap) => {
                const box = document.getElementById('chat-messages');
                box.innerHTML = "";
                const docs = [];
                snap.forEach(d => docs.push(d.data()));
                docs.sort((a, b) => (a.time?.seconds || 0) - (b.time?.seconds || 0));

                docs.forEach(m => {
                    const isMe = m.sender === auth.currentUser.uid;
                    const div = document.createElement('div');
                    div.className = `flex ${isMe ? 'justify-end' : 'justify-start'}`;
                    
                    // Render konten berdasarkan tipe (Teks atau VN)
                    const content = m.type === 'vn' 
                        ? `<audio src="${m.fileUrl}" controls class="max-w-[200px]"></audio>` 
                        : m.text;

                    div.innerHTML = `<div class="max-w-[80%] p-4 text-sm font-bold shadow-sm ${isMe ? 'chat-bubble-me' : 'chat-bubble-them'}">${content}</div>`;
                    box.appendChild(div);
                });
                box.scrollTop = box.scrollHeight;
            });
        }

        window.sendMessage = async () => {
            const input = document.getElementById('chat-input');
            const val = input.value.trim();
            if(!val || !targetUser) return;
            await addDoc(collection(db, "chats"), {
                room: [auth.currentUser.uid, targetUser.uid].sort().join("_"),
                sender: auth.currentUser.uid,
                text: val,
                type: 'text',
                time: serverTimestamp()
            });
            input.value = "";
        };

        // --- VOICE NOTE (VN) ---
        window.startRecording = async () => {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                mediaRecorder = new MediaRecorder(stream);
                audioChunks = [];
                mediaRecorder.ondataavailable = (e) => audioChunks.push(e.data);
                mediaRecorder.onstop = async () => {
                    const blob = new Blob(audioChunks, { type: 'audio/webm' });
                    const r = ref(storage, `vn/${Date.now()}.webm`);
                    await uploadBytes(r, blob);
                    const url = await getDownloadURL(r);
                    await addDoc(collection(db, "chats"), {
                        room: [auth.currentUser.uid, targetUser.uid].sort().join("_"),
                        sender: auth.currentUser.uid,
                        text: "Voice Note",
                        type: "vn",
                        fileUrl: url,
                        time: serverTimestamp()
                    });
                };
                mediaRecorder.start();
                document.getElementById('vn-btn').classList.replace('bg-slate-100', 'bg-red-500');
                document.getElementById('vn-btn').classList.replace('text-slate-500', 'text-white');
            } catch (e) { alert("Akses mic ditolak!"); }
        };

        window.stopRecording = () => {
            if(mediaRecorder && mediaRecorder.state === "recording") {
                mediaRecorder.stop();
                document.getElementById('vn-btn').classList.replace('bg-red-500', 'bg-slate-100');
                document.getElementById('vn-btn').classList.replace('text-white', 'text-slate-500');
            }
        };

        // --- CALL & VC ---
        window.startCall = async (type) => {
            if(!targetUser) return;
            alert(`Memanggil ${targetUser.nama} via ${type}...`);
            await addDoc(collection(db, "call_history"), {
                uid: targetUser.uid,
                callerName: myData.nama,
                status: type === 'video' ? 'Video Call' : 'Voice Call',
                timestamp: serverTimestamp()
            });
        };

        // --- EMOJI APPLE ---
        const picker = new EmojiMart.Picker({
            data: async () => { const r = await fetch('https://cdn.jsdelivr.net/npm/@emoji-mart/data'); return r.json(); },
            set: 'apple',
            onEmojiSelect: (emoji) => { document.getElementById('chat-input').value += emoji.native; },
            theme: 'light'
        });
        document.getElementById('emoji-container').appendChild(picker);
        document.getElementById('emoji-btn').onclick = (e) => {
            e.stopPropagation();
            document.getElementById('emoji-container').classList.toggle('hidden');
        };

        // --- SESSION CHECK ---
        onAuthStateChanged(auth, async (u) => {
            if(u) {
                document.getElementById('auth-screen').classList.add('hidden');
                document.getElementById('main-app').classList.remove('hidden');
                const s = await getDoc(doc(db, "users", u.uid));
                myData = s.data();
                document.getElementById('header-photo').src = myData.photo;
                // (Muat chat list & story di sini sesuai kodemu)
            } else {
                document.getElementById('auth-screen').classList.remove('hidden');
                document.getElementById('main-app').classList.add('hidden');
            }
        });

    </script>
</body>
</html>
