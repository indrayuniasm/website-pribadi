<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ConnectPro - Chat, Search & Story</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; overflow: hidden; }
        .hide-scroll::-webkit-scrollbar { display: none; }
        .glass { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(15px); }
        #main-app { height: 100dvh; }
        .page-content { display: none; height: 100%; overflow-y: auto; }
        .page-content.active { display: block; }
        .nav-active { color: #2563eb !important; transform: scale(1.1); }
        .progress-fill { height: 100%; background: #fff; width: 0%; transition: width linear; }
        .chat-bubble-me { border-radius: 20px 20px 4px 20px; background: #2563eb; color: white; }
        .chat-bubble-them { border-radius: 20px 20px 20px 4px; background: white; color: #1e293b; border: 1px solid #e2e8f0; }
    </style>
</head>
<body class="bg-slate-100">

    <div id="auth-screen" class="min-h-screen flex items-center justify-center p-4">
        <div class="bg-white w-full max-w-md rounded-[40px] shadow-2xl p-8">
            <div id="login-container">
                <h2 class="text-3xl font-black mb-2 text-slate-800 tracking-tighter">ConnectPro 👋</h2>
                <p class="text-slate-500 mb-8 text-sm font-bold">Masuk untuk terhubung dengan ID teman.</p>
                <div class="space-y-4">
                    <input type="text" id="login-id" placeholder="ID User" class="w-full p-4 bg-slate-100 rounded-2xl outline-none focus:ring-2 focus:ring-blue-500">
                    <input type="password" id="login-pass" placeholder="Password" class="w-full p-4 bg-slate-100 rounded-2xl outline-none focus:ring-2 focus:ring-blue-500">
                    <button onclick="handleLogin()" class="w-full bg-blue-600 text-white font-extrabold py-4 rounded-2xl shadow-lg active:scale-95 transition">Masuk</button>
                </div>
                <p class="text-center mt-8 text-slate-500 text-sm">Belum punya akun? <a href="#" onclick="toggleAuth(true)" class="text-blue-600 font-bold">Daftar</a></p>
            </div>
            <div id="register-container" class="hidden">
                <h2 class="text-3xl font-black mb-6 text-emerald-500 tracking-tighter">Buat Akun</h2>
                <div class="space-y-3">
                    <input type="text" id="reg-nama" placeholder="Nama Lengkap" class="w-full p-4 bg-slate-100 rounded-2xl outline-none">
                    <input type="text" id="reg-id" placeholder="ID User (indra123)" class="w-full p-4 bg-slate-100 rounded-2xl outline-none">
                    <input type="password" id="reg-pass" placeholder="Password" class="w-full p-4 bg-slate-100 rounded-2xl outline-none">
                    <button onclick="handleRegister()" class="w-full bg-emerald-500 text-white font-bold py-4 rounded-2xl shadow-lg mt-4 active:scale-95 transition">Daftar Sekarang</button>
                </div>
                <p class="text-center mt-6 text-sm"><a href="#" onclick="toggleAuth(false)" class="text-blue-600 font-bold">Kembali ke Login</a></p>
            </div>
        </div>
    </div>

    <div id="main-app" class="hidden flex flex-col max-w-lg mx-auto bg-white shadow-2xl relative overflow-hidden">
        
        <header id="header-main" class="p-6 flex justify-between items-center border-b bg-white z-20">
            <h1 id="page-title" class="text-2xl font-black text-blue-600 leading-none">ConnectPro</h1>
            <div class="flex items-center gap-3">
                <img id="my-photo" src="" class="w-10 h-10 rounded-full border-2 border-white shadow-md object-cover bg-slate-200">
                <button onclick="logout()" class="text-slate-300 hover:text-red-500 transition"><i class="fa-solid fa-power-off"></i></button>
            </div>
        </header>

        <div class="flex-1 relative overflow-hidden bg-slate-50">
            <div id="page-home" class="page-content active">
                <div class="p-4 flex gap-4 overflow-x-auto hide-scroll border-b bg-white">
                    <div onclick="openStoryModal()" class="flex flex-col items-center gap-1 min-w-[70px] cursor-pointer group">
                        <div class="w-14 h-14 rounded-2xl bg-blue-50 flex items-center justify-center text-blue-600 border-2 border-dashed border-blue-200 group-hover:bg-blue-100 transition">
                            <i class="fa-solid fa-plus"></i>
                        </div>
                        <span class="text-[10px] font-bold text-slate-500 uppercase">Story</span>
                    </div>
                    <div id="online-list" class="flex gap-4"></div>
                </div>
                <div class="p-10 text-center text-slate-300 mt-20">
                    <i class="fa-solid fa-house-chimney text-6xl mb-4 opacity-10"></i>
                    <p class="text-sm font-bold opacity-40">Beranda Berhasil Dimuat.</p>
                </div>
            </div>

            <div id="page-search" class="page-content p-4">
                <div class="relative mb-6">
                    <input type="text" id="search-input" oninput="searchUser()" placeholder="Cari ID Teman..." 
                        class="w-full p-4 pl-12 bg-white rounded-[24px] outline-none focus:ring-2 focus:ring-blue-500 shadow-sm border border-slate-100">
                    <i class="fa-solid fa-magnifying-glass absolute left-5 top-1/2 -translate-y-1/2 text-slate-400"></i>
                </div>
                <div id="search-result" class="space-y-3"></div>
            </div>

            <div id="page-history" class="page-content p-4">
                <h3 class="font-black text-slate-800 text-lg mb-4 uppercase">Riwayat Panggilan</h3>
                <div id="history-list" class="space-y-3 pb-24"></div>
            </div>
        </div>

        <nav id="footer-nav" class="fixed bottom-0 left-0 right-0 max-w-lg mx-auto glass border-t flex justify-around items-center p-3 h-16 md:h-20 bg-white/95 z-50">
            <button onclick="navigate('home', 'ConnectPro', this)" class="nav-item nav-active flex flex-col items-center justify-center">
                <i class="fa-solid fa-house text-xl md:text-2xl"></i>
                <span class="text-[8px] md:text-[10px] font-bold uppercase mt-1">Beranda</span>
            </button>
            <button onclick="navigate('search', 'Cari Teman', this)" class="nav-item text-slate-400 flex flex-col items-center justify-center">
                <i class="fa-solid fa-magnifying-glass text-xl md:text-2xl"></i>
                <span class="text-[8px] md:text-[10px] font-bold uppercase mt-1">Search</span>
            </button>
            <button onclick="navigate('history', 'History', this)" class="nav-item text-slate-400 flex flex-col items-center justify-center">
                <i class="fa-solid fa-clock-rotate-left text-xl md:text-2xl"></i>
                <span class="text-[8px] md:text-[10px] font-bold uppercase mt-1">History</span>
            </button>
        </nav>
    </div>

    <div id="chat-screen" class="hidden fixed inset-0 z-[100] bg-slate-50 flex flex-col max-w-lg mx-auto shadow-2xl">
        <header class="p-5 flex items-center gap-4 bg-white border-b shadow-sm">
            <button onclick="closeChat()" class="text-slate-400 hover:text-slate-800"><i class="fa-solid fa-chevron-left text-xl"></i></button>
            <img id="chat-avatar" class="w-10 h-10 rounded-full object-cover">
            <div>
                <h4 id="chat-name" class="font-bold text-slate-800 leading-none"></h4>
                <p class="text-[10px] text-blue-500 font-bold uppercase">Sedang Chatting</p>
            </div>
        </header>
        <div id="chat-messages" class="flex-1 overflow-y-auto p-4 space-y-4 pb-20"></div>
        <div class="p-4 bg-white border-t flex gap-3">
            <input type="text" id="chat-input" placeholder="Tulis pesan..." class="flex-1 p-4 bg-slate-100 rounded-2xl outline-none">
            <button onclick="sendMessage()" class="bg-blue-600 text-white w-14 h-14 rounded-2xl flex items-center justify-center shadow-lg active:scale-90 transition">
                <i class="fa-solid fa-paper-plane text-xl"></i>
            </button>
        </div>
    </div>

    <div id="story-view-screen" class="hidden fixed inset-0 z-[200] bg-black">
        </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, onAuthStateChanged, signInWithEmailAndPassword, createUserWithEmailAndPassword, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, getDoc, collection, addDoc, onSnapshot, query, orderBy, where, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBSo0nFUKNBDmUX0wSFV_idAFWBRnnTcXE",
            authDomain: "fotobooth-e36ab.firebaseapp.com",
            projectId: "fotobooth-e36ab",
            storageBucket: "fotobooth-e36ab.firebasestorage.app",
            messagingSenderId: "1040239629485",
            appId: "1:1040239629485:web:254a7b50a4243b6c5d6224"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        let myData = null, targetUser = null;

        // --- NAVIGASI ---
        window.navigate = (page, title, el) => {
            document.querySelectorAll('.page-content').forEach(p => p.classList.remove('active'));
            document.getElementById('page-' + page).classList.add('active');
            document.getElementById('page-title').innerText = title;
            document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('nav-active', 'text-blue-600'));
            document.querySelectorAll('.nav-item').forEach(i => i.classList.add('text-slate-400'));
            el.classList.add('nav-active'); el.classList.remove('text-slate-400');
            if(page === 'history') loadHistory();
        };

        // --- SEARCH SYSTEM ---
        window.searchUser = async () => {
            const id = document.getElementById('search-input').value.trim().toLowerCase();
            const res = document.getElementById('search-result');
            if(id.length < 3) return res.innerHTML = "";
            
            const q = query(collection(db, "users"), where("id", "==", id));
            onSnapshot(q, (snap) => {
                res.innerHTML = snap.empty ? `<p class="text-center py-10 text-slate-400">ID tidak ditemukan.</p>` : "";
                snap.forEach(d => {
                    const u = d.data();
                    const div = document.createElement('div');
                    div.className = "bg-white p-4 rounded-3xl flex items-center justify-between border border-slate-100 shadow-sm";
                    div.innerHTML = `
                        <div class="flex items-center gap-3">
                            <img src="${u.photo}" class="w-12 h-12 rounded-2xl object-cover">
                            <div><h4 class="font-bold text-slate-800">${u.nama}</h4><p class="text-[10px] text-blue-500 font-bold uppercase">@${u.id}</p></div>
                        </div>
                        <button onclick="openChat('${u.uid}', '${u.nama}', '${u.photo}')" class="bg-blue-600 text-white px-5 py-2 rounded-2xl font-black text-xs active:scale-90 transition">CHAT</button>
                    `;
                    res.appendChild(div);
                });
            });
        };

        // --- CHAT SYSTEM ---
        window.openChat = (uid, nama, photo) => {
            targetUser = { uid, nama, photo };
            document.getElementById('chat-screen').classList.remove('hidden');
            document.getElementById('chat-name').innerText = nama;
            document.getElementById('chat-avatar').src = photo;
            loadMessages();
        };

        window.closeChat = () => document.getElementById('chat-screen').classList.add('hidden');

        function loadMessages() {
            const room = [auth.currentUser.uid, targetUser.uid].sort().join("_");
            const q = query(collection(db, "chats"), where("room", "==", room), orderBy("time", "asc"));
            onSnapshot(q, (snap) => {
                const box = document.getElementById('chat-messages'); box.innerHTML = "";
                snap.forEach(d => {
                    const m = d.data();
                    const me = m.sender === auth.currentUser.uid;
                    box.innerHTML += `<div class="flex ${me ? 'justify-end' : 'justify-start'}">
                        <div class="max-w-[80%] p-4 text-sm font-bold shadow-sm ${me ? 'chat-bubble-me' : 'chat-bubble-them'}">${m.text}</div>
                    </div>`;
                });
                box.scrollTop = box.scrollHeight;
            });
        }

        window.sendMessage = async () => {
            const input = document.getElementById('chat-input');
            if(!input.value.trim()) return;
            const room = [auth.currentUser.uid, targetUser.uid].sort().join("_");
            await addDoc(collection(db, "chats"), {
                room, sender: auth.currentUser.uid, text: input.value, time: serverTimestamp()
            });
            input.value = "";
        };

        // --- AUTH & INITIAL ---
        onAuthStateChanged(auth, async (u) => {
            if(u) {
                document.getElementById('auth-screen').classList.add('hidden');
                document.getElementById('main-app').classList.remove('hidden');
                const s = await getDoc(doc(db, "users", u.uid)); 
                myData = s.data();
                document.getElementById('my-photo').src = myData.photo;
            } else {
                document.getElementById('auth-screen').classList.remove('hidden');
                document.getElementById('main-app').classList.add('hidden');
            }
        });

        window.handleLogin = async () => { /* Logika Login Seperti Sebelumnya */ };
        window.handleRegister = async () => { /* Logika Register Seperti Sebelumnya */ };
        window.logout = () => signOut(auth);
    </script>
</body>
    </html>
