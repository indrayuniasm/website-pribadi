<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>game catur</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/chessboard-js/1.0.0/chessboard-1.0.0.min.css">
    <script src="https://code.jquery.com/jquery-3.5.1.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/chessboard-js/1.0.0/chessboard-1.0.0.min.js"></script>

    <style>
        :root { --bg: #121212; --card: #242424; --accent: #00b894; }
        body { background: var(--bg); color: white; font-family: 'Segoe UI', sans-serif; display: flex; flex-direction: column; align-items: center; padding: 20px; margin: 0; }
        
        #board { width: 380px; box-shadow: 0 10px 25px rgba(0,0,0,0.5); border-radius: 4px; overflow: hidden; }
        
        /* Gaya Titik Petunjuk Langkah */
        .legal-move-hint {
            width: 20px; height: 20px; background: rgba(0, 0, 0, 0.15); border-radius: 50%;
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            border: 2px solid rgba(0,0,0,0.2);
        }
        .highlight-selected { background: rgba(255, 255, 0, 0.4) !important; }

        .sidebar { background: var(--card); padding: 20px; border-radius: 12px; width: 380px; margin-top: 20px; box-sizing: border-box; }
        #status { font-weight: bold; font-size: 1.1em; color: var(--accent); margin-bottom: 15px; display: block; }
        
        select, button { width: 100%; padding: 12px; margin-top: 10px; border-radius: 6px; border: none; font-weight: bold; cursor: pointer; }
        select { background: #333; color: white; }
        button { background: var(--accent); color: white; }
        button.undo { background: #636e72; }
    </style>
</head>
<body>

    <div id="board"></div>

    <div class="sidebar">
        <span id="status">Putih (Anda) Melangkah</span>
        
        <label style="font-size: 0.8em; color: #888;">Pilih kesulitan:</label>
        <select id="difficulty">
            <option value="1">Mudah</option>
            <option value="2" selected>Normal</option>
            <option value="3">Sulit</option>
        </select>

        <button onclick="resetGame()">Main Ulang</button>
        <button class="undo" onclick="undoMove()">Tarik Langkah (Undo)</button>
    </div>

<script>
    var board = null;
    var game = new Chess();
    var selectedSquare = null;

    // --- LOGIKA AI (MINIMAX RINGAN) ---
    function evaluateBoard(game) {
        var total = 0;
        var vals = {p: 10, n: 30, b: 30, r: 50, q: 90, k: 900};
        game.board().forEach(row => {
            row.forEach(p => { if(p) total += (p.color === 'w' ? -vals[p.type] : vals[p.type]); });
        });
        return total;
    }

    function aiMove() {
        var moves = game.moves();
        if (game.game_over()) return;

        var depth = $('#difficulty').val();
        // Sederhananya kita ambil langkah terbaik berdasarkan evaluasi dasar
        moves.sort(() => Math.random() - 0.5); 
        var bestMove = moves[0];
        var bestVal = -9999;

        for (var i = 0; i < moves.length; i++) {
            game.move(moves[i]);
            var val = evaluateBoard(game);
            game.undo();
            if (val > bestVal) { bestVal = val; bestMove = moves[i]; }
        }

        game.move(bestMove);
        board.position(game.fen());
        updateStatus();
    }

    // --- LOGIKA KLIK & PETUNJUK ---
    function removeHighlights() {
        $('#board .square-55d63').removeClass('highlight-selected');
        $('.legal-move-hint').remove();
    }

    function onSquareClick(square) {
        // 1. Jika sudah ada yang dipilih, coba jalan ke petak yang diklik
        if (selectedSquare) {
            var move = game.move({
                from: selectedSquare,
                to: square,
                promotion: 'q'
            });

            if (move !== null) {
                board.position(game.fen());
                selectedSquare = null;
                removeHighlights();
                updateStatus();
                window.setTimeout(aiMove, 600);
                return;
            }
        }

        // 2. Pilih bidak (hanya jika itu bidak putih)
        removeHighlights();
        var piece = game.get(square);
        if (piece && piece.color === 'w') {
            selectedSquare = square;
            $('#board .square-' + square).addClass('highlight-selected');
            
            // Tampilkan titik petunjuk
            var moves = game.moves({ square: square, verbose: true });
            moves.forEach(m => {
                $('#board .square-' + m.to).append('<div class="legal-move-hint"></div>');
            });
        } else {
            selectedSquare = null;
        }
    }

    function updateStatus() {
        var status = "Giliran: " + (game.turn() === 'w' ? "Putih (Anda)" : "Hitam (AI)");
        if (game.in_checkmate()) status = "SKAKMAT! Game Selesai.";
        else if (game.in_draw()) status = "REMIS / DRAW.";
        else if (game.in_check()) status += " (SKAK!)";
        $('#status').text(status);
    }

    function resetGame() {
        game.reset();
        board.start();
        removeHighlights();
        updateStatus();
    }

    function undoMove() {
        game.undo(); game.undo();
        board.position(game.fen());
        removeHighlights();
        updateStatus();
    }

    // Inisialisasi
    board = Chessboard('board', {
        position: 'start',
        pieceTheme: 'https://chessboardjs.com/img/chesspieces/wikipedia/{piece}.png'
    });

    // Pasang Event Klik
    $(document).on('click', '.square-55d63', function() {
        var square = $(this).attr('data-square');
        onSquareClick(square);
    });

    updateStatus();
</script>
</body>
</html>
