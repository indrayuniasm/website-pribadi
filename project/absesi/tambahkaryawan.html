<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Tambah Karyawan By Indra</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        /*buat doraemon*/
    #doraemonFace { width: 180px; height: 180px; margin: 0 auto 2rem auto; }
    .eye { fill: white; stroke: #004a7c; stroke-width: 2; transition: all 0.3s ease; transform-origin: center; }
    .pupil { fill: black; transition: all 0.3s ease; }
    .eye.closed { ry: 2 !important; fill: #004a7c !important; stroke-width: 0 !important; }
    .pupil.closed { opacity: 0 !important; }
    #nose { fill: #e60012; transition: transform 0.3s ease; transform-origin: center; }
    .wiggle { animation: wiggle 0.4s ease-in-out 3; }
    @keyframes wiggle {
      0%, 100% { transform: rotate(0deg); }
      25% { transform: rotate(15deg); }
      50% { transform: rotate(-15deg); }
      75% { transform: rotate(15deg); }
    }

      .font-pacifico {
      font-family: 'Pacifico', cursive;
    }
      .highlight {
      color: #e91e63;
      font-weight: bold;
    }
    </style>
</head>
<body class="bg-gray-100 p-10 min-h-screen">
    <section id="authPage" class="flex items-center justify-center py-10 px-4">
  <div class="bg-white rounded-3xl shadow-2xl max-w-5xl w-full p-8 grid grid-cols-1 lg:grid-cols-3 gap-10">
    <!-- Doraemon Face -->
    <div class="lg:col-span-1 flex flex-col items-center">
      <div id="doraemonFace">
        <svg width="180" height="180" viewBox="0 0 180 180">
          <circle cx="90" cy="90" r="85" fill="#00a0de" stroke="#004a7c" stroke-width="4"/>
          <circle cx="90" cy="110" r="65" fill="white"/>
          <circle id="nose" cx="90" cy="85" r="12"/>
          <ellipse id="leftEye" class="eye" cx="60" cy="70" rx="18" ry="25"/>
          <ellipse id="rightEye" class="eye" cx="120" cy="70" rx="18" ry="25"/>
          <circle id="leftPupil" class="pupil" cx="60" cy="80" r="9"/>
          <circle id="rightPupil" class="pupil" cx="120" cy="80" r="9"/>
          <path id="mouth" d="M50 120 Q90 130 130 120" stroke="#a3000a" stroke-width="4" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </div>
      <p class="mt-4 text-center text-indigo-800 font-semibold">Hi admin ku yang baik hati</p>
    </div>

    <!-- Login Form -->
    <div class="lg:col-span-1 bg-indigo-50 rounded-2xl p-6">
      <h2 class="text-2xl text-center font-semibold text-indigo-700 mb-6">Login</h2>
      <form id="loginForm" class="space-y-4">
        <input type="email" id="loginEmail" placeholder="Email" required class="w-full px-4 py-2 border rounded-lg" />
        <input type="password" id="loginPassword" placeholder="Password" required class="w-full px-4 py-2 border rounded-lg" />
        <button type="submit" class="w-full bg-indigo-600 text-white py-2 rounded-lg hover:bg-indigo-700">Login</button>
        <p id="loginErrorMsg" class="text-red-600 text-center hidden">Email atau password salah</p>
      </form>
    </div>
  </div>
</section>

<section id="mainPage" class="hidden">
    <div class="max-w-lg mx-auto bg-white p-8 rounded-3xl shadow-lg">
        <h2 class="text-2xl font-bold mb-6 text-blue-700">Registrasi Karyawan</h2>
        
        <div class="space-y-4">
            <input type="text" id="nama" placeholder="Nama Lengkap" class="w-full p-3 border rounded-xl">
            <input type="text" id="id_karyawan" placeholder="ID Karyawan (Misal: 628089)" class="w-full p-3 border rounded-xl">
            
            <button onclick="generateDanSimpan()" class="w-full bg-blue-600 text-white py-3 rounded-xl font-bold">
                Daftarkan & Bikin Barcode
            </button>
        </div>

        <div id="hasil-qr" class="mt-10 hidden text-center border-t pt-6">
            <div id="qrcode" class="flex justify-center mb-4"></div>
            <p id="info-nama" class="font-bold text-lg text-gray-800"></p>
            <p class="text-sm text-gray-500 mb-4">Klik kanan pada gambar QR untuk simpan/cetak</p>
            <button onclick="location.reload()" class="text-blue-500 text-sm underline">Tambah Karyawan Lain</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-app.js";
        import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-firestore.js";

        // CONFIG MILIKMU (SAMAKAN DENGAN INDEX.HTML)
        const firebaseConfig = {
            apiKey: "AIzaSyB-GSKbvVTc2e_6sGnL2WSPNU19wUd6BYQ",
            authDomain: "bukber-9d73f.firebaseapp.com",
            projectId: "bukber-9d73f",
            storageBucket: "bukber-9d73f.firebasestorage.app",
            messagingSenderId: "86991458584",
            appId: "1:86991458584:web:6ce66640bcb7fe45ba8e6d"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        window.generateDanSimpan = async function() {
            const nama = document.getElementById('nama').value;
            const idKar = document.getElementById('id_karyawan').value;

            if(!nama || !idKar) return Swal.fire('Error', 'Isi nama dan ID dulu!', 'error');

            try {
                // 1. Simpan data ke Firebase agar bisa di-scan nantinya
                await addDoc(collection(db, "employees"), {
                    name: nama,
                    barcode: idKar,
                    createdAt: new Date().toISOString()
                });

                // 2. Munculkan QR Code di layar
                document.getElementById('hasil-qr').classList.remove('hidden');
                document.getElementById('info-nama').innerText = nama;
                
                new QRCode(document.getElementById("qrcode"), {
                    text: idKar, // Ini yang akan dibaca scanner
                    width: 180,
                    height: 180
                });

                Swal.fire('Berhasil!', 'Karyawan terdaftar dan QR dibuat.', 'success');
            } catch (e) {
                Swal.fire('Gagal', e.message, 'error');
            }
        }
    </script>
     <script>
        const passwordInput = document.getElementById('loginPassword');
  const leftEye = document.getElementById('leftEye');
  const rightEye = document.getElementById('rightEye');
  const leftPupil = document.getElementById('leftPupil');
  const rightPupil = document.getElementById('rightPupil');

  // Doraemon eye animation
  passwordInput.addEventListener('focus', () => {
    leftEye.classList.add('closed');
    rightEye.classList.add('closed');
    leftPupil.classList.add('closed');
    rightPupil.classList.add('closed');
  });

  passwordInput.addEventListener('blur', () => {
    leftEye.classList.remove('closed');
    rightEye.classList.remove('closed');
    leftPupil.classList.remove('closed');
    rightPupil.classList.remove('closed');
  });

  const loginForm = document.getElementById('loginForm');
  const loginError = document.getElementById('loginErrorMsg');

  // Static login data
  const validEmail = "indra2005@gmail.com";
  const validPassword = "indra2005";

  // Login validation
  loginForm.addEventListener('submit', function(e) {
    e.preventDefault();
    const email = document.getElementById('loginEmail').value;
    const password = document.getElementById('loginPassword').value;

    if (email === validEmail && password === validPassword) {
      document.getElementById('authPage').classList.add('hidden');
      document.getElementById('mainPage').classList.remove('hidden');
    } else {
      loginError.classList.remove('hidden');
    }
  });
    
    menuBtn.addEventListener('click', () => {
      mobileMenu.classList.toggle('hidden');
    });

    // Form submission handling
    const form = document.getElementById('loveMessageForm');
    const thankYouMessage = document.getElementById('thankYouMessage');

    form.addEventListener('submit', (e) => {
      e.preventDefault();
      if (!form.checkValidity()) {
        form.reportValidity();
        return;
      }
      form.reset();
      thankYouMessage.classList.remove('hidden');
      setTimeout(() => {
        thankYouMessage.classList.add('hidden');
      }, 5000);
    });

         // BLOK TOMBOL
document.addEventListener("keydown", function(e) {

    // F12
    if (e.key === "F12") {
        e.preventDefault();
        location.reload();
    }

    // CTRL+U
    if (e.ctrlKey && e.key.toLowerCase() === "u") {
        e.preventDefault();
    }

    // CTRL+S
    if (e.ctrlKey && e.key.toLowerCase() === "s") {
        e.preventDefault();
    }

    // CTRL+SHIFT+I / CTRL+SHIFT+C / CTRL+SHIFT+J
    if (e.ctrlKey && e.shiftKey && ["I","C","J"].includes(e.key)) {
        e.preventDefault();
        location.reload();
    }
});


// BLOK KLIK KANAN
document.addEventListener("contextmenu", function(e){
    e.preventDefault();
});
    </script>
</body>
</html>
