<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel - By Indra</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        /*buat doraemon*/
    #doraemonFace { width: 180px; height: 180px; margin: 0 auto 2rem auto; }
    .eye { fill: white; stroke: #004a7c; stroke-width: 2; transition: all 0.3s ease; transform-origin: center; }
    .pupil { fill: black; transition: all 0.3s ease; }
    .eye.closed { ry: 2 !important; fill: #004a7c !important; stroke-width: 0 !important; }
    .pupil.closed { opacity: 0 !important; }
    #nose { fill: #e60012; transition: transform 0.3s ease; transform-origin: center; }
    .wiggle { animation: wiggle 0.4s ease-in-out 3; }
    @keyframes wiggle {
      0%, 100% { transform: rotate(0deg); }
      25% { transform: rotate(15deg); }
      50% { transform: rotate(-15deg); }
      75% { transform: rotate(15deg); }
    }

      .font-pacifico {
      font-family: 'Pacifico', cursive;
    }
      .highlight {
      color: #e91e63;
      font-weight: bold;
    }
    </style>
</head>
<body class="bg-slate-50 font-sans min-h-screen">
<section id="authPage" class="flex items-center justify-center py-10 px-4">
  <div class="bg-white rounded-3xl shadow-2xl max-w-5xl w-full p-8 grid grid-cols-1 lg:grid-cols-3 gap-10">
    <!-- Doraemon Face -->
    <div class="lg:col-span-1 flex flex-col items-center">
      <div id="doraemonFace">
        <svg width="180" height="180" viewBox="0 0 180 180">
          <circle cx="90" cy="90" r="85" fill="#00a0de" stroke="#004a7c" stroke-width="4"/>
          <circle cx="90" cy="110" r="65" fill="white"/>
          <circle id="nose" cx="90" cy="85" r="12"/>
          <ellipse id="leftEye" class="eye" cx="60" cy="70" rx="18" ry="25"/>
          <ellipse id="rightEye" class="eye" cx="120" cy="70" rx="18" ry="25"/>
          <circle id="leftPupil" class="pupil" cx="60" cy="80" r="9"/>
          <circle id="rightPupil" class="pupil" cx="120" cy="80" r="9"/>
          <path id="mouth" d="M50 120 Q90 130 130 120" stroke="#a3000a" stroke-width="4" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </div>
      <p class="mt-4 text-center text-indigo-800 font-semibold">Hi admin ku yang baik hati</p>
    </div>

    <!-- Login Form -->
    <div class="lg:col-span-1 bg-indigo-50 rounded-2xl p-6">
      <h2 class="text-2xl text-center font-semibold text-indigo-700 mb-6">Login</h2>
      <form id="loginForm" class="space-y-4">
        <input type="email" id="loginEmail" placeholder="Email" required class="w-full px-4 py-2 border rounded-lg" />
        <input type="password" id="loginPassword" placeholder="Password" required class="w-full px-4 py-2 border rounded-lg" />
        <button type="submit" class="w-full bg-indigo-600 text-white py-2 rounded-lg hover:bg-indigo-700">Login</button>
        <p id="loginErrorMsg" class="text-red-600 text-center hidden">Email atau password salah</p>
      </form>
    </div>
  </div>
</section>

<section id="mainPage" class="hidden">

    <nav class="bg-blue-800 text-white p-4 shadow-md sticky top-0 z-50">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <h1 class="text-xl font-bold tracking-tighter">HR-SYSTEM ADMIN</h1>
            <a href="index.html" class="bg-blue-600 px-4 py-2 rounded-lg text-sm hover:bg-blue-700 transition">Buka Mesin Scan</a>
        </div>
    </nav>

    <div class="max-w-7xl mx-auto p-4 lg:p-8 grid grid-cols-1 lg:grid-cols-3 gap-8">
        
        <div class="space-y-6">
            <div class="bg-white p-6 rounded-2xl shadow-sm border border-gray-100">
                <h2 class="text-lg font-bold mb-4 text-gray-700 flex items-center">
                    <span class="mr-2">👤</span> Tambah Karyawan
                </h2>
                <div class="space-y-4">
                    <input type="text" id="addNama" placeholder="Nama Lengkap" class="w-full p-3 bg-gray-50 border rounded-xl outline-none focus:ring-2 focus:ring-blue-500">
                    <input type="text" id="addBarcode" placeholder="ID / Barcode (Misal: 1001)" class="w-full p-3 bg-gray-50 border rounded-xl outline-none focus:ring-2 focus:ring-blue-500">
                    <button onclick="simpanKaryawan()" class="w-full bg-blue-600 text-white font-bold py-3 rounded-xl hover:bg-blue-700 transition">Simpan ke Database</button>
                </div>
            </div>
        </div>

        <div class="lg:col-span-2 space-y-8">
            
            <div class="bg-white p-6 rounded-2xl shadow-sm border border-gray-100">
                <h2 class="text-lg font-bold mb-4 text-gray-700 flex items-center">
                    <span class="mr-2">📋</span> Daftar Karyawan Terdaftar
                </h2>
                <div class="overflow-x-auto max-h-60 overflow-y-auto">
                    <table class="w-full text-left border-collapse">
                        <thead>
                            <tr class="bg-gray-50 border-b">
                                <th class="p-3 text-sm font-bold text-gray-600">Nama</th>
                                <th class="p-3 text-sm font-bold text-gray-600">ID / Barcode</th>
                                <th class="p-3 text-sm font-bold text-gray-600 text-center">Aksi</th>
                            </tr>
                        </thead>
                        <tbody id="tabelKaryawan" class="divide-y">
                            </tbody>
                    </table>
                </div>
            </div>

            <div class="bg-white p-6 rounded-2xl shadow-sm border border-gray-100">
                <h2 class="text-lg font-bold mb-4 text-gray-700 flex items-center">
                    <span class="mr-2">📸</span> Log Absensi Real-Time (Hari Ini)
                </h2>
                <div class="overflow-x-auto">
                    <table class="w-full text-left">
                        <thead>
                            <tr class="bg-gray-50 border-b">
                                <th class="p-3 text-sm font-bold text-gray-600">Karyawan</th>
                                <th class="p-3 text-sm font-bold text-gray-600 text-center">Waktu</th>
                                <th class="p-3 text-sm font-bold text-gray-600 text-center">Selfie</th>
                            </tr>
                        </thead>
                        <tbody id="tabelAbsensi" class="divide-y">
                            </tbody>
                    </table>
                </div>
            </div>

        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-app.js";
        import { getFirestore, collection, doc, setDoc, onSnapshot, query, orderBy, deleteDoc } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyB-GSKbvVTc2e_6sGnL2WSPNU19wUd6BYQ",
            authDomain: "bukber-9d73f.firebaseapp.com",
            projectId: "bukber-9d73f",
            storageBucket: "bukber-9d73f.firebasestorage.app",
            messagingSenderId: "86991458584",
            appId: "1:86991458584:web:6ce66640bcb7fe45ba8e6d"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // 1. FUNGSI SIMPAN KARYAWAN (Menggunakan ID Barcode sebagai ID Dokumen)
        window.simpanKaryawan = async function() {
            const nama = document.getElementById('addNama').value;
            const barcode = document.getElementById('addBarcode').value;

            if(!nama || !barcode) return Swal.fire('Error', 'Lengkapi data!', 'error');

            try {
                // Kita gunakan setDoc agar ID di Firebase rapi (menggunakan nomor barcode)
                await setDoc(doc(db, "employees", barcode), {
                    name: nama,
                    barcode: barcode,
                    createdAt: new Date().toISOString()
                });
                Swal.fire('Berhasil', 'Karyawan terdaftar!', 'success');
                document.getElementById('addNama').value = "";
                document.getElementById('addBarcode').value = "";
            } catch (err) { Swal.fire('Gagal', err.message, 'error'); }
        };

        // 2. FUNGSI HAPUS KARYAWAN
        window.hapusKaryawan = async function(id) {
            const res = await Swal.fire({
                title: 'Hapus Karyawan?',
                text: "Karyawan ini tidak akan bisa absen lagi!",
                icon: 'warning',
                showCancelButton: true,
                confirmButtonColor: '#d33',
                confirmButtonText: 'Ya, Hapus!'
            });
            if(res.isConfirmed) {
                await deleteDoc(doc(db, "employees", id));
            }
        };

        // 3. LISTEN DATA KARYAWAN (Real-time)
        onSnapshot(collection(db, "employees"), (snap) => {
            const list = document.getElementById('tabelKaryawan');
            list.innerHTML = "";
            snap.forEach(d => {
                const data = d.data();
                list.innerHTML += `
                    <tr>
                        <td class="p-3 text-sm font-medium text-gray-800">${data.name}</td>
                        <td class="p-3 text-sm text-gray-500 font-mono">${data.barcode}</td>
                        <td class="p-3 text-center">
                            <button onclick="hapusKaryawan('${d.id}')" class="text-red-500 hover:text-red-700 text-sm font-bold">Hapus</button>
                        </td>
                    </tr>
                `;
            });
        });

        // 4. LISTEN DATA ABSENSI (Real-time)
        const qAbsen = query(collection(db, "attendance"), orderBy("time", "desc"));
        onSnapshot(qAbsen, (snap) => {
            const list = document.getElementById('tabelAbsensi');
            list.innerHTML = "";
            snap.forEach(d => {
                const data = d.data();
                list.innerHTML += `
                    <tr>
                        <td class="p-3 text-sm font-medium text-gray-800">${data.name}</td>
                        <td class="p-3 text-sm text-gray-500 text-center">${data.time}</td>
                        <td class="p-3 text-center">
                            <img src="${data.photo}" class="w-12 h-10 rounded shadow-sm mx-auto object-cover cursor-pointer hover:scale-110 transition" onclick="Swal.fire({imageUrl: '${data.photo}', title: '${data.name}'})">
                        </td>
                    </tr>
                `;
            });
        });
    </script>
    <script>
        const passwordInput = document.getElementById('loginPassword');
  const leftEye = document.getElementById('leftEye');
  const rightEye = document.getElementById('rightEye');
  const leftPupil = document.getElementById('leftPupil');
  const rightPupil = document.getElementById('rightPupil');

  // Doraemon eye animation
  passwordInput.addEventListener('focus', () => {
    leftEye.classList.add('closed');
    rightEye.classList.add('closed');
    leftPupil.classList.add('closed');
    rightPupil.classList.add('closed');
  });

  passwordInput.addEventListener('blur', () => {
    leftEye.classList.remove('closed');
    rightEye.classList.remove('closed');
    leftPupil.classList.remove('closed');
    rightPupil.classList.remove('closed');
  });

  const loginForm = document.getElementById('loginForm');
  const loginError = document.getElementById('loginErrorMsg');

  // Static login data
  const validEmail = "indra2005@gmail.com";
  const validPassword = "indra2005";

  // Login validation
  loginForm.addEventListener('submit', function(e) {
    e.preventDefault();
    const email = document.getElementById('loginEmail').value;
    const password = document.getElementById('loginPassword').value;

    if (email === validEmail && password === validPassword) {
      document.getElementById('authPage').classList.add('hidden');
      document.getElementById('mainPage').classList.remove('hidden');
    } else {
      loginError.classList.remove('hidden');
    }
  });
    
    menuBtn.addEventListener('click', () => {
      mobileMenu.classList.toggle('hidden');
    });

    // Form submission handling
    const form = document.getElementById('loveMessageForm');
    const thankYouMessage = document.getElementById('thankYouMessage');

    form.addEventListener('submit', (e) => {
      e.preventDefault();
      if (!form.checkValidity()) {
        form.reportValidity();
        return;
      }
      form.reset();
      thankYouMessage.classList.remove('hidden');
      setTimeout(() => {
        thankYouMessage.classList.add('hidden');
      }, 5000);
    });

        // BLOK TOMBOL
document.addEventListener("keydown", function(e) {

    // F12
    if (e.key === "F12") {
        e.preventDefault();
        location.reload();
    }

    // CTRL+U
    if (e.ctrlKey && e.key.toLowerCase() === "u") {
        e.preventDefault();
    }

    // CTRL+S
    if (e.ctrlKey && e.key.toLowerCase() === "s") {
        e.preventDefault();
    }

    // CTRL+SHIFT+I / CTRL+SHIFT+C / CTRL+SHIFT+J
    if (e.ctrlKey && e.shiftKey && ["I","C","J"].includes(e.key)) {
        e.preventDefault();
        location.reload();
    }
});


// BLOK KLIK KANAN
document.addEventListener("contextmenu", function(e){
    e.preventDefault();
});
    </script>
</body>
</html>
