<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WM REMOVER | IYM Project</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://cdn.tailwindcss.com"></script>

    <style>
        body {
            background-color: #050505;
            color: white;
            font-family: 'Plus Jakarta Sans', sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .gold-gradient {
            background: linear-gradient(135deg, #D4AF37 0%, #F4D03F 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(212, 175, 55, 0.2);
            border-radius: 30px;
        }

        .upload-area {
            border: 2px dashed rgba(212, 175, 55, 0.3);
            transition: all 0.3s ease;
        }

        .upload-area:hover {
            border-color: #D4AF37;
            background: rgba(212, 175, 55, 0.05);
        }

        #status-text {
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .loader {
            width: 48px;
            height: 48px;
            border: 3px solid #FFF;
            border-bottom-color: #D4AF37;
            border-radius: 50%;
            display: inline-block;
            box-sizing: border-box;
            animation: rotation 1s linear infinite;
        }

        @keyframes rotation {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body class="p-6">

    <div class="max-w-xl w-full text-center">
        <div class="mb-10">
            <h1 class="text-4xl font-extrabold gold-gradient tracking-tighter mb-2">WM REMOVER</h1>
            <p class="text-zinc-500 text-[10px] font-bold tracking-[4px] uppercase">AI Powered Watermark Eraser</p>
        </div>

        <div class="glass-card p-8 md:p-12 shadow-2xl">
            <div id="main-ui">
                <p class="text-zinc-400 text-sm mb-8 leading-relaxed">
                    Unggah gambar yang memiliki watermark. Sistem akan otomatis memproses dan mengunduh hasilnya untukmu.
                </p>

                <input type="file" id="imageInput" accept="image/*" class="hidden">
                
                <div onclick="document.getElementById('imageInput').click()" 
                    class="upload-area rounded-2xl p-10 cursor-pointer mb-6 group">
                    <i class="fa-solid fa-cloud-arrow-up text-5xl text-zinc-700 group-hover:text-gold-mid transition-colors mb-4"></i>
                    <p class="text-zinc-500 font-semibold group-hover:text-white transition-colors">Klik untuk Pilih Gambar</p>
                    <p class="text-[10px] text-zinc-600 mt-2">JPG, PNG, atau WEBP</p>
                </div>
            </div>

            <div id="loading-ui" class="hidden py-10">
                <span class="loader mb-6"></span>
                <p id="status-text" class="text-gold-mid font-bold text-xs animate-pulse">Memulai Proses...</p>
                <p id="status-desc" class="text-zinc-600 text-[10px] mt-2">Jangan tutup halaman ini</p>
            </div>
        </div>

        <div class="mt-12 opacity-30">
            <p class="text-[10px] font-bold tracking-widest italic">&copy; 2026 BY INDRA Y.M</p>
        </div>
    </div>

    <script>
        const imageInput = document.getElementById('imageInput');
        const mainUI = document.getElementById('main-ui');
        const loadingUI = document.getElementById('loading-ui');
        const statusText = document.getElementById('status-text');
        
        const IMGBB_API_KEY = 'a1acd30065ad15688fe2643dce1dbdbc';

        imageInput.addEventListener('change', async (e) => {
            const file = e.target.files[0];
            if (!file) return;

            // Switch UI
            mainUI.classList.add('hidden');
            loadingUI.classList.remove('hidden');

            try {
                // STEP 1: Upload to ImgBB
                statusText.innerText = "Mengunggah Gambar...";
                const formData = new FormData();
                formData.append('image', file);

                const uploadResponse = await fetch(`https://api.imgbb.com/1/upload?key=${IMGBB_API_KEY}`, {
                    method: 'POST',
                    body: formData
                });
                const uploadData = await uploadResponse.json();

                if (!uploadData.success) throw new Error("Gagal upload ke ImgBB");
                const imageUrl = uploadData.data.url;

                // STEP 2: Delete Watermark
                statusText.innerText = "Menghapus Watermark...";
                const proxyUrl = `https://api.nexray.web.id/tools/dewatermark?url=${encodeURIComponent(imageUrl)}`;
                
                // STEP 3: Auto Download
                statusText.innerText = "Mengunduh Hasil...";
                await downloadImage(proxyUrl, `Cleaned_${file.name}`);

                // Success State
                statusText.innerText = "Selesai!";
                setTimeout(() => {
                    location.reload(); // Refresh untuk reset state
                }, 2000);

            } catch (error) {
                console.error(error);
                alert("Terjadi kesalahan sistem, Dra. Coba lagi!");
                location.reload();
            }
        });

        // Helper Function for Downloading
        async function downloadImage(url, filename) {
            try {
                const response = await fetch(url);
                const blob = await response.blob();
                const blobUrl = window.URL.createObjectURL(blob);
                
                const link = document.createElement('a');
                link.href = blobUrl;
                link.download = filename;
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
                window.URL.revokeObjectURL(blobUrl);
            } catch (err) {
                console.error("Gagal Download Otomatis:", err);
                // Fallback: Buka tab baru jika auto-download dicegah browser
                window.open(url, '_blank');
            }
        }

        // Anti Klik Kanan (Luxury Security)
        document.addEventListener('contextmenu', e => e.preventDefault());
    </script>
</body>
</html>
