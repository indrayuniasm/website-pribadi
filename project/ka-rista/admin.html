<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Database ka Rista</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Montserrat:wght@300;400;700&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Montserrat:wght@300;400;700&family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700&display=swap');
        .custom-scroll::-webkit-scrollbar { 
            width: 4px; 
        }
        
        .custom-scroll::-webkit-scrollbar-thumb { 
            background: #3f3f46; 
            border-radius: 10px; 
        }
        
        input[type="number"]::-webkit-inner-spin-button, input[type="number"]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }

            @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        
        body { 
            background: #0f172a; 
            color: white; 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            cursor: default !important; 
        }

        button, a { cursor: pointer; }

        .tg-card { 
            background: #1e293b; 
            border: 1px solid rgba(255,255,255,0.05); 
        }
        
        .sticker-item { 
            background: rgba(255,255,255,0.03); 
            transition: all 0.3s ease; 
        }
        
        .sticker-item:hover {
            transform: translateY(-5px); 
            background: rgba(255,255,255,0.08); 
        }
        
        .btn-tg { 
            background: #24A1DE; 
        }
        
        .loader { 
            border-top-color: #24A1DE; 
            animation: spin 1s linear infinite; 
        }
        
        @keyframes spin { to { transform: rotate(360deg); } }

        :root {
            --gold-light: #f9e29d;
            --gold-mid: #d4af37;
            --gold-dark: #a67c00;
        }

            /* Kunci scroll saat loading */
        body.loading-active {
            overflow: hidden !important;
            height: 100vh;
            min-height: 100vh;
        }

        #preloader {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #0f0e0d;    
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 10002;
            perspective: 1000px;
            transition: opacity 1s ease, visibility 1s ease;
        }

        .luxury-loader {
            position: relative;
            width: 200px;
            height: 200px;
            transform-style: preserve-3d;
        }

        .luxury-loader .ring {
            position: absolute;
            width: 100%;
            height: 100%;
            border: 2px solid transparent;
            border-top: 4px solid var(--gold-mid);
            border-radius: 50%;
            box-shadow: 0 0 20px rgba(212, 175, 55, 0.2);
        }
        .cursive {
            font-family: 'Great Vibes', cursive;
        }

        /* Animasi Cincin   */
        .luxury-loader .ring:nth-child(1) {
            animation: rotate3D_1 2s linear infinite;
        }

        .luxury-loader .ring:nth-child(2) {
            animation: rotate3D_2 2s linear infinite;
            border-top: 4px solid var(--gold-light);
            width: 90%; height: 90%; top: 5%; left: 5%;
        }

        .luxury-loader .ring:nth-child(3) {
            animation: rotate3D_3 2s linear infinite;
            border-top: 4px solid var(--gold-dark);
            width: 80%; height: 80%; top: 10%; left: 10%;
        }
            
        .loading-text {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            width: 100%;
            z-index: 10;
        }

        .loading-text span {
            display: block;
            font-size: 3rem;
            color: var(--gold-mid);
            text-shadow: 0 0 15px rgba(212, 175, 55, 0.5);
        }

        .loading-text p {
            font-family: 'Montserrat', sans-serif;
            font-size: 0.6rem;
            letter-spacing: 5px;
            text-transform: uppercase;
            color: white;
            margin-top: 10px;
            opacity: 0.8;
            animation: pulseText 1.5s ease-in-out infinite;
        }

        @keyframes rotate3D_1 {
            0% { transform: rotateX(35deg) rotateY(-45deg) rotateZ(0deg); }
            100% { transform: rotateX(35deg) rotateY(-45deg) rotateZ(360deg); }
        }

        @keyframes rotate3D_2 {
            0% { transform: rotateX(50deg) rotateY(10deg) rotateZ(0deg); }
            100% { transform: rotateX(50deg) rotateY(10deg) rotateZ(360deg); }
        }

        @keyframes rotate3D_3 {
            0% { transform: rotateX(-35deg) rotateY(55deg) rotateZ(0deg); }
            100% { transform: rotateX(-35deg) rotateY(55deg) rotateZ(360deg); }
        }

        @keyframes pulseText {
            0%, 100% { opacity: 0.3; }
            50% { opacity: 1; }
        }
    </style>
</head>
<body>
<div class="flex flex-col min-h-screen"> <main class="flex-grow p-4 md:p-10 flex flex-col items-center">
<div id="preloader">
    <div class="luxury-loader">
        <div class="ring"></div>
        <div class="ring"></div>
        <div class="ring"></div>
        <div class="loading-text">
            <span class="cursive" style="font-size: 3rem; color: var(--gold-mid); display: block;">dra</span>
                <p style="color: white; font-size: 0.6rem; letter-spacing: 5px; text-transform: uppercase; margin-top: 10px; opacity: 0.8;">Welcome To My site</p>
        </div>
    </div>
</div>
<!--isian web-->
    <div id="infoBar" class="fixed top-0 left-0 right-0 p-4 text-center text-sm font-bold transform -translate-y-full transition-all duration-500 z-[100] shadow-2xl flex items-center justify-center gap-4 text-white">
        <i class="fas fa-info-circle text-xl"></i>
        <span id="infoText">Status Bar</span>
        <button onclick="hideInfo()" class="bg-black/20 px-4 py-1 rounded-full hover:bg-black/40 transition text-[10px] uppercase font-bold tracking-widest">Tutup</button>
    </div>

    <div class="max-w-7xl mx-auto mt-10">
        <header class="mb-10 flex flex-col md:flex-row justify-between items-center gap-6">
            <div>
                <h1 class="text-4xl font-black text-white tracking-tighter italic uppercase">WARI<span class="text-emerald-500">KGA</span></h1>
                <p class="text-zinc-500 text-[10px] uppercase tracking-[0.4em] font-bold">Database Customer</p>
            </div>
            <div class="relative w-full md:w-96">
                <i class="fas fa-search absolute left-4 top-1/2 -translate-y-1/2 text-emerald-500"></i>
                <input type="text" id="searchInput" onkeyup="filterTable()" placeholder="Cari Nama, NIK, atau Rangka..." 
                    class="w-full bg-[#111114] border border-zinc-800 p-4 pl-12 rounded-2xl focus:ring-2 focus:ring-emerald-500 outline-none text-white shadow-2xl transition-all font-medium">
            </div>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-12 gap-10">
            <div class="lg:col-span-4">
                <div class="bg-[#111114] border border-zinc-800 p-8 rounded-[2.5rem] shadow-2xl sticky top-24">
                    
                    <div class="mb-8">
                        <label class="text-[10px] uppercase font-black text-zinc-500 mb-3 block tracking-widest text-center italic">Silahkan Input Data:</label>
                        <div class="flex bg-zinc-950 p-1.5 rounded-2xl border border-zinc-800">
                            <button id="btnBeli" onclick="setMode('pembelian')" class="flex-1 py-3 rounded-xl text-[10px] font-black transition-all bg-emerald-600 text-white shadow-lg">BELI UNIT</button>
                            <button id="btnService" onclick="setMode('service')" class="flex-1 py-3 rounded-xl text-[10px] font-black transition-all text-zinc-500">SERVICE</button>
                        </div>
                    </div>
                    
                    <div class="space-y-5">
                        <input type="hidden" id="currentMode" value="pembelian">
                        
                        <div class="space-y-1">
                            <label class="text-[10px] uppercase font-black text-emerald-500 ml-1 tracking-widest">NIK KTP Konsumen</label>
                            <input type="number" id="nik_ktp" onblur="cekDatabase('nik')" placeholder="Masukkan NIK KTP..." 
                                class="w-full bg-zinc-950 border border-zinc-800 p-4 rounded-xl outline-none text-white focus:border-emerald-500 font-bold tracking-widest transition-all">
                        </div>

                        <div class="space-y-1">
                             <label class="text-[10px] uppercase font-black text-emerald-500 ml-1 tracking-widest">NIK KK Konsumen</label>
                            <input type="number" id="nik_kk" placeholder="Masukkan NIK KK..." 
                                class="w-full bg-zinc-950 border border-zinc-800 p-4 rounded-xl outline-none text-white focus:border-emerald-500 font-bold tracking-widest transition-all">
                        </div>
                        

                        <div class="h-[1px] bg-zinc-800 my-4"></div>

                        <div class="space-y-4">
                            <input type="text" id="nama" placeholder="Nama Lengkap Konsumen" class="w-full bg-zinc-900/50 border border-zinc-800 p-3 rounded-xl outline-none text-white focus:border-emerald-500">
                            <input type="text" id="no_mesin" placeholder="Nomor Mesin" class="w-full bg-zinc-900/50 border border-zinc-800 p-3 rounded-xl outline-none text-white font-mono uppercase">
                            <input type="text" id="no_rangka" onblur="cekDatabase('rangka')" placeholder="Cek No Rangka..." class="w-full bg-zinc-900/50 border border-zinc-800 p-3 rounded-xl outline-none text-white font-mono uppercase">
                        </div>

                        <button onclick="prosesSimpan()" class="w-full bg-emerald-600 hover:bg-emerald-500 text-white font-black py-5 rounded-2xl transition-all shadow-lg shadow-emerald-900/20 mt-6 flex items-center justify-center gap-3 tracking-widest text-xs">
                            <i class="fas fa-save"></i> SIMPAN DATA & WAKTU
                        </button>
                        
                        <button onclick="resetForm()" class="w-full text-[10px] font-bold uppercase tracking-widest text-zinc-600 hover:text-white transition">Reset Form</button>
                    </div>
                </div>
            </div>

            <div class="lg:col-span-8">
                <div class="bg-[#111114] border border-zinc-800 rounded-[2.5rem] overflow-hidden shadow-2xl">
                    <div class="overflow-x-auto custom-scroll">
                        <table class="w-full text-left" id="mainTable">
                            <thead class="bg-zinc-900 text-[9px] uppercase tracking-[0.2em] text-zinc-500 font-black border-b border-zinc-800">
                                <tr>
                                    <th class="p-6">Data Konsumen</th>
                                    <th class="p-6">Data Unit</th>
                                    <th class="p-6">Aktivitas</th>
                                    <th class="p-6 text-center">Aksi</th>
                                </tr>
                            </thead>
                            <tbody id="tableBody" class="divide-y divide-zinc-800/40"></tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>
</main>
</div>
    <footer class="bg-transparent border-t border-white/5 py-10 mt-auto">
    <div class="max-w-6xl mx-auto px-8 flex flex-col md:flex-row justify-between items-center gap-8">
        <div class="order-2 md:order-1 text-center md:text-left">
            <p class="text-[10px] text-gray-500 font-bold uppercase tracking-widest">
                &copy; 2026 <span class="text-[#24A1DE]">-Indra Y.M</span>
            </p>
        </div>

        <div class="flex items-center gap-6 order-1 md:order-2">
            <a href="https://wa.me/6283849997221" target="_blank" class="text-gray-500 hover:text-green-500 transition-colors">
                <i class="fa-brands fa-whatsapp text-xl"></i>
            </a>
            <a href="https://instagram.com/asmarabot" target="_blank" class="text-gray-500 hover:text-pink-500 transition-colors">
                <i class="fa-brands fa-instagram text-xl"></i>
            </a>
            <a href="https://www.tiktok.com/@apaan_oy" target="_blank" class="text-gray-500 hover:text-[#24A1DE] transition-colors">
                <i class="fa-brands fa-tiktok text-xl"></i>
            </a>
        </div>
    </div>
</footer>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, onSnapshot, query, where, getDocs, doc, getDoc, setDoc, updateDoc, arrayUnion, serverTimestamp, orderBy, deleteDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        // ini firebase
        const firebaseConfig = {
        apiKey: "AIzaSyCLTHkDtSmn6ICpq4o-xWWUPrl3a_VaT3c",
        authDomain: "pricelist-23ec2.firebaseapp.com",
        projectId: "pricelist-23ec2",
        storageBucket: "pricelist-23ec2.firebasestorage.app",
        messagingSenderId: "546085857444",
        appId: "1:546085857444:web:e1fe997ddb9feb912ede31"
    };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // ini buat search
        window.filterTable = () => {
            const val = document.getElementById("searchInput").value.toUpperCase();
            const rows = document.getElementById("tableBody").getElementsByTagName("tr");
            for (let row of rows) {
                row.style.display = row.innerText.toUpperCase().includes(val) ? "" : "none";
            }
        };

        // ini buat mode
        window.setMode = (m) => {
            document.getElementById('currentMode').value = m;
            document.getElementById('btnBeli').className = m === 'pembelian' ? "flex-1 py-3 rounded-xl text-[10px] font-black bg-emerald-600 text-white shadow-lg" : "flex-1 py-3 text-[10px] font-black text-zinc-500";
            document.getElementById('btnService').className = m === 'service' ? "flex-1 py-3 rounded-xl text-[10px] font-black bg-blue-600 text-white shadow-lg" : "flex-1 py-3 text-[10px] font-black text-zinc-500";
        };

        // ini buat deteksi
        window.cekDatabase = async (tipe) => {
            const vNik = document.getElementById('nik_ktp').value;
            const vRan = document.getElementById('no_rangka').value.toUpperCase();
            if(!vNik && !vRan) return;

            let q = tipe === 'nik' ? query(collection(db, "wari_kga"), where("nik_ktp", "==", vNik)) : query(collection(db, "wari_kga"), where("no_rangka", "==", vRan));
            const snap = await getDocs(q);
            
            if(!snap.empty) {
                const d = snap.docs[0].data();
                document.getElementById('nama').value = d.nama;
                document.getElementById('no_rangka').value = d.no_rangka;
                document.getElementById('no_mesin').value = d.no_mesin;
                document.getElementById('nik_ktp').value = d.nik_ktp;
                document.getElementById('nik_kk').value = d.nik_kk;
                
                const bar = document.getElementById('infoBar');
                document.getElementById('infoText').innerText = "Data Konsumen Terdeteksi Otomatis!";
                bar.className = "fixed top-0 left-0 right-0 p-4 text-center bg-emerald-600 text-white z-[100] transition-all";
                bar.classList.remove('-translate-y-full');
            }
        };

        window.hideInfo = () => document.getElementById('infoBar').classList.add('-translate-y-full');

        // edit dan hapus
        window.editData = async (id) => {
            const snap = await getDoc(doc(db, "wari_kga", id));
            if(snap.exists()){
                const d = snap.data();
                document.getElementById('nama').value = d.nama;
                document.getElementById('no_rangka').value = d.no_rangka;
                document.getElementById('no_mesin').value = d.no_mesin;
                document.getElementById('nik_ktp').value = d.nik_ktp;
                document.getElementById('nik_kk').value = d.nik_kk;
                window.scrollTo({ top: 0, behavior: 'smooth' });
            }
        };

        window.hapusData = async (id) => {
            if(confirm("Hapus data & seluruh riwayat motor ini?")) {
                await deleteDoc(doc(db, "wari_kga", id));
            }
        };

        // simpan data
        window.prosesSimpan = async () => {
            const mode = document.getElementById('currentMode').value;
            const nik = document.getElementById('nik_ktp').value;
            const rangka = document.getElementById('no_rangka').value.toUpperCase().trim();
            const nama = document.getElementById('nama').value;
            
            const now = new Date();
            const timeStamp = now.toLocaleDateString('id-ID') + " - " + now.toLocaleTimeString('id-ID', {hour:'2-digit', minute:'2-digit'}) + " WIB";

            if(!nik || !rangka || !nama) return alert("Mohon lengkapi NIK, Rangka, dan Nama!");

            const docRef = doc(db, "wari_kga", rangka);
            const docSnap = await getDoc(docRef);

            const data = {
                nama: nama, no_rangka: rangka,
                no_mesin: document.getElementById('no_mesin').value.toUpperCase(),
                nik_ktp: nik, nik_kk: document.getElementById('nik_kk').value,
                updatedAt: serverTimestamp()
            };

            try {
                if (docSnap.exists()) {
                    await updateDoc(docRef, { 
                        ...data, 
                        [mode === 'pembelian' ? 'riwayat_beli' : 'riwayat_service']: arrayUnion(timeStamp) 
                    });
                } else {
                    await setDoc(docRef, { 
                        ...data, 
                        riwayat_beli: mode === 'pembelian' ? [timeStamp] : [], 
                        riwayat_service: mode === 'service' ? [timeStamp] : [], 
                        createdAt: serverTimestamp() 
                    });
                }
                alert("Berhasil Disimpan!");
                resetForm();
            } catch (e) { alert(e.message); }
        };

        window.resetForm = () => {
            document.querySelectorAll('input').forEach(i => i.value = "");
            hideInfo();
        };

        // buat table
        onSnapshot(query(collection(db, "wari_kga"), orderBy("updatedAt", "desc")), (snap) => {
            const tbody = document.getElementById('tableBody');
            tbody.innerHTML = "";
            snap.forEach(doc => {
                const d = doc.data();
                const bLog = d.riwayat_beli?.map(t => `<div class="text-[9px] text-amber-500 font-bold mb-1 border-l-2 border-amber-500/30 pl-2">${t}</div>`).join('') || '-';
                const sLog = d.riwayat_service?.map(t => `<div class="text-[9px] text-blue-400 font-bold mb-1 border-l-2 border-blue-500/30 pl-2">${t}</div>`).join('') || '-';

                tbody.innerHTML += `
                    <tr class="hover:bg-zinc-800/20 border-b border-zinc-800/30 transition-all">
                        <td class="p-6">
                            <div class="text-white font-bold text-sm mb-1">Nama: ${d.nama}</div>
                            <div class="text-[10px] text-zinc-600 font-mono tracking-tighter">NIK KTP: ${d.nik_ktp}</div>
                            <div class="text-[10px] text-zinc-600 font-mono tracking-tighter">NIK KK: ${d.nik_kk}</div>
                        </td>
                        <td class="p-6">
                            <div class="text-[10px] text-zinc-400 font-mono uppercase mb-1">R: ${d.no_rangka}</div>
                            <div class="text-[9px] text-zinc-500 font-mono uppercase italic">M: ${d.no_mesin}</div>
                        </td>
                        <td class="p-6">
                            <div class="grid grid-cols-2 gap-4 min-w-[200px]">
                                <div><p class="text-[7px] font-black text-amber-600 uppercase mb-2">Pembelian</p>${bLog}</div>
                                <div><p class="text-[7px] font-black text-blue-500 uppercase mb-2">Service</p>${sLog}</div>
                            </div>
                        </td>
                        <td class="p-6">
                            <div class="flex items-center justify-center gap-4">
                                <button onclick="editData('${d.no_rangka}')" class="text-zinc-600 hover:text-emerald-500 transition-all text-xs" title="Edit"><i class="fas fa-edit"></i></button>
                                <button onclick="hapusData('${d.no_rangka}')" class="text-zinc-600 hover:text-red-500 transition-all text-xs" title="Hapus"><i class="fas fa-trash-alt"></i></button>
                            </div>
                        </td>
                    </tr>
                `;
            });
            filterTable();
        });

        // Loading
        document.body.classList.add('loading-active');
    window.addEventListener('load', () => {
        const preloader = document.getElementById('preloader');
        setTimeout(() => {
            preloader.style.opacity = '0';
            preloader.style.visibility = 'hidden';
            document.body.classList.remove('loading-active');
        }, 3000); 
    });

            // Mematikan Klik Kanan
    document.addEventListener('contextmenu', e => e.preventDefault());

    // Mematikan Shortcut Keyboard (F12, Ctrl+U, Ctrl+I, Ctrl+Shift+I, dll)
    document.onkeydown = function(e) {
        if (
            e.keyCode === 123 || // F12
            (e.ctrlKey && (e.keyCode === 85 || e.keyCode === 83 || e.keyCode === 65 || e.keyCode === 70)) || // Ctrl+U, S, A, F
            (e.ctrlKey && e.shiftKey && (e.keyCode === 73 || e.keyCode === 74 || e.keyCode === 75 || e.keyCode === 67)) || // Ctrl+Shift+I, J, K, C
            (e.metaKey && e.altKey && (e.keyCode === 73 || e.keyCode === 85)) // Shortcut Mac (Cmd+Opt+I/U)
        ) {
            return false;
        }
    };
    </script>
</body>
</html>
