    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, doc, addDoc, updateDoc, setDoc, deleteDoc, onSnapshot, query, orderBy, getDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCLTHkDtSmn6ICpq4o-xWWUPrl3a_VaT3c",
            authDomain: "pricelist-23ec2.firebaseapp.com",
            projectId: "pricelist-23ec2",
            storageBucket: "pricelist-23ec2.firebasestorage.app",
            messagingSenderId: "546085857444",
            appId: "1:546085857444:web:e1fe997ddb9feb912ede31"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // --- NAVIGATION ---
        window.showTab = (tab) => {
            const isVid = tab === 'videos';
            document.getElementById('tab-videos').classList.toggle('hidden', !isVid);
            document.getElementById('tab-users').classList.toggle('hidden', isVid);
            document.getElementById('current-tab-name').innerText = isVid ? 'Video' : 'User';
            
            // UI Toggle Desktop
            document.getElementById('btn-videos-desk').className = isVid ? 'sidebar-active w-full text-left px-5 py-4 rounded-2xl font-bold flex items-center gap-4 transition-all group' : 'w-full text-left px-5 py-4 rounded-2xl font-bold flex items-center gap-4 text-slate-500 hover:text-white transition-all group';
            document.getElementById('btn-users-desk').className = !isVid ? 'sidebar-active w-full text-left px-5 py-4 rounded-2xl font-bold flex items-center gap-4 transition-all group' : 'w-full text-left px-5 py-4 rounded-2xl font-bold flex items-center gap-4 text-slate-500 hover:text-white transition-all group';
        };

        // --- MODAL OPS ---
        window.openModal = (editData = null) => {
            const modal = document.getElementById('modal-v');
            const btn = document.getElementById('btn-save');
            modal.classList.replace('hidden', 'flex');
            
            if (editData) {
                document.getElementById('modal-title').innerText = "Edit Konten";
                document.getElementById('v-id').value = editData.id;
                document.getElementById('v-title').value = editData.title;
                document.getElementById('v-url').value = editData.videoUrl;
                document.getElementById('v-thumb').value = editData.thumbnailUrl;
                btn.innerText = "Simpan Perubahan";
                
                // Checkboxes
                const cats = Array.isArray(editData.category) ? editData.category : [editData.category];
                document.querySelectorAll('input[name="cat"]').forEach(cb => {
                    cb.checked = cats.includes(cb.value);
                });
            } else {
                document.getElementById('modal-title').innerText = "Konten Baru";
                document.getElementById('v-id').value = '';
                document.getElementById('v-title').value = '';
                document.getElementById('v-url').value = '';
                document.getElementById('v-thumb').value = '';
                document.querySelectorAll('input[name="cat"]').forEach(cb => cb.checked = false);
                btn.innerText = "Publish Konten";
            }
        };

        window.closeModal = () => document.getElementById('modal-v').classList.replace('flex', 'hidden');

        // --- SAVE / UPDATE ---
        window.saveVideo = async () => {
            const id = document.getElementById('v-id').value;
            const checkedCats = Array.from(document.querySelectorAll('input[name="cat"]:checked')).map(cb => cb.value);
            
            if(checkedCats.length === 0) return alert("Pilih kategori!");
            
            const data = {
                title: document.getElementById('v-title').value,
                category: checkedCats,
                thumbnailUrl: document.getElementById('v-thumb').value,
                videoUrl: document.getElementById('v-url').value,
                updatedAt: serverTimestamp()
            };

            if(!data.title || !data.videoUrl) return alert("Lengkapi data!");

            try {
                if (id) {
                    await updateDoc(doc(db, "videos", id), data);
                } else {
                    data.createdAt = serverTimestamp();
                    data.viewers = 0;
                    data.uploader = "Admin"; // Default jika dari panel admin
                    await addDoc(collection(db, "videos"), data);
                }
                closeModal();
            } catch (e) { alert("Gagal!"); }
        };

        // --- DELETE ---
        window.deleteData = async (col, id) => {
            if(confirm("Hapus data ini secara permanen?")) {
                await deleteDoc(doc(db, col, id));
            }
        };

        // --- EDIT TRIGGER ---
        window.triggerEdit = async (id) => {
            const snap = await getDoc(doc(db, "videos", id));
            if (snap.exists()) {
                window.openModal({id: snap.id, ...snap.data()});
            }
        };

        // --- REALTIME RENDER VIDEO ---
        onSnapshot(query(collection(db, "videos"), orderBy("createdAt", "desc")), async (sn) => {
            const list = document.getElementById('admin-video-list');
            let html = '';
            
            for (const d of sn.docs) {
                const v = d.data();
                // Ambil info uploader (Nama)
                let uploaderName = v.uploader || "Unknown";
                if (v.uploader && v.uploader !== "Admin") {
                    const uSnap = await getDoc(doc(db, "users", v.uploader));
                    if (uSnap.exists()) uploaderName = uSnap.data().name;
                }

                html += `
                <div class="glass-card p-5 rounded-[40px] shadow-sm hover:shadow-xl transition-all group border-2 border-transparent hover:border-blue-100">
                    <div class="relative overflow-hidden rounded-[28px] aspect-video bg-slate-100 mb-5">
                        <img src="${v.thumbnailUrl}" class="w-full h-full object-cover group-hover:scale-110 transition-transform duration-700">
                        <div class="absolute top-3 left-3 bg-blue-600 text-[8px] font-black text-white px-3 py-1.5 rounded-full uppercase tracking-widest shadow-lg">
                            ${v.viewers || 0} Views
                        </div>
                    </div>
                    
                    <h4 class="font-black text-slate-800 text-xs uppercase leading-tight mb-2 line-clamp-2 min-h-[32px]">${v.title}</h4>
                    
                    <div class="flex items-center gap-2 mb-6">
                        <div class="w-5 h-5 bg-slate-200 rounded-full flex items-center justify-center text-[8px]"><i class="fa-solid fa-user"></i></div>
                        <span class="text-[9px] font-bold text-slate-400 uppercase tracking-tighter">By: <span class="text-slate-700">${uploaderName}</span></span>
                    </div>

                    <div class="grid grid-cols-2 gap-3">
                        <button onclick="window.triggerEdit('${d.id}')" class="py-3 bg-slate-100 text-slate-600 rounded-2xl text-[9px] font-black uppercase hover:bg-blue-600 hover:text-white transition-all tracking-widest">Edit</button>
                        <button onclick="window.deleteData('videos', '${d.id}')" class="py-3 bg-red-50 text-red-500 rounded-2xl text-[9px] font-black uppercase hover:bg-red-500 hover:text-white transition-all tracking-widest">Hapus</button>
                    </div>
                </div>`;
            }
            list.innerHTML = html || `<div class="col-span-full py-20 text-center text-slate-300 font-black uppercase italic tracking-widest">Belum ada konten</div>`;
        });

        // --- REALTIME RENDER USERS ---
        onSnapshot(collection(db, "users"), (sn) => {
            let p = 0, w = 0, html = '';
            sn.docs.forEach(d => {
                const u = d.data();
                const isPria = u.gender === 'Laki-laki';
                if(isPria) p++; else w++;

                html += `
                <tr class="hover:bg-slate-50 transition-colors">
                    <td class="p-6">
                        <div class="flex items-center gap-4">
                            <div class="w-10 h-10 ${isPria ? 'bg-blue-100 text-blue-600' : 'bg-pink-100 text-pink-600'} rounded-2xl flex items-center justify-center text-sm">
                                <i class="fa-solid fa-user"></i>
                            </div>
                            <div>
                                <div class="uppercase tracking-tight">${u.name}</div>
                                <div class="text-[10px] text-slate-400 font-bold">${u.age || '?'} TAHUN</div>
                            </div>
                        </div>
                    </td>
                    <td class="p-6">
                        <span class="px-3 py-1 rounded-full text-[9px] font-black uppercase ${isPria ? 'bg-blue-50 text-blue-500' : 'bg-pink-50 text-pink-500'}">
                            ${u.gender}
                        </span>
                    </td>
                    <td class="p-6">
                        <div class="text-blue-600 font-mono">${u.phone}</div>
                        <div class="text-blue-300 font-mono">PASS: ${u.password}</div>
                    </td>
                    <td class="p-6 text-center">
                        <button onclick="window.deleteData('users', '${u.phone}')" class="w-10 h-10 rounded-2xl text-red-300 hover:bg-red-50 hover:text-red-600 transition-all">
                            <i class="fa-solid fa-trash-can"></i>
                        </button>
                    </td>
                </tr>`;
            });

            document.getElementById('stat-total').innerText = sn.size;
            document.getElementById('stat-pria').innerText = p;
            document.getElementById('stat-wanita').innerText = w;
            document.getElementById('full-user-list').innerHTML = html || '<tr><td colspan="4" class="p-20 text-center text-slate-300 uppercase font-black italic">Belum ada member</td></tr>';
        });

        // Limit checkbox maks 3
        document.addEventListener('change', (e) => {
            if (e.target.name === 'cat') {
                const checked = document.querySelectorAll('input[name="cat"]:checked');
                if (checked.length > 5) {
                    e.target.checked = false;
                    alert("Maksimal 3 kategori!");
                }
            }
        });

    </script>
</body>
