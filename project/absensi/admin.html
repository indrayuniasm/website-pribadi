<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - by indra</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #050507; color: white; }
        .glass { background: rgba(255, 255, 255, 0.02); border: 1px solid rgba(255, 255, 255, 0.05); border-radius: 24px; }
        .img-evidence { width: 50px; height: 50px; border-radius: 12px; object-fit: cover; cursor: pointer; }
        #idCardExport { background: white; color: black; padding: 30px; border-radius: 20px; width: 350px; text-align: center; }
    </style>
</head>
<body class="p-6">

    <section id="authPage" class="fixed inset-0 z-[500] flex items-center justify-center bg-black p-6">
        <div class="glass p-10 w-full max-w-md text-center">
            <h1 class="text-2xl font-black mb-6 italic uppercase">Admin<span class="text-blue-500">Console</span></h1>
            <input type="password" id="adminPass" placeholder="PASSWORD ADMIN" class="w-full p-4 mb-4 bg-white/5 border border-white/10 rounded-xl outline-none text-center font-bold">
            <button onclick="loginAdmin()" class="w-full bg-blue-600 py-4 rounded-xl font-black uppercase tracking-widest text-sm">Masuk Sistem</button>
        </div>
    </section>

    <section id="mainPage" class="hidden max-w-7xl mx-auto space-y-8">
        <header class="flex justify-between items-center">
            <h2 class="text-3xl font-black italic">DASHBOARD <span class="text-blue-500 opacity-50">CONTROL</span></h2>
            <button onclick="location.reload()" class="text-red-500 font-bold text-xs uppercase">Logout</button>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
            <div class="lg:col-span-2 space-y-6">
                <div class="grid grid-cols-3 gap-4">
                    <div class="glass p-6"><p class="text-[10px] font-bold text-gray-500 uppercase">Total In</p><h3 id="statIn" class="text-2xl font-black text-green-500">0</h3></div>
                    <div class="glass p-6"><p class="text-[10px] font-bold text-gray-500 uppercase">Total Out</p><h3 id="statOut" class="text-2xl font-black text-orange-500">0</h3></div>
                    <div class="glass p-6"><p class="text-[10px] font-bold text-gray-500 uppercase">Staff</p><h3 id="statStaff" class="text-2xl font-black text-blue-500">0</h3></div>
                </div>

                <div class="glass overflow-hidden">
                    <table class="w-full text-left text-xs">
                        <thead class="bg-white/5 text-gray-400 font-black uppercase">
                            <tr>
                                <th class="p-4">Foto</th>
                                <th class="p-4">Nama</th>
                                <th class="p-4 text-center">Status</th>
                                <th class="p-4">Lokasi</th>
                                <th class="p-4 text-right">Opsi</th>
                            </tr>
                        </thead>
                        <tbody id="tabelAbsensi" class="divide-y divide-white/5"></tbody>
                    </table>
                </div>
            </div>

            <div class="space-y-6">
                <div class="glass p-6">
                    <h3 class="font-black text-xs uppercase mb-4 text-blue-500 tracking-widest">Registrasi Baru</h3>
                    <input type="text" id="newID" placeholder="ID / BARCODE" class="w-full p-4 mb-2 bg-white/5 border border-white/10 rounded-xl outline-none font-bold uppercase text-blue-400">
                    <input type="text" id="newName" placeholder="NAMA LENGKAP" class="w-full p-4 mb-4 bg-white/5 border border-white/10 rounded-xl outline-none font-bold uppercase">
                    <button onclick="saveStaff()" class="w-full bg-blue-600 py-4 rounded-xl font-black uppercase text-xs">Simpan Karyawan</button>
                </div>

                <div class="glass p-6">
                    <h3 class="font-black text-xs uppercase mb-4 text-gray-500 tracking-widest">Daftar Karyawan</h3>
                    <div id="listKaryawan" class="space-y-3 max-h-[400px] overflow-y-auto"></div>
                </div>
            </div>
        </div>
    </section>

    <div id="idCardContainer" class="fixed -top-[2000px]">
        <div id="idCardExport">
            <h1 style="font-weight: 900; font-size: 20px; letter-spacing: -1px; margin-bottom: 5px;">ID<span style="color: #3d5afe;">CARD</span></h1>
            <p style="font-size: 10px; font-weight: bold; color: #888; margin-bottom: 20px; text-transform: uppercase;">silahkan scan/masukan QR ini ke Absen</p>
            <div id="qrcode" style="display: flex; justify-content: center; margin-bottom: 20px;"></div>
            <h2 id="qrName" style="font-weight: 800; font-size: 18px; margin: 0; text-transform: uppercase;">-</h2>
            <p id="qrID" style="font-family: monospace; font-size: 12px; color: #3d5afe; font-weight: bold; margin-top: 5px;">-</p>
        </div>
    </div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-app.js";
    import { getFirestore, collection, doc, setDoc, onSnapshot, query, orderBy, deleteDoc } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyB-GSKbvVTc2e_6sGnL2WSPNU19wUd6BYQ",
        authDomain: "bukber-9d73f.firebaseapp.com",
        projectId: "bukber-9d73f",
        storageBucket: "bukber-9d73f.firebasestorage.app",
        appId: "1:86991458584:web:6ce66640bcb7fe45ba8e6d"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    window.loginAdmin = () => {
        if(document.getElementById('adminPass').value === "indra2005") {
            document.getElementById('authPage').classList.add('hidden');
            document.getElementById('mainPage').classList.remove('hidden');
        } else {
            alert("Password Salah!");
        }
    };

    // 1. MONITOR KARYAWAN
    onSnapshot(collection(db, "employees"), (s) => {
        document.getElementById('statStaff').innerText = s.size;
        const container = document.getElementById('listKaryawan');
        container.innerHTML = "";
        s.forEach(d => {
            const data = d.data();
            container.innerHTML += `
                <div class="p-4 bg-white/5 rounded-2xl flex justify-between items-center border border-white/5">
                    <div>
                        <p class="font-black text-[11px] uppercase">${data.name}</p>
                        <p class="text-[9px] font-mono text-gray-500">${data.barcode}</p>
                    </div>
                    <div class="flex gap-2">
                        <button onclick="showQRCard('${data.barcode}', '${data.name}')" class="bg-blue-600/20 text-blue-500 px-3 py-2 rounded-lg text-[9px] font-black uppercase">Get QR</button>
                        <button onclick="deleteStaff('${d.id}')" class="text-red-900 px-2">✕</button>
                    </div>
                </div>`;
        });
    });

    // 2. MONITOR ABSENSI
    onSnapshot(collection(db, "attendance"), (snap) => {
        const list = document.getElementById('tabelAbsensi'); list.innerHTML = "";
        let inC = 0, outC = 0;
        const docs = [];
        snap.forEach(d => docs.push({id: d.id, ...d.data()}));
        docs.sort((a, b) => (b.timestamp?.seconds || 0) - (a.timestamp?.seconds || 0));

        docs.forEach(data => {
            const isM = data.status === "MASUK";
            if(isM) inC++; else outC++;
            const lat = data.location?.lat || data.coords?.lat;
            const lon = data.location?.lon || data.coords?.lon;

            list.innerHTML += `
                <tr class="hover:bg-white/[0.01]">
                    <td class="p-4"><img src="${data.photo}" class="img-evidence" onclick="window.open('${data.photo}')"></td>
                    <td class="p-4"><p class="font-black uppercase">${data.name}</p><p class="text-[9px] text-gray-500 font-mono">${data.barcode}</p></td>
                    <td class="p-4 text-center"><span class="px-2 py-1 rounded-md font-black text-[9px] ${isM ? 'bg-green-500/10 text-green-500' : 'bg-orange-500/10 text-orange-500'}">${data.status}</span></td>
                    <td class="p-4">
                        <button onclick="window.open('https://www.google.com/maps?q=${lat},${lon}')" class="text-blue-500 text-[9px] font-black uppercase underline">Buka Maps</button>
                    </td>
                    <td class="p-4 text-right">
                        <button onclick="deleteLog('${data.id}')" class="text-gray-600 hover:text-red-500">✕</button>
                    </td>
                </tr>`;
        });
        document.getElementById('statIn').innerText = inC;
        document.getElementById('statOut').innerText = outC;
    });

    // 3. QR LOGIC & DOWNLOAD
    window.showQRCard = (id, name) => {
        const qrContainer = document.getElementById("qrcode");
        qrContainer.innerHTML = "";
        new QRCode(qrContainer, { text: "SECURE-ID-" + id, width: 200, height: 200 });
        
        document.getElementById('qrName').innerText = name;
        document.getElementById('qrID').innerText = id;

        Swal.fire({
            title: 'KARTU ID KARYAWAN',
            html: '<div id="swalQRPreview"></div>',
            showCancelButton: true,
            confirmButtonText: 'DOWNLOAD IMAGE',
            cancelButtonText: 'CLOSE',
            background: '#050507',
            color: '#fff',
            didOpen: () => {
                const preview = document.getElementById('idCardExport').cloneNode(true);
                document.getElementById('swalQRPreview').appendChild(preview);
            }
        }).then((result) => {
            if (result.isConfirmed) {
                downloadCard(name);
            }
        });
    };

    async function downloadCard(name) {
        const element = document.getElementById('idCardExport');
        const canvas = await html2canvas(element);
        const link = document.createElement('a');
        link.download = `QR_${name}.png`;
        link.href = canvas.toDataURL();
        link.click();
    }

    window.saveStaff = async () => {
        const n = document.getElementById('newName').value, b = document.getElementById('newID').value;
        if(n && b) {
            await setDoc(doc(db, "employees", b), { name: n, barcode: b });
            document.getElementById('newName').value = ""; document.getElementById('newID').value = "";
            Swal.fire('BERHASIL', 'Karyawan terdaftar!', 'success');
        }
    };

    window.deleteLog = async (id) => { if(confirm('Hapus log absen ini?')) await deleteDoc(doc(db, "attendance", id)); };
    window.deleteStaff = async (id) => { if(confirm('Hapus karyawan ini?')) await deleteDoc(doc(db, "employees", id)); };

</script>
</body>
</html>
