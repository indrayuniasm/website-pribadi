<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QR Karyawan - By Indra </title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/easyqrcodejs@4.4.13/dist/easy.qrcode.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #0a0a0c; color: #fff; }
        .glass-card { background: #16161a; border: 1px solid #2d2d35; border-radius: 32px; }
        .input-style { background: #22222a; border: 1px solid #333; border-radius: 16px; color: white; transition: 0.3s; }
        .input-style:focus { border-color: #3d5afe; outline: none; box-shadow: 0 0 0 4px rgba(61, 90, 254, 0.15); }
        .eye { fill: white; stroke: #004a7c; stroke-width: 2; transition: 0.3s; transform-origin: center; }
        .eye-closed { ry: 1 !important; }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">

<section id="authPage" class="w-full max-w-[450px]">
    <div class="glass-card p-10 text-center shadow-2xl">
        <div id="doraemon-container" class="mb-8 transition-transform duration-500">
            <svg width="150" height="150" viewBox="0 0 180 180" class="mx-auto">
                <circle cx="90" cy="90" r="85" fill="#00a0de" stroke="#004a7c" stroke-width="4"/>
                <circle cx="90" cy="110" r="65" fill="white"/>
                <circle cx="90" cy="85" r="12" fill="#e60012"/>
                <ellipse id="leftEye" class="eye" cx="65" cy="70" rx="18" ry="25"/>
                <ellipse id="rightEye" class="eye" cx="115" cy="70" rx="18" ry="25"/>
                <circle id="leftPupil" cx="65" cy="75" r="7" fill="black"/>
                <circle id="rightPupil" cx="115" cy="75" r="7" fill="black"/>
                <path d="M50 125 Q90 140 130 125" stroke="#a3000a" stroke-width="4" fill="none" stroke-linecap="round"/>
            </svg>
        </div>
        <h2 class="text-2xl font-extrabold mb-8 uppercase tracking-widest">Admin Login</h2>
        <form id="loginForm" class="space-y-4">
            <input type="email" id="loginEmail" placeholder="Email Admin" required class="w-full p-4 input-style">
            <input type="password" id="loginPassword" placeholder="Password" required class="w-full p-4 input-style">
            <button type="submit" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-black py-4 rounded-2xl transition">LOGIN</button>
        </form>
    </div>
</section>

<section id="mainPage" class="hidden w-full max-w-5xl grid grid-cols-1 md:grid-cols-2 gap-8">
    <div class="glass-card p-10">
        <div class="mb-10 text-center md:text-left">
            <h2 class="text-3xl font-black">Registrasi Baru</h2>
            <p class="text-blue-500 font-bold text-xs uppercase tracking-widest">Database Karyawan Indra</p>
        </div>

        <div class="space-y-6">
            <div>
                <label class="text-xs font-black text-gray-500 uppercase ml-1">Nama Lengkap</label>
                <input type="text" id="nama" placeholder="Ahmad Fauzi" class="w-full p-4 mt-2 input-style font-bold">
            </div>
            <div>
                <label class="text-xs font-black text-gray-500 uppercase ml-1">ID Karyawan (Unik)</label>
                <input type="text" id="id_karyawan" placeholder="628089" class="w-full p-4 mt-2 input-style font-mono text-blue-400 font-bold text-lg">
            </div>
            
            <button onclick="generateDanSimpan()" class="w-full bg-blue-600 text-white font-black py-5 rounded-2xl hover:brightness-125 transition duration-300 uppercase tracking-widest">
                VERIFIKASI & DAFTARKAN
            </button>
        </div>
    </div>

    <div class="glass-card p-10 flex flex-col items-center justify-center bg-gradient-to-b from-[#16161a] to-[#0f0f12]">
        <div id="placeholder-text" class="text-center opacity-30">
            <div class="text-6xl mb-4">🎫</div>
            <p class="font-bold">Menunggu Input Data...</p>
        </div>

        <div id="hasil-qr" class="hidden text-center scale-95 transition-all duration-500">
            <div id="qrcode" class="p-6 bg-white rounded-[2rem] shadow-2xl mb-6 inline-block"></div>
            <h3 id="info-nama" class="text-2xl font-black text-white mb-2 italic"></h3>
            <div class="flex items-center justify-center gap-2">
                <span class="w-2 h-2 bg-green-500 rounded-full animate-pulse"></span>
                <p class="text-xs font-bold text-gray-500 uppercase tracking-widest">ID Card Generated</p>
            </div>
            <button onclick="location.reload()" class="mt-8 text-blue-500 text-xs font-black hover:underline uppercase">Input Karyawan Lain</button>
        </div>
    </div>
</section>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-app.js";
    import { getFirestore, collection, query, where, getDocs, addDoc } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyB-GSKbvVTc2e_6sGnL2WSPNU19wUd6BYQ",
        authDomain: "bukber-9d73f.firebaseapp.com",
        projectId: "bukber-9d73f",
        storageBucket: "bukber-9d73f.firebasestorage.app",
        messagingSenderId: "86991458584",
        appId: "1:86991458584:web:6ce66640bcb7fe45ba8e6d"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    // Toast Notification Configuration
    const Toast = Swal.mixin({
        toast: true,
        position: 'top',
        showConfirmButton: false,
        timer: 3000,
        timerProgressBar: true,
        background: '#1c1c21',
        color: '#fff'
    });

    window.generateDanSimpan = async function() {
        const nama = document.getElementById('nama').value.trim();
        const idKar = document.getElementById('id_karyawan').value.trim();

        if(!nama || !idKar) {
            return Toast.fire({ icon: 'warning', title: 'Isi Nama dan ID dulu!' });
        }

        try {
            // 1. CEK APAKAH ID SUDAH TERDAFTAR (Cek Duplikasi)
            const q = query(collection(db, "employees"), where("barcode", "==", idKar));
            const querySnapshot = await getDocs(q);

            if (!querySnapshot.empty) {
                // JIKA DITEMUKAN DATA DENGAN ID YANG SAMA
                return Swal.fire({
                    icon: 'error',
                    title: 'ID Sudah Terdaftar!',
                    text: `ID "${idKar}" sudah digunakan oleh karyawan lain.`,
                    background: '#16161a',
                    color: '#fff',
                    confirmButtonColor: '#d33'
                });
            }

            // 2. JIKA ID BELUM ADA, LANJUT SIMPAN
            Swal.fire({ title: 'Mendaftarkan...', allowOutsideClick: false, didOpen: () => { Swal.showLoading() } });

            await addDoc(collection(db, "employees"), {
                name: nama,
                barcode: idKar,
                createdAt: new Date().toISOString()
            });

            // 3. TAMPILKAN QR
            document.getElementById('placeholder-text').classList.add('hidden');
            document.getElementById('hasil-qr').classList.remove('hidden');
            document.getElementById('hasil-qr').classList.add('scale-100');
            document.getElementById('info-nama').innerText = nama;
            document.getElementById('qrcode').innerHTML = "";

            new QRCode(document.getElementById("qrcode"), {
                text: idKar,
                width: 200,
                height: 200,
                correctLevel: QRCode.CorrectLevel.H,
                logo: "icon.png", // Logo tengah
                logoWidth: 50,
                logoHeight: 50,
                logoBackgroundColor: '#ffffff'
            });

            Swal.close();
            Toast.fire({ icon: 'success', title: 'Berhasil didaftarkan!' });

        } catch (e) {
            Swal.fire('Error', e.message, 'error');
        }
    }
</script>

<script>
    // Doraemon Animation & Login Logic (Sama seperti sebelumnya)
    const passInput = document.getElementById('loginPassword');
    passInput.addEventListener('focus', () => {
        document.getElementById('leftEye').classList.add('eye-closed');
        document.getElementById('rightEye').classList.add('eye-closed');
        document.getElementById('doraemon-container').style.transform = 'scale(1.1)';
    });
    passInput.addEventListener('blur', () => {
        document.getElementById('leftEye').classList.remove('eye-closed');
        document.getElementById('rightEye').classList.remove('eye-closed');
        document.getElementById('doraemon-container').style.transform = 'scale(1)';
    });

    document.getElementById('loginForm').addEventListener('submit', (e) => {
        e.preventDefault();
        if(document.getElementById('loginEmail').value === "indra2005@gmail.com" && 
           document.getElementById('loginPassword').value === "indra2005") {
            document.getElementById('authPage').classList.add('hidden');
            document.getElementById('mainPage').classList.remove('hidden');
            document.getElementById('mainPage').classList.add('grid');
        } else {
            Swal.fire({ icon: 'error', title: 'Akses Ditolak', text: 'Email/Pass Salah!', background: '#16161a', color: '#fff' });
        }
    });
</script>
</body>
</html>
