<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ID-GATE | SECURE ATTENDANCE SYSTEM</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { --neon: #00f2ff; --neon-purple: #bc13fe; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #050505; color: white; min-height: 100vh; margin: 0; }
        .orbitron { font-family: 'Orbitron', sans-serif; }
        
        .cyber-bg {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at 50% -20%, #1a1a2e 0%, #050505 80%);
            z-index: -1;
        }

        .action-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 30px;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        #scan-area-ui {
            position: relative; overflow: hidden;
            border: 2px solid var(--neon);
            box-shadow: 0 0 25px rgba(0, 242, 255, 0.3);
            background: #000;
        }
        .scan-line {
            position: absolute; width: 100%; height: 4px;
            background: var(--neon); box-shadow: 0 0 15px var(--neon);
            animation: moveScan 2s infinite ease-in-out;
            z-index: 10;
        }
        @keyframes moveScan { 0%, 100% { top: 0%; } 50% { top: 100%; } }

        video { transform: scaleX(-1); border-radius: 20px; object-fit: cover; }
        ::-webkit-scrollbar { width: 0px; }
    </style>
</head>
<body class="p-6">
    <div class="cyber-bg"></div>

    <section id="authPage" class="min-h-screen flex flex-col items-center justify-center space-y-10">
        <div class="text-center">
            <div class="w-24 h-24 bg-cyan-500/10 rounded-3xl mx-auto flex items-center justify-center mb-6 border border-cyan-500/30">
                <span class="text-4xl">💎</span>
            </div>
            <h1 class="orbitron text-3xl font-black tracking-[0.4em]">ID-GATE</h1>
            <p class="text-cyan-500 text-[10px] font-black uppercase tracking-[0.2em] mt-3">Personnel Authorization</p>
        </div>

        <div class="w-full max-w-xs space-y-4">
            <input type="text" id="inputID" placeholder="ENTER SYSTEM ID" class="w-full bg-white/5 border border-white/10 p-5 rounded-2xl text-center orbitron text-cyan-400 focus:border-cyan-400 outline-none transition uppercase">
            <button onclick="loginUser()" class="w-full bg-white py-5 rounded-2xl font-black text-black orbitron tracking-widest hover:bg-cyan-400 transition-all">AUTHORIZE</button>
        </div>
    </section>

    <section id="mainPage" class="hidden max-w-md mx-auto space-y-8 pt-6 pb-20">
        <div class="bg-white/5 p-8 rounded-[2.5rem] border border-white/10 relative overflow-hidden">
            <div class="relative z-10">
                <div class="flex items-center gap-2 mb-2">
                    <span class="w-2 h-2 bg-cyan-400 rounded-full animate-pulse"></span>
                    <p class="text-[10px] font-black text-cyan-400 uppercase tracking-widest">Authorized Staff</p>
                </div>
                <h2 id="userName" class="text-3xl font-black orbitron leading-tight text-white"></h2>
                <p id="userIDDisplay" class="text-[10px] font-mono text-gray-500 mt-2 tracking-widest"></p>
            </div>
            <button onclick="location.reload()" class="absolute top-8 right-8 text-gray-500">✕</button>
        </div>

        <div class="text-center">
            <h3 id="liveClock" class="orbitron text-5xl font-black tracking-tighter">00:00:00</h3>
            <p id="liveDate" class="text-gray-500 text-[10px] font-bold uppercase tracking-[0.3em] mt-2"></p>
        </div>

        <div class="grid grid-cols-1 gap-4">
            <button onclick="openVerification('MASUK')" class="action-card p-8 flex items-center justify-between group border-l-[5px] border-cyan-400">
                <div class="text-left">
                    <p class="orbitron text-lg font-black text-white">ABSEN MASUK</p>
                    <p class="text-[10px] text-cyan-500 font-bold uppercase">SHIFT START</p>
                </div>
                <div class="text-3xl">☀️</div>
            </button>

            <button onclick="openVerification('PULANG')" class="action-card p-8 flex items-center justify-between group border-l-[5px] border-purple-500">
                <div class="text-left">
                    <p class="orbitron text-lg font-black text-white">ABSEN PULANG</p>
                    <p class="text-[10px] text-purple-500 font-bold uppercase">SHIFT END</p>
                </div>
                <div class="text-3xl">🌙</div>
            </button>
        </div>

        <div class="space-y-4">
            <h4 class="text-[10px] font-black text-gray-500 uppercase tracking-widest px-2">Recent Logs</h4>
            <div id="recentLogs" class="space-y-3"></div>
        </div>
    </section>

    <div id="modalVerify" class="fixed inset-0 bg-black/98 z-[100] hidden flex flex-col items-center justify-center p-8 backdrop-blur-2xl">
        <div class="w-full max-w-sm text-center">
            <div id="scan-area-ui" class="aspect-square rounded-[3rem] mb-10">
                <div id="qr-reader" class="w-full h-full"></div>
                <video id="webcam" class="hidden w-full h-full object-cover" autoplay playsinline></video>
                <div id="scan-line-ui" class="scan-line"></div>
            </div>

            <h3 id="verifyTitle" class="orbitron text-2xl font-black text-white mb-2">SCANNING...</h3>
            <p id="verifyDesc" class="text-gray-500 text-xs uppercase font-bold tracking-[0.2em] mb-8">Gunakan QR Card atau Pilih File</p>
            
            <input type="file" id="qr-input-file" accept="image/*" class="hidden">
            
            <div id="initialActions" class="space-y-4">
                <button onclick="handleGalleryOption()" class="w-full bg-white/10 text-white py-4 rounded-2xl orbitron font-bold text-xs tracking-widest border border-white/20">
                    📁 UPLOAD DARI GALERI
                </button>
                <button onclick="location.reload()" class="w-full py-4 text-gray-700 font-bold text-[10px] uppercase tracking-widest">CANCEL</button>
            </div>
            
            <div id="snapAction" class="hidden mt-6">
                <button onclick="snapAndSubmit()" class="w-full bg-cyan-500 text-black py-6 rounded-3xl orbitron font-black text-sm tracking-widest">KONFIRMASI WAJAH</button>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-app.js";
        import { getFirestore, collection, query, where, getDocs, addDoc, onSnapshot, orderBy, limit } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-firestore.js";

        // CONFIGURASI FIREBASE
        const firebaseConfig = {
            apiKey: "AIzaSyB-GSKbvVTc2e_6sGnL2WSPNU19wUd6BYQ",
            authDomain: "bukber-9d73f.firebaseapp.com",
            projectId: "bukber-9d73f",
            storageBucket: "bukber-9d73f.firebasestorage.app",
            appId: "1:86991458584:web:6ce66640bcb7fe45ba8e6d"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        let user = null, type = "";
        const scanner = new Html5Qrcode("qr-reader");

        // JAM REALTIME
        setInterval(() => {
            const now = new Date();
            document.getElementById('liveClock').innerText = now.toLocaleTimeString('id-ID', {hour12: false});
            document.getElementById('liveDate').innerText = now.toLocaleDateString('id-ID', {weekday:'long', day:'numeric', month:'long'});
        }, 1000);

        // LOGIN USER
        window.loginUser = async () => {
            const id = document.getElementById('inputID').value.trim();
            if(!id) return;
            const q = query(collection(db, "employees"), where("barcode", "==", id));
            const snap = await getDocs(q);
            if (snap.empty) {
                return Swal.fire({ icon: 'error', title: 'DENIED', text: 'ID System Tidak Terdaftar', background: '#050505', color: '#fff' });
            }
            user = snap.docs[0].data();
            document.getElementById('authPage').classList.add('hidden');
            document.getElementById('mainPage').classList.remove('hidden');
            document.getElementById('userName').innerText = user.name.toUpperCase();
            document.getElementById('userIDDisplay').innerText = `TAG: ${user.barcode}`;
            loadRecentLogs(user.barcode);
        };

        // BUKA PANEL SCAN
        window.openVerification = (status) => {
            type = status;
            document.getElementById('modalVerify').classList.remove('hidden');
            scanner.start({ facingMode: "environment" }, { fps: 20, qrbox: 250 }, onQrSuccess)
                   .catch(() => console.log("Menunggu input manual..."));
        };

        // HANDLE GALERI (DIOPTIMASI)
        window.handleGalleryOption = async () => {
            // Matikan kamera dulu agar tidak crash di beberapa browser
            if(scanner.isScanning) {
                await scanner.stop();
            }
            document.getElementById('qr-input-file').click();
        };

        document.getElementById('qr-input-file').addEventListener('change', async e => {
            if (e.target.files.length === 0) return;
            
            Swal.fire({ title: 'MENGANALISIS...', background: '#050505', color: '#fff', didOpen: () => Swal.showLoading() });
            
            try {
                const result = await scanner.scanFile(e.target.files[0], true);
                Swal.close();
                onQrSuccess(result);
            } catch (err) {
                Swal.fire({ icon: 'error', title: 'QR TIDAK TERDETEKSI', text: 'Gunakan gambar QR yang jelas dan kontras.', background: '#050505', color: '#fff' });
                // Reset scanner jika gagal agar tombol kamera bisa dipakai lagi
                openVerification(type);
            }
        });

        // VALIDASI QR
        async function onQrSuccess(txt) {
            if (!txt.includes(user.barcode)) {
                Swal.fire({ icon: 'error', title: 'INVALID', text: 'QR Code bukan milik ID Anda!', background: '#050505', color: '#fff' });
                return;
            }

            if (scanner.isScanning) await scanner.stop();
            
            // Masuk ke Mode Foto Wajah
            document.getElementById('qr-reader').classList.add('hidden');
            document.getElementById('scan-line-ui').style.animation = "none";
            document.getElementById('initialActions').classList.add('hidden');
            document.getElementById('webcam').classList.remove('hidden');
            document.getElementById('snapAction').classList.remove('hidden');
            document.getElementById('verifyTitle').innerText = "VERIFIKASI WAJAH";

            const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } });
            document.getElementById('webcam').srcObject = stream;
        }

        // SUBMIT ABSENSI
        window.snapAndSubmit = async () => {
            const vid = document.getElementById('webcam'), canvas = document.createElement('canvas');
            canvas.width = vid.videoWidth; canvas.height = vid.videoHeight;
            const ctx = canvas.getContext('2d');
            ctx.translate(canvas.width, 0); ctx.scale(-1, 1);
            ctx.drawImage(vid, 0, 0);
            const photo = canvas.toDataURL('image/jpeg', 0.5);

            Swal.fire({ title: 'RECORDING...', background: '#050505', color: '#fff', didOpen: () => Swal.showLoading() });
            
            await addDoc(collection(db, "attendance"), {
                name: user.name, barcode: user.barcode, status: type,
                time: new Date().toLocaleTimeString('id-ID'),
                date: new Date().toLocaleDateString('id-ID'),
                timestamp: new Date(), photo: photo
            });

            Swal.fire({ icon: 'success', title: 'SUCCESS', text: `Absen ${type} Berhasil!`, background: '#050505', color: '#fff', showConfirmButton: false, timer: 1500 })
            .then(() => location.reload());
        };

        // LOAD DATA
        function loadRecentLogs(userBarcode) {
            const qLogs = query(collection(db, "attendance"), where("barcode", "==", userBarcode), orderBy("timestamp", "desc"), limit(3));
            onSnapshot(qLogs, (snap) => {
                const container = document.getElementById('recentLogs');
                container.innerHTML = snap.empty ? `<p class="text-[10px] text-gray-700 text-center py-6 italic uppercase">No Activity</p>` : "";
                snap.forEach(doc => {
                    const data = doc.data();
                    container.innerHTML += `
                        <div class="bg-white/5 border border-white/10 p-4 rounded-3xl flex items-center justify-between">
                            <div class="flex items-center gap-4">
                                <img src="${data.photo}" class="w-12 h-12 rounded-2xl object-cover border border-white/10">
                                <div>
                                    <p class="text-[9px] font-black ${data.status === 'MASUK' ? 'text-cyan-400' : 'text-purple-400'} uppercase">${data.status}</p>
                                    <p class="orbitron text-sm font-black text-white">${data.time}</p>
                                </div>
                            </div>
                            <p class="text-[8px] text-gray-600 font-bold uppercase">${data.date}</p>
                        </div>`;
                });
            });
        }
    </script>
</body>
</html>
