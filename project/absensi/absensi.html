<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>absensi by indra</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/@vladmandic/face-api/dist/face-api.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #050505; color: white; overflow-x: hidden; }
        .glass { background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255, 255, 255, 0.1); backdrop-filter: blur(10px); }
        .btn-blue { background: linear-gradient(135deg, #3d5afe, #2196f3); }
        #webcam { transform: scaleX(-1); border-radius: 24px; object-fit: cover; background: #000; }
        #reader { border: none !important; border-radius: 20px; overflow: hidden; }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center justify-center p-6">

    <section id="loginPage" class="w-full max-w-md space-y-8">
        <div class="text-center">
            <h1 class="text-4xl font-extrabold tracking-tighter italic uppercase">Staff<span class="text-blue-500">Portal</span></h1>
            <p class="text-[10px] text-gray-500 font-bold uppercase tracking-[0.4em] mt-2 italic">absensi by indra</p>
        </div>
        <div class="glass p-8 rounded-[35px] space-y-4 shadow-2xl">
            <input type="text" id="inputID" placeholder="MASUKKAN ID ANDA" class="w-full p-5 rounded-2xl bg-white/5 border border-white/10 outline-none focus:border-blue-500 transition font-bold uppercase text-center text-blue-400">
            <button onclick="doLogin()" class="w-full btn-blue text-white font-black py-5 rounded-2xl text-[11px] uppercase tracking-widest active:scale-95 transition">masuk</button>
        </div>
    </section>

    <section id="homePage" class="hidden w-full max-w-md space-y-6">
        <div class="glass p-8 rounded-[35px] border border-white/5">
            <h2 id="userGreet" class="text-2xl font-black uppercase italic text-white">-</h2>
            <p id="idGreet" class="text-[10px] font-mono text-gray-500 tracking-widest font-bold">-</p>
        </div>
        <div class="grid grid-cols-1 gap-4">
            <button onclick="openAbsen('MASUK')" class="glass p-6 rounded-[28px] flex items-center gap-6 border-l-4 border-green-500 group transition text-left">
                <span class="text-3xl">📥</span>
                <div>
                    <p class="text-xs font-black uppercase tracking-widest">Absen Masuk</p>
                    <p class="text-[9px] text-gray-500 font-bold italic uppercase">selamat bekerja</p>
                </div>
            </button>
            <button onclick="openAbsen('PULANG')" class="glass p-6 rounded-[28px] flex items-center gap-6 border-l-4 border-orange-500 group transition text-left">
                <span class="text-3xl">📤</span>
                <div>
                    <p class="text-xs font-black uppercase tracking-widest">Absen Pulang</p>
                    <p class="text-[9px] text-gray-500 font-bold italic uppercase">hati-hati dijalan pulang yaa...</p>
                </div>
            </button>
        </div>
    </section>

    <section id="absenActionPage" class="hidden w-full max-w-md space-y-4">
        <div id="qrSection" class="glass rounded-[30px] overflow-hidden p-3 border border-white/5">
            <div id="reader" class="bg-black"></div>
            <div class="p-6 text-center space-y-4">
                <input type="file" id="qr-input-file" accept="image/*" class="hidden">
                <button onclick="triggerFileSelect()" class="w-full py-4 bg-white/5 border border-white/10 rounded-2xl text-[10px] font-black uppercase tracking-widest hover:bg-white/10 transition">
                    📁 Ambil QR dari Galeri
                </button>
            </div>
        </div>

        <div id="faceSection" class="hidden relative glass p-2 rounded-[35px] overflow-hidden">
            <video id="webcam" autoplay playsinline class="w-full h-[450px]"></video>
            <div class="absolute top-8 left-1/2 -translate-x-1/2 bg-blue-600/90 px-6 py-2 rounded-full text-[10px] font-black uppercase">Scan Wajah...</div>
        </div>
    </section>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-app.js";
        import { getFirestore, collection, addDoc, getDocs, query, where } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyB-GSKbvVTc2e_6sGnL2WSPNU19wUd6BYQ",
            authDomain: "bukber-9d73f.firebaseapp.com",
            projectId: "bukber-9d73f",
            storageBucket: "bukber-9d73f.firebasestorage.app",
            appId: "1:86991458584:web:6ce66640bcb7fe45ba8e6d"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        let session = { id: "", name: "", mode: "" };
        let html5QrCode = null;

        async function loadModels() {
            await faceapi.nets.tinyFaceDetector.loadFromUri('https://cdn.jsdelivr.net/npm/@vladmandic/face-api/model/');
        }
        loadModels();

        window.doLogin = async () => {
            const idInput = document.getElementById('inputID').value.trim().toUpperCase();
            if(!idInput) return;
            Swal.fire({ title: 'loading...', background: '#050505', color: '#fff', didOpen: () => Swal.showLoading() });
            const q = query(collection(db, "employees"), where("barcode", "==", idInput));
            const snap = await getDocs(q);
            if (!snap.empty) {
                const data = snap.docs[0].data();
                session.id = data.barcode;
                session.name = data.name;
                document.getElementById('userGreet').innerText = data.name;
                document.getElementById('idGreet').innerText = data.barcode;
                document.getElementById('loginPage').classList.add('hidden');
                document.getElementById('homePage').classList.remove('hidden');
                Swal.close();
            } else {
                Swal.fire({ icon: 'error', title: 'GAGAL', text: 'ID tidak ditemukan.', background: '#050505' });
            }
        };

        window.openAbsen = (mode) => {
            session.mode = mode;
            document.getElementById('homePage').classList.add('hidden');
            document.getElementById('absenActionPage').classList.remove('hidden');
            html5QrCode = new Html5Qrcode("reader");
            html5QrCode.start({ facingMode: "environment" }, { fps: 10, qrbox: 250 }, (txt) => handleQrResult(txt));
        };

        window.triggerFileSelect = async () => {
            if(html5QrCode && html5QrCode.isScanning) {
                await html5QrCode.stop().catch(e => console.log(e));
            }
            document.getElementById('qr-input-file').click();
        };

        document.getElementById('qr-input-file').addEventListener('change', async e => {
            if (e.target.files.length === 0) return;
            const file = e.target.files[0];
            Swal.fire({ title: 'SCANNING...', allowOutsideClick: false, background: '#050505', color: '#fff', didOpen: () => Swal.showLoading() });
            
            const reader = new FileReader();
            reader.onload = (f) => {
                const img = new Image();
                img.onload = () => {
                    const canvas = document.createElement('canvas');
                    const max = 800;
                    let w = img.width, h = img.height;
                    if (w > h) { if (w > max) { h *= max / w; w = max; } }
                    else { if (h > max) { w *= max / h; h = max; } }
                    canvas.width = w; canvas.height = h;
                    canvas.getContext('2d').drawImage(img, 0, 0, w, h);
                    canvas.toBlob(async (blob) => {
                        const rFile = new File([blob], "qr.jpg", { type: "image/jpeg" });
                        try {
                            const scanner = new Html5Qrcode("reader");
                            const res = await scanner.scanFile(rFile, true);
                            handleQrResult(res);
                            Swal.close();
                        } catch (err) {
                            Swal.fire({ icon: 'error', title: 'GAGAL', text: 'QR tidak jelas/terpotong.', background: '#050505' });
                            html5QrCode.start({ facingMode: "environment" }, { fps: 10, qrbox: 250 }, (txt) => handleQrResult(txt));
                        }
                    }, 'image/jpeg', 0.8);
                };
                img.src = f.target.result;
            };
            reader.readAsDataURL(file);
        });

        function handleQrResult(text) {
            if(text.trim().toUpperCase().includes(session.id.toUpperCase())) {
                if(html5QrCode && html5QrCode.isScanning) html5QrCode.stop().catch(() => {});
                document.getElementById('qrSection').classList.add('hidden');
                document.getElementById('faceSection').classList.remove('hidden');
                startFaceDetection();
            } else {
                Swal.fire({ icon: 'warning', title: 'BUKAN ID ANDA', text: 'Gunakan QR milik sendiri.', background: '#050505' });
            }
        }

        async function startFaceDetection() {
            const vid = document.getElementById('webcam');
            const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } });
            vid.srcObject = stream;
            vid.addEventListener('play', () => {
                const i = setInterval(async () => {
                    const d = await faceapi.detectAllFaces(vid, new faceapi.TinyFaceDetectorOptions());
                    if(d.length > 0) { clearInterval(i); saveFinal(); }
                }, 1000);
            });
        }

        async function saveFinal() {
            Swal.fire({ title: 'TERVERIFIKASI', text: 'Sinkronisasi...', icon: 'success', showConfirmButton: false, background: '#050505' });
            navigator.geolocation.getCurrentPosition(async (p) => {
                const vid = document.getElementById('webcam');
                const canvas = document.createElement('canvas');
                canvas.width = vid.videoWidth; canvas.height = vid.videoHeight;
                canvas.getContext('2d').drawImage(vid, 0, 0);
                
                try {
                    await addDoc(collection(db, "attendance"), {
                        name: session.name,
                        barcode: session.id,
                        status: session.mode,
                        time: new Date().toLocaleTimeString('id-ID'),
                        date: new Date().toLocaleDateString('id-ID'),
                        photo: canvas.toDataURL('image/jpeg', 0.5),
                        coords: { lat: p.coords.latitude, lon: p.coords.longitude }
                    });
                    location.reload();
                } catch (e) { console.log(e); }
            });
        }
    </script>
</body>
</html>
