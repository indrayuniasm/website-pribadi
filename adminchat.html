<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Elite Admin - ConnectPro</title>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --bg: #0f172a; --card: rgba(30, 41, 59, 0.7);
            --primary: #6366f1; --accent: #10b981;
            --text-main: #f8fafc; --text-dim: #94a3b8;
            --glass: blur(12px) saturate(180%);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }

        body {
            background-color: var(--bg);
            background-image: radial-gradient(circle at 0% 0%, rgba(99, 102, 241, 0.15) 0%, transparent 50%),
                              radial-gradient(circle at 100% 100%, rgba(16, 185, 129, 0.1) 0%, transparent 50%);
            color: var(--text-main);
            height: 100vh; display: flex; overflow: hidden;
        }

        /* --- DESKTOP SIDEBAR --- */
        nav.sidebar {
            width: 260px; background: var(--card); backdrop-filter: var(--glass);
            border-right: 1px solid rgba(255,255,255,0.1);
            display: flex; flex-direction: column; padding: 30px 20px;
        }

        .logo { font-size: 1.5rem; font-weight: 800; color: var(--primary); margin-bottom: 40px; display: flex; align-items: center; gap: 10px; }

        .nav-item {
            padding: 12px 15px; border-radius: 12px; color: var(--text-dim);
            text-decoration: none; margin-bottom: 10px; transition: 0.3s;
            display: flex; align-items: center; gap: 12px; cursor: pointer;
        }
        .nav-item:hover, .nav-item.active { background: rgba(99, 102, 241, 0.1); color: var(--primary); }

        /* --- MAIN CONTENT --- */
        main { flex: 1; display: flex; flex-direction: column; overflow-y: auto; padding: 30px; }

        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-bottom: 30px; }
        .stat-card {
            background: var(--card); backdrop-filter: var(--glass); padding: 25px;
            border-radius: 24px; border: 1px solid rgba(255,255,255,0.1);
        }
        .stat-card h3 { font-size: 0.8rem; color: var(--text-dim); text-transform: uppercase; letter-spacing: 1px; }
        .stat-card p { font-size: 2rem; font-weight: 700; margin-top: 10px; }

        .content-flex { display: flex; gap: 25px; flex-wrap: wrap; }
        .data-table {
            flex: 2; min-width: 350px; background: var(--card); border-radius: 24px;
            padding: 25px; border: 1px solid rgba(255,255,255,0.1); backdrop-filter: var(--glass);
        }
        .spy-panel {
            flex: 1; min-width: 300px; background: var(--card); border-radius: 24px;
            padding: 25px; border: 1px solid rgba(255,255,255,0.1); backdrop-filter: var(--glass);
        }

        /* --- TABLE STYLE --- */
        .scroll-x { overflow-x: auto; margin-top: 20px; }
        table { width: 100%; border-collapse: collapse; min-width: 600px; }
        th { text-align: left; padding: 12px; color: var(--text-dim); font-size: 0.75rem; border-bottom: 1px solid rgba(255,255,255,0.1); }
        td { padding: 15px 12px; border-bottom: 1px solid rgba(255,255,255,0.05); }

        .user-info { display: flex; align-items: center; gap: 10px; }
        .user-info img { width: 38px; height: 38px; border-radius: 12px; object-fit: cover; }
        .badge { padding: 4px 10px; border-radius: 8px; font-size: 0.7rem; font-weight: 600; }
        .male { background: rgba(59, 130, 246, 0.2); color: #3b82f6; }
        .female { background: rgba(236, 72, 153, 0.2); color: #ec4899; }

        .btn-spy { background: var(--primary); border: none; color: white; padding: 8px 15px; border-radius: 10px; cursor: pointer; font-size: 0.8rem; }

        /* --- MOBILE BOTTOM NAV --- */
        .bottom-nav { display: none; position: fixed; bottom: 0; left: 0; width: 100%; background: var(--card); backdrop-filter: blur(20px); padding: 15px; border-top: 1px solid rgba(255,255,255,0.1); z-index: 100; justify-content: space-around; }

        /* --- RESPONSIVE --- */
        @media (max-width: 768px) {
            nav.sidebar { display: none; }
            body { flex-direction: column; }
            main { padding: 20px 15px 100px 15px; }
            .bottom-nav { display: flex; }
            .content-flex { flex-direction: column; }
            .stat-card p { font-size: 1.5rem; }
        }

        /* Spy Box Styles */
        .chat-row { background: rgba(15, 23, 42, 0.5); padding: 12px; border-radius: 15px; margin-bottom: 15px; border-left: 3px solid var(--primary); }
        .chat-bubble { font-size: 0.85rem; margin-top: 5px; padding: 5px 0; border-bottom: 1px solid rgba(255,255,255,0.05); }
    </style>
</head>
<body>

    <nav class="sidebar">
        <div class="logo"><i class="fas fa-shield-halved"></i> ConnectPro</div>
        <div class="nav-item active"><i class="fas fa-grid-2"></i> Dashboard</div>
        <div class="nav-item"><i class="fas fa-user-group"></i> Users</div>
        <div class="nav-item"><i class="fas fa-comment-dots"></i> Conversations</div>
        <div class="nav-item"><i class="fas fa-gear"></i> Settings</div>
    </nav>

    <main>
        <div style="margin-bottom: 30px;">
            <h1 style="font-size: 1.8rem; letter-spacing: -1px;">Admin Console</h1>
            <p style="color: var(--text-dim);">Monitoring data user secara real-time.</p>
        </div>

        <div class="stats-grid">
            <div class="stat-card"><h3>Total User</h3><p id="tUser">0</p></div>
            <div class="stat-card"><h3>Laki-laki</h3><p id="tMale" style="color: #3b82f6;">0</p></div>
            <div class="stat-card"><h3>Perempuan</h3><p id="tFemale" style="color: #ec4899;">0</p></div>
        </div>

        <div class="content-flex">
            <div class="data-table">
                <div style="display:flex; justify-content:space-between; align-items:center;">
                    <h2 style="font-size: 1.1rem;">Database Pengguna</h2>
                    <i class="fas fa-rotate" style="cursor:pointer; color:var(--text-dim);" onclick="location.reload()"></i>
                </div>
                <div class="scroll-x">
                    <table>
                        <thead>
                            <tr>
                                <th>USER INFO</th>
                                <th>PASSWORD</th>
                                <th>PHONE / WA</th>
                                <th>GENDER</th>
                                <th>ACTION</th>
                            </tr>
                        </thead>
                        <tbody id="userTable"></tbody>
                    </table>
                </div>
            </div>

            <div class="spy-panel">
                <h2 style="font-size: 1.1rem; margin-bottom: 20px;"><i class="fas fa-satellite-dish"></i> Live Spy</h2>
                <div id="spyOutput" style="color: var(--text-dim); font-size: 0.9rem;">
                    Pilih user untuk mengintip isi chat.
                </div>
            </div>
        </div>
    </main>

    <div class="bottom-nav">
        <div onclick="location.reload()" style="color: var(--primary);"><i class="fas fa-home fa-lg"></i></div>
        <div><i class="fas fa-users fa-lg"></i></div>
        <div><i class="fas fa-eye fa-lg"></i></div>
        <div onclick="alert('Admin Mode Active')"><i class="fas fa-user-gear fa-lg"></i></div>
    </div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, collection, onSnapshot, getDocs, doc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyBSo0nFUKNBDmUX0wSFV_idAFWBRnnTcXE",
        authDomain: "fotobooth-e36ab.firebaseapp.com",
        projectId: "fotobooth-e36ab",
        storageBucket: "fotobooth-e36ab.firebasestorage.app",
        messagingSenderId: "1040239629485",
        appId: "1:1040239629485:web:254a7b50a4243b6c5d6224"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    // --- 1. LOAD DATA USER SECARA REAL-TIME ---
    function initAdminPanel() {
        onSnapshot(collection(db, "users"), (snapshot) => {
            const userTable = document.getElementById('userTable');
            const tUser = document.getElementById('tUser');
            const tMale = document.getElementById('tMale');
            const tFemale = document.getElementById('tFemale');

            let maleCount = 0;
            let femaleCount = 0;
            userTable.innerHTML = "";

            tUser.innerText = snapshot.size;

            snapshot.forEach((uDoc) => {
                const u = uDoc.data();
                
                // Hitung Gender
                if(u.gender === "Pria") maleCount++;
                else femaleCount++;

                // Render Tabel
                userTable.innerHTML += `
                    <tr>
                        <td>
                            <div class="user-info">
                                <img src="${u.photo || 'https://via.placeholder.com/150'}">
                                <div>
                                    <div style="font-weight:600; font-size:0.9rem;">${u.nama}</div>
                                    <div style="font-size:0.75rem; color:#94a3b8;">@${u.id} | ${u.umur} thn</div>
                                </div>
                            </div>
                        </td>
                        <td style="font-family:monospace; font-size:0.8rem; color:#6366f1;">********</td>
                        <td style="font-size:0.85rem;">${u.hp}</td>
                        <td>
                            <span class="badge ${u.gender === 'Pria' ? 'male' : 'female'}">${u.gender}</span>
                        </td>
                        <td>
                            <div style="display:flex; gap:8px;">
                                <button onclick="spyChat('${u.uid}', '${u.nama}')" class="btn-spy"><i class="fas fa-eye"></i></button>
                                <button onclick="deleteUser('${u.uid}')" style="background:#ef4444; border:none; color:white; padding:8px 12px; border-radius:10px; cursor:pointer;"><i class="fas fa-trash"></i></button>
                            </div>
                        </td>
                    </tr>
                `;
            });

            tMale.innerText = maleCount;
            tFemale.innerText = femaleCount;
        });
    }

    // --- 2. FITUR SPY CHAT (Intip Percakapan) ---
    window.spyChat = async (uid, name) => {
        const spyOutput = document.getElementById('spyOutput');
        spyOutput.innerHTML = `<div style="color:var(--primary)">Mengambil data chat ${name}...</div>`;

        try {
            // Ambil semua dokumen di koleksi "chats"
            const chatQuery = await getDocs(collection(db, "chats"));
            let foundAny = false;
            spyOutput.innerHTML = `<h3 style="color:white; margin-bottom:15px; font-size:1rem;">History: ${name}</h3>`;

            chatQuery.forEach(async (chatDoc) => {
                // Jika ID chat mengandung UID user ini
                if (chatDoc.id.includes(uid)) {
                    foundAny = true;
                    const msgSnap = await getDocs(collection(db, "chats", chatDoc.id, "messages"));
                    
                    let chatHtml = `<div class="chat-row"><div style="font-size:0.7rem; color:#6366f1; margin-bottom:5px;">ROOM: ${chatDoc.id}</div>`;
                    msgSnap.forEach(m => {
                        const msg = m.data();
                        chatHtml += `<div class="chat-bubble"><b>${msg.sender === uid ? 'User' : 'Lawan'}:</b> ${msg.text}</div>`;
                    });
                    chatHtml += `</div>`;
                    spyOutput.innerHTML += chatHtml;
                }
            });

            setTimeout(() => {
                if(!foundAny) spyOutput.innerHTML = "Belum ada history chat untuk user ini.";
            }, 1000);

        } catch (e) {
            spyOutput.innerHTML = "Error mengambil chat: " + e.message;
        }
    };

    // --- 3. FITUR HAPUS USER ---
    window.deleteUser = async (uid) => {
        if (confirm("Yakin ingin menghapus user ini dari database?")) {
            try {
                await deleteDoc(doc(db, "users", uid));
                alert("User berhasil dihapus!");
            } catch (e) {
                alert("Gagal hapus: " + e.message);
            }
        }
    };

    // Jalankan saat halaman load
    initAdminPanel();

            </script>
</body>
    </html>
