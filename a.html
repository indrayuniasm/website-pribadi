<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel | Elite Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #020617; color: #f8fafc; font-family: sans-serif; overflow-x: hidden; }
        .glass { background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.05); }
        tr:hover { background: rgba(255, 255, 255, 0.02); }
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: #1e293b; border-radius: 10px; }
    </style>
</head>
<body class="p-6 md:p-12">
    <div class="max-w-7xl mx-auto">
        <div class="flex flex-col md:flex-row justify-between items-center mb-10 gap-4">
            <div>
                <h1 class="text-3xl font-bold text-white tracking-tight">Admin <span class="text-indigo-500">Dashboard</span></h1>
                <p class="text-gray-500 text-sm">Monitoring ulasan & chat pelanggan secara real-time.</p>
            </div>
            <a href="index.html" class="px-5 py-2 glass rounded-xl text-xs font-bold hover:bg-white/5">LIHAT WEB USER</a>
        </div>

        <div class="glass rounded-3xl overflow-hidden mb-12 shadow-2xl">
            <div class="p-6 border-b border-white/5"><h3 class="font-bold text-lg">Daftar Testimoni</h3></div>
            <div class="overflow-x-auto">
                <table class="w-full text-left text-sm">
                    <thead class="bg-white/5 text-[10px] uppercase tracking-[0.2em] text-gray-500 font-black">
                        <tr><th class="p-6">Nama</th><th class="p-6">WhatsApp</th><th class="p-6">Rating</th><th class="p-6">Pesan</th><th class="p-6 text-center">Aksi</th></tr>
                    </thead>
                    <tbody id="tableBody"></tbody>
                </table>
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-12 gap-8 h-[600px] items-stretch">
            <div class="lg:col-span-4 glass rounded-3xl p-6 flex flex-col shadow-2xl">
                <h3 class="font-bold text-indigo-400 mb-6 flex items-center gap-2">
                    <span class="w-2 h-5 bg-indigo-500 rounded-full"></span> Chat Masuk
                </h3>
                <div id="userList" class="flex-grow overflow-y-auto space-y-3 pr-2">
                    <div class="text-center py-10 text-gray-600 text-xs italic">Menunggu pesan...</div>
                </div>
            </div>
            <div class="lg:col-span-8 glass rounded-3xl p-6 flex flex-col shadow-2xl relative overflow-hidden">
                <div id="chatHeader" class="pb-4 mb-4 border-b border-white/5">
                    <h4 id="activeName" class="font-bold text-white text-lg">Pilih Pelanggan</h4>
                    <p id="activePhone" class="text-xs text-indigo-400 font-medium italic">-</p>
                </div>
                <div id="adminChatMessages" class="flex-grow overflow-y-auto space-y-4 p-4 bg-black/30 rounded-2xl mb-4 flex flex-col shadow-inner">
                    <div class="m-auto text-gray-700 text-sm italic">Klik salah satu user di kiri untuk membalas chat.</div>
                </div>
                <div id="adminInputBox" class="hidden flex gap-3">
                    <input type="text" id="adminReply" onkeypress="if(event.key==='Enter')sendReply()" placeholder="Tulis balasan..." class="flex-grow bg-white/5 border border-white/10 rounded-2xl px-5 py-4 text-sm outline-none focus:border-indigo-500 transition-all">
                    <button onclick="sendReply()" class="px-8 bg-indigo-600 rounded-2xl font-bold text-sm hover:bg-indigo-500 transition-all active:scale-95 shadow-lg shadow-indigo-600/30">KIRIM</button>
                </div>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, query, orderBy, onSnapshot, where, addDoc, serverTimestamp, deleteDoc, doc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        // GANTI DENGAN CONFIG ANDA (HARUS SAMA DENGAN INDEX)
        const firebaseConfig = {
            apiKey: "ISI_API_KEY_ANDA",
            authDomain: "ISI_AUTH_DOMAIN_ANDA",
            projectId: "ISI_PROJECT_ID_ANDA",
            storageBucket: "ISI_STORAGE_BUCKET_ANDA",
            messagingSenderId: "ISI_MESSAGING_SENDER_ID_ANDA",
            appId: "ISI_APP_ID_ANDA"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // SYNC TESTIMONI TABLE
        onSnapshot(query(collection(db, "testimonials"), orderBy("createdAt", "desc")), snap => {
            const tbody = document.getElementById('tableBody'); tbody.innerHTML = '';
            snap.forEach(d => {
                const data = d.data();
                tbody.innerHTML += `<tr class="border-b border-white/5 transition-colors">
                    <td class="p-6 font-bold text-indigo-300 text-base">${data.name}</td>
                    <td class="p-6"><a href="https://wa.me/${data.phone}" target="_blank" class="px-3 py-1 bg-green-500/10 text-green-500 rounded-lg text-xs font-bold hover:bg-green-500/20 transition-all">WhatsApp: ${data.phone || '-'}</a></td>
                    <td class="p-6 font-black text-amber-500">${data.rating} ★</td>
                    <td class="p-6 text-gray-400 italic max-w-xs truncate">"${data.message}"</td>
                    <td class="p-6 text-center"><button onclick="delR('${d.id}')" class="p-2 hover:bg-red-500/20 rounded-lg group transition-all"><svg class="w-5 h-5 text-gray-600 group-hover:text-red-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg></button></td>
                </tr>`;
            });
        });
        window.delR = async (id) => { if(confirm("Hapus ulasan ini?")) await deleteDoc(doc(db, "testimonials", id)); };

        // CHAT MANAGER LOGIC
        let activeID = null; let activeN = ""; let activeP = ""; let unsubA = null;
        onSnapshot(query(collection(db, "chats"), orderBy("createdAt", "desc")), snap => {
            const list = document.getElementById('userList'); const sessions = {};
            snap.forEach(d => { 
                const msg = d.data(); 
                if(!sessions[msg.sessionID]) sessions[msg.sessionID] = { name: msg.userName, phone: msg.userPhone, last: msg.text }; 
            });
            list.innerHTML = '';
            Object.keys(sessions).forEach(id => {
                list.innerHTML += `<div onclick="openC('${id}','${sessions[id].name}','${sessions[id].phone}')" class="p-5 rounded-2xl bg-white/5 border border-white/5 cursor-pointer hover:bg-indigo-600/20 hover:border-indigo-600/30 transition-all ${activeID===id?'bg-indigo-600/20 border-indigo-600/50 shadow-lg':''}">
                    <div class="flex justify-between items-start mb-1"><h4 class="font-bold text-sm text-white">${sessions[id].name}</h4><span class="text-[8px] bg-white/10 px-1.5 py-0.5 rounded text-gray-400">AKTIF</span></div>
                    <p class="text-[10px] text-gray-500 truncate italic">"${sessions[id].last}"</p>
                </div>`;
            });
        });
        window.openC = (id, n, p) => {
            activeID = id; activeN = n; activeP = p; 
            document.getElementById('activeName').innerText = n; 
            document.getElementById('activePhone').innerText = "WhatsApp: " + p;
            document.getElementById('adminInputBox').classList.remove('hidden');
            if(unsubA) unsubA();
            unsubA = onSnapshot(query(collection(db, "chats"), where("sessionID", "==", id), orderBy("createdAt", "asc")), snap => {
                const box = document.getElementById('adminChatMessages'); box.innerHTML = '';
                snap.forEach(d => { 
                    const msg = d.data(); 
                    const isAdmin = msg.sender === 'admin';
                    box.innerHTML += `<div class="max-w-[75%] p-3 rounded-2xl text-[11px] leading-relaxed shadow-md animate-in ${isAdmin ? 'self-end bg-indigo-600 text-white rounded-tr-none' : 'self-start bg-white/10 text-gray-300 rounded-tl-none'}">${msg.text}</div>`; 
                });
                box.scrollTop = box.scrollHeight;
            });
        };
        window.sendReply = async () => { 
            const i = document.getElementById('adminReply'); if(!i.value) return; 
            await addDoc(collection(db, "chats"), { sessionID: activeID, userName: activeN, userPhone: activeP, text: i.value, sender: 'admin', createdAt: serverTimestamp() }); 
            i.value = ''; 
        };
    </script>
</body>
                            </html>
