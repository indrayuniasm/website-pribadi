<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Master Admin - Responsive Panel</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>

    <style>
        :root {
            --primary: #8b5cf6;
            --bg: #050505;
            --card: #121212;
            --border: #262626;
            --text: #ffffff;
            --text-dim: #a3a3a3;
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* --- DESKTOP SIDEBAR --- */
        .sidebar {
            width: 300px;
            background: var(--card);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            transition: 0.3s;
        }

        .main-content {
            flex: 1;
            overflow-y: auto;
            padding: 25px;
            display: flex;
            flex-direction: column;
            gap: 25px;
        }

        /* --- MOBILE NAVIGATION (Hidden on Desktop) --- */
        .mobile-nav {
            display: none;
            position: fixed;
            bottom: 0;
            width: 100%;
            background: var(--card);
            border-top: 1px solid var(--border);
            z-index: 1000;
            justify-content: space-around;
            padding: 10px 0;
        }

        .nav-item {
            color: var(--text-dim);
            text-align: center;
            font-size: 0.7rem;
            text-decoration: none;
        }

        .nav-item i { font-size: 1.2rem; display: block; margin-bottom: 3px; }
        .nav-item.active { color: var(--primary); }

        /* --- UI COMPONENTS --- */
        .glass-card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 20px;
        }

        .grid-system {
            display: grid;
            grid-template-columns: 1.5fr 1fr;
            gap: 20px;
        }

        .scroll-x { overflow-x: auto; width: 100%; }

        table { width: 100%; border-collapse: collapse; min-width: 600px; }
        th { text-align: left; color: var(--text-dim); padding: 15px; border-bottom: 1px solid var(--border); font-size: 0.85rem; }
        td { padding: 15px; border-bottom: 1px solid var(--border); font-size: 0.9rem; }

        .chat-bubble { padding: 10px 15px; border-radius: 15px; margin-bottom: 8px; max-width: 85%; font-size: 0.85rem; }
        .chat-admin { background: var(--primary); align-self: flex-end; }
        .chat-user { background: #262626; align-self: flex-start; }

        /* --- RESPONSIVE LOGIC (MOBILE) --- */
        @media (max-width: 992px) {
            body { flex-direction: column; }
            .sidebar { display: none; } /* Sembunyikan sidebar di HP */
            .mobile-nav { display: flex; } /* Tampilkan menu bawah */
            .main-content { padding: 15px; padding-bottom: 80px; }
            .grid-system { grid-template-columns: 1fr; } /* Layout jadi 1 kolom */
            
            .desktop-only { display: none; }
            h1 { font-size: 1.2rem; }
        }

        /* Tombol & Input */
        .btn-action {
            background: var(--primary);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 10px;
            font-weight: 600;
            cursor: pointer;
        }

        input {
            background: #1a1a1a;
            border: 1px solid var(--border);
            color: white;
            padding: 12px;
            border-radius: 10px;
            outline: none;
        }
    </style>
</head>
<body>

    <div class="sidebar">
        <div style="padding: 30px; font-weight: 800; color: var(--primary); font-size: 1.4rem;">
            <i class="fas fa-bolt"></i> DASHBOARD
        </div>
        <div style="padding: 0 20px 10px; font-size: 0.8rem; color: var(--text-dim);">USER CHATS</div>
        <div id="chatUserList" style="flex:1; overflow-y:auto; padding: 0 10px;"></div>
    </div>

    <div class="main-content">
        <header style="display: flex; justify-content: space-between; align-items: center;">
            <h1 id="pageTitle">Overview</h1>
            <div id="adminStatus" style="font-size: 0.8rem; color: #22c55e;">● Server Active</div>
        </header>

        <div class="grid-system">
            <div class="glass-card" id="chatSection" style="display: flex; flex-direction: column; height: 400px;">
                <h3 id="targetName" style="margin-top:0;">Live Chat</h3>
                <div id="chatMessages" style="flex:1; overflow-y:auto; display:flex; flex-direction:column; padding:10px;">
                    <p style="color:var(--text-dim); text-align:center;">Pilih user di sidebar atau menu Chat</p>
                </div>
                <div style="display:flex; gap:10px; padding-top:15px; border-top:1px solid var(--border);">
                    <input type="text" id="adminReply" placeholder="Ketik balasan..." style="flex:1;">
                    <button class="btn-action" onclick="sendReply()"><i class="fas fa-paper-plane"></i></button>
                </div>
            </div>

            <div class="glass-card">
                <h3>Bank Deposit</h3>
                <div style="display:flex; flex-direction:column; gap:10px;">
                    <input type="text" id="newBank" placeholder="Nama Bank">
                    <input type="text" id="newRek" placeholder="Nomor Rekening">
                    <button class="btn-action" onclick="addBank()">Tambah Rekening</button>
                </div>
                <div id="bankListDisplay" style="margin-top:15px; font-size:0.9rem;"></div>
            </div>
        </div>

        <div class="glass-card">
            <h3>Database Member</h3>
            <div class="scroll-x">
                <table id="userTable">
                    <thead>
                        <tr>
                            <th>ID User</th>
                            <th>Password</th>
                            <th>Kontak</th>
                            <th>Rekening</th>
                            <th>Saldo</th>
                        </tr>
                    </thead>
                    <tbody></tbody>
                </table>
            </div>
        </div>

        <div class="glass-card">
            <h3>Antrean Transaksi</h3>
            <div class="scroll-x">
                <table>
                    <thead>
                        <tr>
                            <th>User</th>
                            <th>Tipe</th>
                            <th>Nominal</th>
                            <th>Status/Info</th>
                            <th>Aksi</th>
                        </tr>
                    </thead>
                    <tbody id="txTable"></tbody>
                </table>
            </div>
        </div>
    </div>

    <div class="mobile-nav">
        <a href="#" class="nav-item active" onclick="showTab('main')">
            <i class="fas fa-home"></i>Home
        </a>
        <a href="#" class="nav-item" onclick="showTab('chat')">
            <i class="fas fa-comments"></i>Chat
        </a>
        <a href="#" class="nav-item" onclick="showTab('users')">
            <i class="fas fa-users"></i>Users
        </a>
        <a href="#" class="nav-item" onclick="showTab('finance')">
            <i class="fas fa-wallet"></i>Finance
        </a>
    </div>

<script>
    const firebaseConfig = { /* CONFIG FIREBASE ANDA */ };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    let currentChatID = null;

    // --- RESPONSIVE TAB LOGIC (Untuk Mobile) ---
    function showTab(type) {
        // Logika sederhana untuk menyembunyikan/menampilkan section di HP
        // Di sini kita bisa menambah filter tampilan berdasarkan kategori
        document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
        event.currentTarget.classList.add('active');
        
        if(type === 'chat') {
            // Logika munculkan daftar chat di mobile jika diperlukan
            alert("Gunakan sidebar (Desktop) atau sistem Drawer (Mobile) untuk pilih chat");
        }
    }

    // --- DATA FETCHING (Sama seperti sebelumnya) ---
    db.ref('users').on('value', snap => {
        const tbody = document.querySelector('#userTable tbody');
        tbody.innerHTML = "";
        snap.forEach(c => {
            const u = c.val();
            tbody.innerHTML += `<tr>
                <td><b>${c.key}</b></td>
                <td><code>${u.pw}</code></td>
                <td><a href="https://wa.me/${u.wa}" style="color:var(--primary); text-decoration:none;">${u.wa}</a></td>
                <td>${u.bank}<br><small>${u.rek}</small></td>
                <td>Rp ${(u.balance||0).toLocaleString()}</td>
            </tr>`;
        });
    });

    // (Masukkan fungsi handleTx, sendReply, openChat, dan addBank dari kode sebelumnya)
</script>
</body>
    </html>
